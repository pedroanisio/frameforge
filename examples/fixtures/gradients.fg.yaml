dsl: FrameGraph
version: 2.2.0
profile: diagram
title: Gradient paints (fixture)
description: >-
  Exercises the v2 `Gradient` paint source as a `fill` and as a `stroke` — the
  three `kind`s (linear / radial / conic), multi-stop colour ramps with explicit
  `position` percentages, the `angle` (linear) and `from`/`at`/`shape` (radial,
  conic) controls, and a `repeating` ramp for hard-edged stripes. The SVG proxy
  emits a real `<linearGradient>` / `<radialGradient>`; `conic` degrades to its
  first stop in the proxy (documented), but validates and renders in conformant
  backends.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      a1: '#2e86de'
      a2: '#9b59b6'
      a3: '#e74c3c'
      gold: '#f1c40f'
      teal: '#16a085'
    text_styles:
      title:
        font: sans
        size: 15
        weight: 600
        color: ink
      cap:
        font: sans
        size: 11
        color: ink
        align: center
pages:
- mode: page
  id: gradients
  canvas:
    size: [780, 300]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: text
      box: [24, 16, 720, 22]
      text: Gradient paints — linear, radial, conic
      style: title

    # Row 1 — six fill swatches
    - type: rect
      box: [24, 56, 116, 110]
      radius: 8
      fill:
        kind: linear
        angle: 90
        stops:
        - {color: a1, position: '0%'}
        - {color: a2, position: '50%'}
        - {color: a3, position: '100%'}
    - type: text
      box: [24, 172, 116, 16]
      text: linear 90° · 3 stops
      style: cap

    - type: rect
      box: [152, 56, 116, 110]
      radius: 8
      fill:
        kind: linear
        angle: 45
        stops:
        - {color: gold, position: '0%'}
        - {color: teal, position: '100%'}
    - type: text
      box: [152, 172, 116, 16]
      text: linear 45°
      style: cap

    - type: rect
      box: [280, 56, 116, 110]
      radius: 8
      fill:
        kind: radial
        shape: circle
        at: center
        stops:
        - {color: gold, position: '0%'}
        - {color: a3, position: '100%'}
    - type: text
      box: [280, 172, 116, 16]
      text: radial · circle
      style: cap

    - type: rect
      box: [408, 56, 116, 110]
      radius: 8
      fill:
        kind: radial
        shape: ellipse
        at: [20, 20]
        stops:
        - {color: '#ffffff', position: '0%'}
        - {color: a2, position: '100%'}
    - type: text
      box: [408, 172, 116, 16]
      text: radial · ellipse · top-left
      style: cap

    - type: rect
      box: [536, 56, 116, 110]
      radius: 8
      fill:
        kind: conic
        from: 0
        at: center
        stops:
        - {color: a1, position: '0%'}
        - {color: a2, position: '33%'}
        - {color: a3, position: '66%'}
        - {color: a1, position: '100%'}
    - type: text
      box: [536, 172, 116, 16]
      text: conic (≈1st stop in proxy)
      style: cap

    - type: rect
      box: [664, 56, 92, 110]
      radius: 8
      fill:
        kind: linear
        angle: 90
        repeating: true
        stops:
        - {color: ink, position: '0%'}
        - {color: ink, position: '50%'}
        - {color: gold, position: '50%'}
        - {color: gold, position: '100%'}
    - type: text
      box: [624, 172, 132, 16]
      text: repeating stripes
      style: cap

    # Row 2 — gradient used as a stroke (outline only, no fill)
    - type: rect
      box: [24, 210, 360, 44]
      radius: 22
      fill: none
      stroke:
        kind: linear
        angle: 0
        stops:
        - {color: a1, position: '0%'}
        - {color: a2, position: '50%'}
        - {color: a3, position: '100%'}
      stroke_style: {stroke_width: 8}
    - type: text
      box: [24, 260, 360, 16]
      text: linear gradient as a stroke
      style: cap

    - type: rect
      box: [408, 210, 348, 44]
      radius: 8
      fill:
        kind: linear
        angle: 135
        stops:
        - {color: teal, position: '0%'}
        - {color: a1, position: '40%'}
        - {color: a2, position: '100%'}
    - type: text
      box: [408, 260, 348, 16]
      text: linear 135° · diagonal ramp
      style: cap
