dsl: FrameGraph
version: 2.2.0
profile: diagram
title: Advanced typography (fixture)
description: >-
  Exercises the CSS-Text/Fonts surface of `Style`: `letter_spacing`,
  `word_spacing`, `text_transform`, `font_variant_caps` small-caps,
  `text_decoration` (wavy/coloured and double over+through), `line_height`,
  per-run `font_weight` via `text.spans`, plus `font_style: italic` and
  `vertical_align: super|sub` superscript/subscript spans. Each row labels the
  property and shows it applied to the right.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      accent: '#c0392b'
      plum: '#8e44ad'
    text_styles:
      title:
        font: sans
        size: 15
        weight: 600
        color: ink
      lab:
        font: sans
        size: 12
        color: '#6b7785'
pages:
- mode: page
  id: typography
  canvas:
    size: [780, 480]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: text
      box: [24, 16, 720, 22]
      text: Advanced typography
      style: title

    - type: text
      box: [24, 56, 150, 20]
      text: letter_spacing
      style: lab
    - type: text
      box: [186, 52, 560, 24]
      text: Wide tracking across the line
      style: {font: sans, size: 17, color: ink, letter_spacing: 4}

    - type: text
      box: [24, 96, 150, 20]
      text: word_spacing
      style: lab
    - type: text
      box: [186, 92, 560, 24]
      text: Extra gaps between the words
      style: {font: sans, size: 17, color: ink, word_spacing: 12}

    - type: text
      box: [24, 136, 150, 20]
      text: text_transform
      style: lab
    - type: text
      box: [186, 132, 560, 24]
      text: this is uppercased automatically
      style: {font: sans, size: 17, color: ink, text_transform: uppercase}

    - type: text
      box: [24, 176, 150, 20]
      text: text_transform
      style: lab
    - type: text
      box: [186, 172, 560, 24]
      text: each word capitalized here
      style: {font: sans, size: 17, color: ink, text_transform: capitalize}

    - type: text
      box: [24, 216, 150, 20]
      text: small-caps
      style: lab
    - type: text
      box: [186, 212, 560, 24]
      text: Small Caps Variant Faces
      style: {font: sans, size: 17, color: ink, font_variant_caps: small-caps}

    - type: text
      box: [24, 256, 150, 20]
      text: text_decoration
      style: lab
    - type: text
      box: [186, 252, 560, 24]
      text: wavy underline in accent
      style:
        font: sans
        size: 17
        color: ink
        text_decoration: {line: underline, style: wavy, color: accent, thickness: 2}

    - type: text
      box: [24, 296, 150, 20]
      text: text_decoration
      style: lab
    - type: text
      box: [186, 292, 560, 24]
      text: overline plus line-through
      style:
        font: sans
        size: 17
        color: ink
        text_decoration: {line: [overline, line-through], style: double, color: plum}

    - type: text
      box: [24, 336, 150, 20]
      text: line_height
      style: lab
    - type: text
      box: [186, 332, 560, 40]
      text: A line_height of 1.7 opens up the leading so a wrapped paragraph breathes across its two rendered lines.
      style: {font: sans, size: 14, color: ink, line_height: 1.7}

    - type: text
      box: [24, 392, 150, 20]
      text: weight spans
      style: lab
    - type: text
      box: [186, 388, 560, 24]
      spans:
      - {text: 'Light ', style: {font: sans, size: 18, weight: 300, color: ink}}
      - {text: 'Regular ', style: {font: sans, size: 18, weight: 400, color: ink}}
      - {text: 'Bold', style: {font: sans, size: 18, weight: 700, color: ink}}

    - type: text
      box: [24, 432, 150, 20]
      text: italic · super · sub
      style: lab
    - type: text
      box: [186, 428, 560, 24]
      spans:
      - {text: 'Einstein ', style: {font: sans, size: 18, italic: true, color: ink}}
      - {text: 'E = mc', style: {font: sans, size: 18, color: ink}}
      - {text: '2', style: {font: sans, size: 18, color: ink, vertical_align: super}}
      - {text: '   water H', style: {font: sans, size: 18, color: ink}}
      - {text: '2', style: {font: sans, size: 18, color: ink, vertical_align: sub}}
      - {text: 'O', style: {font: sans, size: 18, color: ink}}
