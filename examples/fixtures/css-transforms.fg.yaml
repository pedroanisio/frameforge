dsl: FrameGraph
version: 2.2.0
profile: diagram
title: CSS DSL — CSS transform strings (css escape)
description: >-
  Exercises CSS `transform` written as a literal string through the `css` escape
  — `translate`, `scale`, `rotate`, `skew`, `matrix`, and a composed
  `rotate()+scale()`. `transform` IS an SVG-applicable property, so the escape
  (emitted on the compositing <g> wrapper) renders. `transform-box: fill-box` +
  `transform-origin` make the transforms act about the box (in place / a chosen
  corner), matching the dashed ghost of each untransformed box. The CSS-syntax
  counterpart to the typed `TransformFn` list (see transforms-affine.fg.yaml).
lang: en
defs:
  tokens:
    colors:
      ink: '#0f172a'
      sub: '#64748b'
      page: '#f8fafc'
      accent: '#2563eb'
      guide: '#94a3b8'
    styles:
      cap: {font: sans, size: 11, color: sub, align: center}
      title: {font: sans, size: 18, weight: 700, color: ink}
pages:
- mode: page
  id: css_transforms
  canvas:
    size: [880, 230]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: rect
      box: [0, 0, 880, 230]
      fill: page
    - type: text
      box: [24, 18, 832, 24]
      text: CSS transform strings via css escape
      style: title

    # 1 translate
    - type: rect
      box: [48, 70, 58, 54]
      fill: none
      stroke: guide
      stroke_style: {stroke_width: 1.2, stroke_dasharray: [4, 3]}
      radius: 4
    - type: rect
      box: [48, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style: {css: 'transform: translate(22px, 14px)'}
    - type: text
      box: [18, 176, 118, 16]
      text: translate
      style: cap

    # 2 scale
    - type: rect
      box: [172, 70, 58, 54]
      fill: none
      stroke: guide
      stroke_style: {stroke_width: 1.2, stroke_dasharray: [4, 3]}
      radius: 4
    - type: rect
      box: [172, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style: {css: 'transform: scale(1.4); transform-box: fill-box; transform-origin: center'}
    - type: text
      box: [142, 176, 118, 16]
      text: scale
      style: cap

    # 3 rotate
    - type: rect
      box: [296, 70, 58, 54]
      fill: none
      stroke: guide
      stroke_style: {stroke_width: 1.2, stroke_dasharray: [4, 3]}
      radius: 4
    - type: rect
      box: [296, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style: {css: 'transform: rotate(20deg); transform-box: fill-box; transform-origin: center'}
    - type: text
      box: [266, 176, 118, 16]
      text: rotate
      style: cap

    # 4 skew
    - type: rect
      box: [420, 70, 58, 54]
      fill: none
      stroke: guide
      stroke_style: {stroke_width: 1.2, stroke_dasharray: [4, 3]}
      radius: 4
    - type: rect
      box: [420, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style: {css: 'transform: skew(16deg); transform-box: fill-box; transform-origin: center'}
    - type: text
      box: [390, 176, 118, 16]
      text: skew
      style: cap

    # 5 matrix
    - type: rect
      box: [544, 70, 58, 54]
      fill: none
      stroke: guide
      stroke_style: {stroke_width: 1.2, stroke_dasharray: [4, 3]}
      radius: 4
    - type: rect
      box: [544, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style: {css: 'transform: matrix(1, 0, 0.36, 1, 0, 0); transform-box: fill-box; transform-origin: center'}
    - type: text
      box: [514, 176, 118, 16]
      text: matrix
      style: cap

    # 6 composed + transform-origin
    - type: rect
      box: [668, 70, 58, 54]
      fill: none
      stroke: guide
      stroke_style: {stroke_width: 1.2, stroke_dasharray: [4, 3]}
      radius: 4
    - type: rect
      box: [668, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style: {css: 'transform: rotate(12deg) scale(1.1); transform-box: fill-box; transform-origin: top left'}
    - type: text
      box: [638, 176, 118, 16]
      text: rotate+scale · origin
      style: cap
