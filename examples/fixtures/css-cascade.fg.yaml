dsl: FrameGraph
version: 2.2.0
profile: diagram
title: CSS DSL — the explicit cascade
description: >-
  Exercises the explicit cascade (§5.2.1) for the `fill` property, lowest→highest:
  (1) theme defaults, (2) named `class` styles in order, (3) inline `style` props,
  (5) per-object convenience fields which win on conflict. Each swatch keeps the
  previous layers and adds the next, so the resolved fill changes left→right —
  every swatch is proxy-exact. (Layer 4, the raw `css` escape, sits between inline
  and convenience; for `fill` specifically an SVG element's own paint attribute
  beats an inherited css value, so the escape is exercised on properties that ARE
  inheritable/compositable in css-filters.fg.yaml / css-raw-effects.fg.yaml.)
lang: en
defs:
  tokens:
    colors:
      ink: '#0f172a'
      sub: '#64748b'
      page: '#f8fafc'
      blue: '#3b82f6'
      purple: '#8b5cf6'
      amber: '#f59e0b'
      green: '#10b981'
      line: '#cbd5e1'
    styles:
      base: {fill: blue}
      accent: {fill: purple}
      cap: {font: sans, size: 11, color: sub, align: center}
      title: {font: sans, size: 18, weight: 700, color: ink}
pages:
- mode: page
  id: css_cascade
  canvas:
    size: [680, 230]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: rect
      box: [0, 0, 680, 230]
      fill: page
    - type: text
      box: [24, 18, 632, 24]
      text: The explicit cascade — each swatch adds one layer
      style: title

    # 1 — defaults only (no style): empty box, hairline so it is visible
    - type: rect
      box: [24, 60, 96, 96]
      radius: 10
      fill: none
      stroke: line
      stroke_style: {stroke_width: 1.5, stroke_dasharray: [3, 3]}
    - type: text
      box: [12, 164, 120, 14]
      text: 1 · defaults
      style: cap

    # 2 — + class base (blue)
    - type: rect
      box: [156, 60, 96, 96]
      radius: 10
      style: {class: base}
    - type: text
      box: [144, 164, 120, 14]
      text: 2 · + class base
      style: cap

    # 3 — + 2nd class accent, later wins (purple)
    - type: rect
      box: [288, 60, 96, 96]
      radius: 10
      style: {class: [base, accent]}
    - type: text
      box: [276, 164, 120, 14]
      text: 3 · + accent ↑
      style: cap

    # 4 — + inline style prop (amber) overrides classes
    - type: rect
      box: [420, 60, 96, 96]
      radius: 10
      style: {class: [base, accent], fill: amber}
    - type: text
      box: [408, 164, 120, 14]
      text: 4 · + inline ↑
      style: cap

    # 5 — + per-object convenience fill (green) wins over everything
    - type: rect
      box: [552, 60, 96, 96]
      radius: 10
      fill: green
      style: {class: [base, accent], fill: amber}
    - type: text
      box: [540, 164, 120, 14]
      text: 5 · + obj fill ↑
      style: cap
