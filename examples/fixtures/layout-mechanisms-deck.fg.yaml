- mode: flow
  id: s5-flow
  master: report
  story:
  - type: heading
    level: 1
    text: The flow model
    style: fTitle
  - type: paragraph
    text: Same document, a completely different layout engine — text that sets itself
      into the master's region and across as many pages as it takes. (The region declares
      two columns; the SVG proxy renders one — multi-column validates but is a backend
      feature.)
    style: fLead
  - type: heading
    level: 2
    text: Why it is not the same set
    style: fH
  - type: paragraph
    text: 'A flow section is not a slide. There are no object coordinates at all:
      a story of headings and paragraphs is poured into the master''s regions and
      the paginator breaks it into as many pages as the content needs. Change a sentence
      and the column rebalances; change the region and the whole document repaginates.
