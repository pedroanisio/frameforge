dsl: FrameGraph
version: 2.2.0
profile: diagram
title: CSS DSL — custom properties, var() and calc()
description: >-
  Exercises advanced CSS through the `css` escape: custom properties (`--blur`,
  `--deg`, `--a`) declared and consumed with `var()` on the same element, and a
  derived value via `calc()`. Crucially the variables feed SVG-applicable
  properties — `filter`, `transform`, `opacity` — so the escape (emitted on the
  compositing <g> wrapper) actually renders. Each card's colour is a solid base
  `fill`; the var/calc-driven effect is the demonstrable layer.
lang: en
defs:
  tokens:
    colors:
      ink: '#0f172a'
      sub: '#64748b'
      page: '#ffffff'
      blue: '#2563eb'
      emerald: '#059669'
      rose: '#e11d48'
    styles:
      cap: {font: mono, size: 12, color: sub, align: center}
      title: {font: sans, size: 18, weight: 700, color: ink}
      note: {font: sans, size: 13, color: sub}
pages:
- mode: page
  id: css_variables
  canvas:
    size: [700, 300]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: rect
      box: [0, 0, 700, 300]
      fill: page
    - type: text
      box: [24, 20, 652, 24]
      text: Custom properties · var() · calc()
      style: title

    # var() feeding a transform
    - type: rect
      box: [24, 64, 200, 120]
      radius: 14
      fill: blue
      style: {css: '--deg: 6deg; transform: rotate(var(--deg)); transform-box: fill-box; transform-origin: center'}
    - type: text
      box: [24, 192, 200, 18]
      text: 'transform: rotate(var(--deg))'
      style: cap

    # var() feeding a filter
    - type: rect
      box: [250, 64, 200, 120]
      radius: 14
      fill: emerald
      style: {css: '--blur: 2px; filter: blur(var(--blur)) saturate(1.6)'}
    - type: text
      box: [250, 192, 200, 18]
      text: 'filter: blur(var(--blur))'
      style: cap

    # calc() deriving an opacity
    - type: rect
      box: [476, 64, 200, 120]
      radius: 14
      fill: rose
      style: {css: '--a: 0.9; opacity: calc(var(--a) - 0.35)'}
    - type: text
      box: [476, 192, 200, 18]
      text: 'opacity: calc(--a - 0.35)'
      style: cap

    - type: text
      box: [24, 238, 652, 40]
      text: One declaration block sets a variable and derives the rest — change the var to re-tune, no other edits.
      style: note
