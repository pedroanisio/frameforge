- mode: page
  id: s2_problem
  master: deck
  canvas:
    size:
    - 1280
    - 720
    units: px
  layers:
  - id: chrome
    z: 0
    objects:
    - type: use
      id: v.ch
      decorative: true
      symbol: chrome
      box:
      - 0
      - 0
      - 1280
      - 720
      section_label: 01 — The problem
      slide_num: 02 / 12
      params:
        phase_color: accent_warm
  - id: title
    z: 10
    objects:
    - type: text
      id: v.k
      decorative: true
      text: 01 · MOTIVATION
      box:
      - 40
      - 70
      - 1200
      - 14
      style: slide_kicker
    - type: text
      id: v.t
      decorative: true
      text: Diagrams drift from the systems they describe.
      box:
      - 40
      - 92
      - 1200
      - 36
      style: slide_title
  - id: failures
    z: 20
    objects:
    - type: use
      id: v.f1
      symbol: block_card
      box:
      - 40
      - 180
      - 380
      - 200
      label: FAILURE MODE 1
      title: 'Architect draws once.

        Nobody updates the picture.'
      body: The PNG in the wiki was true on the day it was committed. Six months later the system has split, merged, or rerouted,
        and the picture lies. There is no diff, no review, no test that catches the drift.
      params:
        accent: accent_warm
    - type: use
      id: v.f2
      symbol: block_card
      box:
      - 450
      - 180
      - 380
      - 200
      label: FAILURE MODE 2
      title: 'Diagram tools own the

        source. Source is binary.'
      body: Visio, OmniGraffle, Lucidchart files are opaque. Pull requests cannot review them. The intended semantic structure
        (a typed graph of components) is lost in pixel positions and bezier handles.
      params:
        accent: accent_warm
    - type: use
      id: v.f3
      symbol: block_card
      box:
      - 860
      - 180
      - 380
      - 200
      label: FAILURE MODE 3
      title: 'Generative tools produce

        plausible-looking outputs.'
      body: An LLM-rendered diagram passes the eye test. Whether its semantics agree with the system it claims to depict is
        unverifiable. Absence of a verification layer is a design defect, not a runtime bug.
      params:
        accent: accent_warm
  - id: synthesis
    z: 30
    objects:
    - type: rect
      id: v.s
      decorative: true
      box:
      - 40
      - 420
      - 1200
      - 84
      fill: panel
      radius: 6
    - type: rect
      id: v.sa
      decorative: true
      box:
      - 40
      - 420
      - 4
      - 84
      fill: accent
    - type: text
      id: v.st
      decorative: true
      text: 'FrameGraph''s response: treat the diagram as code.'
      box:
      - 60
      - 432
      - 1160
      - 24
      style: body_em
    - type: text
      id: v.sb
      decorative: true
      text: Diagrams are versionable, reviewable, testable, and reproducible. The semantic structure is first-class. The visual
        surface is rendered from it.
      box:
      - 60
      - 462
      - 1160
      - 36
      style: body
  notes: 'Architects draw diagrams once, then ship code, then ship more code, and the

    diagram goes stale. The diagram becomes a lie. FrameGraph treats the diagram

    as source so the diff makes drift visible.

    '
  meta:
    title: 'The problem: diagrams drift from the systems they describe.'
    description: Why this exists. Two failure modes lined up. One sentence each.
    slide_index: 2
