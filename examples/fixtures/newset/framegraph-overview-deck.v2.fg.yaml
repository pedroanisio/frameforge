      - 447
      - 340
      - 386
      - 240
      fill: slide_bg
      stroke: chrome_line
      radius: 6
      stroke_style:
        stroke_width: 0.75
    - type: text
      id: v.r2l
      decorative: true
      text: RULE 2
      box:
      - 467
      - 360
      - 346
      - 12
      style: card_label
    - type: text
      id: v.r2t
      decorative: true
      text: 'The semantic block

        is primary.'
      box:
      - 467
      - 378
      - 346
      - 50
      style: card_title
    - type: text
      id: v.r2b
      decorative: true
      text: Nodes and edges are typed. The ontology declares what types exist. The visual is a presentation of this graph
        — never the source of truth, never the place where structure is defined.
      box:
      - 467
      - 432
      - 346
      - 130
      style: card_body
    - type: rect
      id: v.r3
      decorative: true
      box:
      - 854
      - 340
      - 386
      - 240
      fill: slide_bg
      stroke: chrome_line
      radius: 6
      stroke_style:
        stroke_width: 0.75
    - type: text
      id: v.r3l
      decorative: true
      text: RULE 3
      box:
      - 874
      - 360
      - 346
      - 12
      style: card_label
    - type: text
      id: v.r3t
      decorative: true
      text: 'Tokens substitute

        uniformly.'
      box:
      - 874
      - 378
      - 346
      - 50
      style: card_title
    - type: text
      id: v.r3b
      decorative: true
      text: Anywhere a color is accepted, a token id is also accepted. The same rule holds for text styles, stroke styles,
        fills. Design-system substitution is single-rewrite, not per-shape.
      box:
      - 874
      - 432
      - 346
      - 130
      style: card_body
  notes: 'This is the spine of the project. Read the highlighted line slowly.

    Every visual object either carries a `bind:` to a semantic node/edge,

    or declares `decorative: true`. There is no third option.

    '
