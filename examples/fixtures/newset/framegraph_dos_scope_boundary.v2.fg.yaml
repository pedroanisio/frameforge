        - 470
        - 406
      route:
        type: orthogonal
        points:
        - - 427
          - 406
        - - 470
          - 406
      stroke_style: direct_flow
    - type: connector
      id: v.conn.knowledge_work_excluded
      bind: edge.knowledge_work_excluded
      from:
        object: v.role.knowledge_work
        port: west
      to:
        point:
        - 486
        - 258
      route:
        type: orthogonal
        points:
        - - 530
          - 258
        - - 486
          - 258
      stroke_style: exclusion_loop
    - type: connector
      id: v.conn.collaboration_excluded
      bind: edge.collaboration_excluded
      from:
        object: v.role.collaboration
        port: west
      to:
