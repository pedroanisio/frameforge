  semantic:
    nodes:
    - id: doc.title
      type: DocumentTitle
      label: What the proposal is — and is not
      subtitle: Bounded feasibility assessment of constrained endpoint roles, not a universal rollback.
    - id: governance.preconditions
      type: GovernancePrecondition
      label: Pilot preconditions
      items:
      - security control envelope
      - compatibility inventory
      - TCO model
      - reversibility plan
    - id: scope.included
      type: ScopeRegion
      label: In scope
      side_label: INCLUDED ROLES
    - id: scope.included.fixed_function
      type: InScopeRole
      label: Fixed-function stations
      contents:
      - single workflow
      - no general browsing
      - controlled hardware
    - id: scope.included.terminal
      type: InScopeRole
      label: Terminal-driven workflows
      contents:
      - text UI
      - line-of-business apps
      - deterministic input
    - id: scope.included.controlled_entry
      type: InScopeRole
      label: Controlled data entry
      contents:
      - forms
      - fixed schemas
      - audited keystroke paths
    - id: scope.excluded
      type: ScopeRegion
      label: Out of scope
      side_label: EXCLUDED ROLES
    - id: scope.excluded.knowledge_work
      type: OutOfScopeRole
      label: Knowledge work
      contents:
      - research
      - document authoring
      - multi-app reasoning
    - id: scope.excluded.collaboration
      type: OutOfScopeRole
      label: Collaboration-heavy work
      contents:
      - calls
      - shared editing
      - chat
      - screen sharing
    - id: scope.excluded.browser_centric
      type: OutOfScopeRole
      label: Browser-centric work
      contents:
      - SaaS apps
      - web tools
      - cloud collaboration
    - id: boundary.line
      type: DecisionBoundary
      label: Scope boundary
    - id: callout.proposal
      type: ProposalCallout
      label: Proposal restated
      contents:
      - Universal rollback is NOT recommended.
      - Constrained assessment IS the decision.
    - id: legend.main
      type: Legend
      label: Visual encoding legend
    edges:
    - id: edge.preconditions_gate_scope
      type: PreconditionApplication
      from: governance.preconditions
      to:
      - scope.included
      - scope.excluded
      - boundary.line
      label: preconditions gate any scope decision
    - id: edge.fixed_function_in_scope
      type: InScopeBinding
      from: scope.included.fixed_function
      to: boundary.line
      direction: forward
      label: enters assessment
    - id: edge.terminal_in_scope
      type: InScopeBinding
      from: scope.included.terminal
      to: boundary.line
      direction: forward
      label: enters assessment
    - id: edge.controlled_entry_in_scope
      type: InScopeBinding
      from: scope.included.controlled_entry
      to: boundary.line
      direction: forward
      label: enters assessment
    - id: edge.knowledge_work_excluded
      type: ExclusionMarker
      from: scope.excluded.knowledge_work
      to: boundary.line
      direction: reverse
      label: explicitly excluded
    - id: edge.collaboration_excluded
      type: ExclusionMarker
      from: scope.excluded.collaboration
      to: boundary.line
      direction: reverse
      label: explicitly excluded
    - id: edge.browser_centric_excluded
      type: ExclusionMarker
      from: scope.excluded.browser_centric
      to: boundary.line
      direction: reverse
      label: explicitly excluded
    - id: edge.callout_anchors_boundary
      type: ProposalAnchor
      from: callout.proposal
      to: boundary.line
      direction: bidirectional
      label: the boundary IS the proposal
    ontology:
      node_types:
        DocumentTitle:
          meaning: Primary statement and subtitle of the diagram.
        GovernancePrecondition:
          meaning: Cross-cutting precondition that gates any pilot before scope is decided.
        ScopeRegion:
          meaning: Container grouping a set of endpoint roles that share a scope verdict.
        InScopeRole:
          meaning: Endpoint role evaluated as a candidate for the constrained operating model.
        OutOfScopeRole:
          meaning: Endpoint role explicitly excluded from any constrained-model assessment.
        DecisionBoundary:
          meaning: Visible boundary that separates included from excluded scope.
        ProposalCallout:
          meaning: Restatement that the proposal is bounded assessment, not universal rollback.
        Legend:
          meaning: Explanation of visual encodings.
      edge_types:
        PreconditionApplication:
          meaning: Precondition applies as a cross-cutting gate above any scope decision.
          default_visual_style: cross_cutting_control
        InScopeBinding:
          meaning: Solid arrow showing that an in-scope role enters the assessment.
          default_visual_style: direct_flow
        ExclusionMarker:
          meaning: Dashed arrow showing that an out-of-scope role is explicitly excluded.
          default_visual_style: exclusion_loop
        ProposalAnchor:
          meaning: Definitional bind tying the proposal callout to the decision boundary. Intentionally not rendered as a
            visual connector — the callout sits below the boundary as a colocation, and the bind is preserved at the semantic
            layer only.
