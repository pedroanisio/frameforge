      box:
      - 220
      - 478
      - 540
      - 30
      title: Universal rollback is NOT recommended.  Constrained assessment IS the decision.
      body: ''
      ports:
        north:
        - 490
        - 478
  - id: connectors
    z: 80
    objects:
    - type: connector
      id: v.conn.fixed_function_to_boundary
      bind: edge.fixed_function_in_scope
      from:
