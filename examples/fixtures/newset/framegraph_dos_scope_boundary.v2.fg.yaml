dsl: FrameGraph
version: 2.2.0
profile: diagram
title: What the proposal is — and is not
defs:
  tokens:
    colors:
      page_bg: '#F8FAFD'
      slide_bg: '#FFFFFF'
      slide_border: '#C8C8C8'
      black: '#000000'
      white: '#FFFFFF'
      in_scope_blue: '#153F6B'
      in_scope_border: '#082E53'
      pale_blue: '#E8EEF7'
      governance_blue: '#DFE8F5'
      governance_border: '#003D76'
      panel_gray: '#EFEFEF'
      box_gray: '#F7F7F7'
      excluded_box: '#FBEFEF'
      excluded_border: '#9A4040'
      callout_yellow: '#FFF7D6'
      callout_border: '#B58A00'
      boundary_line: '#082E53'
      legend_gray: '#EFEFEF'
      chip_border: '#AFC3D9'
    fonts:
      primary: Arial, Helvetica, sans-serif
    text_styles:
      title:
        font: primary
        size: 29
        weight: 800
        color: black
        align: left
        line_height: 32
      subtitle:
        font: primary
        size: 18
        weight: 400
        color: black
        align: left
        line_height: 21
      heading:
        font: primary
        size: 14
        weight: 700
        color: black
        align: center
        line_height: 16
      body:
        font: primary
        size: 12
        weight: 400
        color: black
        align: center
        line_height: 13
      tiny:
        font: primary
        size: 10
        weight: 400
        color: black
        align: center
        line_height: 11
      tiny_left:
        font: primary
        size: 10
        weight: 400
        color: black
        align: left
        line_height: 11
      white_heading:
        font: primary
        size: 14
        weight: 700
        color: white
        align: center
        line_height: 16
      legend:
        font: primary
        size: 12
        weight: 400
        color: black
        align: left
        line_height: 14
    stroke_styles:
      direct_flow:
        stroke_width: 1.5
        stroke_dasharray: null
        arrow_start: false
        arrow_end: true
        stroke: in_scope_border
      exclusion_loop:
        stroke_width: 1.3
        stroke_dasharray:
        - 5
        - 4
        arrow_start: false
        arrow_end: true
        stroke: excluded_border
      cross_cutting_control:
        stroke_width: 1.2
        stroke_dasharray: null
        stroke: governance_border
      thin_border:
        stroke_width: 1
        stroke_dasharray: null
        stroke: black
      boundary_line_style:
        stroke_width: 2.5
        stroke_dasharray:
        - 10
        - 4
        stroke: boundary_line
  masters:
    main:
      canvas:
        size:
        - 991
        - 570
        units: px
  components:
    role_box:
      slots:
      - title
      - body
      geometry:
        radius: 8
      variants:
        in_scope:
          fill: pale_blue
          stroke_style: thin_border
        out_of_scope:
          fill: excluded_box
          stroke:
            color: excluded_border
            width: 1
      internal_layout:
        title:
          box_offset:
          - 0
          - 7
          - 100%
          - 17
          style: heading
        body:
          box_offset:
          - 8
          - 24
          - calc(100% - 16)
          - calc(100% - 27)
          style: body
    callout_box:
      slots:
      - title
      - body
      geometry:
        radius: 8
      fill: callout_yellow
      stroke:
        color: callout_border
        width: 1
      internal_layout:
        title:
          box_offset:
          - 0
          - 7
          - 100%
          - 17
          style: heading
        body:
          box_offset:
          - 8
          - 26
          - calc(100% - 16)
          - calc(100% - 30)
          style: body
  ontology:
    node_types:
      DocumentTitle:
        meaning: Primary statement and subtitle of the diagram.
      GovernancePrecondition:
        meaning: Cross-cutting precondition that gates any pilot before scope is decided.
      ScopeRegion:
        meaning: Container grouping a set of endpoint roles that share a scope verdict.
      InScopeRole:
        meaning: Endpoint role evaluated as a candidate for the constrained operating model.
      OutOfScopeRole:
        meaning: Endpoint role explicitly excluded from any constrained-model assessment.
      DecisionBoundary:
        meaning: Visible boundary that separates included from excluded scope.
      ProposalCallout:
        meaning: Restatement that the proposal is bounded assessment, not universal rollback.
      Legend:
        meaning: Explanation of visual encodings.
    edge_types:
      PreconditionApplication:
        meaning: Precondition applies as a cross-cutting gate above any scope decision.
        default_visual_style: cross_cutting_control
      InScopeBinding:
        meaning: Solid arrow showing that an in-scope role enters the assessment.
        default_visual_style: direct_flow
      ExclusionMarker:
        meaning: Dashed arrow showing that an out-of-scope role is explicitly excluded.
        default_visual_style: exclusion_loop
      ProposalAnchor:
        meaning: Definitional bind tying the proposal callout to the decision boundary. Intentionally not rendered as a visual
          connector — the callout sits below the boundary as a colocation, and the bind is preserved at the semantic layer
          only.
description: 'Scope boundary for the DOS 5.2 feasibility assessment: in-scope constrained endpoint roles versus out-of-scope
  general-purpose work, with the governance preconditions that gate any pilot.'
pages:
- mode: page
  id: dos_scope_boundary
  master: main
  canvas:
    size:
    - 991
    - 570
    units: px
  rendering:
    coordinate_mode: absolute
    text:
      min_font_size: 7
      overflow: shrink_to_fit
    semantics:
      meaningful_visual_objects_should_bind_to_semantic_ids: true
      connectors_should_bind_to_semantic_edges: true
      decorative_objects_may_omit_bind: true
    preserve_manual_line_breaks: true
  layers:
  - id: background
    z: 0
    objects:
    - type: rect
      id: v.page
      decorative: true
      box:
      - 0
      - 0
      - 991
      - 570
      fill: page_bg
    - type: rect
      id: v.slide
      decorative: true
      box:
      - 10
      - 18
      - 920
      - 519
      fill: slide_bg
      stroke: slide_border
      stroke_style:
        stroke_width: 1
  - id: title
    z: 10
    objects:
    - type: text
      id: v.title
      bind: doc.title
      text: What the proposal is — and is not
      box:
      - 58
      - 55
      - 740
      - 35
      style: title
    - type: text
      id: v.subtitle
      bind: doc.title
      text: Bounded feasibility assessment of constrained endpoint roles, not a universal rollback.
      box:
      - 58
      - 88
      - 830
      - 24
      style: subtitle
  - id: governance
    z: 20
    objects:
    - type: rect
      id: v.governance.container
      bind: governance.preconditions
      box:
      - 52
      - 121
      - 853
      - 39
      radius: 5
      fill: governance_blue
      stroke: governance_border
      ports:
        south_left:
        - 240
        - 160
        south_center:
        - 480
        - 160
        south_right:
        - 720
        - 160
      stroke_style:
        stroke_width: 1.2
    - type: text
      id: v.governance.title
      bind: governance.preconditions
      text: Pilot preconditions (gate any scope decision)
      box:
      - 52
      - 126
      - 853
      - 16
      style: heading
    - type: text
      id: v.governance.body
      bind: governance.preconditions
      text: security control envelope · compatibility inventory · TCO model · reversibility plan
      box:
      - 52
      - 144
      - 853
      - 14
      style: tiny
  - id: regions
    z: 30
    objects:
    - type: rect
      id: v.region.included
      bind: scope.included
      box:
      - 42
      - 182
      - 405
      - 280
      radius: 9
      fill: panel_gray
    - type: text
      id: v.region.included.heading
      bind: scope.included
      text: In scope
      box:
      - 42
      - 188
      - 405
      - 17
      style: heading
    - type: text
      id: v.region.included.subtitle
      bind: scope.included
      text: INCLUDED ROLES — candidates for constrained operating model
      box:
      - 42
      - 206
      - 405
      - 13
      style: tiny
    - type: rect
      id: v.region.excluded
      bind: scope.excluded
      box:
      - 510
      - 182
      - 405
      - 280
      radius: 9
      fill: panel_gray
    - type: text
      id: v.region.excluded.heading
      bind: scope.excluded
      text: Out of scope
      box:
      - 510
      - 188
      - 405
      - 17
      style: heading
    - type: text
      id: v.region.excluded.subtitle
      bind: scope.excluded
      text: EXCLUDED ROLES — modern OS endpoint remains required
      box:
      - 510
      - 206
      - 405
      - 13
      style: tiny
  - id: in_scope_roles
    z: 40
    objects:
    - type: component
      component: role_box
      id: v.role.fixed_function
      bind: scope.included.fixed_function
      box:
      - 62
      - 226
      - 365
      - 65
      variant: in_scope
      title: Fixed-function stations
      body: 'single workflow · no general browsing

        controlled hardware'
      ports:
        east:
        - 427
        - 258
    - type: component
      component: role_box
      id: v.role.terminal
      bind: scope.included.terminal
      box:
      - 62
      - 300
      - 365
      - 65
      variant: in_scope
      title: Terminal-driven workflows
      body: 'text UI · line-of-business apps

        deterministic input'
      ports:
        east:
        - 427
        - 332
    - type: component
      component: role_box
      id: v.role.controlled_entry
      bind: scope.included.controlled_entry
      box:
      - 62
      - 374
      - 365
      - 65
      variant: in_scope
      title: Controlled data entry
      body: 'forms · fixed schemas

        audited keystroke paths'
      ports:
        east:
        - 427
        - 406
  - id: out_of_scope_roles
    z: 50
    objects:
    - type: component
      component: role_box
      id: v.role.knowledge_work
      bind: scope.excluded.knowledge_work
      box:
      - 530
      - 226
      - 365
      - 65
      variant: out_of_scope
      title: Knowledge work
      body: 'research · document authoring

        multi-app reasoning'
      ports:
        west:
        - 530
        - 258
    - type: component
      component: role_box
      id: v.role.collaboration
      bind: scope.excluded.collaboration
      box:
      - 530
      - 300
      - 365
      - 65
      variant: out_of_scope
      title: Collaboration-heavy work
      body: 'calls · shared editing · chat

        screen sharing'
      ports:
        west:
        - 530
        - 332
    - type: component
      component: role_box
      id: v.role.browser_centric
      bind: scope.excluded.browser_centric
      box:
      - 530
      - 374
      - 365
      - 65
      variant: out_of_scope
      title: Browser-centric work
      body: 'SaaS apps · web tools

        cloud collaboration'
      ports:
        west:
        - 530
        - 406
  - id: boundary
    z: 60
    objects:
    - type: line
      id: v.boundary.line
      bind: boundary.line
      from:
      - 478
      - 182
      to:
      - 478
      - 462
