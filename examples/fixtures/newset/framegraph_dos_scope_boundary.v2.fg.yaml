        - 486
        - 332
      route:
        type: orthogonal
        points:
        - - 530
          - 332
        - - 486
          - 332
      stroke_style: exclusion_loop
    - type: connector
      id: v.conn.browser_centric_excluded
      bind: edge.browser_centric_excluded
      from:
        object: v.role.browser_centric
        port: west
      to:
        point:
        - 486
        - 406
      route:
        type: orthogonal
        points:
        - - 530
          - 406
