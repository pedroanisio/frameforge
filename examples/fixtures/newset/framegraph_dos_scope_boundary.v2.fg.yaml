  - id: legend
    z: 90
    objects:
    - type: rect
      id: v.legend.background
      bind: legend.main
      box:
      - 21
      - 522
      - 913
      - 25
      fill: legend_gray
    - type: legend
      id: v.legend.main
      bind: legend.main
      box:
      - 55
      - 528
      - 870
      - 16
      item_gap: 30
      items:
      - id: legend.direct_flow
        bind: InScopeBinding
        sample:
          type: line
          from:
          - 57
          - 537
          to:
          - 99
          - 537
