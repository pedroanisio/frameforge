        type: orthogonal
        points:
        - - 427
          - 258
        - - 470
          - 258
      stroke_style: direct_flow
    - type: connector
      id: v.conn.terminal_to_boundary
      bind: edge.terminal_in_scope
      from:
        object: v.role.terminal
        port: east
      to:
