  # ── §6 Discussion ─────────────────────────────────────────────────────────
  - type: heading
    level: 2
    text: Discussion
    id: discussion
    number: {series: section}
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - 'Two consequences of Equation '
    - {kind: ref, target: eq-bound, show: number}
    - ' are worth drawing out.'
  - type: list
    ordered: true
    style: body
    items:
    - 'Entire integrands (no finite singularities) admit arbitrarily large ρ, so the convergence is faster than any geometric rate — in practice, machine precision in a handful of nodes.'
    - 'The useful ρ is set by the nearest singularity to [−1, 1], not by smoothness on the real line alone; a function can be infinitely differentiable on the interval yet converge slowly if a complex pole lurks nearby.'
  - type: paragraph
    style: body
    spans:
    - >-
      It is sometimes claimed that the interpolatory Clenshaw–Curtis rule, being
      as cheap as an FFT, is the better default. For analytic integrands the two
      converge at the same asymptotic rate, and the Gauss advantage is a constant
      factor rather than a different exponent; the careful comparison is the
      subject of Trefethen's analysis
    - {kind: cite, key: trefethen2008}
    - >-
      . For broader spectral context, see the texts of Boyd and Trefethen
    - {kind: cite, key: [boyd2001, trefethen2013]}
    - .
  - type: block
    role: remark
    style: note
    fill: band
    padding: [8, 12, 8, 12]
    children:
    - type: paragraph
      style: note
      spans:
      - {text: 'Remark. ', style: lead}
      - >-
        The geometric rate is an asymptotic statement. At very small n the
        pre-asymptotic regime dominates, which is why the ratio in Table 1 starts
        at 0.87 before settling; the bound is an upper estimate, so a ratio below
        one is expected.

  # ── §7 Conclusion ─────────────────────────────────────────────────────────
  - type: heading
    level: 2
    text: Conclusion
    id: conclusion
    number: {series: section}
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    text: >-
      Gauss–Legendre quadrature converges geometrically on analytic integrands,
      at a rate fixed by the largest Bernstein ellipse the integrand fills. The
      bound is classical and its rate is sharp, as our twelve-order-of-magnitude
      experiment on the Runge function confirms. The nodes and weights come for
      free from a tridiagonal eigenproblem, making the rule a sound default
      whenever the integrand is smooth in the complex sense.

  # ── back matter ───────────────────────────────────────────────────────────
  - type: heading
    level: 2
    text: Acknowledgements
    id: ack
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    text: >-
      We thank the FrameGraph working group for the document model that this
      article both describes its mathematics in and is itself authored in.
  - type: heading
    level: 2
    text: References
    id: references
    style: h2
    break_after: avoid
  - type: bibliography
    id: bib
    source: references
    csl: ieee

