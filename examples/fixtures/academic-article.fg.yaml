  # ── front matter ──────────────────────────────────────────────────────────
  - type: heading
    level: 1
    text: Error Bounds for Gauss–Legendre Quadrature of Analytic Functions
    id: title
    style: title
    break_after: avoid
  - type: paragraph
    style: author
    text: 'Ada R. Whitman¹    ·    Henri Poincaré-Lima²    ·    Sofia V. Kovalenko¹'
  - type: paragraph
    style: affil
    text: >-
      ¹ Institute for Computational Mathematics, Adler University · ² Numerical
      Analysis Group, Lausanne Polytechnic
  - type: paragraph
    style: affil
    spans:
    - 'Correspondence: '
    - kind: link
      href: mailto:a.whitman@adler.example.edu
      content: ['a.whitman@adler.example.edu']
      title: Email the corresponding author
    - '.   Preprint compiled June 2026.'
  - type: block
    role: abstract
    id: abstract
    style: abstract
    children:
    - type: paragraph
      style: abstract
      spans:
      - {text: 'Abstract. ', style: lead}
      - >-
        The n-point Gauss–Legendre rule integrates polynomials of degree up to
        2n−1 exactly, but its real power is on analytic integrands, where the
        error decays geometrically. We review the classical bound: if the
        integrand extends analytically to the Bernstein ellipse Eρ with foci ±1,
        the quadrature error is O(ρ⁻²ⁿ). We give the nodes and weights through
        the Golub–Welsch eigenvalue algorithm, and we verify the rate
        numerically on the Runge function 1/(1+25x²), whose nearest singularities
        at ±i/5 fix ρ ≈ 1.2198. The measured error tracks ρ⁻²ⁿ to within a
        constant factor across twelve orders of magnitude, confirming that the
        bound is sharp in its exponential rate.
  - type: paragraph
    style: keywords
    spans:
    - {text: 'Index Terms—', style: lead}
    - 'Gaussian quadrature; analytic integrands; Bernstein ellipse; spectral accuracy; Golub–Welsch algorithm.'
  - type: toc
    of: headings
    levels: [2, 3]
    title: Contents
    leader: '.'
    style: toc_title

  # ── §1 Introduction ───────────────────────────────────────────────────────
  - type: heading
    level: 2
    text: Introduction
    id: intro
    number: {series: section}
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - >-
      Numerical quadrature replaces an integral by a finite weighted sum of
      samples. Among the fixed-rule schemes, the Gauss–Legendre rule is optimal
      in the sense of polynomial exactness: with n nodes it integrates every
      polynomial of degree at most 2n−1 without error. The construction is due to
      Gauss
    - {kind: cite, key: gauss1814}
    - >-
      , and its modern, numerically stable realisation through a symmetric
      tridiagonal eigenproblem is due to Golub and Welsch
    - {kind: cite, key: golub1969}
    - >-
      . The classical references for the surrounding error theory are the texts of
      Davis and Rabinowitz and of Boyd
    - {kind: cite, key: [davis1984, boyd2001]}
    - .
  - type: paragraph
    style: body
    spans:
    - >-
      Polynomial exactness, however, undersells the method. For an integrand that
      is analytic in a neighbourhood of the interval, the Gauss error does not
      merely fall like a power of n; it falls geometrically. Our aim in this note
      is to state that bound precisely (Section
    - {kind: ref, target: bound, show: number}
    - >-
      ), to recall how the nodes and weights are computed (Section
    - {kind: ref, target: compute, show: number}
    - '), and to confirm the predicted rate against measured errors (Section '
    - {kind: ref, target: experiments, show: number}
    - >-
      ). Throughout we take the canonical interval [−1, 1]; an arbitrary finite
      interval reduces to it by an affine change of variables.
    - kind: footnote
      id: fn-affine
      content:
      - type: paragraph
        style: note
        text: >-
          For [a, b] the substitution x = ½(b−a)t + ½(a+b) maps [−1, 1] onto
          [a, b] and multiplies every weight by the constant Jacobian ½(b−a), so
          no generality is lost.

  # ── §2 Mathematical Background ────────────────────────────────────────────
  - type: heading
    level: 2
    text: Mathematical Background
    id: background
    number: {series: section}
    style: h2
    break_after: avoid

  - type: heading
    level: 3
    text: The Gauss–Legendre Rule
    id: rule
    number: {series: subsection, parent: section, reset_with: section}
    style: h3
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - 'The n-point rule approximates the integral by a weighted sum and leaves a remainder '
    - {kind: math, tex: 'E_n(f)'}
    - ':'
  - type: math
    id: eq-rule
    number: {series: equation, prefix: '(', suffix: ')'}
    tex: '\int_{-1}^{1} f(x)\,dx \;=\; \sum_{k=1}^{n} w_k\, f(x_k) \;+\; E_n(f)'
    alt: The integral of f from minus one to one equals the sum over k of w_k times f of x_k, plus a remainder E_n of f.
    break_before: avoid
  - type: paragraph
    style: body
    spans:
    - 'The nodes '
    - {kind: math, tex: 'x_k'}
    - ' are the roots of the Legendre polynomial '
    - {kind: math, tex: 'P_n'}
    - ', and the weights are positive:'
  - type: math
    id: eq-weights
    number: {series: equation, prefix: '(', suffix: ')'}
    tex: 'w_k \;=\; \frac{2}{\left(1 - x_k^{2}\right)\,\bigl[P_n''(x_k)\bigr]^{2}} \;>\; 0 .'
    alt: w_k equals two divided by the quantity one minus x_k squared times the square of the derivative of P_n at x_k, which is positive.
    break_before: avoid
  - type: paragraph
    style: body
    spans:
    - >-
      Because the rule is built from the orthogonal polynomials for the constant
      weight on [−1, 1], it attains the maximal degree of exactness:
    - {kind: math, tex: 'E_n(f) = 0'}
    - ' for every '
    - {kind: math, tex: 'f \in \mathbb{P}_{2n-1}'}
    - >-
      , the polynomials of degree at most 2n−1. No n-point rule can do better
    - {kind: cite, key: davis1984, locator: '§2.7'}
    - .

  - type: heading
    level: 3
    text: Analyticity and Bernstein Ellipses
    id: bernstein
    number: {series: subsection, parent: section, reset_with: section}
    style: h3
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - >-
      The natural regions of analyticity for the interval are the Bernstein
      ellipses. For ρ > 1, let Eρ be the image of the circle |z| = ρ under the
      Joukowski map, an ellipse with foci at ±1:
  - type: math
    id: eq-bernstein
    number: {series: equation, prefix: '(', suffix: ')'}
    tex: 'E_\rho \;=\; \left\{\, \tfrac{1}{2}\!\left(z + z^{-1}\right) : |z| = \rho \,\right\}, \qquad \rho > 1 .'
    alt: E rho is the set of one half times z plus one over z, as z ranges over the circle of radius rho, for rho greater than one.
    break_before: avoid
  - type: paragraph
    style: body
    spans:
    - >-
      The ellipse crosses the imaginary axis at ±i·½(ρ−ρ⁻¹), so a singularity of
      the integrand close to the interval forces ρ close to 1, while a
      singularity far away admits a large ρ. Fig.
    - {kind: ref, target: fig-ellipse, show: number}
    - >-
      sketches the geometry: the larger the ellipse the integrand can fill
      without meeting a singularity, the faster the quadrature converges.
  - type: figure
    id: fig-ellipse
    units: px
    align: center
    number: {series: figure, prefix: 'Fig. '}
    size: [330, 230]
    alt: >-
      A schematic of the complex plane. The real axis carries the integration
      interval from minus one to plus one, with the two foci marked. A Bernstein
      ellipse with those foci is drawn around the interval, and the two
      singularities of the Runge function at plus and minus i over five are
      marked on the imaginary axis just inside the ellipse.
    caption: 'Schematic Bernstein ellipse Eρ with foci ±1. The integrand must be analytic inside the ellipse; the relevant ρ is the largest one whose boundary the singularities ±i/5 reach.'
    credit: 'Drawing: FrameGraph primitives (lines, ellipse, text).'
    break_before: avoid
    object:
      type: group
      id: ellipse_fig
      box: [0, 0, 330, 230]
      children:
