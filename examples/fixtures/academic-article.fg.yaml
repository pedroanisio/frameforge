  # ── §3 An Error Bound ─────────────────────────────────────────────────────
  - type: heading
    level: 2
    text: An Error Bound for Analytic Integrands
    id: bound
    number: {series: section}
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - >-
      The following statement is the heart of the matter; sharp constants and a
      full proof are given by Trefethen
    - {kind: cite, key: trefethen2008}
    - ' and in the monograph treatment of Davis and Rabinowitz '
    - {kind: cite, key: davis1984}
    - .
  - type: keep_together
    children:
    - type: block
      role: theorem
      id: thm-1
      style: theorem
      stroke: rule
      stroke_style: rule_thin
      padding: [10, 12, 10, 12]
      children:
      - type: paragraph
        style: theorem
        spans:
        - {text: 'Theorem 1 (Geometric convergence). ', style: lead}
        - 'Let '
        - {kind: math, tex: 'f'}
        - ' be analytic inside and on the Bernstein ellipse '
        - {kind: math, tex: 'E_\rho'}
        - ', and let '
        - {kind: math, tex: 'M(\rho) = \max_{z \in E_\rho} |f(z)|'}
        - '. Then the n-point Gauss–Legendre error obeys'
      - type: math
        id: eq-bound
        number: {series: equation, prefix: '(', suffix: ')'}
        tex: '\bigl|E_n(f)\bigr| \;\le\; \frac{C(\rho)\,M(\rho)}{\rho^{\,2n}} ,'
        alt: The absolute value of E_n of f is at most C of rho times M of rho divided by rho to the power two n.
        break_before: avoid
      - type: paragraph
        style: theorem
        spans:
        - 'where '
        - {kind: math, tex: 'C(\rho)'}
        - ' depends only on '
        - {kind: math, tex: '\rho'}
        - ' and is bounded for '
        - {kind: math, tex: '\rho'}
        - ' bounded away from 1.'
  - type: paragraph
    style: body
    spans:
    - {text: 'Proof sketch. ', style: lead}
    - >-
      Expand f in Chebyshev (equivalently, Legendre) series. Analyticity in Eρ
      makes the coefficients decay like ρ⁻ᵏ, and the Gauss rule annihilates the
      first 2n terms exactly; summing the tail of the doubly-suppressed remainder
      gives the ρ⁻²ⁿ rate. The factor two in the exponent — absent for
      interpolatory rules such as Clenshaw–Curtis at low n — is exactly the
      polynomial-exactness advantage of Gauss
    - {kind: cite, key: trefethen2008, locator: 'Th. 4.5'}
    - .

  # ── §4 Computing the Nodes and Weights ────────────────────────────────────
  - type: heading
    level: 2
    text: Computing the Nodes and Weights
    id: compute
    number: {series: section}
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - >-
      Solving for the Legendre roots directly is ill-advised. The Golub–Welsch
      algorithm instead reads the nodes and weights off the eigendecomposition of
      the symmetric tridiagonal Jacobi matrix of the recurrence coefficients
    - {kind: cite, key: golub1969}
    - >-
      : the nodes are its eigenvalues, and each weight is twice the square of the
      first component of the corresponding unit eigenvector.
    - kind: footnote
      id: fn-cost
      content:
      - type: paragraph
        style: note
        spans:
        - 'A symmetric tridiagonal eigensolver costs '
        - {kind: math, tex: 'O(n^2)'}
        - ' for all n nodes and weights — negligible beside the integrand evaluations it enables.'
  - type: code
    language: python
    line_numbers: true
    style: code
    source: |
      import numpy as np

      def gauss_legendre(n):
          """n-point Gauss-Legendre nodes/weights on [-1, 1] (Golub-Welsch)."""
          k = np.arange(1, n)
          beta = k / np.sqrt(4.0 * k * k - 1.0)       # Legendre recurrence
          J = np.diag(beta, -1) + np.diag(beta, 1)    # symmetric Jacobi matrix
          x, V = np.linalg.eigh(J)                    # nodes  = eigenvalues
          w = 2.0 * V[0, :] ** 2                      # weights = 2 * (first row)^2
          return x, w
  - type: paragraph
    style: body
    spans:
    - >-
      The routine returns nodes in [−1, 1] and weights that sum to 2, the length
      of the interval. We use it to produce every number in Section
    - {kind: ref, target: experiments, show: number}
    - .

  # ── §5 Numerical Experiments ──────────────────────────────────────────────
  - type: heading
    level: 2
    text: Numerical Experiments
    id: experiments
    number: {series: section}
    style: h2
    break_after: avoid
  - type: paragraph
    style: body
    spans:
    - 'We integrate the Runge function '
    - {kind: math, tex: 'f(x) = \dfrac{1}{1 + 25x^{2}}'}
    - ' on [−1, 1], whose exact value is '
    - {kind: math, tex: '\tfrac{2}{5}\arctan 5 \approx 0.5493603'}
    - >-
      . Its poles sit at ±i/5, so the largest admissible Bernstein ellipse has
    - {kind: math, tex: '\rho = \tfrac{1}{5} + \sqrt{\tfrac{1}{25} + 1} \approx 1.2198'}
    - ', predicting an error rate of '
    - {kind: math, tex: '\rho^{-2n}'}
    - '. Table '
    - {kind: ref, target: tbl-conv, show: number}
    - ' reports the measured error and that prediction.'
  - type: table
