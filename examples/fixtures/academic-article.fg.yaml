# ─────────────────────────────────────────────────────────────────────────────
# academic-article.fg.yaml — the canonical scholarly-article exemplar.
#
# This fixture is the reference for authoring a peer-review-style article in
# FrameGraph v2: front matter (title / authors / affiliations / abstract /
# index terms), a table of contents, auto-numbered sections and subsections,
# cross-references, citations (single / multi-key / with locator), footnotes,
# inline and display mathematics with equation numbers, figures drawn from
# primitives, a data table, a code listing, a kept-together theorem, and a
# CSL-bound bibliography.
#
# It follows IEEE conventions: numeric in-text citations resolved through
# `csl: ieee`, references ordered by first citation ([1]…[6]), Roman-numeral
# sections (I, II, …) with alphabetic subsections (A, B, …), `Index Terms—`,
# and `Fig.` / `TABLE` labels. The `cite` inlines name authors in prose and
# carry the keys; a CSL renderer renders the bracketed numbers.
#
# It is a single `mode: flow` section (the story reads in document order), so it
# is clean under every HEAD gate: structural validation, the §3.3 geometric
# audit (page-only), the accessibility lint (flows read in story order), and the
# text-fit overflow proxy. Every figure primitive is `decorative` (the figure
# carries an `alt`), so the free-group no-overlap audit is silent too.
#
# The numbers in Table 1 and Figure 2 are the *true* Gauss–Legendre quadrature
# errors for the Runge function 1/(1+25x²) on [-1,1]; they track the Bernstein-
# ellipse rate ρ⁻²ⁿ to a constant, which is the article's main point.
# ─────────────────────────────────────────────────────────────────────────────

