# FrameGraph brand tokens, expressed in FrameGraph's own model.
#
# This is an EXCERPT (a `defs:` fragment), not a complete, gated Document — it
# lives outside fixtures/ and is NOT run by `make validate`. It exists to show
# that the brand palette and type system map 1:1 onto the native `Defs.tokens`
# surface (models/framegraph.py: Tokens). Drop this block into a real Document's
# top-level `defs:` to consume the brand from FrameGraph itself.
defs:
  tokens:
    colors:
      ink:        "#15181E"   # graphite — text, lines, crop marks
      paper:      "#FBFAF6"   # warm technical paper — page backgrounds
      canvas:     "#FFFFFF"   # pure render surface
      frame-blue: "#1F4FD8"   # primary accent — the "Frame" half (structure)
      graph-cyan: "#12B0C3"   # secondary accent — the "Graph" half (signal/flow)
      gate-green: "#1E9E5A"   # semantic: a passing gate / in-sync / valid
      drift-red:  "#D23B2B"   # semantic: a failed gate / drift / invalid
      grid:       "#D4D8DE"   # hairlines, rules, secondary strokes
      mute:       "#6B7280"   # captions, secondary text
    fonts:
      mono:  "IBM Plex Mono"   # wordmark, code, YAML, schema, CLI  (fallback: DejaVu Sans Mono)
      sans:  "IBM Plex Sans"   # UI, docs body, captions             (fallback: DejaVu Sans)
      serif: "IBM Plex Serif"  # long-form book/letter rendering     (fallback: DejaVu Serif)
    styles:
      h1:      { font_family: "IBM Plex Sans", font_size: 32, font_weight: 600, color: "#15181E" }
      body:    { font_family: "IBM Plex Sans", font_size: 16, line_height: 1.55, color: "#15181E" }
      code:    { font_family: "IBM Plex Mono", font_size: 14, color: "#15181E" }
      caption: { font_family: "IBM Plex Sans", font_size: 13, color: "#6B7280" }
      pass:    { font_family: "IBM Plex Mono", font_size: 13, font_weight: 600, color: "#1E9E5A" }
      drift:   { font_family: "IBM Plex Mono", font_size: 13, font_weight: 600, color: "#D23B2B" }
