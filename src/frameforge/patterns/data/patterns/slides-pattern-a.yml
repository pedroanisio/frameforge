          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar: {side: top, width: 3, color: text}
          slots:
            label:
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: text, align: left, v_align: middle, line_height: 14}
