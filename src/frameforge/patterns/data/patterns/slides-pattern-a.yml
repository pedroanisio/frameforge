- id: 10
  name: SWOT Analysis
  layout_disposition: 'Four-quadrant matrix: strengths, weaknesses, opportunities, and threats.'
  zones:
  - role: strengths
    size: equal
    placement: *id003
    content_type: list_items
  - role: weaknesses
    size: equal
    placement: &id018
      anchor:
        h: right
        v: top
    content_type: list_items
  - role: opportunities
    size: equal
    placement: &id025
      anchor:
        h: left
        v: bottom
    content_type: list_items
  - role: threats
    size: equal
    placement: &id026
      anchor:
        h: right
        v: bottom
    content_type: list_items
  category: generic
  # SWOT polish — four labelled quadrants. Boxes come from the
  # layout planner (4-corner equal split). Each quadrant carries a
  # tinted accent bar and a clear LABEL band so readers can scan
  # strengths/weaknesses/opportunities/threats at a glance.
  enterprise_layout:
    notes: |
      Four-quadrant SWOT. Strengths/Opportunities use a positive
      accent (green/accent); Weaknesses/Threats use a warning accent
      (warm). Label bands are 16px bold uppercase.
    zones:
      strengths:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [20, 24, 20, 24]
          accent_bar:
            side: left
            width: 4
            color: data_3
          slots:
            label:
              height: 16
              gap_below: 10
              typography:
                font: primary
                size: 14
                weight: 700
                color: data_3
                align: left
                v_align: middle
                line_height: 16
      weaknesses:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [20, 24, 20, 24]
          accent_bar:
            side: left
            width: 4
            color: accent_warm
          slots:
            label:
              height: 16
              gap_below: 10
              typography:
                font: primary
                size: 14
                weight: 700
                color: accent_warm
                align: left
                v_align: middle
                line_height: 16
      opportunities:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [20, 24, 20, 24]
          accent_bar:
            side: left
            width: 4
            color: accent
          slots:
            label:
              height: 16
              gap_below: 10
              typography:
                font: primary
                size: 14
                weight: 700
                color: accent
                align: left
                v_align: middle
                line_height: 16
      threats:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [20, 24, 20, 24]
          accent_bar:
            side: left
            width: 4
            color: text
          slots:
            label:
              height: 16
              gap_below: 10
              typography:
                font: primary
                size: 14
                weight: 700
                color: text
                align: left
                v_align: middle
                line_height: 16
