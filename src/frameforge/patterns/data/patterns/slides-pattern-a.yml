  - role: follow_up_actions
    size: equal
    placement: *id037
    shape: cell
    content_type: table_data
  use_case: Tracks key decisions, owners, dates, and implications.
  # Decision-log polish — five zones share a common card chrome with
  # accent labels and panel backgrounds. Uses planner boxes.
  enterprise_layout:
    notes: |
      Decision log. Five zones (decision items + four table columns)
      sharing one polished card treatment so the page reads as a
      coherent grid. Each label band is small accent caps.
    zones:
      decision_items:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [18, 22, 18, 22]
          accent_bar:
            side: left
            width: 4
            color: accent
          slots:
            label:
              height: 14
              gap_below: 8
              typography:
                font: primary
                size: 12
                weight: 700
                color: accent
                align: left
                v_align: middle
                line_height: 14
      decision_owner:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar:
            side: top
            width: 3
            color: data_3
          slots:
            label:
              height: 14
              gap_below: 8
              typography:
                font: primary
                size: 12
                weight: 700
                color: data_3
                align: left
                v_align: middle
                line_height: 14
      decision_date:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar:
            side: top
            width: 3
            color: accent
          slots:
            label:
              height: 14
              gap_below: 8
              typography:
                font: primary
                size: 12
                weight: 700
                color: accent
                align: left
                v_align: middle
                line_height: 14
      implications:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar:
            side: top
            width: 3
            color: text
          slots:
            label:
              height: 14
              gap_below: 8
              typography:
                font: primary
                size: 12
                weight: 700
                color: text
                align: left
                v_align: middle
                line_height: 14
      follow_up_actions:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar:
