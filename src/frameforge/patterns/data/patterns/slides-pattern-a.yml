  # Recommendations polish — hand-tuned 1920×1080 layout. Headline
  # spans the top; below: a wide recommendation panel (left ~60 %),
  # a priority sidebar (right ~36 %); rationale callout below the
  # panel; next-steps strip across the footer. Each zone carries a
  # labelled accent card.
  enterprise_layout:
    notes: |
      Closing / recommendations slide. Headline card + 3-up content
      columns + dark next-steps strip. Tuned for 1920×1080.
    zones:
      recommendation_cards:
        box: [60, 140, 1180, 540]
        treatment:
          fill_color: surface
