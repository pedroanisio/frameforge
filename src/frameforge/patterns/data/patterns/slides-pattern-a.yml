slide_template_patterns:
- id: 1
  name: Title Slide
  layout_disposition: Full-bleed or clean centered composition with a large title, optional subtitle, logo, date, and presenter
    name.
  zones:
  - role: title
    size: large
    placement: &id001
      anchor:
        h: center
        v: middle
    content_type: title_body
  - role: subtitle
    size: medium
    placement:
      relative:
        relation: below
        target: title
    content_type: title_body
  - role: metadata
    size: small
    placement:
      anchor:
        h: left
        v: bottom
    content_type: key_value
  category: generic
  # Enterprise-polished layout (calibrated for a 1920×1080 canvas;
  # absolute boxes). Display-grade title in the upper-middle, a single
  # accent rule, body subtitle below, and footer metadata in muted
  # italic small caps along the bottom-left. The user's stylesheet
  # roles[] still override on conflict.
  enterprise_layout:
    notes: |
      Cover slide. Display typography (heading 72px) for the title;
      regular body (22px) for the subtitle; small italic muted for the
      metadata. Three zones, hand-tuned coordinates so the title sits
      visually above center and breathes against the chrome.

      Chrome suppression: covers don't show the small chrome title,
      the separator rule, or the page number — the body draws the
      display title and the cover is implicitly slide 00. A slide
      author can override any of these per-slide via `chrome: {...}`.
    canvas_overrides:
      title: ""
      title_rule: false
      page_number: false
    zones:
      title:
        box: [120, 360, 1680, 180]
        treatment:
          fill_color: none
          stroke_color: none
          padding: 0
          slots:
            title:
              height: 90
              gap_below: 12
              typography:
                font: heading
                size: 72
                weight: 700
                color: primary
                align: left
                v_align: top
                line_height: 84
                wrap: true
            body:
              typography:
                font: primary
                size: 26
                weight: 400
                color: text
                align: left
                v_align: top
                line_height: 36
                wrap: true
        label_text: ""
      subtitle:
        box: [120, 580, 1680, 80]
        treatment:
          fill_color: none
          stroke_color: none
          padding: 0
          accent_bar:
            side: left
            width: 4
            color: accent
          slots:
            title:
              height: 32
              gap_below: 6
              typography:
                font: primary
                size: 20
                weight: 700
                color: accent
                align: left
                v_align: top
                line_height: 26
            body:
              typography:
                font: primary
                size: 18
                weight: 400
                color: text_muted
                align: left
                v_align: top
                line_height: 26
                italic: true
                wrap: true
        label_text: ""
      metadata:
        # Sits above the synthesis-band reservation (band occupies
        # y≈948–1020 when present, plus the 24px footer band below).
        # Box top is calibrated so a 2–3 line key/value list breathes
        # without ever colliding with the band.
        box: [120, 820, 1680, 96]
        treatment:
          fill_color: none
          stroke_color: none
          padding: 0
        typography:
          font: primary
          size: 14
          weight: 400
          color: text_muted
          align: left
          v_align: top
          italic: true
          line_height: 22
        label_text: ""
- id: 2
  name: Section Divider
  layout_disposition: Minimal slide separating major sections, usually with a large section number and title.
  zones:
  - role: section_number
    size: large
    placement: &id028
      anchor:
        h: left
        v: top
    content_type: metric
  - role: section_title
    size: large
    placement: &id023
      anchor:
        h: center
        v: middle
    content_type: title_body
  - role: decorative_element
    size: variable
    placement:
      anchor:
        h: center
        v: middle
    content_type: decorative
  category: generic
  # Enterprise-polished section divider (1920×1080). Large display
  # part-number label in muted serif; massive display title; subtle
  # accent rule below. Decorative zone is suppressed.
  enterprise_layout:
    notes: |
      Section divider. Part-number renders as a small kicker (label
      = "PART") above a 64px display title with a thin accent rule
      below. Body text sits underneath in regular weight.
    zones:
      section_number:
        box: [120, 340, 1680, 96]
        treatment:
          fill_color: none
          stroke_color: none
          padding: 0
          slots:
            kpi_value:
              height: 96
              typography:
                font: heading
                size: 96
                weight: 700
                color: accent
                align: left
                v_align: top
                line_height: 100
            kpi_label:
              typography:
                font: primary
                size: 16
                weight: 700
                color: accent
                align: left
                v_align: top
                line_height: 20
        label_text: ""
      section_title:
        box: [120, 460, 1680, 320]
        treatment:
          fill_color: none
          stroke_color: none
          padding: 0
          accent_bar:
            side: left
            width: 4
            color: accent
          slots:
            title:
              height: 80
              gap_below: 16
              typography:
                font: heading
                size: 64
                weight: 700
                color: primary
                align: left
                v_align: top
                line_height: 76
                wrap: true
            body:
              typography:
                font: primary
                size: 22
                weight: 400
                color: text
                align: left
                v_align: top
                line_height: 32
                wrap: true
        label_text: ""
      decorative_element:
        box: [0, 0, 0, 0]
        label_text: ""
