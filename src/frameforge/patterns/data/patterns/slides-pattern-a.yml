  # BMC polish — nine-block canvas. Three color families:
  #   left column (infra): text muted (operational, internal)
  #   center (value): accent (the hero — value props connect both sides)
  #   right column (customer): data_3 sage (positive, market-facing)
  #   bottom strip: warm (costs) | sage (revenue)
  # Boxes come from the layout planner (9-cell grid). Treatments
  # carry LABEL bands and accent bars so each block reads as a
  # distinct, role-coded card.
  enterprise_layout:
    notes: |
      Business Model Canvas. 9 zones, 3 color families:
      - Left (infra/operations) → muted text
      - Center (value propositions) → accent (hero)
      - Right (customer-facing) → sage green
      - Bottom strip → warm (cost) / sage (revenue)
    zones:
      key_partners:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [16, 18, 16, 18]
          accent_bar: {side: left, width: 3, color: text_muted}
          slots:
            label:
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: text_muted, align: left, v_align: middle, line_height: 14}
      key_activities:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [16, 18, 16, 18]
          accent_bar: {side: left, width: 3, color: text_muted}
          slots:
            label:
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: text_muted, align: left, v_align: middle, line_height: 14}
      key_resources:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [16, 18, 16, 18]
          accent_bar: {side: left, width: 3, color: text_muted}
          slots:
            label:
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: text_muted, align: left, v_align: middle, line_height: 14}
      value_propositions:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.8
          corner_radius: 6
          padding: [18, 20, 18, 20]
          accent_bar: {side: left, width: 4, color: accent}
          slots:
            label:
              height: 16
              gap_below: 10
              typography: {font: primary, size: 14, weight: 700, color: accent, align: left, v_align: middle, line_height: 16}
      customer_relationships:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [16, 18, 16, 18]
          accent_bar: {side: left, width: 3, color: data_3}
          slots:
            label:
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: data_3, align: left, v_align: middle, line_height: 14}
      channels:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [16, 18, 16, 18]
          accent_bar: {side: left, width: 3, color: data_3}
          slots:
            label:
              height: 14
              gap_below: 8
