  - role: implications
    size: equal
    placement: *id037
    shape: cell
    content_type: table_data
  use_case: Summarizes what was found in a business or operational diagnostic.
  # Table-stack polish. Defines the canonical treatments for this
  # archetype (1 anchor list column + N table columns) as YAML
  # anchors so the other 10 table-stack patterns can `*reference`
  # them without re-typing 40 lines each.
  enterprise_layout: &ts_layout_diagnostic
    notes: |
      Table-stack archetype: one anchor `list_items` column (subjects)
      + several `table_data` columns (per-subject attributes). Anchor
      column carries an accent-bar card; data columns get a thin
      top-bar header treatment.
    zones:
      dimensions: &ts_anchor_zone
        treatment: &ts_anchor_treatment
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [16, 18, 16, 18]
          accent_bar: {side: left, width: 4, color: accent}
          slots:
            label: &ts_anchor_label
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: accent, align: left, v_align: middle, line_height: 14}
      status: &ts_data_zone
        treatment: &ts_data_treatment
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar: {side: top, width: 3, color: data_3}
          slots:
            label: &ts_data_label
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: data_3, align: left, v_align: middle, line_height: 14}
      findings:
        treatment:
          fill_color: surface
          stroke_color: border
          stroke_width: 0.6
          corner_radius: 6
          padding: [12, 16, 12, 16]
          accent_bar: {side: top, width: 3, color: accent}
          slots:
            label:
              height: 14
              gap_below: 8
              typography: {font: primary, size: 12, weight: 700, color: accent, align: left, v_align: middle, line_height: 14}
      implications:
        treatment:
