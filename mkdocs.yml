site_name: FrameGraph v2 (HEAD)
site_description: >-
  FrameGraph v2 — a proposed document/graphics DSL. Pydantic models are the
  source of truth; the schema, validator, codemod, and this site are generated
  from or checked against them.
docs_dir: docs

# NOTE: the pages under nav except index.md are GENERATED by tooling/gen_docs.py
# (run `make docs`); they are git-ignored. Build with `make docs` / `make docs-serve`,
# which run the generator first. CI fetches the theme ephemerally via `uv run --with`.
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Dark }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Light }

nav:
  - Home: index.md
  - Specification: spec.md
  - Schema reference: reference.md
  - Grammar: grammar.md
  - Python SDK:
      - Guide: sdk.md
      - API reference: sdk-api.md
  - Fixture gallery: fixtures.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
