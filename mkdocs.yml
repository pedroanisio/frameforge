site_name: FrameForge v2 (HEAD)
site_description: >-
  FrameForge v2 — a proposed agent-native visual-authoring substrate (documents,
  decks, diagrams, books, letters today; UIs, vector graphics, logos, and design
  systems as the direction). Pydantic models are the source of truth; the schema,
  validator, codemod, and this site are generated from or checked against them.
docs_dir: docs

# The src-layout refactor hosts non-site reference material under docs/ too
# (the schema generator, spec/grammar sources, seed assets, repo-facing docs;
# the authoritative model itself lives in the package, src/frameforge/model.py).
# Exclude them from the built site: they are repo content, not pages, and their
# repo-root-relative links would fail --strict.
exclude_docs: |
  schema/
  spec/
  grammar/
  seed/
  decisions/
  codebase-standards.md
  request.md
  FIXTURE-STATUS.md
  quarantine-summaries.md
  proposals/
  bhag-pixel-perfect-4k.md
  book-corpus-scope.md
  prompt-implement-from-roadmap.md

# Site pages legitimately deep-link to repo files outside docs_dir (examples,
# tooling, the models). MkDocs cannot resolve those against the site, so its
# unrecognized-link warning is pure noise here — every relative link in every
# tracked Markdown file is already hard-gated by `make docs-linkcheck`
# (tooling/check_doc_links.py). Keep --strict meaningful for nav/anchors.
validation:
  links:
    not_found: info
    unrecognized_links: info

# NOTE: nav pages other than index.md are generated by tooling/gen_docs.py.
# The SDK guide/API are committed generated snapshots; reference/spec/grammar/
# fixtures/changelog and render assets are transient build artifacts.
# Build with `make docs` / `make docs-serve`, which run the generator first.
# CI fetches the theme ephemerally via `uv run --with`.
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Dark }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Light }

# Declaring `plugins` disables the implicit default, so `search` is re-added
# explicitly. print-site must stay LAST: it concatenates every page after all
# other plugins have run, adding a single combined page (site root /print_page/)
# for save-as-HTML plus a print/save-as-PDF flow via the browser print dialog.
# The extra dependency rides in via `--with mkdocs-print-site-plugin`
# (Makefile docs / docs-serve, ci.yml docs jobs).
plugins:
  - search
  - print-site:
      add_to_navigation: true
      print_page_title: "Save as HTML / PDF"
      add_table_of_contents: true
      toc_depth: 2
      add_full_urls: false
      add_print_site_banner: false

nav:
  - Home: index.md
  - Tutorial:
      - Overview: tutorial/index.md
      - 01 · Reconstruct a book cover: tutorial/lesson-01/index.md
      - 02 · Reconstruct a geometric cover: tutorial/lesson-02/index.md
      - 03 · Reconstruct a typeset page: tutorial/lesson-03/index.md
      - 04 · When not to reconstruct: tutorial/lesson-04/index.md
  - Specification: spec.md
  - Schema reference: reference.md
  - Grammar: grammar.md
  - Python SDK:
      - Guide: sdk.md
      - API reference: sdk-api.md
  - Error codes: error-codes.md
  - Examples cookbook: examples.md
  - Fixture gallery: fixtures.md
  - Claude Code plugin (Windows setup): plugin-windows-setup.md
  - Claude Desktop / Cowork setup: desktop-cowork-setup.md
  - Design records:
      - Architecture: architecture.md
      - Output space: output-space.md
      - Roadmap: roadmap.md
      - Patterns & fills: patterns-fills.md
      - Library (themes · symbols · generators): library.md
      - Migrating v0.1 documents: migration-v01.md
      - ADR-0001 backend-neutral rendering: adr-0001-backend-neutral-rendering.md
      - ADR-0002 SDK lags core delivery: adr-0002-sdk-lags-core-delivery.md
      - ADR-0003 backend-neutral flow layout: adr-0003-backend-neutral-flow-layout.md
      - ADR-0004 single-engine layout: adr-0004-single-engine-layout.md
      - ADR-0005 3D scene graph: adr-0005-3d-scene-graph.md
      - ADR-0006 no injected style: adr-0006-no-injected-style.md
      - ADR-0007 layout feedback (separation + overflow signals): adr-0007-layout-feedback.md
      - Illustration protocol: illustration-protocol.md
      - Vector recreation improvements: frameforge-vector-recreation-improvements.md
      - Brand guideline: BRAND.md
  - Writing:
      - Painting with FrameForge: posts/painting-with-frameforge.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
