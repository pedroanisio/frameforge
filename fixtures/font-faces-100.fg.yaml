# ─────────────────────────────────────────────────────────────────────────────
# font-faces-100.fg.yaml — the multi-face capacity proof (>=100 font faces).
#
# Companion to font-faces.fg.yaml (which exercises the OpenType *surface* on a
# few faces). This fixture exercises *count*: defs.tokens.fonts declares 100
# distinct faces and the story renders one paragraph per face, each bound to its
# own text_styles entry. It proves both render paths carry an arbitrary number
# of faces with no cap or truncation:
#
#   * SVG proxy  — each paragraph emits its own font-family (100 distinct).
#   * LaTeX flow — each face becomes a guarded \newfontfamily and the paragraph
#     selects it, so TeX switches typeface per face (not just size/series).
#
# Each face's `family` is a real, installed, Latin-capable typeface; because the
# host carries fewer than 100 distinct Latin families, the backing typefaces are
# cycled over a whitelist (the proven quantity is the face count, not 100 unique
# typefaces). The backend wraps each \newfontfamily in \IfFontExistsTF, so on a
# host missing a face it degrades to the main font and the PDF still compiles.
# A single mode: flow section keeps it clean under every HEAD gate.
# ─────────────────────────────────────────────────────────────────────────────

dsl: FrameGraph
version: 2.2.0
profile: report
title: One hundred font faces — multi-face capacity proof
description: >-
  Declares 100 distinct font faces in defs.tokens.fonts and renders one paragraph
  per face, each bound to its own text style, to prove the renderer carries an
  arbitrary number of faces (>=100) through both the SVG proxy and the LaTeX/flow
  backend with no cap, collision, or truncation.
