# ───────────────────────────── 01 · COVER ─────────────────────────────
- mode: page
  id: cover
  canvas: {size: [1280, 720], units: px}
  rendering: {coordinate_mode: absolute}
  layers:
  - id: bg
    z: 0
    objects:
    - {type: rect, box: [0, 0, 1280, 720], fill: ink}
    - type: rect            # diagonal gradient wash
      box: [0, 0, 1280, 720]
      fill: {kind: linear, angle: 125, stops: [{color: ink1, position: '0%'}, {color: ink, position: '55%'}, {color: ink, position: '100%'}]}
    - type: ellipse         # soft radial glow, top-right
      center: [1080, 210]
      rx: 360
      ry: 360
      fill: {kind: radial, shape: circle, at: center, stops: [{color: ink2, position: '0%'}, {color: ink, position: '70%'}]}
  - id: motif             # neural-graph motif (lines + glowing nodes + transform)
    z: 1
    objects:
    - {type: line, from: [1000, 150], to: [1110, 110], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: line, from: [1000, 150], to: [940, 250], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: line, from: [1110, 110], to: [1190, 210], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: line, from: [940, 250], to: [1060, 300], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: line, from: [1190, 210], to: [1060, 300], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: line, from: [1060, 300], to: [1130, 390], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: line, from: [940, 250], to: [1110, 110], stroke: hair, stroke_style: {stroke_width: 1.2}}
    - {type: ellipse, center: [940, 250], rx: 8, ry: 8, fill: cyan, glow: {color: cyan, blur: 8, opacity: 0.7}}
    - {type: ellipse, center: [1110, 110], rx: 6, ry: 6, fill: hair}
    - {type: ellipse, center: [1190, 210], rx: 10, ry: 10, fill: lime, glow: {color: lime, blur: 10, opacity: 0.8}}
    - {type: ellipse, center: [1000, 150], rx: 6, ry: 6, fill: hair}
