# ─────────────────────── 02 · EXECUTIVE SUMMARY (grid) ───────────────────────
- mode: page
  id: exec
  canvas: {size: [1280, 720], units: px}
  rendering: {coordinate_mode: absolute}
  layers:
  - id: main
    z: 0
    objects:
    - {type: rect, box: [0, 0, 1280, 720], fill: ink}
    - {type: text, box: [80, 64, 1120, 22], text: "Executive summary", style: kicker}
    - {type: text, box: [80, 92, 1120, 50], text: "What the data actually says", style: titleD}
    # 3x2 metric-card grid — Group grid auto-layout; each card is itself a group
    - type: group
      box: [80, 178, 1120, 320]
      layout: {kind: grid, columns: 3, gap: 26}
      children:
      - type: group
        box: [0, 0, 356, 147]
        children:
        - {type: rect, box: [0, 0, 356, 147], fill: ink1, radius: 16, stroke: hair, stroke_style: {stroke_width: 1}, shadow: {color: '#000000', blur: 18, dy: 8, opacity: 0.35}}
        - {type: text, box: [22, 18, 312, 48], text: "90% / 84%", style: {class: statD, color: lime, font_size: 36}}
        - {type: text, box: [22, 72, 312, 22], text: "Adoption is universal", style: cardh}
        - {type: text, box: [22, 96, 312, 42], text: 'Nine in ten developers use AI at work (DORA); 84% on Stack Overflow, up from 76%.', style: cardb}
      - type: group
        box: [0, 0, 356, 147]
        children:
        - {type: rect, box: [0, 0, 356, 147], fill: ink1, radius: 16, stroke: hair, stroke_style: {stroke_width: 1}, shadow: {color: '#000000', blur: 18, dy: 8, opacity: 0.35}}
        - {type: text, box: [22, 18, 312, 48], text: '+19%', style: {class: statD, color: coral, font_size: 36}}
        - {type: text, box: [22, 72, 312, 22], text: "The productivity paradox", style: cardh}
        - {type: text, box: [22, 96, 312, 42], text: 'In an RCT, veterans were 19% slower with AI while believing they were 20% faster (METR).', style: cardb}
      - type: group
        box: [0, 0, 356, 147]
        children:
        - {type: rect, box: [0, 0, 356, 147], fill: ink1, radius: 16, stroke: hair, stroke_style: {stroke_width: 1}, shadow: {color: '#000000', blur: 18, dy: 8, opacity: 0.35}}
        - {type: text, box: [22, 18, 312, 48], text: "29%", style: {class: statD, color: amber, font_size: 36}}
        - {type: text, box: [22, 72, 312, 22], text: "Trust is falling", style: cardh}
        - {type: text, box: [22, 96, 312, 42], text: 'Only 29% trust AI accuracy, down from 40% — a widening adoption-trust gap.', style: cardb}
      - type: group
        box: [0, 0, 356, 147]
        children:
        - {type: rect, box: [0, 0, 356, 147], fill: ink1, radius: 16, stroke: hair, stroke_style: {stroke_width: 1}, shadow: {color: '#000000', blur: 18, dy: 8, opacity: 0.35}}
        - {type: text, box: [22, 18, 312, 48], text: "3.4×", style: {class: statD, color: cyan, font_size: 36}}
        - {type: text, box: [22, 72, 312, 22], text: "A multiplier, not a fix", style: cardh}
        - {type: text, box: [22, 96, 312, 42], text: 'Throughput rises — but incidents per pull request more than tripled in 2026 telemetry.', style: cardb}
      - type: group
        box: [0, 0, 356, 147]
        children:
        - {type: rect, box: [0, 0, 356, 147], fill: ink1, radius: 16, stroke: hair, stroke_style: {stroke_width: 1}, shadow: {color: '#000000', blur: 18, dy: 8, opacity: 0.35}}
        - {type: text, box: [22, 18, 312, 48], text: '−20%', style: {class: statD, color: coral, font_size: 36}}
        - {type: text, box: [22, 72, 312, 22], text: "The junior rung thins", style: cardh}
        - {type: text, box: [22, 96, 312, 42], text: 'Employment of developers aged 22-25 has fallen ~20% from its 2022 peak (Stanford).', style: cardb}
      - type: group
        box: [0, 0, 356, 147]
        children:
        - {type: rect, box: [0, 0, 356, 147], fill: {kind: linear, angle: 135, stops: [{color: ink2, position: '0%'}, {color: ink1, position: '100%'}]}, radius: 16, stroke: violetD, stroke_style: {stroke_width: 1}, shadow: {color: violetD, blur: 16, dy: 6, opacity: 0.25}}
        - {type: text, box: [22, 18, 312, 48], text: "5.5%", style: {class: statD, color: violet, font_size: 36}}
        - {type: text, box: [22, 72, 312, 22], text: "Few capture the return", style: cardh}
        - {type: text, box: [22, 96, 312, 42], text: 'Only 5.5% of organisations see real financial return; leaders redesign workflows.', style: cardb}
  - id: footer
    z: 3
    objects:
    - {type: line, from: [80, 672], to: [1200, 672], stroke: hair, stroke_style: {stroke_width: 1}}
    - {type: text, box: [80, 682, 760, 18], text: 'Source: DORA 2025; Stack Overflow 2025; METR 2025; Stanford 2025; McKinsey 2025', style: source}
    - {type: text, box: [1000, 682, 200, 18], text: "02 / 12", style: pnum}

