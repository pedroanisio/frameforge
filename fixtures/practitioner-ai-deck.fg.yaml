dsl: FrameGraph
version: 2.2.0
profile: deck
title: The Software Engineering Practitioner in the Age of AI
description: >-
  A reimagined research briefing on the state of software-engineering
  practitioners in the age of AI (2025-26 data). Same subject as the original
  framegraph_deck, rebuilt to lean on FrameGraph's advanced primitives rather
  than hand-placed boxes: Group row/column/grid auto-layout, real TableObjects,
  connector flows with arrowheads and ports, Y-axis transforms, linear/radial
  gradients, shadow/glow effects, and custom data visualisations (slope,
  diverging-line, horizontal-delta and zero-baseline cohort charts) assembled
  from primitives. Dark/neon editorial design system.
lang: en
