    - {type: rect, id: s2, box: [370, 232, 250, 132], fill: white, radius: 16, stroke: hairL, stroke_style: {stroke_width: 1}, shadow: {color: '#9AA6C8', blur: 16, dy: 8, opacity: 0.25}}
    - {type: rect, id: s3, box: [660, 232, 250, 132], fill: white, radius: 16, stroke: hairL, stroke_style: {stroke_width: 1}, shadow: {color: '#9AA6C8', blur: 16, dy: 8, opacity: 0.25}}
    - {type: rect, id: s4, box: [950, 232, 250, 132], fill: {kind: linear, angle: 135, stops: [{color: inkD, position: '0%'}, {color: ink2, position: '100%'}]}, radius: 16, shadow: {color: '#1A2236', blur: 18, dy: 8, opacity: 0.3}}
    # number badges + titles + bodies (drawn over the cards)
    - {type: ellipse, center: [112, 264], rx: 20, ry: 20, fill: lime}
    - {type: text, box: [92, 252, 40, 26], text: '01', style: num}
    - {type: text, box: [148, 246, 168, 26], text: "Adoption goes universal", style: cardhL}
    - {type: text, box: [104, 300, 204, 56], text: "From novelty to near-default in under three years — and how developers feel about it.", style: cardbL}
    - {type: ellipse, center: [402, 264], rx: 20, ry: 20, fill: cyan}
    - {type: text, box: [382, 252, 40, 26], text: '02', style: num}
    - {type: text, box: [438, 246, 168, 36], text: 'Speed vs. stability', style: cardhL}
    - {type: text, box: [394, 300, 204, 56], text: "AI amplifies whatever a team already is; throughput and risk rise together.", style: cardbL}
    - {type: ellipse, center: [692, 264], rx: 20, ry: 20, fill: violet}
    - {type: text, box: [672, 252, 40, 26], text: '03', style: num}
    - {type: text, box: [728, 246, 168, 36], text: "The role is restructured", style: cardhL}
    - {type: text, box: [684, 300, 204, 56], text: "From author to reviewer and systems-thinker — and a contracting entry pipeline.", style: cardbL}
    - {type: ellipse, center: [982, 264], rx: 20, ry: 20, fill: lime}
    - {type: text, box: [962, 252, 40, 26], text: '04', style: num}
    - {type: text, box: [1018, 246, 168, 36], text: 'Implications & the path', style: {class: cardhL, color: white}}
    - {type: text, box: [974, 300, 204, 56], text: "What the next two years demand of leaders and individual practitioners.", style: {class: cardbL, color: body}}
  - id: connectors
    z: 2
