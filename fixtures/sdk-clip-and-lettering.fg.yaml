dsl: FrameGraph
version: 2.2.0
profile: diagram
title: SDK clip + lettering demo
lang: en
defs:
  tokens:
    text_styles:
      title:
        color: '#16202b'
        font_family:
        - DejaVu Sans
        - Arial
        - sans-serif
        font_size: 24
        font_weight: 800
        letter_spacing: -0.5
      cap:
        color: '#6b7787'
        font_family:
        - DejaVu Sans Mono
        - monospace
        font_size: 13
        letter_spacing: 0.5
      lbl:
        color: '#16202b'
        font_family:
        - DejaVu Sans
        - Arial
        - sans-serif
        font_size: 14
        font_weight: 700
pages:
- mode: page
  id: clip_and_lettering
  canvas:
    size:
    - 900.0
    - 600.0
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    objects:
    - box:
      - 0
      - 0
      - 900
      - 600
      type: rect
      fill: '#f4f1ea'
    - box:
      - 40
      - 26
      - 820
      - 30
      style: title
      type: text
      text: Clip & author-intent helpers
    - style:
        clip_path:
          shape: polygon
          args:
            points:
            - - 60.0
              - 90.0
            - - 420.0
              - 90.0
            - - 420.0
              - 410.0
            - - 60.0
              - 410.0
      type: group
      children:
      - box:
        - 20
        - 50
        - 460
        - 400
        type: rect
        fill:
          kind: linear
          stops:
          - color: '#7028e4'
            position: 0%
          - color: '#e5b2ca'
            position: 100%
          angle: 45
      - opacity: 0.35
        type: ellipse
        center:
        - 60.0
        - 110.0
        rx: 90.0
        ry: 90.0
        fill: '#ffffff'
      - opacity: 0.35
        type: ellipse
        center:
        - 430.0
        - 400.0
        rx: 120.0
        ry: 120.0
        fill: '#16202b'
    - box:
