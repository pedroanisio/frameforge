    - box:
      - 500
      - 90
      - 320
      - 320
      style:
        clip_path:
          shape: circle
      type: rect
      fill:
        kind: linear
        stops:
        - color: '#7028e4'
          position: 0%
        - color: '#e5b2ca'
          position: 100%
        angle: 45
    - box:
      - 500
      - 420
      - 320
      - 18
      style: cap
      type: text
      text: rect + clip_circle() — derived from the box
    - decorative: true
