meta:
  design_reference:
    source: Anthropic / Claude public product and company surfaces.
    principles:
    - Warm ivory editorial surface
    - High-contrast restrained typography
    - Terracotta accent rather than saturated tech-blue
    - Safety/trust narrative structure
    - Charts and tables are calm, legible, and evidence-led
  schema: FrameGraph v2 representative schema
  status: template; placeholder content intended to be replaced
  improvement:
    renderer: §3.7 text-fit measure pass (wrap + shrink_to_fit) implemented in the proxy; resolves all 39 prior overflows
      with NO data change — the styles already declared wrap/shrink correctly.
    data: added overflow:shrink_to_fit + min_font_size to 6 label styles that had no fit policy (eyebrow, label, label_ink,
      num, footer, inverse_label), so the reusable template cannot overflow even with longer content.
    not_changed: no text, geometry, palette, or layout altered; the charcoal monolith motif and its crossed axes are intentional
      and left as-is.
