dsl: FrameGraph
version: 2.2.0
profile: diagram
title: CSS DSL — capstone (classes + cascade + css)
description: >-
  Capstone for the CSS DSL: each card composes the whole module — a shared `card`
  structural class (radius), a per-card colour class (`colA/B/C`), and a `css`
  escape adding `filter: drop-shadow(...)` for elevation. Text uses the
  `h`/`p`/`price` text classes. Every layer is SVG-applicable and renders: the
  class fill+radius and the css drop-shadow are all visible. (Elevation uses the
  SVG-native `filter: drop-shadow`, not the HTML-only `box-shadow`.)
lang: en
defs:
  tokens:
    colors:
      ink: '#0f172a'
      sub: '#475569'
      page: '#f1f5f9'
      brandA: '#4f46e5'
      brandB: '#0ea5e9'
      brandC: '#059669'
      white: '#ffffff'
      faint: '#e2e8f0'
    styles:
      card: {radius: 18}
      colA: {fill: brandA}
      colB: {fill: brandB}
      colC: {fill: brandC}
      h: {font: sans, size: 19, weight: 700, color: white}
      p: {font: sans, size: 13, color: faint, line_height: 1.45}
      price: {font: sans, size: 30, weight: 800, color: white}
      title: {font: sans, size: 22, weight: 800, color: ink}
      lead: {font: sans, size: 14, color: sub}
pages:
- mode: page
  id: css_theme_cards
  canvas:
    size: [820, 340]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: rect
      box: [0, 0, 820, 340]
      fill: page
    - type: text
      box: [24, 22, 772, 28]
      text: Theme cards — classes + cascade + css
      style: title
    - type: text
      box: [24, 52, 772, 18]
      text: structural class + colour class + css drop-shadow flourish
      style: lead

    # Card A
    - type: rect
      box: [24, 86, 240, 222]
      style: {class: [card, colA], css: 'filter: drop-shadow(0 14px 22px rgba(2,6,23,.30))'}
    - type: text
      box: [44, 110, 200, 24]
      text: Indigo
      style: h
    - type: text
      box: [44, 142, 200, 40]
      text: Structural class + colour class + a css drop-shadow.
      style: p
    - type: text
      box: [44, 246, 200, 40]
      text: '$19'
      style: price

    # Card B
    - type: rect
      box: [288, 86, 240, 222]
      style: {class: [card, colB], css: 'filter: drop-shadow(0 14px 22px rgba(2,6,23,.30))'}
    - type: text
      box: [308, 110, 200, 24]
      text: Sky
      style: h
    - type: text
      box: [308, 142, 200, 40]
      text: Same structure class, different colour class.
      style: p
    - type: text
      box: [308, 246, 200, 40]
      text: '$29'
      style: price

    # Card C
    - type: rect
      box: [552, 86, 240, 222]
      style: {class: [card, colC], css: 'filter: drop-shadow(0 14px 22px rgba(2,6,23,.30))'}
    - type: text
      box: [572, 110, 200, 24]
      text: Emerald
      style: h
    - type: text
      box: [572, 142, 200, 40]
      text: css escape adds the elevation on top of the cascade.
      style: p
    - type: text
      box: [572, 246, 200, 40]
      text: '$49'
      style: price
