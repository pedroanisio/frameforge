dsl: FrameGraph
version: 2.2.0
profile: diagram
title: CSS DSL — utility-class composition
description: >-
  Exercises `class` composition — the list form `style: {class: [a, b, c]}`
  merges several single-purpose `tokens.styles` bundles like utility classes.
  Resolution is in list order, later wins (§5.2.1 step 2): the last two chips
  prove `[brand, ok] → green` and `[ok, brand] → purple`. Each chip's fill comes
  from a colour utility and its corner radius from `rounded`/`pill`.
lang: en
defs:
  tokens:
    colors:
      ink: '#0f172a'
      sub: '#64748b'
      page: '#f8fafc'
      purple: '#7c3aed'
      green: '#16a34a'
      amber: '#d97706'
      red: '#dc2626'
      slate: '#0f172a'
    styles:
      brand: {fill: purple}
      ok: {fill: green}
      warn: {fill: amber}
      danger: {fill: red}
      dark: {fill: slate}
      rounded: {radius: 14}
      pill: {radius: 999}
      label: {font: sans, size: 12, color: sub, align: center}
      title: {font: sans, size: 18, weight: 700, color: ink}
pages:
- mode: page
  id: css_utilities
  canvas:
    size: [680, 320]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: rect
      box: [0, 0, 680, 320]
      fill: page
    - type: text
      box: [28, 22, 624, 24]
      text: Utility-class composition — class:[a, b]
      style: title

    # Row 1
    - type: rect
      box: [28, 70, 190, 70]
      style: {class: [brand, rounded]}
    - type: text
      box: [28, 144, 190, 16]
      text: '[brand, rounded]'
      style: label
    - type: rect
      box: [245, 70, 190, 70]
      style: {class: [ok, pill]}
    - type: text
      box: [245, 144, 190, 16]
      text: '[ok, pill]'
      style: label
    - type: rect
      box: [462, 70, 190, 70]
      style: {class: [danger, rounded]}
    - type: text
      box: [462, 144, 190, 16]
      text: '[danger, rounded]'
      style: label

    # Row 2 — last two show later-wins on a conflicting property (fill)
    - type: rect
      box: [28, 190, 190, 70]
      style: {class: [dark, pill]}
    - type: text
      box: [28, 264, 190, 16]
      text: '[dark, pill]'
      style: label
    - type: rect
      box: [245, 190, 190, 70]
      style: {class: [brand, ok]}
    - type: text
      box: [245, 264, 190, 16]
      text: '[brand, ok] → ok wins'
      style: label
    - type: rect
      box: [462, 190, 190, 70]
      style: {class: [ok, brand]}
    - type: text
      box: [462, 264, 190, 16]
      text: '[ok, brand] → brand wins'
      style: label
