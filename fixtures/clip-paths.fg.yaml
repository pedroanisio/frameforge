dsl: FrameGraph
version: 2.2.0
profile: diagram
title: Clip paths (fixture)
description: >-
  Exercises the `clip_path` style property across all five `ClipPath.shape`s —
  `circle`, `ellipse`, `inset`, `polygon`, `path`. Each clip is applied to the
  same kind of subject (a vivid gradient-filled rectangle) so the silhouette is
  what changes. `polygon`/`path` carry absolute geometry in `args`; `circle`/
  `ellipse`/`inset` derive from the subject box unless given explicit args.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
    text_styles:
      title:
        font: sans
        size: 15
        weight: 600
        color: ink
      cap:
        font: sans
        size: 11
        color: ink
        align: center
pages:
- mode: page
  id: clip_paths
  canvas:
    size: [820, 250]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: text
      box: [24, 16, 760, 22]
      text: clip_path silhouettes (same gradient subject)
      style: title

    # 1 — circle (derived from the box)
    - type: rect
      box: [24, 50, 140, 140]
      fill: {kind: linear, angle: 45, stops: [{color: '#ff6a00', position: '0%'}, {color: '#ee0979', position: '100%'}]}
      style: {clip_path: {shape: circle}}
    - type: text
      box: [24, 196, 140, 16]
      text: circle
      style: cap

    # 2 — ellipse (explicit rx/ry)
    - type: rect
      box: [182, 50, 140, 140]
      fill: {kind: linear, angle: 45, stops: [{color: '#36d1dc', position: '0%'}, {color: '#5b86e5', position: '100%'}]}
      style: {clip_path: {shape: ellipse, args: {center: [252, 120], rx: 68, ry: 46}}}
    - type: text
      box: [182, 196, 140, 16]
      text: ellipse
      style: cap

    # 3 — inset (uniform 18px inset -> inner rect)
    - type: rect
      box: [340, 50, 140, 140]
      fill: {kind: linear, angle: 45, stops: [{color: '#11998e', position: '0%'}, {color: '#38ef7d', position: '100%'}]}
      style: {clip_path: {shape: inset, args: {top: 18, right: 18, bottom: 18, left: 18}}}
    - type: text
      box: [340, 196, 140, 16]
      text: inset
      style: cap

    # 4 — polygon (absolute hexagon around the cell centre)
    - type: rect
      box: [498, 50, 140, 140]
      fill: {kind: linear, angle: 45, stops: [{color: '#7028e4', position: '0%'}, {color: '#e5b2ca', position: '100%'}]}
      style:
        clip_path:
          shape: polygon
          args:
            points: [[568, 54], [623, 86], [623, 150], [568, 182], [513, 150], [513, 86]]
    - type: text
      box: [498, 196, 140, 16]
      text: polygon (hexagon)
      style: cap

    # 5 — path (absolute triangle)
    - type: rect
      box: [656, 50, 140, 140]
      fill: {kind: linear, angle: 45, stops: [{color: '#f7971e', position: '0%'}, {color: '#ffd200', position: '100%'}]}
      style:
        clip_path:
          shape: path
          args: {d: 'M726,54 L790,182 L662,182 Z'}
    - type: text
      box: [656, 196, 140, 16]
      text: path (triangle)
      style: cap
