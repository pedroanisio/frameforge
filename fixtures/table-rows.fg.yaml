dsl: FrameGraph
version: 2.2.0
profile: diagram
title: Table row heights + cell wrapping (fixture)
description: >-
  Exercises the v2 TableObject row_height / header_height (previously ignored —
  rows were split evenly) and cell-text wrapping: a long cell wraps to multiple
  lines clamped to the row and clipped to the cell. Backs the reused table
  row-height/wrap component. (Cells use text_tag, so this is neutral to the
  overflow gate.)
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      head_bg: '#33506e'
      head_fg: '#ffffff'
    text_styles:
      th: {font: sans, size: 12, weight: 700, color: head_fg}
      td: {font: sans, size: 12, color: ink}
pages:
- mode: page
  id: tablerows
  canvas:
    size: [560, 260]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: table
      box: [30, 30, 360, 150]
      header_height: 30
      row_height: 44
      style: {header_fill: head_bg, header_text: th, cell_text: td}
      columns:
      - {label: Item, width: 70, align: left}
      - {label: Notes, width: 1fr, align: left}
      header: [Item, Notes]
      rows:
      - [A1, 'A deliberately long note that must wrap across several lines inside this narrow column to exercise cell wrapping.']
      - [B2, Short]
