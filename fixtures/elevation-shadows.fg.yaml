dsl: FrameGraph
version: 2.2.0
profile: diagram
title: Shadows & elevation (fixture)
description: >-
  Exercises the shadow/glow surface as an elevation system. Row 1 is a five-step
  elevation ladder built from the object-level `shadow` Effect (an `EffectObject`
  with rising `blur`/`dy`/`opacity`), which the proxy renders via an SVG
  `<filter>`. Row 2 covers an accent `glow`, a tinted "ambient colour" shadow,
  and the CSS-form `box_shadow` style list (validates everywhere; painted flat by
  the proxy). The page title carries a `text_shadow`.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      bg: '#eef1f4'
      card: '#ffffff'
      accent: '#2e86de'
      glowc: '#27ae60'
    text_styles:
      title:
        font: sans
        size: 16
        weight: 700
        color: ink
        text_shadow:
        - {offset_x: 1, offset_y: 2, blur: 2, color: '#9aa6b2'}
      cap:
        font: sans
        size: 11
        color: ink
        align: center
pages:
- mode: page
  id: elevation
  canvas:
    size: [820, 320]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: rect            # page backdrop so white cards + shadows read
      box: [0, 0, 820, 320]
      fill: bg
    - type: text
      box: [24, 14, 600, 24]
      text: Shadows & elevation
      style: title

    # Row 1 — elevation ladder
    - type: rect
      box: [28, 64, 120, 110]
      radius: 10
      fill: card
      shadow: {color: ink, blur: 3, dy: 1, opacity: 0.16}
    - type: text
      box: [28, 180, 120, 16]
      text: elev 1
      style: cap
    - type: rect
      box: [178, 64, 120, 110]
      radius: 10
      fill: card
      shadow: {color: ink, blur: 6, dy: 2, opacity: 0.18}
    - type: text
      box: [178, 180, 120, 16]
      text: elev 2
      style: cap
    - type: rect
      box: [328, 64, 120, 110]
      radius: 10
      fill: card
      shadow: {color: ink, blur: 10, dy: 4, opacity: 0.20}
    - type: text
      box: [328, 180, 120, 16]
      text: elev 3
      style: cap
    - type: rect
      box: [478, 64, 120, 110]
      radius: 10
      fill: card
      shadow: {color: ink, blur: 16, dy: 7, opacity: 0.22}
    - type: text
      box: [478, 180, 120, 16]
      text: elev 4
      style: cap
    - type: rect
      box: [628, 64, 120, 110]
      radius: 10
      fill: card
      shadow: {color: ink, blur: 24, dy: 11, opacity: 0.24}
    - type: text
      box: [628, 180, 120, 16]
      text: elev 5
      style: cap

    # Row 2 — glow, tinted ambient shadow, CSS box_shadow
    - type: rect
      box: [28, 216, 220, 70]
      radius: 10
      fill: card
      glow: {color: glowc, blur: 14, opacity: 0.85}
    - type: text
      box: [28, 290, 220, 16]
      text: glow (accent)
      style: cap
    - type: rect
      box: [300, 216, 220, 70]
      radius: 10
      fill: card
      shadow: {color: accent, blur: 18, dy: 9, opacity: 0.55}
    - type: text
      box: [300, 290, 220, 16]
      text: tinted ambient shadow
      style: cap
    - type: rect
      box: [572, 216, 220, 70]
      radius: 10
      fill: card
      style:
        box_shadow:
        - {offset_x: 0, offset_y: 6, blur: 12, color: '#b0b8c1'}
        - {offset_x: 0, offset_y: 2, blur: 3, color: '#c7ced6'}
    - type: text
      box: [572, 290, 220, 16]
      text: box_shadow (CSS form)
      style: cap
