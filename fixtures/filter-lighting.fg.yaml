dsl: FrameGraph
version: 2.2.0
profile: diagram
title: SVG filter lighting and procedural primitives
description: >-
  Exercises typed FilterFn entries that lower to SVG filter primitives:
  feTurbulence, feDisplacementMap, feDiffuseLighting and feSpecularLighting.
lang: en
defs:
  tokens:
    colors:
      ink: '#102033'
      panel: '#dbeafe'
      warm: '#f97316'
      cool: '#06b6d4'
      light: '#fff7cc'
    text_styles:
      title:
        font: sans
        size: 17
        weight: 700
        color: ink
      cap:
        font: sans
        size: 11
        color: ink
        align: center
pages:
- mode: page
  id: filter_lighting
  canvas:
    size: [860, 300]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    objects:
    - type: text
      box: [28, 18, 760, 24]
      text: SVG filter lighting + procedural primitives
      style: title

    - type: rect
      box: [34, 70, 170, 130]
      radius: 12
      fill: {kind: linear, angle: 45, stops: [{color: warm, position: '0%'}, {color: cool, position: '100%'}]}
      style:
        filter:
        - {fn: turbulence, base_frequency: [0.035, 0.09], num_octaves: 3, seed: 11, opacity: 0.42, mode: multiply}
    - type: text
      box: [34, 215, 170, 18]
      text: feTurbulence texture
      style: cap

    - type: rect
      box: [244, 70, 170, 130]
      radius: 12
      fill: {kind: linear, angle: 135, stops: [{color: panel, position: '0%'}, {color: cool, position: '100%'}]}
      style:
        filter:
        - {fn: displacement_map, base_frequency: 0.045, num_octaves: 2, seed: 4, scale: 12, x_channel: R, y_channel: G}
    - type: text
      box: [244, 215, 170, 18]
      text: feDisplacementMap warp
      style: cap

    - type: rect
      box: [454, 70, 170, 130]
      radius: 12
      fill: panel
      style:
        filter:
        - {fn: diffuse_lighting, surface_scale: 4, diffuse_constant: 1.1, lighting_color: light, azimuth: 225, elevation: 38}
    - type: text
      box: [454, 215, 170, 18]
      text: feDiffuseLighting
      style: cap

    - type: rect
      box: [664, 70, 170, 130]
      radius: 12
      fill: warm
      style:
        filter:
        - {fn: specular_lighting, surface_scale: 3, specular_constant: 0.9, specular_exponent: 22, lighting_color: '#ffffff', x: 710, y: 90, z: 80}
    - type: text
      box: [664, 215, 170, 18]
      text: feSpecularLighting
      style: cap
