  - type: paragraph
    style: body
    text: Charge is the property of matter that gives rise to electric and magnetic phenomena (known collectively
      as electromagnetism). Charge is quantized, which means it can only exist in discrete amounts with restricted
      values — multiples and fractions of the elementary charge (e = 1.6 × 10⁻¹⁹ C). Particles that exist independently
      (the electron, muon, and tau) carry multiples of the elementary charge (−1 e), while quarks carry fractions
      of the elementary charge (+⅔ e or −⅓ e). Quarks always bind together in groups whose total charge is an integral
      multiple of the elementary charge, which is why no one has ever directly measured a fractional charge. In
      addition, since opposite charges attract, electrons tend to bind to protons to form atoms that are neutral
      overall. We don't normally notice the electrical nature of matter because of this.
