  - type: paragraph
    style: body
    text: Colored particles are bound together by the appropriately named gluons. Gluons are also colored, but in
      a more complicated way than the quarks are. Six of the eight gluons have two colors, one has four, and another
      has six. Gluons glue quarks together, but they also stick to themselves. One consequence of this is that they
      they can't reach out and do much beyond the nucleus.
  - type: paragraph
    style: body
    text: The mathematical model used to describe the interaction of colored particles through the exchange of gluons
      is known as quantum chromodynamics (QCD). The whole sticky mess is called the strong force or the strong interaction
      since it results in forces in the nucleus that are stronger than the electromagnetic force. Without the strong
      force, every nucleus would blow itself to smithereens.
