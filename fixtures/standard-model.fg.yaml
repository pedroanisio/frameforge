    caption: Cartoon representation of the three fundamental forces of the standard model
  - type: paragraph
    style: body
    text: Three of the four fundamental fources of nature are included in the standard model of particle physics
      — electromagnetism, the strong force, and the weak force. (Gravity is not included in the standard model.)
      Each force acts between particles because of some property of that particle — charge for electromagnetism,
      color for the strong force, and flavor for the weak force. The bosons associated with each force are called
      gauge bosons — the photon for electromagnetism, gluons for the strong force, and the W and Z bosons for the
      weak force.
