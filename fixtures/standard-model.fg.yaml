pages:
- mode: flow
  id: standard-model
  master: article
  media: continuous
  lang: en
  links:
  - to: https://physics.info/radiobiology/
    relation: prev
    label: radiobiology
    external: true
  - to: https://physics.info/qed/
    relation: next
    label: qed
    external: true
  - to: https://physics.info/standard/
    relation: source
    label: The Standard Model (physics.info)
    external: true
  story:
  - type: heading
    level: 1
    text: The Standard Model
    id: standard-model
    style: h1
  - type: heading
    level: 2
    text: Discussion
    id: discussion
    style: h2
  - type: heading
    level: 3
    text: Introduction
    id: introduction
    style: h3
  - type: paragraph
    style: body
    text: The standard model is the name given in the 1970s to a theory of fundamental particles and how they interact.
      It incorporated all that was known about subatomic particles at the time and predicted the existence of additional
      particles as well.
  - type: paragraph
    style: body
    text: There are seventeen named particles in the standard model, organized into the chart shown below. The last
      particles discovered were the W and Z bosons in 1983, the top quark in 1995, the tau neutrino in 2000, and
      the higgs boson in 2012.
  - type: figure
    units: px
    id: fig-family-base
    object:
      type: group
      children:
      - type: use
        symbol: sm_grid_names
        box: [0, 0, 560, 408]
        z: 5
      box: [0, 0, 660, 410]
    size: [560, 408]
    caption: Standard model table
  - type: paragraph
    style: body
    text: The symbols used to represent the particles of the standard model are a mix of Latin and Greek characters.
  - type: figure
    units: px
    id: fig-family-base-symbols
    object:
      type: group
      children:
      - type: use
        symbol: sm_grid_symbols
        box: [0, 0, 560, 408]
        z: 5
      box: [0, 0, 660, 410]
    size: [560, 408]
    caption: Standard model particles (nucleons included for comparison)
  - type: block
    role: notes
    children:
    - type: paragraph
      style: note
      text: '*Masses as reported by the Particle Data Group, 2024.'
    - type: paragraph
      style: note
      text: '**Neutrino mass as reported by the KATRIN Collaboration, 2025.'
    - type: paragraph
      style: note
      text: †The proton and neutron are hadrons (made of quarks), baryons (made of three quarks), and nucleons (found
        in the nucleus), but they are not standard model particles.
    - type: paragraph
      style: note
      text: ‡The higgs boson is the only known scalar boson.
