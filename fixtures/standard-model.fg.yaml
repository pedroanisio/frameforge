    caption: Standard model table showing bosons and fermions
  - type: paragraph
    style: body
    text: Fundamental particles are either the building blocks of matter, called fermions, or the mediators of interactions,
      called bosons. There are twelve named fermions and five named bosons in the standard model.
  - type: paragraph
    style: body
    spans:
    - 'Fermions obey a statistical rule described by '
    - kind: link
      href: https://en.wikipedia.org/wiki/Enrico_Fermi
      content:
      - Enrico Fermi
    - ' (1901–1954) of Italy, '
    - kind: link
      href: https://en.wikipedia.org/wiki/Paul_Dirac
      content:
      - Paul Dirac
    - ' (1902–1984) of England, and '
    - kind: link
      href: https://en.wikipedia.org/wiki/Wolfgang_Pauli
      content:
      - Wolfgang Pauli
    - ' (1900–1958) of Austria called the exclusion principle. Simply stated, fermions cannot occupy the same place
      at the same time. (More formally, no two fermions may be described by the same quantum numbers.) Leptons and
      quarks are fermions, but so are things made from them like protons, neutrons, atoms, molecules, people, and
      walls. This agrees with our macroscopic observations of matter in everyday life. People cannot walk through
      walls unless the wall gets out of their way.'
  - type: paragraph
    style: body
    text: Bosons, in contrast, are have no problem occupying the same place at the same time. (More formally, two
      or more bosons may be described by the same quantum numbers.) The statistical rules that bosons obey were
      first described by Satyendra Bose (1894–1974) of India and Albert Einstein (1879–1955) of Germany. Gluons,
      photons, and the W, Z and higgs are all bosons. As the particles that make up light and other forms of electromagnetic
      radiation, photons are the bosons we have the most direct experience with. In our everyday experience, we
      never see beams of light crash into one another. Photons behave like phantoms. They pass through one another
      with no effect.
  - type: figure
    units: px
    id: fig-quantity-spin
    object:
