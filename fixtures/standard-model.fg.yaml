  - type: paragraph
    style: body
    text: There are twelve named elementary fermions. The difference between them is one of flavor. The word "flavor"
      is used here to mean "type" and it applies only to fermions. Don't let the word mislead you. Subatomic particles
      are much too small to have any characteristics that could be directly observed by human senses.
