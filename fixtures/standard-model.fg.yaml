  - type: paragraph
    style: body
    text: 'Fermions are divided into two groups of six: those that must bind together are called quarks and those
      that can exist independently are called leptons.'
  - type: paragraph
    style: body
    text: The word "quark" originally appeared in a single line of the the novel Finnegans Wake written by the Irish
      author James Joyce (1882–1941). The protagonist of the book is a publican named Humphrey Chimpden Earwicker
      who dreams that he is serving beer to a drunken seagull (no joke). Instead of asking for "three quarts for
      Master Mark" the inebriated bird says "three quarks for Muster Mark". Since the pre-standard model theory
      was complete with only three quarks, the name made some sense. The full standard model today needs six quarks.
      That hasn't made the word any less fun to say. Quark! The six flavors of quark are up, down, strange, charm,
      top, and bottom. The names of the flavors are essentially meaningless.
  - type: paragraph
    style: body
    text: Quarks are known to bind into triplets and doublets. The triplets are called baryons, a term derived from
      the Greek word βαρύς (varys) meaning "heavy". The doublets are called mesons, a term derived from the Greek
      word μέσος (mesos) meaning "medium". Collectively baryons (the heavy triplets), mesons (the middleweight doublets),
      and quarks (the fundamental particles) are known as hadrons, from the Greek word αδρός (adros) meaning thick,
      robust, massive, or large. This name alludes to the ability of the point-like quarks to bind together and
      form particles that are "thick" in a certain sense.
  - type: paragraph
    style: body
    text: The other six fermions are called leptons, a name derived from the Greek word λεπτός (leptos) meaning
      thin, delicate, lightweight, or small. These particles don't need to bind to each other, which keeps them
      "thin" in a certain sense. Originally leptons were considered the "light" particles and hadrons the "heavy"
      particles, but the discovery of the tau lepton in 1975 broke that rule. The tau (the heaviest lepton) is almost
      twice as massive as a proton (the lightest hadron).
  - type: paragraph
    style: body
    text: Baryons found in the nucleus (the proton and neutron) are called nucleons. The Latin word for kernel is
      nucleus. Nucleons are found in the metaphorical "kernel" of the atom. Baryons that contain at least one strange
      quark but no charm, bottom, or top quarks are called hyperons. The Greek word for beyond is υπέρ (yper), which
      morphed into the English prefix hyper-. Hyperons are particles that are "way out" in a certain sense.
