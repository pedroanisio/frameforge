    style: h3
  - type: paragraph
    style: body
    text: What is this? The standard model Lagrangian. What does it say? I'll let you know when I figure it out.
  - type: math
    id: sm-lagrangian
    tex: \mathcal{L} = -\tfrac{1}{4} F_{\mu\nu} F^{\mu\nu} + i\bar{\psi}\,\slashed{D}\,\psi + \text{h.c.} + \psi_i\,
      y_{ij}\, \psi_j\, \phi + \text{h.c.} + \left|D_\mu \phi\right|^2 - V(\phi)
  semantic:
