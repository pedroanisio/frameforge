  - type: paragraph
    style: body
    text: Elementary particles have an intrinsic spin angular momentum S. The adjective intrinsic means innate or
      essential to the thing itself. Elementary particles don't have spin because someone is spinning them. They
      just spin — or rather, they just have a measurable quantity with the same units as angular momentum. In current
      physics, elementary particles are featureless — like a mathematical point. In order for something to be perceived
      as spinning, the thing spinning would need something like a "front" and a "back". Featureless, point particles
      don't have anything like that. Particle physics is best described with mathematics. Spin is a convenient label
      for a measurable quality and not a description of reality.
  - type: paragraph
    style: body
    text: Every elementary particle has associated with it a spin quantum number s (often called the spin number
      or just the spin), where s is any whole number multiple of a half. Fermions have half integral spin quantum
      numbers (½, 1½, 2½, etc.) and bosons have integral spin quantum numbers (0, 1, 2, etc.). No spin numbers are
      possible in between these. Spin is a quantized quantity.
  - type: paragraph
    style: body
    text: The elementary fermions have a spin of ½. Particles made from combinations of fermions will have an overall
      spin that's a combination of the individual spins. A baryon composed three quarks will combine to an overall
      spin of ½ or 1½, since those are the only possible, non-negative combinations of ½ ± ½ ± ½. That shows that
      all baryons (like protons and neutrons, for example) are also fermions. Likewise, a meson composed of a quark
      and an antiquark will combine to an overall spin of 0 or 1 since those are the only possible, non-negative
      combinations of ½ ± ½. That shows that all all mesons (like the pion of the residual strong interaction, for
      example) are also bosons.
  - type: figure
    units: px
