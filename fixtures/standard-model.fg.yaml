    drawings:
      approach: All figures are composed from FrameGraph VisualObjects (no image src). The shared particle grid
        is defined once as defs.symbols.sm_grid_symbols (symbols) / sm_grid_names (full names), built from a reusable
        defs.symbols.card. Each overlay figure is a GroupObject = translucent region rects (low z) + use(sm_grid_symbols)
        (z=5) + region labels (z=10), embedded in the article via FigureFlow.object.
      coordinate_system: px, page-space top-left origin, +y down (per Box definition). card=72px, pitch=86px, grid
        origin (120,34).
      reuse_constructs_used:
      - SymbolDef
      - UseObject
      - GroupObject
      - RectObject
      - EllipseObject
      - TextObject
      - LineObject
      - PolylineObject
      - Layer z-order
      - StyleRef tokens.styles
      fidelity_notes:
      - family-base uses full particle names; all other figures use the symbol grid — matches source.
      - Colour dots on quark cards encode the three colour charges (r,g,b); the gluon card shows 8 multi-colour
        dots evoking the 8 gluon states (schematic, not a literal colour assignment).
      - The small open circle on every card is a decorative marker reproduced from the source art; no physical quantity
        is asserted by it.
      - Force/quantity overlays (charge, color, flavor, em, strong, weak, higgs) highlight each participating card
        individually; family groupings (fermion/boson, quark/lepton, neutrino, generations, spin) use contiguous
        block rects — mirroring how the source shades them.
      - three-forces is a SCHEMATIC Feynman-style reconstruction (lines, dots, ellipses, dashed W propagator). The
        source art is richer (textured gold sphere, drawn gluon coils); geometry here is approximate, not a pixel
        reproduction.
      - quantity-mass uses two arrowed axis lines + labels instead of region fills, plus a green tint on the massive
        bosons (W, Z, H).
      unverifiable_without_renderer:
      - Nested-symbol coordinate composition (figure group -> use(grid) -> use(card)) relies on spec section 3.6
        local-coordinate rules, which no validator enforces here.
      - Text vertical centering inside cards, region halo appearance, and arrowhead rendering (stroke_style.arrow_start/arrow_end)
        depend on renderer behaviour that does not exist yet.
