  - type: paragraph
    style: body
    text: Flavored particles interact weakly through the exchange of W or Z bosons — the carriers of the weak force
      (also known as intermediate vector bosons). When a neutron decays into a proton, a W− boson is responsible.
      The mathematical model used to describe the interaction of flavored particles through the exchange of W and
      Z bosons is sometimes known as quantum flavordynamics (QFD), but this is a term that is not used by working
      particle physicists. At higher energies, the weak and electromagnetic forces begin to look more and more alike.
      The mathematical model that describes these interactions together is known as electroweak theory (EWT). This
      is the conventional name for the theory of the weak force.
  - type: heading
    level: 3
    text: mass
    id: mass
    style: h3
