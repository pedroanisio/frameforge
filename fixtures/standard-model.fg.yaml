  - type: paragraph
    style: body
    text: The force-carying bosons of the standard model (gluons, photons, and the W and Z) have spin 1 since they
      go with vector fields. The mass-genrating boson (the higgs boson) has spin 0 since mass is a scalar quantity.
      If the particle of the gravitational field is ever discovered, it would be called a graviton and would have
      a spin 2 since it corresponds to a tensor field. A tensor is a mathematical object that's more complex than
      a vector, which is in turn more complex than a scalar. See the trend? A scalar field with no direction gets
      a particle with spin 0. A vector field with a direction gets a particle with spin 1. A tensor field that stretches
      and squeezes space along two directions gets a particle with spin 2.
  - type: paragraph
    style: body
    text: All fundamental and composite particles have a spin quantum number s (lowercase). This is associated with
      a spin angular momentum S (uppercase). The SI unit of angular momentum is the kilogram meter squared per second
      [kg m²/s] or, equivalently, the joule second [J s], which is much too large for elementary particles. Instead
      ℏ (h bar), also known as the reduced Planck constant (ℏ = h/2π), is used. For reasons that are beyond the
      scope of this book, the spin quantum number s (which is just a number) and the spin angular momentum S (which
      is a number with a unit) are not numerically the same. Instead, they are related by a non-obvious equation.
  - type: math
    id: spin-angular-momentum
    tex: S = \left[\, s\left(s + 1\right) \right]^{1/2} \hbar
    alt: Spin angular momentum S equals the square root of s times (s plus 1), all multiplied by the reduced Planck
      constant ℏ.
  - type: paragraph
    style: body
    text: For particles with spin quantum number of 0, the solution is a sensible spin angular momentum of 0 ℏ.
  - type: math
    id: spin-s0
    tex: S(0) = \left[\, 0\left(0 + 1\right) \right]^{1/2} \hbar = 0\,\hbar
  - type: paragraph
    style: body
    text: For higher spin quantum numbers the spin angular momentum increases, but beyond that there's not much
      else that can be simply said.
  - type: math
    id: spin-s-half
    tex: S(\tfrac{1}{2}) = \left[\, \tfrac{1}{2}\left(\tfrac{1}{2} + 1\right) \right]^{1/2} \hbar = \frac{\sqrt{3}}{2}\,\hbar
  - type: math
    id: spin-s1
    tex: S(1) = \left[\, 1\left(1 + 1\right) \right]^{1/2} \hbar = \sqrt{2}\,\hbar
  - type: math
    id: spin-s-three-halves
    tex: S(1\tfrac{1}{2}) = \left[\, \tfrac{3}{2}\left(\tfrac{3}{2} + 1\right) \right]^{1/2} \hbar = \frac{\sqrt{15}}{2}\,\hbar
  - type: math
    id: spin-s2
    tex: S(2) = \left[\, 2\left(2 + 1\right) \right]^{1/2} \hbar = \sqrt{6}\,\hbar
