  - type: paragraph
    style: body
    text: All of space is assumed to be filled with a higgs field — a background sea of virtual higgs bosons that
      pop in and out of existence. The quarks, leptons, and W and Z bosons moving around through space interact
      with this field, which is why these particles have mass. The photons and gluons do not interact with the higgs
      field, which is why these particles do not have mass. Even the higgs boson itself interacts with the higgs
      field. It gives itself mass! The higgs boson is different from the other bosons (gluons, photons, W and Z
      bosons) in that the higgs mechanism doesn't result in anything resembling a force (like the strong, electromagnetic,
      and weak forces). The higgs field is a scalar field and the higgs boson is a particle with spin zero.
  - type: heading
    level: 3
    text: gravity
    id: gravity
    style: h3
  - type: paragraph
    style: body
    text: Gravity is the force between objects due to their mass. The mathematical model that would describe gravity
      on the particle level is sometimes called quantum geometrodynamics (QGD), but is more often referred to as
      quantum gravitation. The standard model of particle physics does not include gravity (nor could it ever) and
      there currently is no quantum theory of gravitation. If there was, it would have to include a force carying
      particle. The proposed name for this particle is the graviton. General relativity describes gravitational
      waves as a tensor disturbance that propogates — one that shears spacetime along two alternating perpendicular
      directions. This two dimensional behavior leads theoretical physicists to believe that the graviton would
      have spin two.
  - type: paragraph
    style: body
    text: It is hoped that gravity will be taken care of in a theory beyond the standard model. In an extreme case
      of overconfidence, some theorists propose that such a theory would be a theory of everything. Given the history
      of science (and of life in general), anything that claims to be the ultimate representation of reality (scientific,
      economic, cultural, or religious) is certainly doomed to be superseded by something bigger and better — or
      at the very least, something less wrong.
