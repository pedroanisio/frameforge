  - type: heading
    level: 3
    text: group theory
    id: group-theory
    style: h3
  - type: paragraph
    style: body
    text: For those who like fancy math, the standard model is described using group theory notation as…
  - type: math
    id: sm-gauge-group
    tex: SU(3) \times SU(2) \times U(1)
    alt: The standard model gauge group, SU(3) cross SU(2) cross U(1).
  - type: paragraph
    style: body
    text: where the gauge group of strong interactions is…
  - type: math
    id: strong-gauge-group
    tex: SU(3)
    alt: SU(3), the gauge group of the strong interaction.
  - type: paragraph
    style: body
    text: and the gauge group of electroweak interactions is…
  - type: math
    id: electroweak-gauge-group
    tex: SU(2) \times U(1)
    alt: SU(2) cross U(1), the gauge group of the electroweak interaction.
  - type: paragraph
    style: body
    text: Notes…
  - type: paragraph
    style: body
    text: 'SU(3):'
  - type: list
    ordered: false
    style: body
    items:
    - 3rd order special unitary group
    - the set of all 3 × 3 unitary matrices with unit determinant
  - type: paragraph
    style: body
    text: 'SU(2):'
  - type: list
    ordered: false
    style: body
    items:
    - 2nd order special unitary group
    - the set of all 2 × 2 unitary matrices with unit determinant
    - 'isomorphic to the group of quaternions of absolute value 1, {x ∈ ℍ: |x| = 1}'
    - diffeomorphic to a hypersphere (3-sphere)
    - homomorphic to the rotation group SO(3), the set of all rotations about the origin in ordinary three dimensional
      euclidean space
  - type: paragraph
    style: body
    text: 'U(1):'
  - type: list
    ordered: false
    style: body
    items:
    - 1st order unitary group
    - the set of all 1 × 1 unitary matrices
    - 'isomorphic to the circle group, the multiplicative group of complex numbers with absolute value 1, T
      = {x ∈ ℂ: |x| = 1}'
    - isomorphic to SO(2), the second order special orthogonal group
  - type: heading
