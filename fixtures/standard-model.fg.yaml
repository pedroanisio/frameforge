  - type: paragraph
    style: body
    text: All fermions are thought to have a nonzero mass. Particles in generation I are less massive than those
      in generation II, which are less massive than those in generation III. Within the generations, quarks are
      more massive than leptons and neutrinos are less massive than the other leptons. Bosons are divided when it
      comes to mass. Gluons and photons are massless. The W, Z, and higgs bosons are massive.
  - type: paragraph
    style: body
    text: Mass is energy. A moving particle is more massive than a stationary particle because it has kinetic energy.
      Logically then, a stationary particle should have no mass. If we could stop a photon (which we can't) it would
      weigh nothing. Our logic appears to be working. If we could stop an electron (which we can) it would weigh
      something. Our logic is broken. Why do some particles weigh something at rest and others weigh nothing?
  - type: paragraph
    style: body
    text: 'Mass is energy and energy comes in two types: kinetic energy (the energy of motion) and potential energy
      (the energy of arrangement). The kinetic energy contribution to mass is minor. Most of the mass around us
      comes from some sort of potential energy. For example, a proton is made of two up quarks and a down quark.
      The masses of these three quarks do not add up to the mass of a proton.'
  - type: table
    id: proton-mass-defect
    caption: The mass of a proton is not the sum of its quark masses
    rows:
    - - mₚ
      - ≠
      - 2mᵤ + 1m_d
    - - 938.272 MeV/c²
      - ≠
      - 2(2.3 MeV/c²) + 1(4.8 MeV/c²)
    - - 938.272 MeV/c²
      - ≠
      - 9.4 MeV/c²
  - type: paragraph
    style: body
    text: The masses of the parts are only 1% of the mass of the whole. The remaining 99% comes from the potential
      energy of the strong force holding the proton together. The particles that mediate the strong force are gluons.
      The interaction energy of these massleess particles is what gives the proton most of its mass.
  - type: paragraph
    style: body
    text: So why do quarks have mass but the gluons don't? Or as the question was historically stated, why do the
      W and Z bosons have mass but the photon doesn't? Maybe there's another kind of potential energy. Maybe there's
      another interaction out there — an interaction that some particles feel and others don't. If there's an interaction,
      there's a particle — a particle that gives mass to other particles when they're just sitting around doing
      nothing. The interaction that gives mass to elementary particles was proposed in 1964 by scientists in three
      independent locations.
  - type: list
    ordered: true
    style: body
    items:
    - François Englert and Robert Brout at L'Université Libre de Bruxelles in Belgium
    - Peter Higgs at the University of Edinburgh in Scotland
    - Gerald Guralnik, Carl Hagen, and Tom Kibble at Imperial College, London
  - type: paragraph
    style: body
    text: It should be called the Englert-Brout-Higgs-Guralnik-Hagen-Kibble mechanism, but it isn't. For whatever
      reason, the interaction that gives mass to elementary particles is called the higgs mechanism and the particle
      that mediates the interaction is called the higgs boson, the higgs particle, or (rarely) the higgson.
