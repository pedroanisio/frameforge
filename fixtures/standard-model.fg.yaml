  - type: paragraph
    style: body
    text: 'Quarks stick to other quarks because they possess a characteristic known as color (or color charge).
      Quarks come in one of three colors: red, green, and blue. Don''t let the words mislead you. Quarks are much
      too small to to be visible and thus could never have a perceptual property like color. The names were chosen
      because of a convenient analogy. The colors of quarks in the standard model combine like the colors of light
      in human vision.'
  - type: paragraph
    style: body
    text: Red light plus green light plus blue light appears to us humans as "colorless" white light. A baryon is
      a triplet of one red, one green, and one blue quark. Put them together and you get a color neutral particle.
      A color plus its opposite color also gives white light. Red light plus cyan light looks the same to humans
      as white light, for example. A meson is a doublet of one colored quark and one anticolored antiquark. Put
      them together and you get a color neutral particle.
  - type: paragraph
    style: body
    text: There's something about color that makes it want to hide itself from anything bigger than a nucleus. Quarks
      can't stand being apart from one another. They just have to join up and always do so in a way that hides their
      color from the outside world. One color is never favored over another when quarks get together. Matter is
      color neutral down to the very small scale.
