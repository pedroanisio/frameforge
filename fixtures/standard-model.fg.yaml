  - type: paragraph
    style: body
    text: Charged particles interact by the exchange of photons — the carrier of the electromagnetic force. Whenever
      one electron repels another or any electron orbits a nucleus, a photon is responsible. Photons are massless,
      uncharged, and have an unlimited range. The mathematical model used to describe the interaction of charged
      particles through the exchange of photons is known as quantum electrodynamics (QED).
