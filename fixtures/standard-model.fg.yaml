  - type: paragraph
    style: body
    text: The neutrinos are an important subgroup within the leptons. They come in three flavors named for their
      partner leptons. The electron, muon, and tau are matched with the electron neutrino, muon neutrino, and tau
      neutrino. Neutrinos have very little mass (even for leptons) and interact so weakly with the rest of the particles
      that they are exceptionally difficult to detect. The name is a play on words. The Italian word for neutron
      (neutrone) sounds like the word neutral (neutro) with an augmentative suffix (-one) tacked on the end. That
      is, it sounds something like "big neutral" to Italian ears. Replace the augmentative suffix -one with the
      diminutive suffix -ino and you have a "little neutral", which is a good description of what a neutrino is
      — a diminutive neutral particle. Aaaaaw, so small and neutral.
