  - type: paragraph
    style: body
    text: Fermions belong to one of three known generations from ordinary (I), to exotic (II), to very exotic (III).
      (These are the adjectives I selected to describe the generations.) Generation I particles can combine to form
      hadrons with effectively infinite life spans (stable atoms made of electrons, protons, and neutrons for example).
      Generation II particles always form unstable hadrons. The longest lived hadron containing a generation II
      quark is the lambda particle (made of an up, down, and strange quark). It has a mean lifetime of less than
      a billionth of a second, which is considered long-lived for an unstable hadron. Generation III particles are
      divided in their behavior. The bottom quark isn't much stranger than a strange quark, but the top quark is
      so short-lived that it doesn't exist long enough to do anything. It falls apart before the world even knows
      it exists. Top quarks are only known from their decay products.
