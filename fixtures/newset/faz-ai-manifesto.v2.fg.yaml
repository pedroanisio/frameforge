    objects:
    - type: use
      id: v.card.01
      bind: sl.01
      symbol: s_card
      box:
      - 203
      - 66
      - 170
      - 142
      num: '01'
      short_title: 'faz.ai

        The achievement layer

        for operators who want

        their life back'
      role_text: OPENING  ·  brand
      layout_icon: '[COVER]'
      params:
        accent: '#1A1A1A'
    - type: use
      id: v.card.02
      bind: sl.02
      symbol: s_card
      box:
      - 395
      - 66
      - 170
      - 142
      num: '02'
      short_title: '47-second attention.

        95% pilot failure.

        43-pt perception gap.

        AI is making it worse.'
      role_text: DIAGNOSTIC  ·  the world
      layout_icon: '[STATS]'
      params:
        accent: '#9A4D2C'
    - type: use
      id: v.card.03
      bind: sl.03
      symbol: s_card
      box:
      - 587
      - 66
      - 170
      - 142
      num: '03'
      short_title: 'Engagement-maximizing

        AI is the disease,

        not the cure.

        We will not ship that.'
      role_text: REJECTION  ·  stance
      layout_icon: '[ANTI]'
      params:
        accent: '#7A3A1F'
    - type: use
      id: v.card.04
      bind: sl.04
      symbol: s_card
      box:
      - 107
      - 264
      - 170
      - 142
      num: '04'
      short_title: 'Workforce is the means.

        Achievement is the end.

        Cognition offload over

        task processing.'
      role_text: REFRAME  ·  positioning
      layout_icon: '[FRAME]'
      params:
        accent: '#3D7A4D'
    - type: use
      id: v.card.05
      bind: sl.05
      symbol: s_card
      box:
      - 299
      - 264
      - 170
      - 142
      num: '05'
      short_title: 'Privacy posture.

        Anti-engagement UX.

        Work-life merge.

        Refusal as feature.'
      role_text: COMMITMENTS  ·  what only we can
      layout_icon: '[GRID]'
      params:
        accent: '#2A5A3A'
    - type: use
      id: v.card.06
      bind: sl.06
      symbol: s_card
      box:
      - 491
      - 264
      - 170
      - 142
      num: '06'
      short_title: 'User has agency

        over workers.

        System is constitutional.

        Cancel-subscription is real.'
      role_text: STRUCTURE  ·  authority
      layout_icon: '[STACK]'
      params:
        accent: '#4A6651'
    - type: use
      id: v.card.07
      bind: sl.07
      symbol: s_card
      box:
      - 683
      - 264
      - 170
      - 142
      num: '07'
      short_title: 'Four-layer cascade.

        Three refusal tiers.

        No is No.

        Sleep on it. Or leave.'
      role_text: MECHANISM  ·  AI says No
      layout_icon: '[CASCADE]'
      params:
        accent: '#1F3D29'
    - type: use
      id: v.card.08
      bind: sl.08
      symbol: s_card
      box:
      - 203
      - 462
      - 170
      - 142
      num: 08
      short_title: '"You''ve done enough

        thinking today."

        "faz is working.

        You are resting."'
      role_text: VOICE  ·  proof
      layout_icon: '[QUOTE]'
      params:
        accent: '#5A4D7A'
    - type: use
      id: v.card.09
      bind: sl.09
      symbol: s_card
      box:
      - 395
      - 462
      - 170
      - 142
      num: 09
      short_title: 'No dark patterns.

        No training without consent.

        No soft-refusal that relents.

        No hidden Core.'
      role_text: DISCIPLINE  ·  taboos
      layout_icon: '[LIST]'
      params:
        accent: '#3A4566'
    - type: use
      id: v.card.10
      bind: sl.10
      symbol: s_card
      box:
      - 587
      - 462
      - 170
      - 142
      num: '10'
      short_title: 'I will model

        the AI to

        say No.'
      role_text: COMMITMENT  ·  founder line
      layout_icon: '[CLOSE]'
      params:
        accent: '#1A2D4A'
