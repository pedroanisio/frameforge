name: Bug report
description: Report a reproducible problem in FrameForge.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private documents,
        or unpublished customer data. For security issues, use SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest document, SDK snippet, command, or fixture path that reproduces the issue.
      placeholder: |
        uv run python tooling/validate.py path/to/doc.fg.yaml
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the relevant traceback, validation output, render artifact, or screenshot description.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, commit, Python version, OS, optional dependency groups, renderer/backend.
      placeholder: |
        FrameForge:
        Python:
        OS:
        Command:
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I removed secrets and private input data from this report.
          required: true
