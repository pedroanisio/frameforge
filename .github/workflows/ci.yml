name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps from the lockfile (+ pdf group for the transpiler e2e)
        run: uv sync --locked --group pdf

      # --- the gates (mirror `make check`) ---
      - name: Schema is generated and in sync with the models
        run: uv run python schema/build_schema.py --check

      - name: Grammar (EBNF) in sync with the models (core profile)
        run: uv run python tooling/check_grammar_sync.py

      - name: HEAD assertion suite
        run: uv run pytest -q

      - name: Validate the curated fixtures
        run: uv run python tooling/validate.py fixtures/*.fg.yaml

      - name: Text-fit overflow check (no text spills its box)
        run: uv run python tooling/render_fixtures.py --all --check-overflow

      - name: Fixture-status table in sync with the validator
        run: uv run python tooling/gen_status.py --check

      - name: Lint (non-blocking)
        continue-on-error: true
        run: uvx ruff check .

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Generate doc pages (nav must resolve)
        run: uv run python tooling/gen_docs.py --check
      - name: Build the site (strict)
        run: uv run --with mkdocs-material mkdocs build --strict

  # Publish versioned docs to GitHub Pages on pushes to main (mike -> gh-pages).
  # Requires Pages enabled for the repo, serving from the gh-pages branch.
  docs-deploy:
    name: deploy docs (main)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Generate pages + deploy versioned docs
        run: |
          uv run python tooling/gen_docs.py
          VERSION=$(uv run python -c "import sys; sys.path.insert(0,'models'); import framegraph as fg; print(fg.HEAD_VERSION)")
          uv run --with mkdocs-material --with mike mike deploy --push --update-aliases "$VERSION" latest
          uv run --with mkdocs-material --with mike mike set-default --push latest

  # The JS viewer is mid-refactor; surface its status without blocking the gate.
  viewer:
    name: viewer smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
        working-directory: viewer
      - run: npm run build
        working-directory: viewer
      - run: npm test
        working-directory: viewer
