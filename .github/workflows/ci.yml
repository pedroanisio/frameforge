name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.10" (§16 row 8). Exercise the floor and the two
        # newer minors so the support claim is tested, not just asserted.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync deps from the lockfile (+ pdf group for the transpiler e2e)
        run: uv sync --locked --group pdf --python ${{ matrix.python-version }}

      - name: Run local gate
        run: make check

      - name: Lint (non-blocking)
        continue-on-error: true
        run: uvx ruff check .

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Generate doc pages (nav must resolve)
        run: uv run python tooling/gen_docs.py --check
      - name: Build the site (strict)
        run: uv run --with mkdocs-material mkdocs build --strict

  # Publish versioned docs to GitHub Pages on pushes to main (mike -> gh-pages).
  # Requires Pages enabled for the repo, serving from the gh-pages branch.
  docs-deploy:
    name: deploy docs (main)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Generate pages + deploy versioned docs
        run: |
          uv run python tooling/gen_docs.py
          VERSION=$(uv run python -c "import sys; sys.path.insert(0,'docs/models'); import frameforge as fg; print(fg.HEAD_VERSION)")
          uv run --with mkdocs-material --with mike mike deploy --push --update-aliases "$VERSION" latest
          uv run --with mkdocs-material --with mike mike set-default --push latest

  # BLOCKING: the viewer hand-mirrors the document model, so its declared type
  # surface (viewer/dev/type-registry.json) must stay reconciled with the model's
  # discriminators. Dependency-free (reads two JSON files), so no `npm ci`.
  # Closes drift-risk-map Finding C7. The same contract also runs in the blocking
  # pytest gate (tests/test_viewer_schema_contract.py); this is its Node twin.
  viewer-contract:
    name: viewer ⇄ model contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: viewer type contract
        run: node viewer/dev/schema-contract.mjs
      - name: contract self-test
        run: node viewer/dev/schema-contract.mjs --self-test

  # The JS viewer's *rendering* is mid-refactor; surface its smoke status without
  # blocking the gate. The type-surface contract above is separate and blocking.
  viewer:
    name: viewer smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
        working-directory: viewer
      - run: npm run build
        working-directory: viewer
      - run: npm test
        working-directory: viewer
