# FrameForge Studio — sitemap + wireframe (v0.1, draft proposal)
# Derived from: frameforge-ide-annotated_fg.pdf (24-feature teardown).
# Disclaimer: reconstructed from a wireframe; unverified claims may be wrong — verify before building.
# Principle: PY is the source of truth; YAML is generated. One primary surface (Studio), few satellites.

persona:
  id: R
  role: design engineer / technical author ("decks-as-code")
  session:                      # state carried across every view
    auth: signed-in
    workspace: FrameForge
    project: docs
    open_file: illustrator_vs_frameforge.fg.yaml
    file_state: unsaved          # amber dot on document tab
    editor: { lint_errors: 1, py_yaml_sync: in-sync }
    gates: all-passing
    golden_lock: pinned          # render · hash · gate baseline
  overall_goal: >
    Author the deck in PY, fix the lint error, keep PY↔YAML sync,
    get all gates green, render, and export SVG/PDF.

sitemap:

  - view: sign-in
    breadcrumb: Sign in
    presents: [auth form / SSO]
    options: [sign in]
    persona_goal: reach the workspace with zero friction

  - view: home                    # workspace dashboard (implied by "brand click = home")
    breadcrumb: FrameForge
    presents:
      - project list + recent files (save-state badges)
      - create / import project
      - workspace switcher
    options: [open project, new project, switch workspace, account menu]
    persona_goal: resume the last open file in one click

  - view: studio                  # THE wireframe — single primary surface
    breadcrumb: FrameForge › docs › illustrator_vs_frameforge.fg.yaml
    layout: |                     # 1440×900
      ┌─ top-bar: brand·workspace | doc tab | Render | account ─────────┐
      │ left-rail │ chat │ editor (PY|YAML) │ center │ render preview   │
      │ outline   │ AI   │ lint·minimap     │ MCP +  │ WYSIWYG|Render   │
      │ pages     │      │ status bar       │ gates  │ toolbar · page   │
      └─ ruler frame around the whole canvas ───────────────────────────┘
    presents:
      top_bar:   [brand·workspace (home/switch), document tab + save state, Render action, account]
      left_rail: [outline tree (+add node), page selector (drives preview), doc stats "6 groups · 51 nodes · valid"]
      chat:      [assistant status, message thread, artifact chips, composer]
      editor:    [PY|YAML tabs (YAML generated+locked), code surface, inline lint, SDK autocomplete, minimap w/ error ticks, status bar "1 error · Ln/Col · in sync"]
      center:    [MCP tool toggles (Vision, Measure, Vectorize, Propose, Reconstruct, Compare — 25 total), quality-gates panel (pass %, fonts, collisions, golden lock)]
      render:    [WYSIWYG|Render tabs (WYSIWYG guarded), preview toolbar (page nav · zoom · fit), rendered page]
      frame:     [rulers + accent bands = selection bounds]
    options:
      - edit PY / accept AI edits via chat
      - run Render (SDK → SVG/PDF, all gates)
      - toggle MCP tools on/off
      - select page · jump to error · zoom/fit
    guarded_actions:               # confirmations, not free edits
      - edit WYSIWYG → confirm "this breaks PY sync"
      - edit YAML    → blocked (derived artifact)
      - golden lock  → PIN required to re-baseline (render·hash·gate)
    persona_goal: fix error → gates green → render → export

  - view: render-run              # invoked by Render action
    breadcrumb: … › illustrator_vs_frameforge.fg.yaml › Render
    presents: [pipeline progress, per-gate results, output artifacts (SVG/PDF)]
    options: [download, re-run, jump to failing gate/line]
    persona_goal: get a shippable artifact or the exact failure location

  - view: settings
    breadcrumb: FrameForge › Settings
    presents: [profile, workspace members, SDK + fonts config, golden-lock PIN management]
    options: [edit profile, manage fonts/SDK, sign out]
    persona_goal: rare admin task; in and out fast
