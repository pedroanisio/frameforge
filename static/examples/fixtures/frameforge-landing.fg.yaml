      - 574.0
      - 28
      style: h3r
      type: text
      text: The validator is the same model.
    - id: t173
      box:
      - 766.0
      - 4921
      - 574.0
      - 55
      style: bodyr
      type: text
      text: '`validate.py` validates against that same `Document`, then layers the
        spec''s structural and geometric rules on top.'
    - decorative: true
      type: ellipse
      center:
      - 107.0
      - 5020.0
      rx: 5.5
      ry: 5.5
      fill: gate
    - id: t174
      box:
      - 126.0
      - 5009
      - 574.0
      - 28
      style: h3r
      type: text
      text: The codemod is the validator, inverted.
    - id: t175
      box:
      - 126.0
      - 5045
      - 574.0
      - 55
      style: bodyr
      type: text
      text: Its migrations are exactly the breaking and renamed forms the validator
        rejects. Running it makes a legacy document pass.
    - decorative: true
      type: ellipse
      center:
      - 747.0
      - 5020.0
      rx: 5.5
      ry: 5.5
      fill: gate
    - id: t176
