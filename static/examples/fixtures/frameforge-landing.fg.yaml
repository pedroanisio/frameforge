      - 574.0
      - 28
      style: h3r
      type: text
      text: Schema follows the models.
    - id: t171
      box:
      - 126.0
      - 4921
      - 574.0
      - 80
      style: bodyr
      type: text
      text: '`docs/schema/frameforge-v2.schema.json` is produced by `Document.model_json_schema()`.
        `build_schema.py --check` returns non-zero if the committed file differs from
        a fresh build.'
    - decorative: true
      type: ellipse
      center:
      - 747.0
      - 4896.0
      rx: 5.5
      ry: 5.5
      fill: gate
    - id: t172
      box:
      - 766.0
