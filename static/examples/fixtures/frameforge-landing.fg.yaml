      text: The sync guarantee.
    - id: t169
      box:
      - 100
      - 4786
      - 700
      - 55
      style: bodyr
      type: text
      text: Four couplings that would silently rot in any other stack. Here each one
        is a gate, and a gate that fails stops the build.
    - decorative: true
      type: ellipse
      center:
      - 107.0
      - 4896.0
