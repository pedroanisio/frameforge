server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    charset     utf-8;

    # Browse every file under the viewer. Directories without an index
    # fall back to a generated listing, so demo/ and verification/ are
    # fully navigable.
    autoindex             on;
    autoindex_exact_size  off;
    autoindex_localtime   on;

    location / {
        index     index.html;
        try_files $uri $uri/ =404;
    }

    # Render source/config files in-browser as text instead of forcing
    # a download (these extensions aren't in nginx's default mime map).
    location ~ \.(jsx|cjs|yml|yaml|md|txt)$ {
        default_type text/plain;
    }
}
