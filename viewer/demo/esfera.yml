meta:
  brand_basis:
    note: This is a proposed reimagined style guide, not an official existing brand manual.
    public_signals_used:
    - Esfera wordmark pattern with red underscore/accent
    - Santander relationship and red brand equity
    - Rewards, points, offers, and discount ecosystem positioning
  status: proposal deck template with editable content
  refinement_pass:
    version: '2'
    changes:
    - Added brand underscore motif across slides.
    - Tuned warm palette and typography scale.
    - Added logo clearspace and Santander relationship guidance.
    - Improved CTA legibility and UI card hierarchy.
    - Added palette hex labels, voice chips, rollout gate and checklist closing.
  improvement:
    finding: deck is well-designed and renders correctly under a §3.7 text-fit renderer; the one systematic
      gap was label styles with no fit policy.
    data_change: added overflow:shrink_to_fit + min_font_size to 17 label/number styles that had none,
      so the reusable template cannot overflow on longer content (the cover kicker pill already did).
    not_changed: no text, geometry, palette, or layout altered; p11 component table left intact (its impact-badge
      pills would be lost by a naive table conversion); decorative compositions left as authored.
    styles_made_fit_safe:
    - eyebrow
    - label
    - label_ink
    - num
    - inverse_label
    - footer
    - footer_inverse
    - hero_logo
    - hero_logo_red
    - metric_big
    - section_kicker
    - micro
    - micro_inverse
    - swatch_hex
    - pill_text
    - ui_button
    - logo_label
    overlap_fix: 'slide_14: removed leftover duplicate deliverables block (s14_panel_b) that overlapped
      the checkbox rows (s14_check_*) by ~25k px²; the four items remain as the styled checkbox list.'
  fixes:
  - 'slide_14: removed orphan duplicate list ''s14_panel_b'' (stale combined text overlapping the bulleted
    s14_check_* items); widened ''s14_panel_h'' title box 260->500 so ''Immediate deliverables'' no longer
    wraps into the first item.'
