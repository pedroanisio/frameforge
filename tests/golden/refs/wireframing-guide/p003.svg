<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842" xml:lang="en-US"><title>The Guide to Wireframing — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of UXPin&#x27;s “The Guide to Wireframing” (Chris Bank). Body text is the real extracted copy; the book&#x27;s photographic/sketch figures are the authors&#x27; copyrighted illustrations, shown as labelled image-placeholders. The cover&#x27;s wireframe mock is rebuilt from primitives. Layout is representative, not pixel-exact.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip2"><rect x="0" y="90" width="595" height="40"/></clipPath></defs><g clip-path="url(#clip2)"><text y="110" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:34px;fill:#2BB0C4;font-weight:700"><tspan x="297.5">INDEX</tspan></text></g><text y="259" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F"><tspan x="50">6.</tspan></text><text y="260" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F;font-weight:600;text-decoration:underline #3F3F3F 1px;text-transform:uppercase"><tspan x="78">THE DESIGN PATTERN &amp; WIREFRAME LIBRARIES GUIDE</tspan></text><text y="259" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#8C8C8C"><tspan x="545">49</tspan></text><text y="289" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Importable Libraries</tspan></text><text y="317" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Standalone Libraries</tspan></text><text y="345" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">You’ve Got Options!</tspan></text><text y="381" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F"><tspan x="50">7.</tspan></text><text y="382" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F;font-weight:600;text-decoration:underline #3F3F3F 1px;text-transform:uppercase"><tspan x="78">FRESH UI DESIGN PATTERNS</tspan></text><text y="381" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#8C8C8C"><tspan x="545">71</tspan></text><text y="411" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Design Patterns &amp; Wireframe Examples</tspan></text><text y="439" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Beg, Borrow &amp; Steal… When Appropriate</tspan></text><text y="475" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F"><tspan x="50">8.</tspan></text><text y="476" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F;font-weight:600;text-decoration:underline #3F3F3F 1px;text-transform:uppercase"><tspan x="78">DESIGN PRINCIPLES FOR WIREFRAMING</tspan></text><text y="475" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#8C8C8C"><tspan x="545">105</tspan></text><text y="505" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Plan a little - do the rest</tspan></text><text y="533" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Start with users - and their needs</tspan></text><text y="561" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Start simple, stay simple</tspan></text><text y="589" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Everything has a meaning</tspan></text><text y="617" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Low-fidelity doesn’t mean unrealistic</tspan></text><text y="645" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Your designs will get built</tspan></text><text y="673" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#8C8C8C"><tspan x="108">Ready, set, wireframe!</tspan></text><text y="709" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F"><tspan x="50">9.</tspan></text><text y="710" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#3F3F3F;font-weight:600;text-decoration:underline #3F3F3F 1px;text-transform:uppercase"><tspan x="78">ABOUT UXPIN</tspan></text><text y="709" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#8C8C8C"><tspan x="545">118</tspan></text><text y="807" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:11px;fill:#2BB0C4"><tspan x="545">3</tspan></text></svg>
