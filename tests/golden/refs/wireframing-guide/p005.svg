<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842" xml:lang="en-US"><title>The Guide to Wireframing — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of UXPin&#x27;s “The Guide to Wireframing” (Chris Bank). Body text is the real extracted copy; the book&#x27;s photographic/sketch figures are the authors&#x27; copyrighted illustrations, shown as labelled image-placeholders. The cover&#x27;s wireframe mock is rebuilt from primitives. Layout is representative, not pixel-exact.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip6"><rect x="565" y="78" width="30" height="14"/></clipPath><clipPath id="clip7"><rect x="565" y="108" width="30" height="14"/></clipPath><clipPath id="clip8"><rect x="565" y="138" width="30" height="14"/></clipPath><clipPath id="clip9"><rect x="565" y="168" width="30" height="14"/></clipPath></defs><text y="90" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:60px;fill:#2BB0C4;font-weight:300"><tspan x="297.5">2</tspan></text><text y="170" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:29px;fill:#2BB0C4;font-weight:700"><tspan x="297.5">A PRACTICAL LOOK</tspan></text><text y="212" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:29px;fill:#2BB0C4;font-weight:700"><tspan x="297.5">AT USING WIREFRAMES</tspan></text><text y="246" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:13px;fill:#8C8C8C;font-style:italic"><tspan x="297.5">Who uses wireframes, what’s their purpose &amp; how do they work together</tspan></text><text y="54.66" text-anchor="middle" style="font-family:sketch, sans-serif;font-size:13px;fill:#8C8C8C"><tspan x="475">share this ebook with</tspan><tspan x="475" dy="15">friends!</tspan></text><path d="M 470 86 q 40 14 70 -2" fill="none" stroke="#8C8C8C" stroke-width="1.2"/><path d="M 540 84 L 542 90 L 534 90 Z" fill="#8C8C8C"/><rect x="565" y="70" width="30" height="28" fill="#3B5998"/><g clip-path="url(#clip6)"><text y="85" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#ffffff;font-weight:700"><tspan x="580">f</tspan></text></g><rect x="565" y="100" width="30" height="28" fill="#0077B5"/><g clip-path="url(#clip7)"><text y="115" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#ffffff;font-weight:700"><tspan x="580">in</tspan></text></g><rect x="565" y="130" width="30" height="28" fill="#1DA1F2"/><g clip-path="url(#clip8)"><text y="145" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#ffffff;font-weight:700"><tspan x="580">t</tspan></text></g><rect x="565" y="160" width="30" height="28" fill="#DD4B39"/><g clip-path="url(#clip9)"><text y="175" text-anchor="middle" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#ffffff;font-weight:700"><tspan x="580">g+</tspan></text></g><rect x="50" y="278" width="495" height="150" fill="#E6E8EA"/><rect x="279.3" y="339.168" width="36.4" height="27.664" rx="2" fill="none" stroke="#C9CDD1" stroke-width="1.4"/><ellipse cx="289.492" cy="347.904" rx="3.64" ry="3.64" fill="#C9CDD1"/><path d="M 282.212 363.92 L 294.588 352.272 L 301.868 358.824 L 308.42 350.816 L 312.788 363.92 Z" fill="#C9CDD1"/><text y="438" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:9px;fill:#8C8C8C;font-style:italic"><tspan x="50">image: Todd Lappin</tspan></text><text y="464.5" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:12px;fill:#3F3F3F"><tspan x="50">Wireframing is an important tool for product design and development.</tspan></text><text y="492.84" text-anchor="start" style="font-family:milo, sans-serif;font-size:12px;fill:#3F3F3F"><tspan x="50">Whether you’re building the next hot startup or a solid website or mobile</tspan><tspan x="50" dy="17">application, wireframes are invaluable in keeping everyone on the same page -</tspan><tspan x="50" dy="17">not just product managers, designers, and engineers. And they can be changed</tspan><tspan x="50" dy="17">really quickly to accommodate the collaborative and iterative nature of product</tspan><tspan x="50" dy="17">design and development, especially in agile startups and enterprises.</tspan></text><text y="589.84" text-anchor="start" style="font-family:milo, sans-serif;font-size:12px;fill:#3F3F3F"><tspan x="50">For this reason, wireframes are typically created in the product design and</tspan><tspan x="50" dy="17">development process in one way or another, even if it’s a quick sketch on</tspan><tspan x="50" dy="17">scratch paper or a grid notepad.</tspan></text><text y="807" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:11px;fill:#2BB0C4"><tspan x="545">5</tspan></text></svg>
