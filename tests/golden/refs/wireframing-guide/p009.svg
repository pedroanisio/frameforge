<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842" xml:lang="en-US"><title>The Guide to Wireframing — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of UXPin&#x27;s “The Guide to Wireframing” (Chris Bank). Body text is the real extracted copy; the book&#x27;s photographic/sketch figures are the authors&#x27; copyrighted illustrations, shown as labelled image-placeholders. The cover&#x27;s wireframe mock is rebuilt from primitives. Layout is representative, not pixel-exact.</desc><rect width="100%" height="100%" fill="white"/><text y="73.84" text-anchor="start" style="font-family:milo, sans-serif;font-size:12px;fill:#3F3F3F"><tspan x="50">Developers use wireframes to get a more tangible grasp of the site’s</tspan><tspan x="50" dy="17">functionality. It gives the developer a clear picture of the elements that they</tspan><tspan x="50" dy="17">will need to code.</tspan></text><text y="136.84" text-anchor="start" style="font-family:milo, sans-serif;font-size:12px;fill:#3F3F3F"><tspan x="50">For back-end development, wireframes can be low-fidelity the way a UX designer</tspan><tspan x="50" dy="17">or information architect might produce them. For front-end development, it’s</tspan><tspan x="50" dy="17">more helpful to have high-fidelity wireframes a designer would produce - they</tspan><tspan x="50" dy="17">care about content and information hierarchy as much as the structure,</tspan><tspan x="50" dy="17">functionality and behavior.</tspan></text><rect x="50" y="224" width="495" height="200" fill="#E6E8EA"/><rect x="279.3" y="310.168" width="36.4" height="27.664" rx="2" fill="none" stroke="#C9CDD1" stroke-width="1.4"/><ellipse cx="289.492" cy="318.904" rx="3.64" ry="3.64" fill="#C9CDD1"/><path d="M 282.212 334.92 L 294.588 323.272 L 301.868 329.824 L 308.42 321.816 L 312.788 334.92 Z" fill="#C9CDD1"/><text y="434" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:9px;fill:#8C8C8C;font-style:italic"><tspan x="50">image: Mike Rhode</tspan></text><rect x="50" y="450" width="240" height="150" fill="#E6E8EA"/><rect x="155.7" y="514.132" width="28.6" height="21.736" rx="2" fill="none" stroke="#C9CDD1" stroke-width="1.4"/><ellipse cx="163.708" cy="520.996" rx="2.86" ry="2.86" fill="#C9CDD1"/><path d="M 157.988 533.58 L 167.712 524.428 L 173.432 529.576 L 178.58 523.284 L 182.012 533.58 Z" fill="#C9CDD1"/><text y="608" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:9px;fill:#8C8C8C;font-style:italic"><tspan x="50">image: UX Porn</tspan></text><rect x="305" y="450" width="240" height="150" fill="#E6E8EA"/><rect x="410.7" y="514.132" width="28.6" height="21.736" rx="2" fill="none" stroke="#C9CDD1" stroke-width="1.4"/><ellipse cx="418.708" cy="520.996" rx="2.86" ry="2.86" fill="#C9CDD1"/><path d="M 412.988 533.58 L 422.712 524.428 L 428.432 529.576 L 433.58 523.284 L 437.012 533.58 Z" fill="#C9CDD1"/><text y="608" text-anchor="start" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:9px;fill:#8C8C8C;font-style:italic"><tspan x="305">image: UX Porn</tspan></text><text y="807" text-anchor="end" dominant-baseline="central" style="font-family:milo, sans-serif;font-size:11px;fill:#2BB0C4"><tspan x="545">9</tspan></text></svg>
