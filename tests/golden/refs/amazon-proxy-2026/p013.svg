<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip25"><rect x="60" y="96" width="492" height="48"/></clipPath></defs><text y="74" text-anchor="start" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">ITEM 1—ELECTION OF DIRECTORS</tspan></text><g clip-path="url(#clip25)"><text y="103.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">In accordance with our Bylaws, the Board has fixed the number of directors at eleven as of the Annual Meeting.</tspan><tspan x="60" dy="12.76" textLength="492" lengthAdjust="spacing">Based on the recommendation of the Nominating and Corporate Governance Committee, the Board proposes that the</tspan><tspan x="60" dy="12.76">following eleven nominees be elected, each to hold office until the next Annual Meeting or until a successor</tspan></text></g><text x="60" y="158.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="158.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Jeffrey P. Bezos</text><text x="60" y="169.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="169.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Andrew R. Jassy</text><text x="60" y="181.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="181.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Edith W. Cooper</text><text x="60" y="193.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="193.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Jamie S. Gorelick</text><text x="60" y="205.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="205.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Daniel P. Huttenlocher</text><text x="60" y="217.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="217.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Andrew Y. Ng</text><text x="310" y="158.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="319.68" y="158.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Indra K. Nooyi</text><text x="310" y="169.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="319.68" y="169.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Jonathan J. Rubinstein</text><text x="310" y="181.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="319.68" y="181.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Brad D. Smith</text><text x="310" y="193.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="319.68" y="193.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Patricia Q. Stonesifer</text><text x="310" y="205.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="319.68" y="205.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Wendell P. Weeks</text><text y="277.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">Each nominee is currently a director and was most recently elected at the 2025 Annual Meeting. On April 7,</tspan><tspan x="60" dy="12.76">2026, Keith B. Alexander informed the Company that he would not stand for re-election.</tspan></text><text y="320" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="60">Why We Recommend You Support This Proposal</tspan></text><text x="60" y="339.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="69.35" y="339.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">We have the appropriate mix of skills, qualifications, backgrounds, and tenures on the Board.</text><text x="60" y="351.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="69.35" y="351.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Our composition balances longer-serving directors with fresh perspectives from newer directors.</text><text x="60" y="362.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="69.35" y="362.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">The Board actively oversees sustainability, governance, risk, and regulatory compliance.</text><rect x="60" y="410" width="492" height="26" rx="5" fill="#FDF4E8"/><text y="424" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="70">The Board of Directors recommends a vote “FOR” each nominee.</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement 2</tspan></text></svg>
