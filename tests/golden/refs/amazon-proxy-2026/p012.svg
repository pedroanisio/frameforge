<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip8"><rect x="60" y="60" width="400" height="18"/></clipPath><clipPath id="clip9"><rect x="60" y="134" width="492" height="44"/></clipPath><clipPath id="clip10"><rect x="60" y="360" width="492" height="30"/></clipPath></defs><g clip-path="url(#clip8)"><text y="69" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:15px;fill:#232F3E;font-weight:700"><tspan x="60">AMAZON.COM, INC.</tspan></text></g><text y="93" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">PROXY STATEMENT</tspan></text><text y="119" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#37475A;font-style:italic"><tspan x="60">Annual Meeting of Shareholders — To Be Held on Wednesday, May 20, 2026</tspan></text><g clip-path="url(#clip9)"><text y="141.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">The enclosed proxy is solicited by the Board of Directors of Amazon.com, Inc. (“Amazon” or the “Company”) for</tspan><tspan x="60" dy="12.76" textLength="492" lengthAdjust="spacing">the Annual Meeting of Shareholders to be held virtually at 9:00 a.m., Pacific Time, on Wednesday, May 20,</tspan><tspan x="60" dy="12.76">2026, and any adjournment or postponement thereof.</tspan></text></g><text y="191.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">Voting via the Internet, mobile device, or by telephone helps save money by reducing postage and proxy tab-</tspan><tspan x="60" dy="12.76">ulation costs. Each method is available 24 hours per day, seven days per week.</tspan></text><text y="234" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9.5px;fill:#2b2b2b"><tspan x="60">We encourage you to cast your vote by one of the following methods:</tspan></text><text y="257" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9.5px;fill:#E47911;font-weight:800;letter-spacing:0.04em"><tspan x="60">VOTE BY INTERNET</tspan></text><text y="276" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700"><tspan x="60">Shares Held of Record:</tspan></text><text y="294" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#2b2b2b"><tspan x="60">http://www.proxyvote.com</tspan></text><text y="316" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700"><tspan x="60">Shares Held in Street Name:</tspan></text><text y="334" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#2b2b2b"><tspan x="60">See Notice or Voting Instruction Form</tspan></text><text y="257" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9.5px;fill:#E47911;font-weight:800;letter-spacing:0.04em"><tspan x="245">VOTE BY QR CODE</tspan></text><text y="276" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700"><tspan x="245">Shares Held of Record:</tspan></text><text y="294" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#2b2b2b"><tspan x="245">See Proxy Card</tspan></text><text y="316" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700"><tspan x="245">Shares Held in Street Name:</tspan></text><text y="334" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#2b2b2b"><tspan x="245">See Notice or Voting Instruction Form</tspan></text><text y="257" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9.5px;fill:#E47911;font-weight:800;letter-spacing:0.04em"><tspan x="430">VOTE BY TELEPHONE</tspan></text><text y="276" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700"><tspan x="430">Shares Held of Record:</tspan></text><text y="294" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#2b2b2b"><tspan x="430">800-690-6903</tspan></text><text y="316" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700"><tspan x="430">Shares Held in Street Name:</tspan></text><text y="334" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#2b2b2b"><tspan x="430">See Voting Instruction Form</tspan></text><line x1="235" y1="250" x2="235" y2="340" stroke="#d8dadd" stroke-width="0.5"/><line x1="420" y1="250" x2="420" y2="340" stroke="#d8dadd" stroke-width="0.5"/><g clip-path="url(#clip10)"><text y="367.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">Our principal offices are located at 410 Terry Avenue North, Seattle, Washington 98109. This Proxy Statement</tspan><tspan x="60" dy="12.76">is first being made available to our shareholders on or about April 9, 2026.</tspan></text></g><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement 1</tspan></text></svg>
