<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip4"><rect x="60" y="166" width="492" height="56"/></clipPath><clipPath id="clip5"><rect x="60" y="410" width="400" height="20"/></clipPath></defs><text y="67" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#E47911;font-weight:700;letter-spacing:0.12em"><tspan x="60">PROXY OVERVIEW</tspan></text><text y="91" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">Annual Meeting of Shareholders</tspan></text><text y="117" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#37475A;font-style:italic"><tspan x="60">To Be Held on Wednesday, May 20, 2026</tspan></text><text y="149" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:17px;fill:#FF9900"><tspan x="60">Meeting Agenda</tspan></text><g clip-path="url(#clip4)"><text y="173.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">Thank you for being an Amazon shareholder. No matter how large or small your holdings may be, your vote is</tspan><tspan x="60" dy="12.76" textLength="492" lengthAdjust="spacing">important to us, and we encourage you to vote your shares in accordance with the Board’s recommendations. The</tspan><tspan x="60" dy="12.76">information here is only an overview—you can learn more by reading our Proxy Statement and Annual Report.</tspan></text></g><text y="238" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700;letter-spacing:0.04em;text-transform:uppercase"><tspan x="60">VOTING ITEMS</tspan></text><text y="244" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700;letter-spacing:0.04em;text-transform:uppercase"><tspan x="330">BOARD’S VOTING RECOMMENDATION</tspan></text><text y="238.56" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700;letter-spacing:0.04em;text-transform:uppercase"><tspan x="462">MORE INFORMATION</tspan><tspan x="462" dy="10">(PAGE)</tspan></text><line x1="60" y1="258" x2="552" y2="258" stroke="#F0A93B" stroke-width="1"/><rect x="54" y="263" width="504" height="30" rx="5" fill="#FDF4E8"/><text y="280" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="60">1. Election of 11 directors</tspan></text><text y="280" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="330">FOR (each nominee)</tspan></text><text y="280" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="462">2</tspan></text><text y="314" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="60">2. Ratification of Ernst &amp; Young as independent auditors</tspan></text><text y="314" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="330">FOR</tspan></text><text y="314" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="462">25</tspan></text><rect x="54" y="331" width="504" height="30" rx="5" fill="#FDF4E8"/><text y="348" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="60">3. Advisory vote to approve executive compensation</tspan></text><text y="348" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="330">FOR</tspan></text><text y="348" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="462">28</tspan></text><text y="382" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="60">4-7. Shareholder proposals</tspan></text><text y="382" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="330">AGAINST (each proposal)</tspan></text><text y="382" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="462">30</tspan></text><g clip-path="url(#clip5)"><text y="423.94" text-anchor="start" style="font-family:ember, sans-serif;font-size:17px;fill:#FF9900"><tspan x="60">Shareholder Engagement (Since Beginning of</tspan><tspan x="60" dy="21.25">2025)</tspan></text></g><rect x="60" y="436" width="230" height="70" rx="8" fill="#FDF4E8"/><text y="461" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:19px;fill:#E47911;font-weight:800"><tspan x="76">66 of 100</tspan></text><text y="488" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8.4px;fill:#37475A"><tspan x="76">largest unaffiliated shareholders engaged</tspan></text><rect x="310" y="436" width="230" height="70" rx="8" fill="#FDF4E8"/><text y="461" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:19px;fill:#E47911;font-weight:800"><tspan x="326">&gt;22%</tspan></text><text y="482.888" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#37475A"><tspan x="326">of stock owned by holders the lead independent</tspan><tspan x="326" dy="10.5">director met with</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement i</tspan></text></svg>
