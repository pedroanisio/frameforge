/text><text y="270" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="385">(page 19)</tspan></text><text y="289.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#232F3E;font-weight:700"><tspan x="385" textLength="150" lengthAdjust="spacing">Executive compensation philoso-</tspan><tspan x="385" dy="10.32">phy</tspan></text><text y="304" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="385">(page 47)</tspan></text><text y="327" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#232F3E;font-weight:700"><tspan x="385">2025 executive compensation</tspan></text><text y="338" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="385">(page 52)</tspan></text><g clip-path="url(#clip21)"><text y="475.74" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680"><tspan x="60" textLength="492" lengthAdjust="spacing">This document includes forward-looking statements within the meaning of the Private Securities Litigation Reform Act of 1995. All state-</tspan><tspan x="60" dy="9.1" textLength="492" lengthAdjust="spacing">ments other than statements of historical or current facts are forward-looking. Forward-looking statements reflect management’s current</tspan><tspan x="60" dy="9.1" textLength="492" lengthAdjust="spacing">expectations and are inherently uncertain; actual results could differ materially. See our 2025 Annual Report on Form 10-K for risks and</tspan><tspan x="60" dy="9.1">uncertainties.</tspan></text></g></svg>
