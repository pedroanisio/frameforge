<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="3" result="off"/><feFlood flood-color="rgba(0,0,0,0.08)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="clip21"><rect x="60" y="470" width="492" height="60"/></clipPath></defs><text y="74" text-anchor="start" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">TABLE OF CONTENTS</tspan></text><text y="107" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">ITEM 1—Election of Directors</tspan></text><line x1="360" y1="110" x2="360" y2="110" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="107" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">2</tspan></text><text y="127" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">Board of Directors Information</tspan></text><line x1="360" y1="130" x2="360" y2="130" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="127" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">3</tspan></text><text y="145" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">Board Composition</tspan></text><line x1="360" y1="148" x2="360" y2="148" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="145" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">14</tspan></text><text y="163" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">Corporate Governance</tspan></text><line x1="360" y1="166" x2="360" y2="166" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="163" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">16</tspan></text><text y="181" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">Board Meetings and Committees</tspan></text><line x1="360" y1="184" x2="360" y2="184" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="181" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">20</tspan></text><text y="199" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">Compensation of Directors</tspan></text><line x1="360" y1="202" x2="360" y2="202" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="199" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">23</tspan></text><text y="217" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">ITEM 2—Ratification of Ernst &amp; Young LLP</tspan></text><line x1="360" y1="220" x2="360" y2="220" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="217" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">25</tspan></text><text y="237" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">ITEM 3—Advisory Vote to Approve Executive Compensation</tspan></text><line x1="360" y1="240" x2="360" y2="240" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="237" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">28</tspan></text><text y="257" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">Shareholder Proposals</tspan></text><line x1="360" y1="260" x2="360" y2="260" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="257" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">30</tspan></text><text y="277" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">Beneficial Ownership of Shares</tspan></text><line x1="360" y1="280" x2="360" y2="280" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="277" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">45</tspan></text><text y="297" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">Executive Compensation</tspan></text><line x1="360" y1="300" x2="360" y2="300" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><text y="297" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="395">46</tspan></text><text y="317" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:700"><tspan x="60">Annual Meeting Information</tspan></text><line x1="360" y1=