span><tspan x="385" dy="10.32">philosophy</tspan></text><text y="305.56" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="385">(page 47)</tspan></text><text y="323.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#232F3E;font-weight:700"><tspan x="385">2025 executive compensation</tspan></text><text y="339.56" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="385">(page 52)</tspan></text><text y="475.74" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680"><tspan x="60">This document includes forward-looking statements within the meaning of the Private Securities Litigation Reform Act of 1995. All</tspan><tspan x="60" dy="9.1">statements other than statements of historical or current facts are forward-looking. Forward-looking statements reflect management’s</tspan><tspan x="60" dy="9.1">current expectations and are inherently uncertain; actual results could differ materially. See our 2025 Annual Report on Form 10-K for</tspan><tspan x="60" dy="9.1">risks and uncertainties.</tspan></text></svg>
