<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><line x1="60" y1="60" x2="552" y2="60" stroke="#F0A93B" stroke-width="1.2"/><rect x="60" y="74" width="150" height="150" rx="3" fill="#9aa0a6"/><text y="149.95" text-anchor="middle" style="font-family:ember, sans-serif;font-size:10px;fill:#ffffff;font-weight:700"><tspan x="135">photo</tspan></text><text y="252.51" text-anchor="start" style="font-family:ember, sans-serif;font-size:13px;fill:#E47911;font-weight:700"><tspan x="60">Edith W. Cooper</tspan></text><text y="273.38" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E"><tspan x="60">Co-Founder of Medley Living,</tspan><tspan x="60" dy="11.25">Inc. and Former EVP of Goldman</tspan><tspan x="60" dy="11.25">Sachs Group, Inc.</tspan></text><text y="320.677" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#232F3E;font-weight:700"><tspan x="60">Additional Skills:</tspan></text><text x="60" y="335.544" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="335.544" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Human Capital Management</text><text x="60" y="346.204" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="346.204" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Global Business &amp; Operations</text><text x="60" y="356.864" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="356.864" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Public Company Executive</text><text x="60" y="367.524" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="367.524" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Financial</text><text x="60" y="378.184" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="378.184" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Risk Management</text><text x="60" y="388.844" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="388.844" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Community &amp; Stakeholder Relations</text><line x1="216" y1="74" x2="216" y2="544" stroke="#d8dadd" stroke-width="0.5"/><text y="82.794" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Expertise Provided to the Board</tspan></text><text y="97.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="228">Ms. Cooper brings deep human capital management expertise, including</tspan><tspan x="228" dy="12.76">nine years as EVP, Global Head of Human Capital Management of Goldman</tspan><tspan x="228" dy="12.76">Sachs, and the perspective of overseeing rapidly growing companies as</tspan><tspan x="228" dy="12.76">well as large international companies across technology, consumer, and</tspan><tspan x="228" dy="12.76">financial fields.</tspan></text><text y="168.794" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Background</tspan></text><text y="183.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="228">Ms. Cooper is a co-founder of Medley Living (launched September 2020)</tspan><tspan x="228" dy="12.76">and served as EVP, Global Head of Human Capital Management of Goldman</tspan><tspan x="228" dy="12.76">Sachs from March 2008 to December 2017.</tspan></text><text y="246.794" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Other Experience and Qualifications</tspan></text><text x="228" y="261.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="261.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Director of PepsiCo, Inc. since September 2021; former director of Etsy</text><text x="237.35" y="273.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">and Slack Technologies.</text><text x="228" y="284.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="284.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Trustee of the Museum of Modern Art since 2017.</text><line x1="60" y1="552" x2="552" y2="552" stroke="#F0A93B" stroke-width="1" stroke-dasharray="1 3"/><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="60">Age:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="60">64</tspan></text><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="180">Director since:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="180">September 2021</tspan></text><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="310">Board committees:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="310">Leadership Development and</tspan><tspan x="310" dy="9.12">Compensation (Chair)</tspan></text><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="450">Other current public company boards:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="450">PepsiCo, Inc.</tspan></text><line x1="60" y1="616" x2="552" y2="616" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="773.462" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.5px;fill:#6f7680;letter-spacing:0.06em;text-transform:uppercase"><tspan x="60">BOARD OF DIRECTORS INFORMATION</tspan></text><text y="773.56" text-anchor="end" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement 5</tspan></text><text y="629.365" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">(director photo is a placeholder; the source page reproduces a portrait)</tspan></text></svg>
