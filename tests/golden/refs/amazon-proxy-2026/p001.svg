<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip1"><rect x="432" y="78" width="120" height="30"/></clipPath><linearGradient id="g2" x1="25%" y1="6.699%" x2="75%" y2="93.301%"><stop offset="0%" stop-color="#FFB23E"/><stop offset="55%" stop-color="#FF9900"/><stop offset="100%" stop-color="#F2780F"/></linearGradient><radialGradient id="g3" cx="50%" cy="50%" fx="50%" fy="50%"><stop offset="0%" stop-color="rgba(255,225,170,0.55)"/><stop offset="70%" stop-color="rgba(255,225,170,0)"/></radialGradient><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="10"/><feOffset dx="0" dy="3" result="off"/><feFlood flood-color="rgba(180,90,0,0.35)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect x="0" y="0" width="612" height="792" fill="#ffffff"/><text y="94.6" text-anchor="start" style="font-family:ember, sans-serif;font-size:30px;fill:#232F3E;font-weight:300"><tspan x="60">Notice of 2026 Annual</tspan><tspan x="60" dy="35.4">Meeting of Shareholders</tspan><tspan x="60" dy="35.4">&amp; Proxy Statement</tspan></text><g clip-path="url(#clip1)"><text y="93" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:28px;fill:#232F3E;font-weight:700;letter-spacing:-0.02em"><tspan x="432">amazon</tspan></text></g><path d="M 436 104.0 q 56.0 16.0 108.0 2.0" fill="none" stroke="#FF9900" stroke-width="2.6"/><path d="M 530.0 100.0 l 10 6.0 l -3 -11.0 z" fill="#FF9900"/><text y="307" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10.5px;fill:#37475A"><tspan x="60">9:00 a.m., Pacific Time</tspan></text><text y="321" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10.5px;fill:#37475A"><tspan x="60">Wednesday, May 20, 2026</tspan></text><text y="343" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10.5px;fill:#37475A"><tspan x="60" style="font-family:ember, sans-serif;font-size:10.5px;fill:#37475A">Virtual Meeting Site: </tspan><tspan style="font-family:sans-serif;font-size:10.5px;fill:#37475A;font-style:italic">www.virtualshareholdermeeting.com/AMZN2026</tspan></text><rect x="0" y="400" width="612" height="392" fill="url(#g2)"/><g style="mix-blend-mode:screen"><ellipse cx="300" cy="560" rx="300" ry="300" fill="url(#g3)"/></g><g filter="url(#fx1)"><path d="M 120 560 q 200 150 470 30" fill="none" stroke="#FFC266" stroke-width="26"/></g><path d="M 560 575 l 30 24 l -8 -40 z" fill="#FFC266"/><text y="776" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">(cover — brand image and amazon wordmark shown as placeholders; the arrow mark is a trademark)</tspan></text></svg>
