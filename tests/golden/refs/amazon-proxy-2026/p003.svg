<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><text y="75" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:17px;fill:#FF9900"><tspan x="60">Corporate Governance Highlights</tspan></text><text x="60" y="100.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="100.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">We have a single class of common stock with equal voting rights (one share, one vote).</text><text x="60" y="111.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="111.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">We have a declassified board—all directors are elected annually.</text><text x="60" y="123.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="123.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">We have a majority voting standard for the election of directors.</text><text x="60" y="135.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="135.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">We have a lead independent director appointed by the independent directors.</text><text x="60" y="147.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="147.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">We prohibit hedging, speculative, and derivative transactions by directors and officers.</text><text x="60" y="159.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="159.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Shareholders owning at least 25% of shares may call a special meeting.</text><text y="261" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:17px;fill:#FF9900"><tspan x="60">Executive Compensation Overview</tspan></text><text x="60" y="286.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="286.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Our philosophy is anchored on periodic grants of time-vested RSUs that vest over the long term, aligning</text><text x="69.68" y="297.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">executive compensation with the returns we deliver to shareholders.</text><text x="60" y="309.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="309.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">At our 2025 Annual Meeting, 78% of votes cast supported our say-on-pay advisory vote.</text><text x="60" y="321.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="321.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">The Committee granted no equity to our CEO or named executives in 2025, and none to our CEO since 2021.</text><text y="476" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">[Representative selection of the source’s governance and compensation highlight bullets.]</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement ii</tspan></text></svg>
