<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip12"><rect x="60" y="90" width="492" height="30"/></clipPath><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="12"/><feOffset dx="0" dy="4" result="off"/><feFlood flood-color="rgba(0,0,0,0.18)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><text y="75" text-anchor="start" style="font-family:ember, sans-serif;font-size:15px;fill:#232F3E;font-weight:700"><tspan x="60">Our Planet</tspan></text><g clip-path="url(#clip12)"><text y="97.79" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.5px;fill:#2b2b2b"><tspan x="60" textLength="492" lengthAdjust="spacing">The Climate Pledge is our goal to reach net-zero carbon emissions by 2040, with more than 640 signa-</tspan><tspan x="60" dy="13.3">tories across 60+ industries.</tspan></text></g><text x="60" y="132.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="132.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Reached a global data-center PUE of 1.15 in 2024 (best site 1.04).</text><text x="60" y="143.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="143.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Custom In-Row Heat Exchanger is 20% more power efficient and uses 9%</text><text x="69.68" y="155.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">less water than air-cooled sites.</text><text x="60" y="167.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="167.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Invested in more than 700 carbon-free energy projects worldwide (40+</text><text x="69.68" y="179.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">GW capacity).</text><text x="60" y="191.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="191.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Removed all plastic air pillows from delivery packaging globally.</text><text x="60" y="203.376" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="203.376" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Deployed more than 40,000 electric delivery vehicles globally.</text><g filter="url(#fx1)"><rect x="372" y="124" width="180" height="130" rx="10" fill="#9aa0a6"/></g><text y="190" text-anchor="middle" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#ffffff;font-weight:700"><tspan x="462">photo</tspan></text><text y="340" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">[Representative selection of this section’s bullets.]</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement vii</tspan></text></svg>
