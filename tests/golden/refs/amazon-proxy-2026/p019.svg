<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip18"><rect x="228" y="90" width="324" height="64"/></clipPath></defs><line x1="60" y1="60" x2="552" y2="60" stroke="#F0A93B" stroke-width="1.2"/><rect x="60" y="74" width="150" height="150" rx="3" fill="#9aa0a6"/><text y="149.95" text-anchor="middle" style="font-family:ember, sans-serif;font-size:10px;fill:#ffffff;font-weight:700"><tspan x="135">photo</tspan></text><text y="252.51" text-anchor="start" style="font-family:ember, sans-serif;font-size:13px;fill:#E47911;font-weight:700"><tspan x="60">Andrew Y. Ng</tspan></text><text y="273.38" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E"><tspan x="60">Managing General Partner, AI</tspan><tspan x="60" dy="11.25">Fund LP; Founder,</tspan><tspan x="60" dy="11.25">DeepLearning.AI</tspan></text><text y="320.677" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#232F3E;font-weight:700"><tspan x="60">Additional Skills:</tspan></text><text x="60" y="335.544" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="335.544" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Human Capital Management</text><text x="60" y="346.204" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="346.204" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Global Business &amp; Operations</text><text x="60" y="356.864" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="356.864" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Public Company Executive</text><text x="60" y="367.524" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="367.524" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Community &amp; Stakeholder Relations</text><text x="60" y="378.184" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="378.184" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Emerging Technology &amp; Innovation</text><line x1="216" y1="74" x2="216" y2="544" stroke="#d8dadd" stroke-width="0.5"/><text y="82.794" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Expertise Provided to the Board</tspan></text><g clip-path="url(#clip18)"><text y="97.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="228" textLength="324" lengthAdjust="spacing">Dr. Ng is a global leader in both AI and education. His academic and</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">private-sector work developing machine learning and deep learning algo-</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">rithms informs the Board’s perspective on the opportunities and chal-</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">lenges that AI presents and its transformative social and business</tspan><tspan x="228" dy="12.76">potential.</tspan></text></g><text y="168.794" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Background</tspan></text><text y="183.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="228" textLength="324" lengthAdjust="spacing">Dr. Ng has been Managing General Partner of AI Fund since January 2018</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">and has led DeepLearning.AI since June 2017. He is Executive Chairman</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">of LandingAI and co-founded Coursera, where he has served as Chairman</tspan><tspan x="228" dy="12.76">since 2014.</tspan></text><text y="246.794" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Other Experience and Qualifications</tspan></text><text x="228" y="261.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="261.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Chief Scientist &amp; VP of Baidu, Inc. (2014–2017).</text><text x="228" y="273.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="273.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Founding Lead of Google Brain (2011–2012).</text><line x1="60" y1="552" x2="552" y2="552" stroke="#F0A93B" stroke-width="1" stroke-dasharray="1 3"/><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="60">Age:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="60">49</tspan></text><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="180">Director since:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="180">April 2024</tspan></text><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="310">Board committees:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="310">Nominating and Corporate Governance</tspan></text><text y="566.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="450">Other current public company boards:</tspan></text><text y="580.232" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="450">Coursera, Inc.</tspan></text><line x1="60" y1="616" x2="552" y2="616" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="773.462" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.5px;fill:#6f7680;letter-spacing:0.06em;text-transform:uppercase"><tspan x="60">BOARD OF DIRECTORS INFORMATION</tspan></text><text y="773.56" text-anchor="end" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement 8</tspan></text><text y="629.365" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">(director photo is a placeholder; the source page reproduces a portrait)</tspan></text></svg>
