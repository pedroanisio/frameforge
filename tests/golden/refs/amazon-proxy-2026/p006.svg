<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="12"/><feOffset dx="0" dy="4" result="off"/><feFlood flood-color="rgba(0,0,0,0.18)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><text y="80" text-anchor="start" style="font-family:ember, sans-serif;font-size:25px;fill:#FF9900"><tspan x="60">Global Impact Highlights</tspan></text><text y="119" text-anchor="start" style="font-family:ember, sans-serif;font-size:15px;fill:#232F3E;font-weight:700"><tspan x="60">Our Customers</tspan></text><text y="141.79" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.5px;fill:#2b2b2b"><tspan x="60" textLength="492" lengthAdjust="spacing">We obsess over making customers’ lives better and easier with sharp pricing, vast selection, and</tspan><tspan x="60" dy="13.3">record delivery speeds.</tspan></text><text x="60" y="176.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="176.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Delivered over 13 billion items the same or next day globally to</text><text x="69.68" y="187.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Prime members—our fastest speeds ever.</text><text x="60" y="199.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="199.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Named the lowest-priced U.S. retailer by Profitero, on average 14%</text><text x="69.68" y="211.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">lower than other major retailers.</text><text x="60" y="223.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="223.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Scaled the Rufus AI shopping assistant to more than 300 million</text><text x="69.68" y="235.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">customers.</text><text x="60" y="247.376" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="247.376" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Trainium2 fully subscribed with 1.4 million chips landed; launched</text><text x="69.68" y="259.256" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Trainium3, up to 40% more price-performant.</text><text x="60" y="271.136" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="271.136" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Expanded the Amazon Leo low-Earth-orbit fleet to more than 200</text><text x="69.68" y="283.016" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">satellites.</text><g filter="url(#fx1)"><rect x="372" y="168" width="180" height="130" rx="10" fill="#9aa0a6"/></g><text y="234" text-anchor="middle" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#ffffff;font-weight:700"><tspan x="462">photo</tspan></text><text y="384" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">[Representative selection of this section’s bullets.]</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement v</tspan></text></svg>
