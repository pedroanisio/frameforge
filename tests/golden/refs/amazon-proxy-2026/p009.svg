<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="12"/><feOffset dx="0" dy="4" result="off"/><feFlood flood-color="rgba(0,0,0,0.18)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><text y="75" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:15px;fill:#232F3E;font-weight:700"><tspan x="60">Our Communities</tspan></text><text y="97.79" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.5px;fill:#2b2b2b"><tspan x="60">Our U.S. investments reached more than $340 billion in 2025, contributing more than $1.8 trillion</tspan><tspan x="60" dy="13.3">to the U.S. economy since 2010.</tspan></text><text x="60" y="132.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="132.096" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">134,000+ employees across 55 countries volunteered during our Global</text><text x="69.68" y="143.976" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Month of Volunteering.</text><text x="60" y="155.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="155.856" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Delivered more than 60 million free meals across the U.S. and UK.</text><text x="60" y="167.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="167.736" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Committed $3.6 billion to keep 35,000 homes affordable for 99 years.</text><text x="60" y="179.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="179.616" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Since 2017, delivered 26 million+ relief items across 200+ disasters.</text><text x="60" y="191.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#FF9900">•</text><text x="69.68" y="191.496" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b">Responded to 30 natural disasters across 12 countries in 2025.</text><g filter="url(#fx1)"><rect x="372" y="124" width="180" height="130" rx="10" fill="#9aa0a6"/></g><text y="190" text-anchor="middle" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#ffffff;font-weight:700"><tspan x="462">photo</tspan></text><text y="340" text-anchor="start" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">[Representative selection of this section’s bullets.]</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement viii</tspan></text></svg>
