<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip6"><rect x="60" y="60" width="492" height="28"/></clipPath></defs><g clip-path="url(#clip6)"><text y="80.48" text-anchor="start" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">Shareholder Proposals and Vote</tspan></text></g><rect x="60" y="100" width="492" height="4" fill="#F0A93B"/><text y="119.02" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#232F3E;font-weight:700"><tspan x="60">4 Report on Charitable Partnerships</tspan></text><text x="68" y="153.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="153.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">We support a wide range of programs that help thousands of charities and</text><text x="77.35" y="165.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">communities worldwide.</text><text x="68" y="176.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="176.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Our Nominating and Corporate Governance Committee oversees corporate social</text><text x="77.35" y="187.48" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">responsibility risks.</text><text y="119.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:800"><tspan x="432">AGAINST</tspan></text><text y="136.428" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="432">Page 33</tspan></text><rect x="60" y="230" width="492" height="4" fill="#F0A93B"/><text y="249.02" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#232F3E;font-weight:700"><tspan x="60">5 Additional Reporting on Impact of Data Centers on</tspan><tspan x="60" dy="12.65">Climate Commitments</tspan></text><text x="68" y="283.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="283.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Our current public reporting already addresses the proposal’s concerns,</text><text x="77.35" y="295.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">making the report unnecessary.</text><text x="68" y="306.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="306.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">In 2024, carbon intensity fell for the sixth consecutive year, down 4% on</text><text x="77.35" y="317.48" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">11% business growth.</text><text y="249.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:800"><tspan x="432">AGAINST</tspan></text><text y="266.428" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="432">Page 35</tspan></text><rect x="60" y="360" width="492" height="4" fill="#F0A93B"/><text y="379.02" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#232F3E;font-weight:700"><tspan x="60">6 Report on Impact of Climate Commitments</tspan></text><text x="68" y="413.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="413.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">We evaluate and adapt our sustainability approach to navigate evolving</text><text x="77.35" y="425.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">demands.</text><text x="68" y="436.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="436.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">The additional financial reporting requested would be impractical and</text><text x="77.35" y="447.48" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">potentially misleading.</text><text y="379.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:800"><tspan x="432">AGAINST</tspan></text><text y="396.428" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="432">Page 38</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="773.56" text-anchor="end" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement iii</tspan></text></svg>
