<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameForge replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip26"><rect x="60" y="92" width="492" height="44"/></clipPath><clipPath id="clip27"><rect x="60" y="144" width="360" height="24"/></clipPath><clipPath id="clip28"><rect x="228" y="294" width="324" height="56"/></clipPath></defs><text y="75" text-anchor="start" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">BOARD OF DIRECTORS INFORMATION</tspan></text><g clip-path="url(#clip26)"><text y="99.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60" textLength="492" lengthAdjust="spacing">In evaluating the nominees, the Board and the Nominating and Corporate Governance Committee consider the</tspan><tspan x="60" dy="12.76" textLength="492" lengthAdjust="spacing">qualities they seek for directors and each director’s individual qualifications, skills, expertise, and back-</tspan><tspan x="60" dy="12.76">ground in the context of the Company’s operations, so that collectively the Board operates as a diverse,</tspan></text></g><g clip-path="url(#clip27)"><text y="156" text-anchor="start" style="font-family:ember, sans-serif;font-size:17px;fill:#FF9900"><tspan x="60">Biographical Information</tspan></text></g><line x1="60" y1="178" x2="552" y2="178" stroke="#F0A93B" stroke-width="1.2"/><rect x="60" y="192" width="150" height="150" rx="3" fill="#9aa0a6"/><text y="266" text-anchor="middle" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:10px;fill:#ffffff;font-weight:700"><tspan x="135">photo</tspan></text><text y="367" text-anchor="start" style="font-family:ember, sans-serif;font-size:13px;fill:#E47911;font-weight:700"><tspan x="60">Jeffrey P. Bezos</tspan></text><text y="391.38" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E"><tspan x="60" textLength="152" lengthAdjust="spacing">Founder and Executive Chair of</tspan><tspan x="60" dy="11.25">Amazon</tspan></text><text y="437" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#232F3E;font-weight:700"><tspan x="60">Additional Skills:</tspan></text><text x="60" y="453.544" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="453.544" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Human Capital Management</text><text x="60" y="464.204" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="464.204" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Global Business &amp; Operations</text><text x="60" y="474.864" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="474.864" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Public Company Executive</text><text x="60" y="485.524" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="485.524" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Financial</text><text x="60" y="496.184" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="496.184" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Risk Management</text><text x="60" y="506.844" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="506.844" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Community &amp; Stakeholder Relations</text><text x="60" y="517.504" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="517.504" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Public Policy &amp; Geopolitics</text><text x="60" y="528.164" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="528.164" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Emerging Technology &amp; Innovation</text><text x="60" y="538.824" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="538.824" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Retail &amp; Digital Commerce</text><text x="60" y="549.484" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">•</text><text x="69.02" y="549.484" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Marketing, Media, &amp; Brand</text><text x="69.02" y="560.144" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.2px;fill:#E47911">Management</text><line x1="216" y1="192" x2="216" y2="662" stroke="#d8dadd" stroke-width="0.5"/><text y="199" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Expertise Provided to the Board</tspan></text><text y="215.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="228" textLength="324" lengthAdjust="spacing">Mr. Bezos’s individual qualifications and skills as a director in-</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">clude his customer-focused point of view, his willingness to encourage</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">invention, his long-term perspective, and his ongoing contributions as</tspan><tspan x="228" dy="12.76">founder and Executive Chair.</tspan></text><text y="285" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Background</tspan></text><g clip-path="url(#clip28)"><text y="301.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="228" textLength="324" lengthAdjust="spacing">Mr. Bezos has been Chair of the Board since founding the Company in 1994.</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">Prior to becoming Executive Chair in July 2021, he served as Chief Exec-</tspan><tspan x="228" dy="12.76" textLength="324" lengthAdjust="spacing">utive Officer from May 1996 to July 2021 and as President from founding</tspan><tspan x="228" dy="12.76">until June 1999 and again from October 2000 to July 2021.</tspan></text></g><text y="363" text-anchor="start" style="font-family:ember, sans-serif;font-size:9.2px;fill:#232F3E;font-weight:700"><tspan x="228">Other Experience and Qualifications</tspan></text><text x="228" y="379.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="379.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Executive Chair of the Bezos Earth Fund, founded with a $10 billion</text><text x="237.35" y="391.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">commitment to fight climate change.</text><text x="228" y="402.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="402.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Founded the Bezos Day One Fund, a $2 billion commitment for</text><text x="237.35" y="413.48" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">homelessness and preschools.</text><text x="228" y="424.7" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="237.35" y="424.7" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Founded Blue Origin; owns The Washington Post; co-founded AI company</text><text x="237.35" y="435.92" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Project Prometheus (co-CEO since November 2025).</text><line x1="60" y1="670" x2="552" y2="670" stroke="#F0A93B" stroke-width="1" stroke-dasharray="1 3"/><text y="690" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="60">Age:</tspan></text><text y="712" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="60">62</tspan></text><text y="690" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="180">Director since:</tspan></text><text y="712" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="180">July 1994</tspan></text><text y="690" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="310">Board committees:</tspan></text><text y="712" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="310">None</tspan></text><text y="690" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="450">Other current public company boards:</tspan></text><text y="712" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="450">None</tspan></text><line x1="60" y1="734" x2="552" y2="734" stroke="#d8dadd" stroke-width="0.8" stroke-dasharray="1 3"/><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="772" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.5px;fill:#6f7680;letter-spacing:0.06em;text-transform:uppercase"><tspan x="60">BOARD OF DIRECTORS INFORMATION</tspan></text><text y="772" text-anchor="end" dominant-baseline="central" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement 3</tspan></text><text y="746" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680;font-style:italic"><tspan x="60">(director photo is a placeholder; the source page reproduces a portrait)</tspan></text></svg>
