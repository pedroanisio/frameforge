<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip6"><rect x="60" y="56" width="114" height="28.5"/></clipPath></defs><g clip-path="url(#clip6)"><text y="78.96" text-anchor="start" style="font-family:ember, sans-serif;font-size:28px;fill:#232F3E;font-weight:700;letter-spacing:-0.02em"><tspan x="60">amazon</tspan></text></g><path d="M 64 80.7 q 53.0 15.2 102.0 1.9" fill="none" stroke="#FF9900" stroke-width="2.47"/><path d="M 152.0 76.9 l 10 5.699999999999999 l -3 -10.45 z" fill="#FF9900"/><text y="115.68" text-anchor="start" style="font-family:ember, sans-serif;font-size:24px;fill:#37475A;font-weight:300"><tspan x="60">NOTICE OF 2026 ANNUAL MEETING OF</tspan><tspan x="60" dy="26.4">SHAREHOLDERS</tspan></text><ellipse cx="72" cy="178" rx="12" ry="12" fill="none" stroke="#FF9900" stroke-width="1.6"/><text y="178.95" text-anchor="start" style="font-family:ember, sans-serif;font-size:10px;fill:#E47911;font-weight:700"><tspan x="92">Date and Time</tspan></text><text y="202.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">Wednesday, May 20, 2026</tspan></text><text y="216.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b"><tspan x="60">9:00 a.m., Pacific Time</tspan></text><ellipse cx="322" cy="178" rx="12" ry="12" fill="none" stroke="#FF9900" stroke-width="1.6"/><text y="178.95" text-anchor="start" style="font-family:ember, sans-serif;font-size:10px;fill:#E47911;font-weight:700"><tspan x="342">Virtual Meeting Site</tspan></text><text y="202.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#2b2b2b;font-style:italic"><tspan x="310">www.virtualshareholdermeeting.com/AMZN2026</tspan></text><text y="248.56" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700;letter-spacing:0.04em;text-transform:uppercase"><tspan x="60">ITEMS OF BUSINESS:</tspan></text><text y="246.56" text-anchor="start" style="font-family:ember, sans-serif;font-size:8px;fill:#232F3E;font-weight:700;letter-spacing:0.04em;text-transform:uppercase"><tspan x="352">OUR BOARD OF DIRECTORS RECOMMENDS YOU VOTE:</tspan></text><rect x="54" y="262" width="504" height="40" rx="6" fill="#FDF4E8"/><text y="275.145" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#FF9900"><tspan x="60">•</tspan></text><text y="273.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="74">To elect the eleven directors named in the Proxy Statement to</tspan><tspan x="74" dy="11.18">serve until the next Annual Meeting</tspan></text><ellipse cx="364" cy="273" rx="8" ry="8" fill="#1f9d57"/><path d="M 360.5 273 l 2.5 2.8 l 4.5 -5.5" fill="none" stroke="#ffffff" stroke-width="1.6"/><text y="272.888" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="380">FOR the election of each director</tspan><tspan x="380" dy="10.92">nominee</tspan></text><rect x="54" y="306" width="504" height="40" rx="6" fill="#ffffff"/><text y="319.145" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#FF9900"><tspan x="60">•</tspan></text><text y="317.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="74">To ratify the appointment of Ernst &amp; Young LLP as our</tspan><tspan x="74" dy="11.18">independent auditors for fiscal year 2026</tspan></text><ellipse cx="364" cy="317" rx="8" ry="8" fill="#1f9d57"/><path d="M 360.5 317 l 2.5 2.8 l 4.5 -5.5" fill="none" stroke="#ffffff" stroke-width="1.6"/><text y="316.888" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="380" style="font-family:ember, sans-serif;font-size:8.4px;fill:#1f9d57;font-weight:800">FOR </tspan><tspan style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b">the ratification of the appointment</tspan></text><rect x="54" y="350" width="504" height="40" rx="6" fill="#FDF4E8"/><text y="363.145" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#FF9900"><tspan x="60">•</tspan></text><text y="361.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="74">To conduct an advisory vote to approve our executive</tspan><tspan x="74" dy="11.18">compensation</tspan></text><ellipse cx="364" cy="361" rx="8" ry="8" fill="#1f9d57"/><path d="M 360.5 361 l 2.5 2.8 l 4.5 -5.5" fill="none" stroke="#ffffff" stroke-width="1.6"/><text y="360.888" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="380" style="font-family:ember, sans-serif;font-size:8.4px;fill:#1f9d57;font-weight:800">FOR </tspan><tspan style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b">approval, on an advisory basis</tspan></text><rect x="54" y="394" width="504" height="40" rx="6" fill="#ffffff"/><text y="407.145" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#FF9900"><tspan x="60">•</tspan></text><text y="405.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="74">To consider and act upon the shareholder proposals described in</tspan><tspan x="74" dy="11.18">the Proxy Statement</tspan></text><ellipse cx="364" cy="405" rx="8" ry="8" fill="#232F3E"/><path d="M 360.8 401.8 l 6.4 6.4 m -6.4 0 l 6.4 -6.4" fill="none" stroke="#ffffff" stroke-width="1.6"/><text y="404.888" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="380">AGAINST each of the shareholder</tspan><tspan x="380" dy="10.92">proposals</tspan></text><rect x="54" y="438" width="504" height="40" rx="6" fill="#FDF4E8"/><text y="451.145" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#FF9900"><tspan x="60">•</tspan></text><text y="449.052" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.6px;fill:#2b2b2b"><tspan x="74">To transact such other business as may properly come before the</tspan><tspan x="74" dy="11.18">meeting</tspan></text><text y="499.216" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60">The Board of Directors has fixed March 26, 2026 as the record date for determining shareholders entitled to</tspan><tspan x="60" dy="12.76">notice of, and to vote at, the Annual Meeting.</tspan></text><text y="537.836" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.8px;fill:#2b2b2b;hyphens:auto"><tspan x="60">By Order of the Board of Directors</tspan></text><text y="562.12" text-anchor="start" style="font-family:ember, sans-serif;font-size:16px;fill:#232F3E;font-style:italic"><tspan x="60">Susan K. Jong</tspan></text><text y="579.862" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#232F3E;font-weight:700"><tspan x="60">Susan K. Jong</tspan></text><text y="591.672" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="60">Secretary</tspan></text><text y="607.672" text-anchor="start" style="font-family:ember, sans-serif;font-size:7.6px;fill:#2b2b2b"><tspan x="60">Seattle, Washington — April 9, 2026</tspan></text><text y="629.74" text-anchor="start" style="font-family:ember, sans-serif;font-size:7px;fill:#6f7680"><tspan x="60">Important Notice Regarding the Availability of Proxy Materials. The Proxy Statement and our 2025 Annual Report are available at</tspan><tspan x="60" dy="9.1">www.proxyvote.com.</tspan></text></svg>
