<svg xmlns="http://www.w3.org/2000/svg" width="612" height="792" viewBox="0 0 612 792" xml:lang="en-US"><title>Amazon 2026 Proxy Statement — first 20 pages (FrameGraph replica)</title><desc>Structural replica of pp. 1–20 of the Amazon.com, Inc. 2026 Notice &amp; Proxy Statement. Director photos and the amazon wordmark/arrow are trademarks, shown as labelled placeholders. Dense overview-page bullet lists are representative samples; bios pp. 14–20 use one data-driven template.</desc><rect width="100%" height="100%" fill="white"/><rect x="60" y="80" width="492" height="4" fill="#F0A93B"/><text y="99.02" text-anchor="start" style="font-family:ember, sans-serif;font-size:11px;fill:#232F3E;font-weight:700"><tspan x="60">7 Mandatory Independent Board Chair Policy</tspan></text><text x="68" y="133.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="133.82" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">We are committed to strong, independent leadership of the Board; our lead</text><text x="77.35" y="145.04" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">independent director reinforces independent oversight.</text><text x="68" y="156.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="156.26" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Our governance guidelines let the Board determine the optimal leadership</text><text x="77.35" y="167.48" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">structure for Amazon at any given time.</text><text x="68" y="178.7" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#FF9900">•</text><text x="77.35" y="178.7" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">Our current structure provides robust risk oversight by independent</text><text x="77.35" y="189.92" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.5px;fill:#2b2b2b">directors.</text><text y="99.755" text-anchor="start" style="font-family:ember, sans-serif;font-size:9px;fill:#232F3E;font-weight:800"><tspan x="432">AGAINST</tspan></text><text y="116.428" text-anchor="start" style="font-family:ember, sans-serif;font-size:8.4px;fill:#2b2b2b"><tspan x="432">Page 42</tspan></text><line x1="60" y1="760" x2="552" y2="760" stroke="#d8dadd" stroke-width="0.5"/><text y="773.56" text-anchor="end" style="font-family:ember, sans-serif;font-size:8px;fill:#6f7680"><tspan x="552">2026 Proxy Statement iv</tspan></text></svg>
