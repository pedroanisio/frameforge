<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" xml:lang="en-US"><title>France Entity Migration to Oracle Project Kickoff</title><desc>Migrated from FrameGraph v1.5 (kind: presentation-deck) to v2.0. Slides became fixed Pages through a shared `deck` master; ellipses converted box-&gt;center/rx/ry; image href-&gt;src; v1 gradients and style keys mapped to v2.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip98"><rect x="232" y="186" width="650" height="30"/></clipPath><clipPath id="clip99"><rect x="232" y="229" width="650" height="30"/></clipPath><clipPath id="clip100"><rect x="232" y="356" width="650" height="30"/></clipPath><clipPath id="clip101"><rect x="50" y="354" width="150" height="16"/></clipPath><clipPath id="clip102"><rect x="56" y="502" width="95" height="20"/></clipPath></defs><rect x="0" y="0" width="960" height="540" fill="#FFFFFF"/><text y="62.52" text-anchor="start" style="font-family:primary, sans-serif;font-size:36px;fill:#16002F;font-weight:700"><tspan x="38">Project Roles and Definitions</tspan></text><rect x="44" y="92" width="436" height="42.444" fill="#EEE7FF" stroke="#A8A8A8" stroke-width="0.5"/><text y="115.102" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F;font-weight:700"><tspan x="49">Role Name</tspan></text><rect x="480" y="92" width="436" height="42.444" fill="#EEE7FF" stroke="#A8A8A8" stroke-width="0.5"/><text y="115.102" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F;font-weight:700"><tspan x="485">Description</tspan></text><rect x="44" y="134.444" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="145.004" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">FBT Project Lead</tspan></text><rect x="480" y="134.444" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="145.004" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Accountable for overall execution, risk management/escalation, communication to FBT leadership,</tspan><tspan x="485" dy="10">portfolio owner and supporting team members. Drives Solution Design, BRDs, UAT and Hypercare planning.</tspan></text><rect x="44" y="176.889" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="187.449" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">Product Manager</tspan></text><rect x="480" y="176.889" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="187.449" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Solution architect partnering with FBT project lead and business stakeholders on requirements and KDD</tspan><tspan x="485" dy="10">close-out. Liaison to engineering for design details, demos and configuration.</tspan></text><rect x="44" y="219.333" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="229.893" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">Technical Project Manager/SME</tspan></text><rect x="480" y="219.333" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="229.893" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Owns day-to-day technical delivery plan and status. Supports functional spec, configurations, reports,</tspan><tspan x="485" dy="10">unit testing and sprint demos.</tspan></text><rect x="44" y="261.778" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="272.338" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">Application Functional Lead</tspan></text><rect x="480" y="261.778" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="272.338" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Responsible for functional design, testing and troubleshooting.</tspan></text><rect x="44" y="304.222" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="314.782" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">Application Engineering Lead</tspan></text><rect x="480" y="304.222" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="314.782" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Supports technical build, execution, configuration and delivery of solution.</tspan></text><rect x="44" y="346.667" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="357.227" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">FBT Program Manager</tspan></text><rect x="480" y="346.667" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="357.227" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Responsible for overarching program management of CAO initiatives, governance, SteerCo, OpCo, commits</tspan><tspan x="485" dy="10">and Go/No-Go calls.</tspan></text><rect x="44" y="389.111" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="399.671" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">Change Lead</tspan></text><rect x="480" y="389.111" width="436" height="42.444" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="0.45"/><text y="399.671" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">Owns overarching change strategy and project change plan.</tspan></text><rect x="44" y="431.556" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="442.116" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="49">Contractors</tspan></text><rect x="480" y="431.556" width="436" height="42.444" fill="#F6F2FF" stroke="#D9D9D9" stroke-width="0.45"/><text y="442.116" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="485">External contractors supporting project delivery and execution.</tspan></text><rect x="44" y="92" width="872" height="42" fill="#16002F"/><rect x="44" y="134" width="220" height="340" fill="#C9BDF7"/><line x1="264" y1="92" x2="264" y2="474" stroke="#FFFFFF" stroke-width="1"/><line x1="44" y1="134" x2="916" y2="134" stroke="#FFFFFF" stroke-width="1"/><text y="117.535" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#FFFFFF;font-weight:700"><tspan x="56">Role Name</tspan></text><text y="117.535" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#FFFFFF;font-weight:700"><tspan x="282">Description</tspan></text><text y="158.145" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#000000;font-weight:700"><tspan x="56">FBT Project Lead</tspan></text><text y="199.145" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#000000;font-weight:700"><tspan x="56">Product Manager</tspan></text><text y="237.02" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#000000;font-weight:700"><tspan x="56">Technical Project Manager/SME</tspan></text><text y="285.145" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#000000;font-weight:700"><tspan x="56">Application Functional Lead</tspan></text><text y="327.145" text-anchor="start" style="font-family:primary,