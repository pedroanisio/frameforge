<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" xml:lang="en-US"><title>France Entity Migration to Oracle Project Kickoff</title><desc>Migrated from FrameGraph v1.5 (kind: presentation-deck) to v2.0. Slides became fixed Pages through a shared `deck` master; ellipses converted box-&gt;center/rx/ry; image href-&gt;src; v1 gradients and style keys mapped to v2.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip109"><rect x="241" y="146" width="120" height="18"/></clipPath><clipPath id="clip110"><rect x="540" y="292" width="120" height="18"/></clipPath><clipPath id="clip111"><rect x="192" y="455" width="135" height="18"/></clipPath><clipPath id="clip112"><rect x="56" y="502" width="95" height="20"/></clipPath></defs><rect x="0" y="0" width="960" height="540" fill="#FFFFFF"/><text y="39.04" text-anchor="start" style="font-family:primary, sans-serif;font-size:22px;fill:#16002F;font-weight:700"><tspan x="40">Project Management Assistance – Detailed approach</tspan></text><text y="77.94" text-anchor="start" style="font-family:primary, sans-serif;font-size:17px;fill:#29B9C6;font-weight:700;font-style:italic"><tspan x="38">LOCAL DATA &amp; INTEGRATION ASSESSMENT &amp; IMPACT ANALYSIS</tspan></text><line x1="45" y1="54" x2="870" y2="54" stroke="#4B00D8" stroke-width="1.1"/><ellipse cx="22" cy="72" rx="9" ry="9" fill="#FFFFFF" stroke="#0097A9" stroke-width="2"/><text y="70" text-anchor="middle" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:8px;fill:#0097A9;font-weight:700"><tspan x="22">4</tspan></text><line x1="430" y1="98" x2="430" y2="493" stroke="#29B9C6" stroke-width="5"/><ellipse cx="430" cy="147" rx="10" ry="10" fill="#FFFFFF" stroke="#29B9C6" stroke-width="6"/><ellipse cx="430" cy="292" rx="10" ry="10" fill="#FFFFFF" stroke="#29B9C6" stroke-width="6"/><ellipse cx="430" cy="463" rx="10" ry="10" fill="#FFFFFF" stroke="#29B9C6" stroke-width="6"/><ellipse cx="374" cy="151" rx="24" ry="24" fill="#29B9C6"/><path d="M363 164 L363 140 M366 140 L388 144 L388 157 L366 153" fill="none" stroke="#FFFFFF" stroke-width="2"/><ellipse cx="500" cy="296" rx="24" ry="24" fill="#29B9C6"/><ellipse cx="494" cy="291" rx="7" ry="7" fill="none" stroke="#FFFFFF" stroke-width="2"/><path d="M494 279 L494 283 M494 298 L494 302 M482 291 L486 291 M501 291 L505 291 M486 283 L489 286 M499 296 L502 299 M502 283 L499 286 M489 296 L486 299" fill="none" stroke="#FFFFFF" stroke-width="1.5"/><ellipse cx="373" cy="463" rx="24" ry="24" fill="#29B9C6"/><rect x="360" y="456" width="26" height="16" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/><line x1="365" y1="462" x2="381" y2="462" stroke="#FFFFFF" stroke-width="1.5"/><line x1="365" y1="467" x2="381" y2="467" stroke="#FFFFFF" stroke-width="1.5"/><g clip-path="url(#clip109)"><text y="155" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#29B9C6;font-weight:700"><tspan x="241">OBJECTIVES</tspan></text></g><text y="137.74" text-anchor="start" style="font-family:primary, sans-serif;font-size:7px;fill:#16002F;font-weight:700"><tspan x="452">Identify key data migration and integration considerations specific to French requirements</tspan></text><text y="202.74" text-anchor="start" style="font-family:primary, sans-serif;font-size:7px;fill:#16002F"><tspan x="24">• Organize workshops on data migration and integrations specific to France. • Data Migration Analysis:</tspan><tspan x="24" dy="9">evaluate impact concerning French GAAP and localization requirements. • Integration Catalog: required</tspan><tspan x="24" dy="9">downstream integrations including banking APIs and e-invoicing. • Technical Scope Assessment: technical</tspan><tspan x="24" dy="9">scope, extension needs and reporting configurations. • Banking and Payment Review: bank connectivity,</tspan><tspan x="24" dy="9">formats, approvals and security mandates. • Payroll Integration and bilingual documentation/training.</tspan></text><g clip-path="url(#clip110)"><text y="301" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#29B9C6;font-weight:700"><tspan x="540">ACTIVITIES</tspan></text></g><rect x="674" y="166" width="230" height="253" rx="26" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/><text y="233.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F"><tspan x="692">Prerequisites • Existing data migration</tspan><tspan x="692" dy="11">process documentation • Availability of</tspan><tspan x="692" dy="11">technical teams for integration</tspan><tspan x="692" dy="11">assessments</tspan></text><text y="335.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F"><tspan x="692">Cost drivers • 4 Workshops – 2 hours each</tspan><tspan x="692" dy="11">• 1 validation meeting</tspan></text><g clip-path="url(#clip111)"><text y="464" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#29B9C6;font-weight:700"><tspan x="192">DELIVERABLES</tspan></text></g><text x="452" y="472.9" text-anchor="start" style="font-family:primary, sans-serif;font-size:7.5px;fill:#0097A9;font-weight:700">•</text><text x="460.25" y="472.9" text-anchor="start" style="font-family:primary, sans-serif;font-size:7.5px;fill:#0097A9;font-weight:700">Recommendations on key data migration strategy for French requirements</text><text x="452" y="482.9" text-anchor="start" style="font-family:primary, sans-serif;font-size:7.5px;fill:#0097A9;font-weight:700">•</text><text x="460.25" y="482.9" text-anchor="start" style="font-family:primary, sans-serif;font-size:7.5px;fill:#0097A9;font-weight:700">Required upstream and downstream integration catalog including architecture considerations</text><rect x="36" y="503" width="13" height="13" fill="#4B00FF"/><path d="M43,503 L51,503 L58,510 L51,517 L43,517 Z" fill="#FF5252"/><g clip-path="url(#clip112)"><text y="520.04" text-anchor="start" style="font-family:primary, sans-serif;font-size:22px;fill:#000000;font-weight:700"><tspan x="56">docusig</tspan><tspan x="56" dy="27.5">n.</tspan></text></g><text y="516" text-anchor="middle" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:11px;fill:#666666"><tspan x="480">Docusign Confidential</tspan></text></svg>
