5" fill="none" stroke="#FFFFFF" stroke-width="2"/><line x1="462" y1="293" x2="458" y2="293" stroke="#FFFFFF" stroke-width="2"/><line x1="470" y1="285" x2="470" y2="281" stroke="#FFFFFF" stroke-width="2"/><line x1="488" y1="298" x2="492" y2="298" stroke="#FFFFFF" stroke-width="2"/><ellipse cx="390" cy="452" rx="24" ry="24" fill="#7D65AD" stroke="#7D65AD" stroke-width="1.5"/><rect x="377" y="445" width="26" height="16" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/><line x1="384" y1="445" x2="397" y2="445" stroke="#FFFFFF" stroke-width="3"/><line x1="390" y1="442" x2="390" y2="455" stroke="#FFFFFF" stroke-width="2"/><text y="139.12" text-anchor="start" style="font-family:primary, sans-serif;font-size:16px;fill:#7D65AD;font-weight:700"><tspan x="245">OBJECTIVES</tspan></text><text y="140.56" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F;font-weight:700"><tspan x="455">Review and analyze French-specific requirements and their impact on the global system</tspan></text><text y="202.56" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F"><tspan x="30">• Evaluate readiness for e-invoicing and e-reporting mandates for France B2G and B2B</tspan><tspan x="30" dy="10">transactions. • Invoicing applicative landscape: as-is, to-be and certified platform</tspan><tspan x="30" dy="10">benchmark. • Invoicing required data and use cases: main P2P, O2C and intercompany use</tspan><tspan x="30" dy="10">cases. • E-invoicing data review with 400+ fields for analysis. • Provide high-level</tspan><tspan x="30" dy="10">recommendation on France e-invoicing and supporting tool.</tspan></text><g clip-path="url(#clip116)"><text y="299.12" text-anchor="start" style="font-family:primary, sans-serif;font-size:16px;fill:#7D65AD;font-weight:700"><tspan x="505">ACTIVITIES</tspan></text></g><rect x="675" y="180" width="230" height="186" rx="26" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/><text y="201.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F"><tspan x="692">Prerequisites • Data and documentation</tspan><tspan x="692" dy="11">provided ahead of workshops • SMEs</tspan><tspan x="692" dy="11">available</tspan></text><text y="307.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F"><tspan x="692">Cost drivers • 3 IS workshops • 2</tspan><tspan x="692" dy="11">use-case workshops • 4 data review</tspan><tspan x="692" dy="11">workshops • 1 validation meeting</tspan></text><g clip-path="url(#clip117)"><text y="456.12" text-anchor="start" style="font-family:primary, sans-serif;font-size:16px;fill:#7D65AD;font-weight:700"><tspan x="225">DELIVERABLES</tspan></text></g><text x="455" y="431.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#7D65AD;font-weight:700">•</text><text x="463.8" y="431.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#7D65AD;font-weight:700">Recommendations on France e-invoicing and supporting tool</text><text x="455" y="441.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#7D65AD;font-weight:700">•</text><text x="463.8" y="441.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#7D65AD;font-weight:700">High-level solution and foundational e-invoicing platform recommendations</text><text y="518.145" text-anchor="middle" style="font-family:primary, sans-serif;font-size:11px;fill:#666666"><tspan x="480">Docusign Confidential</tspan></text></svg>
