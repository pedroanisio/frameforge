<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" xml:lang="en-US"><title>France Entity Migration to Oracle Project Kickoff</title><desc>Migrated from FrameForge v1.5 (kind: presentation-deck) to v2.0. Slides became fixed Pages through a shared `deck` master; ellipses converted box-&gt;center/rx/ry; image href-&gt;src; v1 gradients and style keys mapped to v2.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip15"><rect x="38" y="32" width="760" height="48"/></clipPath><clipPath id="clip16"><rect x="76" y="127" width="28" height="25"/></clipPath><clipPath id="clip17"><rect x="461" y="128" width="28" height="24"/></clipPath><clipPath id="clip18"><rect x="455" y="175" width="420" height="44"/></clipPath><clipPath id="clip19"><rect x="56" y="502" width="95" height="20"/></clipPath></defs><rect x="0" y="0" width="960" height="540" fill="#FFFFFF"/><g clip-path="url(#clip15)"><text y="62.34" text-anchor="start" style="font-family:primary, sans-serif;font-size:37px;fill:#16002F;font-weight:700"><tspan x="38">France Entity Migration Project</tspan></text></g><text y="27" text-anchor="end" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:12px;fill:#D9D9D9"><tspan x="930">Alex</tspan></text><rect x="50" y="100" width="365" height="371" rx="16" fill="#EEE7FF"/><rect x="435" y="100" width="475" height="371" rx="16" fill="#FFFFFF" stroke="#EEE7FF" stroke-width="2"/><rect x="70" y="121" width="39" height="39" rx="8" fill="#4B00FF"/><g clip-path="url(#clip16)"><text y="139.5" text-anchor="middle" dominant-baseline="central" style="font-family:serif;font-size:25px;fill:#FFFFFF"><tspan x="90">ch</tspan></text></g><text y="149.68" text-anchor="start" style="font-family:primary, sans-serif;font-size:24px;fill:#16002F;font-weight:700"><tspan x="120">Objectives</tspan></text><text y="198.35" text-anchor="start" style="font-family:primary, sans-serif;font-size:17.5px;fill:#16002F"><tspan x="70">Migrate France legal entity</tspan><tspan x="70" dy="22.5">accounting processes and data from</tspan><tspan x="70" dy="22.5">Sage to Global Oracle Fusion</tspan><tspan x="70" dy="22.5">Platform AND Migrate remaining</tspan><tspan x="70" dy="22.5">France active customer contracts to</tspan><tspan x="70" dy="22.5">Docusign EMEA (Global Oracle Fusion</tspan><tspan x="70" dy="22.5">Platform)</tspan></text><rect x="455" y="121" width="39" height="39" rx="8" fill="#FF5252"/><g clip-path="url(#clip17)"><text y="140" text-anchor="middle" dominant-baseline="central" style="font-family:serif;font-size:24px;fill:#FFFFFF"><tspan x="475">ng</tspan></text></g><text y="149.68" text-anchor="start" style="font-family:primary, sans-serif;font-size:24px;fill:#16002F;font-weight:700"><tspan x="505">Opportunity</tspan></text><g clip-path="url(#clip18)"><text y="188.12" text-anchor="start" style="font-family:primary, sans-serif;font-size:16px;fill:#16002F"><tspan x="455">By migrating the France legal entity and customer</tspan><tspan x="455" dy="22">contracts to Global Oracle Fusion Platform, we</tspan></text></g><text x="470" y="236.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">•</text><text x="485.4" y="236.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">**Decommission legacy systems** by retiring the</text><text x="485.4" y="254.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">local Sage ERP</text><text x="470" y="272.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">•</text><text x="485.4" y="272.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">**Mitigate compliance risks** through globalized AP</text><text x="485.4" y="290.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">workflows, improved SODs, and standardized global</text><text x="485.4" y="308.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">SOX controls</text><text x="470" y="326.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">•</text><text x="485.4" y="326.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">**Standardize financial reporting** by aligning R2R</text><text x="485.4" y="344.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">process under a unified global chart of accounts</text><text x="470" y="362.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">•</text><text x="485.4" y="362.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">**Enable data transparency** with real-time access</text><text x="485.4" y="380.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">to DS France accounts for the corporate and FP&amp;A</text><text x="485.4" y="398.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">teams</text><text x="470" y="416.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">•</text><text x="485.4" y="416.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">**Drive operational efficiency** by automating</text><text x="485.4" y="434.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">accounting workflows and eliminating manual</text><text x="485.4" y="452.88" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F">reporting</text><rect x="36" y="503" width="13" height="13" fill="#4B00FF"/><path d="M43,503 L51,503 L58,510 L51,517 L43,517 Z" fill="#FF5252"/><g clip-path="url(#clip19)"><text y="520.04" text-anchor="start" style="font-family:primary, sans-serif;font-size:22px;fill:#000000;font-weight:700"><tspan x="56">docusig</tspan><tspan x="56" dy="30.462">n.</tspan></text></g><text y="516" text-anchor="end" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:11px;fill:#16002F"><tspan x="930">5</tspan></text></svg>
