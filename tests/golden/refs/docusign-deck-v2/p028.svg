y2="164" stroke="#FFFFFF" stroke-width="2"/><path d="M366,140 L388,144 L388,157 L366,153 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/><ellipse cx="500" cy="296" rx="24" ry="24" fill="#4B00D8" stroke="#4B00D8" stroke-width="1.5"/><ellipse cx="494" cy="291" rx="7" ry="7" fill="none" stroke="#FFFFFF" stroke-width="2"/><ellipse cx="506.5" cy="295.5" rx="5.5" ry="5.5" fill="none" stroke="#FFFFFF" stroke-width="2"/><line x1="486" y1="291" x2="482" y2="291" stroke="#FFFFFF" stroke-width="2"/><line x1="494" y1="283" x2="494" y2="279" stroke="#FFFFFF" stroke-width="2"/><line x1="512" y1="296" x2="516" y2="296" stroke="#FFFFFF" stroke-width="2"/><ellipse cx="373" cy="463" rx="24" ry="24" fill="#4B00D8" stroke="#4B00D8" stroke-width="1.5"/><rect x="360" y="456" width="26" height="16" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/><line x1="367" y1="456" x2="380" y2="456" stroke="#FFFFFF" stroke-width="3"/><line x1="373" y1="453" x2="373" y2="466" stroke="#FFFFFF" stroke-width="2"/><text y="156" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#4B00D8;font-weight:700"><tspan x="239">OBJECTIVES</tspan></text><text y="150.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F;font-weight:700"><tspan x="478">Develop an implementation roadmap and plan for French localization</tspan></text><text y="203.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F;font-weight:700"><tspan x="27">Based on the different elements collected in the Gap Analysis for France,</tspan><tspan x="27" dy="11">define the implementation roadmap and resource plan. The below topics need</tspan><tspan x="27" dy="11">to be included in this step :</tspan></text><text x="27" y="257.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">•</text><text x="35.8" y="257.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">**Implementation Plan:** Build a high-level implementation plan, including roadmap,</text><text x="35.8" y="267.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">timeline, key milestones, project phases...</text><text x="27" y="277.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">•</text><text x="35.8" y="277.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">**Resource Plan:** Provide a plan, including the resources required to support</text><text x="35.8" y="287.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">Localization</text><text x="27" y="297.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">•</text><text x="35.8" y="297.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">**Risk Management:** Identify potential risks, issues, dependencies and develop</text><text x="35.8" y="307.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">mitigation strategies</text><text x="27" y="317.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">•</text><text x="35.8" y="317.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">**Future Architecture Recommendations:** Suggest future state architecture for</text><text x="35.8" y="327.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">integration and associated systems</text><text x="27" y="337.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">•</text><text x="35.8" y="337.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">**Stakeholder Alignment:** Ensure all stakeholders are aligned regarding project</text><text x="35.8" y="347.36" text-anchor="start" style="font-family:primary, sans-serif;font-size:8px;fill:#16002F">scope and timelines</text><text y="431.38" text-anchor="start" style="font-family:primary, sans-serif;font-size:9px;fill:#16002F"><tspan x="27">Organize a validation session to present and to validate the implementation</tspan><tspan x="27" dy="11">roadmap for French localization.</tspan></text><g clip-path="url(#clip113)"><text y="300" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#4B00D8;font-weight:700"><tspan x="540">ACTIVITIES</tspan></text></g><rect x="674" y="188" width="236" height="232" rx="26" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/><text y="244.724" text-anchor="middle" style="font-family:primary, sans-serif;font-size:8.2px;fill:#4B00D8;font-weight:700"><tspan x="789">Prerequisites</tspan></text><text x="698" y="262.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">•</text><text x="705.15" y="262.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">Agreement on project scope and timelines</text><text x="698" y="270.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">•</text><text x="705.15" y="270.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">Availability of resources and budget for</text><text x="705.15" y="278.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">implementation</text><text y="354.724" text-anchor="middle" style="font-family:primary, sans-serif;font-size:8.2px;fill:#4B00D8;font-weight:700"><tspan x="789">Cost drivers</tspan></text><text x="698" y="372.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">•</text><text x="705.15" y="372.98" text-anchor="start" style="font-family:primary, sans-serif;font-size:6.5px;fill:#16002F">2 review and validation meetings</text><g clip-path="url(#clip114)"><text y="464" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#4B00D8;font-weight:700"><tspan x="218">DELIVERABLES</tspan></text></g><text x="452" y="461.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">•</text><text x="461.35" y="461.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">High-level implementation plan for localization</text><text x="452" y="472.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">•</text><text x="461.35" y="472.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">Resource plan with high-level implementation cost estimate</text><text x="452" y="483.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">•</text><text x="461.35" y="483.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">Issues, risks and dependencies</text><text x="452" y="494.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">•</text><text x="461.35" y="494.82" text-anchor="start" style="font-family:primary, sans-serif;font-size:8.5px;fill:#4B00D8;font-weight:700">Future state architecture recommendations</text><rect x="36" y="503" width="13" height="13" fill="#4B00FF"/><path d="M43,503 L51,503 L58,510 L51,517 L43,517 Z" fill="#FF5252"/><g clip-path="url(#clip115)"><text y="520.04" text-anchor="start" style="font-family:primary, sans-serif;font-size:22px;fill:#000000;font-weight:700"><tspan x="56">docusig</tspan><tspan x="56" dy="27.5">n.</tspan></text></g><text y="516" text-anchor="middle" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:11px;f