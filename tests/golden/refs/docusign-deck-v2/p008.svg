<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" xml:lang="en-US"><title>France Entity Migration to Oracle Project Kickoff</title><desc>Migrated from FrameForge v1.5 (kind: presentation-deck) to v2.0. Slides became fixed Pages through a shared `deck` master; ellipses converted box-&gt;center/rx/ry; image href-&gt;src; v1 gradients and style keys mapped to v2.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip21"><rect x="60" y="116" width="820" height="52"/></clipPath><clipPath id="clip22"><rect x="51" y="242" width="42" height="78"/></clipPath><clipPath id="clip23"><rect x="132" y="304" width="300" height="44"/></clipPath><clipPath id="clip24"><rect x="582" y="304" width="300" height="44"/></clipPath><clipPath id="clip25"><rect x="132" y="424" width="300" height="44"/></clipPath><clipPath id="clip26"><rect x="582" y="424" width="300" height="44"/></clipPath><clipPath id="clip27"><rect x="56" y="502" width="95" height="20"/></clipPath></defs><rect x="0" y="0" width="960" height="540" fill="#FFFFFF"/><text y="60.34" text-anchor="start" style="font-family:primary, sans-serif;font-size:37px;fill:#16002F;font-weight:700"><tspan x="36">French Localization Review</tspan></text><text y="27" text-anchor="end" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:14px;fill:#D9D9D9"><tspan x="930">GT</tspan></text><rect x="46" y="125" width="427" height="145" rx="4" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="1"/><rect x="46" y="125" width="5" height="145" fill="#7A2FB5"/><text y="150.48" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F;font-weight:700"><tspan x="58">Solution Design</tspan></text><text y="184.02" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#16002F"><tspan x="58">Establish a clear solution design to support French GAAP and statutory</tspan><tspan x="58" dy="15">requirements within Oracle.</tspan></text><rect x="489" y="125" width="427" height="145" rx="4" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="1"/><rect x="489" y="125" width="5" height="145" fill="#29B9C6"/><text y="150.48" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F;font-weight:700"><tspan x="501">Global Alignment</tspan></text><text y="184.02" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#16002F"><tspan x="501">Ensure alignment with Docusign’s global Oracle architecture and US</tspan><tspan x="501" dy="15">GAAP priorities.</tspan></text><rect x="46" y="286" width="427" height="145" rx="4" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="1"/><rect x="46" y="286" width="5" height="145" fill="#4B00FF"/><text y="311.48" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F;font-weight:700"><tspan x="58">Gap Analysis</tspan></text><text y="345.02" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#16002F"><tspan x="58">Define key decisions, gaps, localization needs, and integration</tspan><tspan x="58" dy="15">impacts before implementation.</tspan></text><rect x="489" y="286" width="427" height="145" rx="4" fill="#FFFFFF" stroke="#D9D9D9" stroke-width="1"/><rect x="489" y="286" width="5" height="145" fill="#008BA0"/><text y="311.48" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F;font-weight:700"><tspan x="501">Future Roadmap</tspan></text><text y="345.02" text-anchor="start" style="font-family:primary, sans-serif;font-size:11px;fill:#16002F"><tspan x="501">Create a high-level roadmap, resource plan, and future-state</tspan><tspan x="501" dy="15">architecture for the France rollout.</tspan></text><rect x="34" y="100" width="890" height="386" fill="#FFFFFF"/><rect x="40" y="102" width="880" height="80" rx="8" fill="#E9E0FF"/><g clip-path="url(#clip21)"><text y="131.58" text-anchor="start" style="font-family:primary, sans-serif;font-size:19px;fill:#16002F"><tspan x="60">Grant Thornton will drive the discovery for the French localization assessment to</tspan><tspan x="60" dy="23">ensure both US GAAP and French GAAP requirements are supported within one single,</tspan></text></g><text y="233" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:29px;fill:#16002F"><tspan x="40">Key Objectives</tspan></text><rect x="40" y="260" width="430" height="100" rx="10" fill="#FFFFFF" stroke="#E6D8FF" stroke-width="1"/><rect x="490" y="260" width="430" height="100" rx="10" fill="#FFFFFF" stroke="#E6D8FF" stroke-width="1"/><rect x="40" y="380" width="430" height="100" rx="10" fill="#FFFFFF" stroke="#E6D8FF" stroke-width="1"/><rect x="490" y="380" width="430" height="100" rx="10" fill="#FFFFFF" stroke="#E6D8FF" stroke-width="1"/><g clip-path="url(#clip22)"><text y="264.96" text-anchor="middle" style="font-family:primary, sans-serif;font-size:28px;fill:#4B00D8"><tspan x="72">br</tspan><tspan x="72" dy="29">us</tspan></text></g><text y="292.96" text-anchor="middle" style="font-family:primary, sans-serif;font-size:28px;fill:#4B00D8"><tspan x="524">sy</tspan><tspan x="524" dy="29">nc</tspan></text><text y="410.96" text-anchor="middle" style="font-family:primary, sans-serif;font-size:28px;fill:#4B00D8"><tspan x="77">rul</tspan><tspan x="77" dy="29">e</tspan></text><text y="410.96" text-anchor="middle" style="font-family:primary, sans-serif;font-size:28px;fill:#4B00D8"><tspan x="526">m</tspan><tspan x="526" dy="29">ap</tspan></text><text y="285" text-anchor="start" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:16px;fill:#16002F;font-weight:700"><tspan x="132">Solution Design</tspan></text><g clip-path="url(#clip23)"><text y="315.48" text-anchor="start" style="font-family:primary, sans-serif;font-size:14px;fill:#16002F"><tspan x="132">Establish a clear solution design to</tspan><tspan x="132" dy="17">support French GAAP and statutory</tspan></text