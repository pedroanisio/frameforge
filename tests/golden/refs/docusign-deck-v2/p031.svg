<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" xml:lang="en-US"><title>France Entity Migration to Oracle Project Kickoff</title><desc>Migrated from FrameForge v1.5 (kind: presentation-deck) to v2.0. Slides became fixed Pages through a shared `deck` master; ellipses converted box-&gt;center/rx/ry; image href-&gt;src; v1 gradients and style keys mapped to v2.</desc><rect width="100%" height="100%" fill="white"/><defs><clipPath id="clip127"><rect x="76" y="126" width="28" height="25"/></clipPath><clipPath id="clip128"><rect x="120" y="122" width="260" height="28"/></clipPath><clipPath id="clip129"><rect x="461" y="127" width="28" height="24"/></clipPath><clipPath id="clip130"><rect x="505" y="122" width="330" height="28"/></clipPath><clipPath id="clip131"><rect x="56" y="502" width="95" height="20"/></clipPath></defs><rect x="0" y="0" width="960" height="540" fill="#FFFFFF"/><text y="63.16" text-anchor="start" style="font-family:primary, sans-serif;font-size:38px;fill:#16002F;font-weight:700"><tspan x="36">Executive Summary</tspan></text><text y="27" text-anchor="end" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:12px;fill:#D9D9D9"><tspan x="930">Alex</tspan></text><rect x="50" y="100" width="365" height="340" rx="16" fill="#EEE7FF"/><rect x="435" y="100" width="475" height="340" rx="16" fill="#FFFFFF" stroke="#EEE7FF" stroke-width="2"/><rect x="70" y="120" width="39" height="39" rx="8" fill="#4B00FF"/><g clip-path="url(#clip127)"><text y="138.5" text-anchor="middle" dominant-baseline="central" style="font-family:serif;font-size:25px;fill:#FFFFFF"><tspan x="90">ch</tspan></text></g><g clip-path="url(#clip128)"><text y="144.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:28px;fill:#16002F;font-weight:700"><tspan x="120">Objectives</tspan></text></g><text y="195.58" text-anchor="start" style="font-family:primary, sans-serif;font-size:19px;fill:#16002F"><tspan x="70">Migrate French legal entity</tspan><tspan x="70" dy="24">accounting processes and data</tspan><tspan x="70" dy="24">from Sage to Global Oracle</tspan><tspan x="70" dy="24">Fusion AND Migrate DS France</tspan><tspan x="70" dy="24">active customer contracts to DS</tspan><tspan x="70" dy="24">EMEA</tspan></text><rect x="455" y="120" width="39" height="39" rx="8" fill="#FF5252"/><g clip-path="url(#clip129)"><text y="139" text-anchor="middle" dominant-baseline="central" style="font-family:serif;font-size:24px;fill:#FFFFFF"><tspan x="475">ng</tspan></text></g><g clip-path="url(#clip130)"><text y="144.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:28px;fill:#16002F;font-weight:700"><tspan x="505">Opportunity</tspan></text></g><text y="187.12" text-anchor="start" style="font-family:primary, sans-serif;font-size:16px;fill:#16002F"><tspan x="455">By migrating French legal entity to Global Oracle</tspan><tspan x="455" dy="22">Fusion, we will be able to:</tspan></text><text x="470" y="237.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="237.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Retire local ERP (Sage)</text><text x="470" y="254.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="254.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Globalize AP to improve controls and reduce SOD issues</text><text x="470" y="271.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="271.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Globalize Record to Report (R2R) process with the same</text><text x="484.3" y="288.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">chart of accounts</text><text x="470" y="305.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="305.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Implement standard global SOX controls</text><text x="470" y="322.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="322.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Provide real time access to DS France accounts to</text><text x="484.3" y="339.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Corporate teams</text><text x="470" y="356.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="356.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Automate accounting processes in line with the global</text><text x="484.3" y="373.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">process (including billing and revenue)</text><text x="470" y="390.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">•</text><text x="484.3" y="390.96" text-anchor="start" style="font-family:primary, sans-serif;font-size:13px;fill:#16002F">Reduce manual reporting</text><rect x="36" y="503" width="13" height="13" fill="#4B00FF"/><path d="M43,503 L51,503 L58,510 L51,517 L43,517 Z" fill="#FF5252"/><g clip-path="url(#clip131)"><text y="520.04" text-anchor="start" style="font-family:primary, sans-serif;font-size:22px;fill:#000000;font-weight:700"><tspan x="56">docusig</tspan><tspan x="56" dy="27.5">n.</tspan></text></g><text y="516" text-anchor="end" dominant-baseline="central" style="font-family:primary, sans-serif;font-size:11px;fill:#16002F"><tspan x="930">31</tspan></text></svg>
