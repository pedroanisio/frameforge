<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="72" y="107.96" text-anchor="start" style="font-family:serif;font-size:13px;fill:#000000;font-weight:bold;text-transform:uppercase">Citing References</text><text x="72" y="133.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#000000;font-weight:bold">References in Text</text><text x="72" y="156.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">References need not be cited in the text. When they are, they appear on the line,</text><text x="72" y="170.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">in square brackets, inside the punctuation. Grammatically, they may be treated as</text><text x="72" y="184.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">if they were footnote numbers, e.g.:</text><text x="82.5" y="197.81" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">as shown by Brown [4], [5]; as mentioned earlier [2], [4], [5] [6], [7], [9];</text><text x="72" y="211.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">Smith [4] and Brown and Jones [5]; Wood et al. [7]</text><text y="225.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="82.5" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:bold">NOTE:</tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a"> Use “et al.” when three or more names are given for a reference cited in</tspan></text><text y="238.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">the text.</tspan></text><text x="82.5" y="252.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">or as nouns:</text><text x="82.5" y="266.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">as demonstrated in [3]; according to [4] and [6], [7], [8], [9].</text><text x="72" y="280.17" text-anchor="start" style="font-family:serif;font-size:11px;fill:#000000;font-weight:bold">References Within a Reference</text><text y="304.01" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Check the reference list for </tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">ibid.</tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a"> or </tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">op. cit.</tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a"> These refer to a previous reference</tspan></text><text y="317.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">and should be eliminated from the reference section. In text, repeat the earlier</tspan></text><text y="331.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">reference number and renumber the reference section accordingly. If the </tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">ibid.</tspan></text><text y="344.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">gives a new page number, or other information, use the following forms:</tspan></text><text x="82.5" y="358.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">[3, Th. 1]; [3, Lemma 2]; [3, pp. 5–10]; [3, eq. (2)]; [3, Fig. 1]; [3, Appendix</text><text x="72" y="372.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">I]; [3, Sec. 4.5]; [3, Ch. 2, pp. 5–10]; [3, Algorithm 5].</text><text y="385.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="82.5" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:bold">NOTE:</tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a"> Editing of references may entail careful renumbering of references, as</tspan></text><text y="399.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">well as the citations in text. Always query the author when renumbering references</tspan></text><text y="413.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">and text citations.</tspan></text><text x="72" y="429.16" text-anchor="start" style="font-family:serif;font-size:13px;fill:#000000;font-weight:bold;text-transform:uppercase">Style</text><text x="72" y="453.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Reference numbers are set flush left and form a column of their own, hanging out</text><text x="72" y="467.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">beyond the body of the reference. The reference numbers are on the line, enclosed</text><text x="72" y="481.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">in square brackets. In all references, the given name of the author or editor is</text><text x="72" y="494.71" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">abbreviated to the initial only and precedes the last name. Do not use commas</text><text x="72" y="508.36" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">around Jr., Sr., and III in names. IEEE publications must list names of all</text><text x="72" y="522.01" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">authors, up to six names. If there are more than six names listed, use the primary</text><text x="72" y="535.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">author’s name followed by et al. For non-IEEE publications, et al. may be used if</text><text x="72" y="549.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">names are not provided. All references, except those ending with URLs, will end</text><text x="72" y="562.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">with a period, including those with a DOI. References may not include all</text><text x="72" y="576.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">information; please obtain and include relevant information. Do not combine</text><text x="72" y="590.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">references. There must be only one reference with each number.</text><text x="72" y="604.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#000000;font-weight:bold">Books</text><text x="72" y="628.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold;font-style:italic">Book</text><text x="72" y="651.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Basic Format:</text><text x="88" y="665.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. K. Author, “Title of chapter in the book,” in Title of His Published Book,</text><text x="88" y="679.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">xth ed. City of Publisher, (only U.S. State), Country: Abbrev. of Publisher, year,</text><text x="88" y="692.81" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">ch. x, sec. x, pp. xxx–xxx.</text><text x="82.5" y="714.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Examples:</text><text x="88" y="728.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• B. Klaus and P. Horn, Robot Vision. Cambridge, MA, USA: MIT Press, 1986.</text><text x="88" y="743.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• L. Stein, “Random patterns,” in Computers and You, J. S. Brake, Ed. New York,</text><text x="88" y="757.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">NY, USA: Wiley, 1994, pp. 55–70.</text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:serif;font-size:8.5px;fill:#5a5a5a"><tspan x="72">II. Style</tspan></text><text y="63" text-anchor="end" dominant-baseline="central" style="font-family:serif;font-size:8.5px;fill:#5a5a5a"><tspan x="523">2</tspan></text></svg>
