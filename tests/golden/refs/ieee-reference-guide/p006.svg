<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="88" y="105.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Break “before” a tilde (~), a hyphen, an underscore (_), a question mark, or a</text><text x="88" y="119.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">percent (%) symbol.</text><text x="88" y="134.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Break before or after an equal sign or an ampersand (follow the same rule for</text><text x="88" y="148.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">the “at” (@) symbol).</text><text x="72" y="172.56" text-anchor="start" style="font-family:serif;font-size:13px;fill:#000000;font-weight:bold;text-transform:uppercase">Useful Abbreviations in References</text><text x="72" y="197.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#000000;font-weight:bold">Common Abbreviations of Words in References</text><text x="72" y="221.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Tips for abbreviating periodical titles in references: words ending in “-ology”</text><text x="72" y="235.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">can be ended after the “-ol.”; words ending in “-graphy” after the “-gr.”;</text><text x="72" y="248.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">compound words using the abbreviation of the last word. Some abbreviations apply</text><text x="72" y="262.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">to more than one word (e.g., “Mathematical” and “Mathematics” are both “Math.”).</text><text x="72" y="276.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Common abbreviations of words in ref