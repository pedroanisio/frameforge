<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="56" y="65.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">The guidelines for citing electronic information as offered here are in modified</text><text x="56" y="79.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">illustration of the adaptation by the International Standards Organization (ISO)</text><text x="56" y="92.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">documentation system and the American Psychological Association style. There are various</text><text x="56" y="106.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">options for including a URL in a reference. Follow the order of details and whether a</text><text x="56" y="120.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">period needs to be placed at the end of the reference. The style of the accessed date is</text><text x="56" y="133.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">“Accessed: Abbrev. month and day, year.”</text><text x="56" y="153.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Order of details (whether a period is added at the end):</text><text x="72" y="174.59" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Accessed date. [Online]. Available: URL, DOI (add period at end).</text><text x="72" y="193.39" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Accessed date. [Online]. Available: URL (no period at end)</text><text x="72" y="212.19" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Accessed date, DOI (add period at end).</text><text x="72" y="230.99" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• URL, DOI (add period at end).</text><text x="72" y="249.79" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• (no accessed date), DOI (add period at end unless hyperlink).</text><text x="72" y="268.59" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• URL (no period at end)</text><text x="56" y="292.01" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Guidelines for Breaking URLs:</text><text x="72" y="312.515" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Break after slash or double slash.</text><text x="72" y="331.315" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Break “before” the hyphen that is part of an address, but do not break</text><text x="72" y="348.115" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">after; do not add hyphens or spaces; do not let addresses hyphenate.</text><text x="72" y="366.915" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Break “before” a tilde (~), a hyphen, an underscore (_), a question mark,</text><text x="72" y="383.715" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">or a percent (%) symbol.</text><text x="72" y="402.515" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Break before or after an equal sign or an ampersand (follow the same rule</text><text x="72" y="419.315" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">for the “at” (@) symbol).</text><text x="56" y="460.675" text-anchor="start" style="font-family:serif;font-size:30px;fill:#000000;font-weight:bold">Useful Abbreviations in</text><text x="56" y="502.675" text-anchor="start" style="font-family:serif;font-size:30px;fill:#000000;font-weight:bold">References</text><text x="56" y="551.915" text-anchor="start" style="font-family:serif;font-size:27px;fill:#000000;font-weight:bold">Common Abbreviations of Words in</text><text x="56" y="589.715" text-anchor="start" style="font-family:serif;font-size:27px;fill:#000000;font-weight:bold">References</text><text x="56" y="622.335" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Tips for abbreviating periodical titles in references: words ending in “-ology” can be</text><text x="56" y="635.985" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">ended after the “-ol.”; words ending in “-graphy” after the “-gr.”; compound words using</text><text x="56" y="649.635" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">the abbreviation of the last word. Some abbreviations apply to more than one word (e.g.,</text><text x="56" y="663.285" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">“Mathematical” and “Mathematics” are both “Math.”).</text><text x="56" y="681.555" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#1c1c1c;font-weight:bold">Common abbreviations of words in references (sample).</text><rect x="56" y="689.875" width="120.75" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="700.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#222;font-weight:bold">Word</text><rect x="176.75" y="689.875" width="120.75" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="700.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#222;font-weight:bold">Abbrev.</text><rect x="297.5" y="689.875" width="120.75" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="700.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#222;font-weight:bold">Word</text><rect x="418.25" y="689.875" width="120.75" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="700.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#222;font-weight:bold">Abbrev.</text><rect x="56" y="707.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="718.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Abstracts</text><rect x="176.75" y="707.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="718.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Abstr.</text><rect x="297.5" y="707.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="718.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Analysis</text><rect x="418.25" y="707.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="718.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Anal.</text><rect x="56" y="725.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="736.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Academy</text><rect x="176.75" y="725.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="736.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Acad.</text><rect x="297.5" y="725.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="736.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Annals</text><rect x="418.25" y="725.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="736.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Ann.</text><rect x="56" y="743.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="754.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Accelerator</text><rect x="176.75" y="743.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="754.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Accel.</text><rect x="297.5" y="743.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="754.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Annual</text><rect x="418.25" y="743.875" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="754.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Annu.</text><rect x="56" y="761.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="772.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Acoustics</text><rect x="176.75" y="761.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="772.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Acoust.</text><rect x="297.5" y="761.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="772.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Apparatus</text><rect x="418.25" y="761.875" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="772.235" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">App.</text></svg>
