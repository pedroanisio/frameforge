<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><rect x="72" y="96" width="112.75" height="21.125" fill="none"/><text x="76" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="184.75" y="96" width="112.75" height="21.125" fill="none"/><text x="188.75" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="297.5" y="96" width="112.75" height="21.125" fill="none"/><text x="301.5" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="410.25" y="96" width="112.75" height="21.125" fill="none"/><text x="414.25" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="72" y="117.125" width="112.75" height="21.125" fill="none"/><text x="76" y="130.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">National</text><rect x="184.75" y="117.125" width="112.75" height="21.125" fill="none"/><text x="188.75" y="130.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Nat.</text><rect x="297.5" y="117.125" width="112.75" height="21.125" fill="none"/><rect x="410.25" y="117.125" width="112.75" height="21.125" fill="none"/><text y="157.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="82.5" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Write out all the remaining words, but omit most articles and prepositions like</tspan></text><text y="171.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">“of the” and “on.” That is, Proceedings of the 1996 Robotics and Automation</tspan></text><text y="185.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Conference becomes </tspan><tspan style="font-family:sans-serif;font-size:10.5px;fill:#1c1c1c;font-style:italic">Proc. 1996 Robot. Automat. Conf.</tspan></text><text y="198.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="82.5" style="font-family:sans-serif;font-size:10.5px;fill:#1c1c1c;font-weight:bold">NOTE:</tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a"> All published conference or proceedings papers have page numbers.</tspan></text><text x="72" y="212.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold;font-style:italic">Conference Paper (Paper Presented at a Conference)</text><text x="72" y="235.635" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Basic Format:</text><text x="88" y="248.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. K. Author, “Title of paper,” presented at the Abbreviated Name of Conf., City</text><text x="88" y="262.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">of Conf., Abbrev. State, Country, Month and day(s), year, Paper number.</text><text x="82.5" y="284.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Examples:</text><text x="88" y="297.185" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• D. Caratelli, M. C. Viganó, G. Toso, and P. Angeletti, “Analytical placement</text><text x="88" y="310.835" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">technique for sparse arrays,” presented at the 32nd ESA Antenna Workshop,</text><text x="88" y="324.485" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Noordwijk, The Netherlands, Oct. 5–8, 2010.</text><text x="88" y="340.135" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. G. Kreifeldt, “An analysis of surface-detected EMG as an amplitude-modulated</text><text x="88" y="353.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">noise,” presented at the 1989 Int. Conf. Med. Biol. Eng., Chicago, IL, USA, Nov.</text><text x="88" y="367.435" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">9–12, 1989.</text><text x="88" y="383.085" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• G. W. Juette and L. E. Zeffanella, “Radio noise currents on short sections on</text><text x="88" y="396.735" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">bundle conductors,” presented at the IEEE Summer Power Meeting, Dallas, TX, USA,</text><text x="88" y="410.385" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Jun. 22–27, 1990, Paper 90 SM 690-0 PWRS.</text><text y="431.115" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="81.5" style="font-family:sans-serif;font-size:9.5px;fill:#1c1c1c;font-weight:bold">Scope note.</tspan><tspan style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"> In the source guide, §II continues with subsections C–R — Course, Datasets,</tspan></text><text y="443.465" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Handbooks, Lectures, Legal Citations, Manuals, Online Video, Patent, Periodicals, Reports,</tspan></text><text y="455.815" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Software, Standards, Theses, U.S. Government Documents, Unpublished, and Websites — each</tspan></text><text y="468.165" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">following the identical Basic Format / Examples pattern shown above. They are omitted from</tspan></text><text y="480.515" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">this fixture as mechanical repetition.</tspan></text><text x="72" y="496.085" text-anchor="start" style="font-family:serif;font-size:13px;fill:#000000;font-weight:bold;text-transform:uppercase">Notes About Online References</text><text x="72" y="520.035" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">The guidelines for citing electronic information as offered here are in modified</text><text x="72" y="533.685" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">illustration of the adaptation by the International Standards Organization (ISO)</text><text x="72" y="547.335" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">documentation system and the American Psychological Association style. There are</text><text x="72" y="560.985" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">various options for including a URL in a reference. Follow the order of details</text><text x="72" y="574.635" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">and whether a period needs to be placed at the end of the reference. The style of</text><text x="72" y="588.285" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">the accessed date is “Accessed: Abbrev. month and day, year.”</text><text x="82.5" y="601.935" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Order of details (whether a period is added at the end):</text><text x="88" y="615.585" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Accessed date. [Online]. Available: URL, DOI (add period at end).</text><text x="88" y="631.235" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Accessed date. [Online]. Available: URL (no period at end)</text><text x="88" y="646.885" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Accessed date, DOI (add period at end).</text><text x="88" y="662.535" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• URL, DOI (add period at end).</text><text x="88" y="678.185" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• (no accessed date), DOI (add period at end unless hyperlink).</text><text x="88" y="693.835" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• URL (no period at end)</text><text x="82.5" y="715.485" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Guidelines for Breaking URLs:</text><text x="88" y="728.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Break after slash or double slash.</text><text x="88" y="744.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Break “before” the hyphen that is part of an address, but do not break after; do</text><text x="88" y="757.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">not add hyphens or spaces; do not let addresses hyphenate.</text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:serif;font-size:8.5px;fill:#5a5a5a"><tspan x="72">III. Notes About Online References</tspan></text><text y="63" text-anchor="end" dominant-baseline="central" style="font-family:serif;font-size:8.5px;fill:#5a5a5a"><tspan x="523">4</tspan></text></svg>
