<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><rect x="72" y="96" width="117.26" height="21.125" fill="none"/><text x="76" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="189.26" y="96" width="108.24" height="21.125" fill="none"/><text x="193.26" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="297.5" y="96" width="117.26" height="21.125" fill="none"/><text x="301.5" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="414.76" y="96" width="108.24" height="21.125" fill="none"/><text x="418.76" y="109.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="72" y="117.125" width="117.26" height="21.125" fill="none"/><text x="76" y="130.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">National</text><rect x="189.26" y="117.125" width="108.24" height="21.125" fill="none"/><text x="193.26" y="130.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Nat.</text><rect x="297.5" y="117.125" width="117.26" height="21.125" fill="none"/><rect x="414.76" y="117.125" width="108.24" height="21.125" fill="none"/><text y="157.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="82.5" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Write out all the remaining words, but omit most articles and prepositions like</tspan></text><text y="171.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">“of the” and “on.” That is, Proceedings of the 1996 Robotics and Automation</tspan></text><text y="185.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="72" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Conference becomes </tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-style:italic">Proc. 1996 Robot. Automat. Conf.</tspan></text><text y="198.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a"><tspan x="82.5" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:bold">NOTE:</tspan><tspan style="font-family:serif;font-size:10.5px;fill:#1a1a1a"> All published conference or proceedings papers have page numbers.</tspan></text><text x="72" y="212.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold;font-style:italic">Conference Paper (Paper Presented at a Conference)</text><text x="72" y="236.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Basic Format:</text><text x="88" y="249.81" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. K. Author, “Title of paper,” presented at the Abbreviated Name of Conf., City</text><text x="88" y="263.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">of Conf., Abbrev. State, Country, Month and day(s), year, Paper number.</text><text x="82.5" y="285.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Examples:</text><text x="88" y="298.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• D. Caratelli, M. C. Viganó, G. Toso, and P. Angeletti, “Analytical placement</text><text x="88" y="312.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">technique for sparse arrays,” presented at the 32nd ESA Antenna Workshop,</text><text x="88" y="326.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Noordwijk, The Netherlands, Oct. 5–8, 2010.</text><text x="88" y="341.71" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. G. Kreifeldt, “An analysis of surface-detected EMG as an amplitude-modulated</text><text x="88" y="355.36" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">noise,” presented at the 1989 Int. Conf. Med. Biol. Eng., Chicago, IL, USA, Nov.</text><text x="88" y="369.01" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">9–12, 1989.</text><text x="88" y="384.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• G. W. Juette and L. E. Zeffanella, “Radio noise currents on short sections on</text><text x="88" y="398.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">bundle conductors,” presented at the IEEE Summer Power Meeting, Dallas, TX, USA,</text><text x="88" y="411.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Jun. 22–27, 1990, Paper 90 SM 690-0 PWRS.</text><text y="432.69" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="81.5" style="font-family:serif;font-size:9.5px;fill:#1a1a1a;font-weight:bold">Scope note.</tspan><tspan style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"> In the source guide, §II continues with subsections C–R — Course, Datasets,</tspan></text><text y="445.04" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Handbooks, Lectures, Legal Citations, Manuals, Online Video, Patent, Periodicals, Reports,</tspan></text><text y="457.39" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Software, Standards, Theses, U.S. Government Documents, Unpublished, and Websites — each</tspan></text><text y="469.74" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">following the identical Basic Format / Examples pattern shown above. They are omitted from</tspan></text><text y="482.09" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic"><tspan x="72" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">this fixture as mechanical repetition.</tspan></text><text x="72" y="497.66" text-anchor="start" style="font-family:serif;font-size:13px;fill:#000000;font-weight:bold;text-transform:uppercase">Notes About Online References</text><text x="72" y="522.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">The guidelines for citing electronic information as offered here are in modified</text><text x="72" y="535.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">illustration of the adaptation by the International Standards Organization (ISO)</text><text x="72" y="549.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">documentation system and the American Psychological Association style. There are</text><text x="72" y="563.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">various options for including a URL in a reference. Follow the order of details</text><text x="72" y="576.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">and whether a period needs to be placed at the end of the reference. The style of</text><text x="72" y="590.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">the accessed date is “Accessed: Abbrev. month and day, year.”</text><text x="82.5" y="604.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Order of details (whether a period is added at the end):</text><text x="88" y="617.81" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Accessed date. [Online]. Available: URL, DOI (add period at end).</text><text x="88" y="633.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Accessed date. [Online]. Available: URL (no period at end)</text><text x="88" y="649.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Accessed date, DOI (add period at end).</text><text x="88" y="664.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• URL, DOI (add period at end).</text><text x="88" y="680.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• (no accessed date), DOI (add period at end unless hyperlink).</text><text x="88" y="696.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• URL (no period at end)</text><text x="82.5" y="717.71" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Guidelines for Breaking URLs:</text><text x="88" y="731.36" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Break after slash or double slash.</text><text x="88" y="747.01" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• Break “before” the hyphen that is part of an address, but do not break after; do</text><text x="88" y="760.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">not add hyphens or spaces; do not let addresses hyphenate.</text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:serif;font-size:8.5px;fill:#5a5a5a"><tspan x="72">III. Notes About Online References</tspan></text><text y="63" text-anchor="end" dominant-baseline="central" style="font-family:serif;font-size:8.5px;fill:#5a5a5a"><tspan x="523">4</tspan></text></svg>
