<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="88" y="105.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• R. L. Myer, “Parametric oscillators and nonlinear materials,” in Nonlinear</text><text x="88" y="119.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Optics, vol. 4, P. G. Harper and B. S. Wherret, Eds. San Francisco, CA, USA:</text><text x="88" y="132.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Academic, 1977, pp. 47–160.</text><text x="88" y="148.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• M. Abramowitz and I. A. Stegun, Eds., Handbook of Mathematical Functions</text><text x="88" y="162.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">(Applied Mathematics Series 55). Washington, DC, USA: NBS, 1964, pp. 32–33.</text><text x="88" y="177.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• E. F. Moore, “Gedanken-experiments on sequential machines,” in Automata Studies</text><text x="88" y="191.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">(Ann. of Math. Studies, no. 1), C. E. Shannon and J. McCarthy, Eds. Princeton, NJ,</text><text x="88" y="205.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">USA: Princeton Univ. Press, 1965, pp. 129–153.</text><text x="72" y="226.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold;font-style:italic">Books, Monographs (Online)</text><text x="72" y="250.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Basic Format:</text><text x="88" y="264.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. K. Author, “Title of chapter in the book,” in Title of Published Book, xth</text><text x="88" y="277.81" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">ed. City of Publisher, State, Country: Abbrev. of Publisher, year, ch. x, sec. x,</text><text x="88" y="291.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">pp. xxx–xxx. [Online]. Available: http://www.web.com</text><text x="82.5" y="313.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Examples:</text><text x="88" y="326.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• G. O. Young, “Synthetic structure of industrial plastics,” in Plastics, vol. 3,</text><text x="88" y="340.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Polymers of Hexadromicon, J. Peters, Ed., 2nd ed. New York, NY, USA: McGraw-Hill,</text><text x="88" y="354.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">1964, pp. 15–64. [Online]. Available: http://www.bookref.com.</text><text x="88" y="369.71" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• The Terahertz Wave eBook. ZOmega Terahertz Corp., 2014. [Online]. Available:</text><text x="88" y="383.36" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">http://dl.z-thz.com/eBook/zomega_ebook_pdf_1206_sr.pdf. Accessed: May 19, 2014.</text><text x="88" y="399.01" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• P. B. Kurland and R. Lerner, Eds., The Founders’ Constitution. Chicago, IL, USA:</text><text x="88" y="412.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Univ. of Chicago Press, 1987. Accessed: Feb. 28, 2010. [Online]. Available:</text><text x="88" y="426.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">http://press-pubs.uchicago.edu/founders/</text><text x="72" y="448.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#000000;font-weight:bold">Conferences and Conference Proceedings</text><text x="72" y="472.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">The general form for citing conference proceedings is to list the author and title</text><text x="72" y="485.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">of the paper, followed by the name of the conference using the following</text><text x="72" y="499.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">abbreviations as well as those found in the “Common Abbreviations of Words in</text><text x="72" y="513.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">References” list.</text><text x="72" y="526.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Conference-word abbreviations.</text><rect x="72" y="534.85" width="117.26" height="21.125" fill="none"/><text x="76" y="548.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="189.26" y="534.85" width="108.24" height="21.125" fill="none"/><text x="193.26" y="548.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="297.5" y="534.85" width="117.26" height="21.125" fill="none"/><text x="301.5" y="548.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="414.76" y="534.85" width="108.24" height="21.125" fill="none"/><text x="418.76" y="548.51" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="72" y="555.975" width="117.26" height="21.125" fill="none"/><text x="76" y="569.635" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Annals</text><rect x="189.26" y="555.975" width="108.24" height="21.125" fill="none"/><text x="193.2