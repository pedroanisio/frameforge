fa" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="226.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Second</text><rect x="418.25" y="216.6" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="226.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">2nd</text><rect x="56" y="234.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="244.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">International</text><rect x="176.75" y="234.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="244.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Int.</text><rect x="297.5" y="234.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="244.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Third</text><rect x="418.25" y="234.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="244.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">3rd</text><rect x="56" y="252.6" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="262.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Meeting</text><rect x="176.75" y="252.6" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="262.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Meeting</text><rect x="297.5" y="252.6" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="300.5" y="262.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Fourth/nth…</text><rect x="418.25" y="252.6" width="120.75" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="421.25" y="262.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">4th/nth…</text><rect x="56" y="270.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="280.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">National</text><rect x="176.75" y="270.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="179.75" y="280.96" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Nat.</text><rect x="297.5" y="270.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="418.25" y="270.6" width="120.75" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="56" y="308.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Write out all the remaining words, but omit most articles and prepositions like “of the”</text><text x="56" y="321.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">and “on.” That is, Proceedings of the 1996 Robotics and Automation Conference becomes</text><text x="56" y="335.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Proc. 1996 Robot. Automat. Conf.</text><text x="56" y="355.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">NOTE: All published conference or proceedings papers have page numbers.</text><text x="56" y="387.28" text-anchor="start" style="font-family:serif;font-size:24px;fill:#000000;font-weight:bold">Conference Paper (Paper Presented at a</text><text x="56" y="420.88" text-anchor="start" style="font-family:serif;font-size:24px;fill:#000000;font-weight:bold">Conference)</text><text x="56" y="452.06" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Basic Format:</text><text x="72" y="472.565" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• J. K. Author, “Title of paper,” presented at the Abbreviated Name of Conf.,</text><text x="72" y="489.365" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">City of Conf., Abbrev. State, Country, Month and day(s), year, Paper number.</text><text x="56" y="512.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Examples:</text><text x="72" y="533.29" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• D. Caratelli, M. C. Viganó, G. Toso, and P. Angeletti, “Analytical</text><text x="72" y="550.09" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">placement technique for sparse arrays,” presented at the 32nd ESA Antenna</text><text x="72" y="566.89" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">Workshop, Noordwijk, The Netherlands, Oct. 5–8, 2010.</text><text x="72" y="585.69" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• J. G. Kreifeldt, “An analysis of surface-detected EMG as an</text><text x="72" y="602.49" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">amplitude-modulated noise,” presented at the 1989 Int. Conf. Med. Biol. Eng.,</text><text x="72" y="619.29" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">Chicago, IL, USA, Nov. 9–12, 1989.</text><text x="72" y="638.09" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• G. W. Juette and L. E. Zeffanella, “Radio noise currents on short sections</text><text x="72" y="654.89" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">on bundle conductors,” presented at the IEEE Summer Power Meeting, Dallas,</text><text x="72" y="671.69" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">TX, USA, Jun. 22–27, 1990, Paper 90 SM 690-0 PWRS.</text><text x="56" y="694.19" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Scope note. In the source guide, §II continues with subsections C–R — Course, Datasets,</text><text x="56" y="706.54" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Handbooks, Lectures, Legal Citations, Manuals, Online Video, Patent, Periodicals, Reports,</text><text x="56" y="718.89" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">Software, Standards, Theses, U.S. Government Documents, Unpublished, and Websites — each</text><text x="56" y="731.24" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">following the identical Basic Format / Examples pattern shown above. They are omitted from this</text><text x="56" y="743.59" text-anchor="start" style="font-family:serif;font-size:9.5px;fill:#5a5a5a;font-style:italic">fixture as mechanical repetition.</text><text x="56" y="780.8" text-anchor="start" style="font-family:serif;font-size:30px;fill:#000000;font-weight:bold">Notes About Online References</text></svg>
