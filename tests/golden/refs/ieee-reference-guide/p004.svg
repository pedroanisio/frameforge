<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="88" y="105.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Optics, vol. 4, P. G. Harper and B. S. Wherret, Eds. San Francisco, CA, USA:</text><text x="88" y="119.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Academic, 1977, pp. 47–160.</text><text x="88" y="134.96" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• M. Abramowitz and I. A. Stegun, Eds., Handbook of Mathematical Functions</text><text x="88" y="148.61" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">(Applied Mathematics Series 55). Washington, DC, USA: NBS, 1964, pp. 32–33.</text><text x="88" y="164.26" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• E. F. Moore, “Gedanken-experiments on sequential machines,” in Automata Studies</text><text x="88" y="177.91" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">(Ann. of Math. Studies, no. 1), C. E. Shannon and J. McCarthy, Eds. Princeton, NJ,</text><text x="88" y="191.56" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">USA: Princeton Univ. Press, 1965, pp. 129–153.</text><text x="72" y="213.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold;font-style:italic">Books, Monographs (Online)</text><text x="72" y="236.335" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Basic Format:</text><text x="88" y="249.46" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• J. K. Author, “Title of chapter in the book,” in Title of Published Book, xth</text><text x="88" y="263.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">ed. City of Publisher, State, Country: Abbrev. of Publisher, year, ch. x, sec. x,</text><text x="88" y="276.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">pp. xxx–xxx. [Online]. Available: http://www.web.com</text><text x="82.5" y="298.41" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#000000;font-weight:bold">Examples:</text><text x="88" y="311.535" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• G. O. Young, “Synthetic structure of industrial plastics,” in Plastics, vol. 3,</text><text x="88" y="325.185" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Polymers of Hexadromicon, J. Peters, Ed., 2nd ed. New York, NY, USA: McGraw-Hill,</text><text x="88" y="338.835" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">1964, pp. 15–64. [Online]. Available: http://www.bookref.com.</text><text x="88" y="354.485" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• The Terahertz Wave eBook. ZOmega Terahertz Corp., 2014. [Online]. Available:</text><text x="88" y="368.135" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">http://dl.z-thz.com/eBook/zomega_ebook_pdf_1206_sr.pdf. Accessed: May 19, 2014.</text><text x="88" y="383.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">• P. B. Kurland and R. Lerner, Eds., The Founders’ Constitution. Chicago, IL, USA:</text><text x="88" y="397.435" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Univ. of Chicago Press, 1987. Accessed: Feb. 28, 2010. [Online]. Available:</text><text x="88" y="411.085" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">http://press-pubs.uchicago.edu/founders/</text><text x="72" y="433.195" text-anchor="start" style="font-family:serif;font-size:11px;fill:#000000;font-weight:bold">Conferences and Conference Proceedings</text><text x="72" y="456.485" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">The general form for citing conference proceedings is to list the author and title</text><text x="72" y="470.135" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">of the paper, followed by the name of the conference using the following</text><text x="72" y="483.785" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">abbreviations as well as those found in the “Common Abbreviations of Words in</text><text x="72" y="497.435" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">References” list.</text><text x="72" y="511.085" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Conference-word abbreviations.</text><rect x="72" y="519.075" width="112.75" height="21.125" fill="none"/><text x="76" y="532.735" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="184.75" y="519.075" width="112.75" height="21.125" fill="none"/><text x="188.75" y="532.735" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="297.5" y="519.075" width="112.75" height="21.125" fill="none"/><text x="301.5" y="532.735" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Word</text><rect x="410.25" y="519.075" width="112.75" height="21.125" fill="none"/><text x="414.25" y="532.735" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a;font-weight:700">Abbrev.</text><rect x="72" y="540.2" width="112.75" height="21.125" fill="none"/><text x="76" y="553.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Annals</text><rect x="184.75" y="540.2" width="112.75" height="21.125" fill="none"/><text x="188.75" y="553.86" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#1a1a1a">Ann.</text><rect x="297.5" y="540.2" width="112.75" height="21.125" fill="n