<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="75" y="123.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14161f;font-weight:bold;letter-spacing:-0.3pt">Neutron Stars: Matter at the</text><text x="75" y="156.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14161f;font-weight:bold;letter-spacing:-0.3pt">Edge of Collapse</text><text x="75" y="184.42" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">How the violent death of a massive star can leave behind an</text><text x="75" y="203.32" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">object the size of a city and as dense as the nucleus of an</text><text x="75" y="222.22" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">atom.</text><text x="75" y="249.42" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">The Death That Leaves a Heart Behind</text><text x="75" y="274.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">A star many times heavier than the Sun does not end its life gently. For mil-</text><text x="75" y="290.52" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">lions of years it fuses hydrogen into helium, helium into carbon, and onward</text><text x="75" y="307.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">through ever-heavier elements, wrapping itself in concentric shells like the</text><text x="75" y="323.52" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">layers of an onion. But this chain of fusion halts abruptly at iron. Forging</text><text x="75" y="340.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">elements heavier than iron consumes energy instead of releasing it, so the mo-</text><text x="75" y="356.52" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">ment the core becomes iron, the furnace that has held the star against its own</text><text x="75" y="373.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">gravity simply goes out.</text><text x="86" y="389.52" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">What follows is among the most violent events in the cosmos. Stripped of</text><text x="75" y="406.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">pressure support, the iron core — already heavier than the Sun yet smaller</text><text x="75" y="422.52" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">than the Earth — collapses in a fraction of a second. Protons and electrons</text><text x="75" y="439.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">are crushed together into neutrons, unleashing a torrent of ghostly particles</text><text x="75" y="455.52" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">called neutrinos. The infalling envelope slams into the suddenly rigid neutron</text><text x="75" y="472.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">core, rebounds, and the star detonates as a core-collapse supernova that can</text><text x="75" y="488.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">briefly outshine its entire host galaxy.</text><text x="86" y="505.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The whole sequence unfolds with breathtaking speed:</text><text x="91" y="521.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">1. A star born with more than roughly eight times the Sun&#x27;s mass burns its</text><text x="91" y="538.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">way up to an inert iron core.</text><text x="91" y="556.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">2. Iron cannot yield energy through fusion, so pressure support at the centre</text><text x="91" y="573.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">collapses.</text><text x="91" y="591.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">3. In well under a second the core implodes, fusing electrons and protons</text><text x="91" y="608.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">into neutrons.</text><text x="91" y="626.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">4. Neutron degeneracy pressure, reinforced by the strong nuclear force,</text><text x="91" y="643.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">abruptly arrests the fall.</text><text x="91" y="661.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">5. The rebound and a flood of neutrinos blow the outer layers off in a</text><text x="91" y="678.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">supernova.</text><text x="91" y="696.52" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">6. The exposed core survives as a neutron star — or, if it is heavy enough,</text><text x="91" y="713.02" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">as a black hole.</text><text x="86" y="737.52" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">What remains at the centre is a neutron star: a sphere of almost pure neu-</text><text x="75" y="754.02" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">trons holding one to two times the mass of the Sun inside a ball little more</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">1</tspan></text></svg>
