<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="75" y="123.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14161f;font-weight:bold">Neutron Stars: Matter at the</text><text x="75" y="165.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14161f;font-weight:bold">Edge of Collapse</text><text x="75" y="202.42" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">How the violent death of a massive star can leave behind an</text><text x="75" y="221.32" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">object the size of a city and as dense as the nucleus of an</text><text x="75" y="240.22" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">atom.</text><text x="75" y="277.54" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">The Death That Leaves a Heart</text><text x="75" y="315.34" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">Behind</text><text x="75" y="348.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">A star many times heavier than the Sun does not end its life gently. For mil-</text><text x="75" y="364.92" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">lions of years it fuses hydrogen into helium, helium into carbon, and onward</text><text x="75" y="381.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">through ever-heavier elements, wrapping itself in concentric shells like the</text><text x="75" y="397.92" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">layers of an onion. But this chain of fusion halts abruptly at iron. Forging</text><text x="75" y="414.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">elements heavier than iron consumes energy instead of releasing it, so the mo-</text><text x="75" y="430.92" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">ment the core becomes iron, the furnace that has held the star against its own</text><text x="75" y="447.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">gravity simply goes out.</text><text x="86" y="463.92" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">What follows is among the most violent events in the cosmos. Stripped of</text><text x="75" y="480.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">pressure support, the iron core — already heavier than the Sun yet smaller</text><text x="75" y="496.92" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">than the Earth — collapses in a fraction of a second. Protons and electrons</text><text x="75" y="513.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">are crushed together into neutrons, unleashing a torrent of ghostly particles</text><text x="75" y="529.92" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">called neutrinos. The infalling envelope slams into the suddenly rigid neutron</text><text x="75" y="546.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">core, rebounds, and the star detonates as a core-collapse supernova that can</text><text x="75" y="562.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">briefly outshine its entire host galaxy.</text><text x="86" y="579.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The whole sequence unfolds with breathtaking speed:</text><text x="91" y="596.84" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">1. A star born with more than roughly eight times the Sun&#x27;s mass burns</text><text x="91" y="613.64" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">its way up to an inert iron core.</text><text x="91" y="632.44" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">2. Iron cannot yield energy through fusion, so pressure support at the</text><text x="91" y="649.24" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">centre collapses.</text><text x="91" y="668.04" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">3. In well under a second the core implodes, fusing electrons and</text><text x="91" y="684.84" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">protons into neutrons.</text><text x="91" y="703.64" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">4. Neutron degeneracy pressure, reinforced by the strong nuclear force,</text><text x="91" y="720.44" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">abruptly arrests the fall.</text><text x="91" y="739.24" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">5. The rebound and a flood of neutrinos blow the outer layers off in a</text><text x="91" y="756.04" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">supernova.</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">1</tspan></text></svg>
