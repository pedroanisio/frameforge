<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="75" y="123.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14161f;font-weight:bold;letter-spacing:-0.3pt">Neutron Stars: Matter at the</text><text x="75" y="156.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14161f;font-weight:bold;letter-spacing:-0.3pt">Edge of Collapse</text><text x="75" y="184.42" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">How the violent death of a massive star can leave behind an ob-</text><text x="75" y="203.32" text-anchor="start" style="font-family:serif;font-size:13.5px;fill:#6b7280;font-style:italic">ject the size of a city and as dense as the nucleus of an atom.</text><text x="75" y="230.52" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">The Death That Leaves a Heart Behind</text><text x="75" y="255.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">A star many times heavier than the Sun does not end its life gently. For mil-</text><text x="75" y="271.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">lions of years it fuses hydrogen into helium, helium into carbon, and onward</text><text x="75" y="288.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">through ever-heavier elements, wrapping itself in concentric shells like the</text><text x="75" y="304.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">layers of an onion. But this chain of fusion halts abruptly at iron. Forging</text><text x="75" y="321.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">elements heavier than iron consumes energy instead of releasing it, so the mo-</text><text x="75" y="337.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">ment the core becomes iron, the furnace that has held the star against its own</text><text x="75" y="354.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">gravity simply goes out.</text><text y="370.62" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="86" style="font-family:serif;font-size:11px;fill:#14161f">What follows is among the most violent events in the cosmos. Stripped of</tspan></text><text y="387.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">pressure support, the iron core — already heavier than the Sun yet smaller</tspan></text><text y="403.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">than the Earth — collapses in a fraction of a second. Protons and electrons</tspan></text><text y="420.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">are crushed together into neutrons, unleashing a torrent of ghostly particles</tspan></text><text y="436.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">called </tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f;font-style:italic">neutrinos</tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f">. The infalling envelope slams into the suddenly rigid neutron</tspan></text><text y="453.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">core, rebounds, and the star detonates as a </tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f;font-weight:bold">core-collapse supernova</tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f"> that can</tspan></text><text y="469.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">briefly outshine its entire host galaxy.</tspan></text><text x="86" y="486.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The whole sequence unfolds with breathtaking speed:</text><text x="91" y="502.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">1. A star born with more than roughly eight times the Sun&#x27;s mass burns its</text><text x="91" y="519.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">way up to an inert iron core.</text><text x="91" y="537.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">2. Iron cannot yield energy through fusion, so pressure support at the centre</text><text x="91" y="554.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">collapses.</text><text x="91" y="572.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">3. In well under a second the core implodes, fusing electrons and protons</text><text x="91" y="589.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">into neutrons.</text><text x="91" y="607.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">4. Neutron degeneracy pressure, reinforced by the strong nuclear force,</text><text x="91" y="624.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">abruptly arrests the fall.</text><text x="91" y="642.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">5. The rebound and a flood of neutrinos blow the outer layers off in a</text><text x="91" y="659.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">supernova.</text><text x="91" y="677.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">6. The exposed core survives as a neutron star — or, if it is heavy enough,</text><text x="91" y="694.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">as a black hole.</text><text x="86" y="718.62" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">What remains at the centre is a neutron star: a sphere of almost pure neu-</text><text x="75" y="735.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">trons holding one to two times the mass of the Sun inside a ball little more</text><text x="75" y="751.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">than twenty kilometres across.</text><text y="60" text-anchor="start" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">1</tspan></text></svg>
