<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="75" y="106.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">than twenty kilometres across.</text><text x="75" y="135.22" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">A Spoonful Weighing a Billion Tonnes</text><text x="75" y="159.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Density is the quality that sets a neutron star apart from anything in ordinary</text><text x="75" y="176.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">experience. Compressing the mass of the Sun into the volume of a small city</text><text x="75" y="192.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">pushes matter to roughly the density of an atomic nucleus — several hundred</text><text x="75" y="209.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">trillion times denser than water. A single teaspoon of neutron-star material</text><text x="75" y="225.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">would weigh about as much as a mountain range.</text><text x="86" y="242.32" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Yet a neutron star is far from a featureless blob. Gravity and nuclear forces</text><text x="75" y="258.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">sort it into distinct layers. A wafer-thin atmosphere of hot plasma sits atop a</text><text x="75" y="275.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">solid crust of ions locked in a crystalline lattice. Deeper down, nuclei grow</text><text x="75" y="291.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">so neutron-rich that neutrons begin to drip out of them, and the matter con-</text><text x="75" y="308.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">torts into exotic shapes nicknamed ‘nuclear pasta.’ Below the crust lies a vast</text><text x="75" y="324.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">core of superfluid neutrons, and at the very centre — at densities beyond any-</text><text x="75" y="341.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">thing physics has pinned down — matter may dissolve into free quarks or other</text><text x="75" y="357.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">states no laboratory has produced.</text><g transform="translate(75 364.2) scale(0.855769231)"><g><ellipse cx="180" cy="180" rx="150" ry="150" fill="#dce6f2" stroke="#3a5a8c" stroke-width="1.4"/><ellipse cx="180" cy="180" rx="116" ry="116" fill="#aebfd8"/><ellipse cx="180" cy="180" rx="78" ry="78" fill="#6f86b0"/><ellipse cx="180" cy="180" rx="34" ry="34" fill="#2f4d7e"/><line x1="305" y1="112" x2="354" y2="108" stroke="#6b7280" stroke-width="0.7"/><line x1="288" y1="150" x2="354" y2="156" stroke="#6b7280" stroke-width="0.7"/><line x1="248" y1="180" x2="354" y2="204" stroke="#6b7280" stroke-width="0.7"/><line x1="210" y1="196" x2="354" y2="252" stroke="#6b7280" stroke-width="0.7"/><text y="103.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Crust — ions in a crystalline</tspan><tspan x="356" dy="10.8">lattice</tspan></text><text y="158" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Outer core — superfluid neutrons</tspan></text><text y="199.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Inner core — composition</tspan><tspan x="356" dy="10.8">uncertain</tspan></text><text y="247.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Centre — the densest matter of</tspan><tspan x="356" dy="10.8">all</tspan></text></g></g><text x="297.5" y="686.557" text-anchor="middle" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic">Schematic interior of a neutron star, from crust to core (not to scale).</text><text x="86" y="711.647" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These conditions translate into figures with no terrestrial parallel:</text><rect x="75" y="718.027" width="148.333" height="21.75" fill="none"/><rect x="223.333" y="718.027" width="148.333" height="21.75" fill="none"/><rect x="371.667" y="718.027" width="148.333" height="21.75" fill="none"/><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">2</tspan></text></svg>
