<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="56" y="66.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">kilometres across.</text><text x="56" y="111.34" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">A Spoonful Weighing a Billion</text><text x="56" y="149.14" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">Tonnes</text><text x="56" y="182.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Density is the quality that sets a neutron star apart from anything in ordinary</text><text x="56" y="198.72" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">experience. Compressing the mass of the Sun into the volume of a small city pushes</text><text x="56" y="215.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">matter to roughly the density of an atomic nucleus — several hundred trillion times</text><text x="56" y="231.72" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">denser than water. A single teaspoon of neutron-star material would weigh about as</text><text x="56" y="248.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">much as a mountain range.</text><text x="56" y="270.72" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Yet a neutron star is far from a featureless blob. Gravity and nuclear forces sort</text><text x="56" y="287.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">it into distinct layers. A wafer-thin atmosphere of hot plasma sits atop a solid</text><text x="56" y="303.72" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">crust of ions locked in a crystalline lattice. Deeper down, nuclei grow so</text><text x="56" y="320.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">neutron-rich that neutrons begin to drip out of them, and the matter contorts into</text><text x="56" y="336.72" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">exotic shapes nicknamed ‘nuclear pasta.’ Below the crust lies a vast core of</text><text x="56" y="353.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">superfluid neutrons, and at the very centre — at densities beyond anything physics</text><text x="56" y="369.72" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">has pinned down — matter may dissolve into free quarks or other states no laboratory</text><text x="56" y="386.22" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">has produced.</text><g transform="translate(56 398.6) scale(0.929)"><g><ellipse cx="180" cy="180" rx="150" ry="150" fill="#dce6f2" stroke="#3a5a8c" stroke-width="1.4"/><ellipse cx="180" cy="180" rx="116" ry="116" fill="#aebfd8"/><ellipse cx="180" cy="180" rx="78" ry="78" fill="#6f86b0"/><ellipse cx="180" cy="180" rx="34" ry="34" fill="#2f4d7e"/><line x1="305" y1="112" x2="354" y2="108" stroke="#6b7280" stroke-width="0.7"/><line x1="288" y1="150" x2="354" y2="156" stroke="#6b7280" stroke-width="0.7"/><line x1="248" y1="180" x2="354" y2="204" stroke="#6b7280" stroke-width="0.7"/><line x1="210" y1="196" x2="354" y2="252" stroke="#6b7280" stroke-width="0.7"/><text y="103.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Crust — ions in a crystalline</tspan><tspan x="356" dy="10.8">lattice</tspan></text><text y="151.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Outer core — superfluid neutrons</tspan></text><text y="199.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Inner core — composition</tspan><tspan x="356" dy="10.8">uncertain</tspan></text><text y="247.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Centre — the densest matter of</tspan><tspan x="356" dy="10.8">all</tspan></text></g></g><text x="297.5" y="748.185" text-anchor="middle" style="font-family:serif;font-size:10px;fill:#666;font-style:italic">Schematic interior of a neutron star, from crust to core (not to scale).</text><text x="56" y="775.105" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These conditions translate into figures with no terrestrial parallel:</text></svg>
