<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="75" y="105.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">heaviest elements are made. The wreckage of colliding neutron stars is now</text><text x="75" y="120.885" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">thought to be a principal forge of gold, platinum, and other heavy metals. Much</text><text x="75" y="136.11" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">of the gold in any wedding ring was very likely born in such a cataclysm.</text><text x="86" y="155.795" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Individual neutron stars push the science further still. The discovery of</text><text x="75" y="172.295" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">pulsars weighing about two solar masses sets hard limits on how squeezable</text><text x="75" y="188.795" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">ultra-dense matter can be, while X-ray observatories measuring the size of a</text><text x="75" y="205.295" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">neutron star to within a kilometre are steadily narrowing down the elusive equa-</text><text x="75" y="221.795" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">tion of state.</text><text x="75" y="261.015" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">The Edge of Collapse</text><text x="75" y="294.095" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">There is, however, a ceiling. Above a critical mass — the Tolman–Oppenheimer–</text><text x="75" y="310.595" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Volkoff limit, somewhere near two and a quarter times the mass of the Sun — not</text><text x="75" y="327.095" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">even the defiance of densely packed neutrons can withstand gravity. Cross that</text><text x="75" y="343.595" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">threshold and collapse resumes without end, and the neutron star vanishes be-</text><text x="75" y="360.095" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">hind the horizon of a black hole.</text><text x="86" y="376.595" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">A neutron star therefore occupies a razor&#x27;s edge in the story of matter: the</text><text x="75" y="393.095" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">densest object that can still hold itself up, poised one step short of oblivion.</text><text x="75" y="409.595" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">In its impossible interior, in its clockwork beams, and in the golden debris</text><text x="75" y="426.095" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">of its collisions, it remains one of the most extreme and instructive objects</text><text x="75" y="442.595" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">the universe has to offer.</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">5</tspan></text></svg>
