<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><rect x="75" y="96" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="106.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Radius</text><rect x="223.333" y="96" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="106.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 10 – 13 km</text><rect x="371.667" y="96" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="106.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The size of a city</text><rect x="75" y="114" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="124.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Mean density</text><rect x="223.333" y="114" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="124.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 4 × 10¹⁷ kg/m³</text><rect x="371.667" y="114" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="124.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The density of an atomic nucleus</text><rect x="75" y="132" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="142.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Surface gravity</text><rect x="223.333" y="132" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="142.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 2 × 10¹¹ g</text><rect x="371.667" y="132" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="142.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Two hundred billion times Earth&#x27;s pull</text><rect x="75" y="150" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="160.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Fastest spin</text><rect x="223.333" y="150" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="160.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">up to ≈ 700 turns per second</text><rect x="371.667" y="150" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="160.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Faster than a kitchen blender</text><rect x="75" y="168" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="178.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Magnetic field</text><rect x="223.333" y="168" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="178.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">10⁸ – 10¹⁵ gauss</text><rect x="371.667" y="168" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="178.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The strongest fields known in nature</text><text x="86" y="206.12" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">The precise way matter behaves at these densities — its equation of state —</text><text x="75" y="222.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">is one of the great unsolved problems of modern physics. Because such condi-</text><text x="75" y="239.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">tions cannot be reproduced on Earth, neutron stars themselves serve as the only</text><text x="75" y="255.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">available laboratory.</text><text x="75" y="284.72" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">Cosmic Lighthouses</text><text x="75" y="309.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Collapse does more than compress a star; it spins it up. Just as a figure skater</text><text x="75" y="325.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">turns faster when she pulls in her arms, a stellar core that shrinks from the</text><text x="75" y="342.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">breadth of the Sun to a few kilometres must conserve its angular momentum, and</text><text x="75" y="358.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">so it whirls — some young neutron stars rotating hundreds of times every second.</text><text x="86" y="375.32" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">The collapse concentrates the star&#x27;s magnetic field as fiercely as its spin,</text><text x="75" y="391.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">amplifying it to trillions of times the strength of any magnet built by human</text><text x="75" y="408.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">hands. A spinning magnet radiates, and a neutron star beams energy from its mag-</text><text x="75" y="424.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">netic poles in two narrow cones. If one of those beams happens to sweep across</text><text x="75" y="441.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">the Earth, we see a pulse with every rotation — as regular as a ticking clock.</text><text x="85.5" y="457.36" text-anchor="start" style="font-family:sans-serif;font-size:10.5px;fill:#3a5a8c;font-weight:bold;letter-spacing:0.5pt;text-transform:uppercase">Little Green Men, 1967</text><text x="85.5" y="470.485" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">When Jocelyn Bell Burnell first recorded a string of impossibly regular pulses</text><text x="75" y="485.71" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">on her radio telescope, the signal was so precise that the source was</text><text x="75" y="500.935" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">half-jokingly labelled ‘LGM-1’, for Little Green Men. The pulses turned out to be</text><text x="75" y="516.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">natural: the lighthouse beam of a rotating neutron star, the first pulsar ever</text><text x="75" y="531.385" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">found.</text><text x="86" y="551.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These beaming neutron stars, or pulsars, come in a remarkable variety:</text><text x="91" y="568.49" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Radio pulsars sweep lighthouse beams of radio waves across space with</text><text x="91" y="585.29" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">metronomic regularity, and serve as some of the most precise clocks in</text><text x="91" y="602.09" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">the universe.</text><text x="91" y="620.89" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Millisecond pulsars have been ‘recycled’ — spun up to hundreds of</text><text x="91" y="637.69" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">rotations per second by matter stripped from a companion star.</text><text x="91" y="656.49" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Magnetars carry the most intense magnetic fields known, occasionally</text><text x="91" y="673.29" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">convulsing in titanic bursts of X-rays and gamma rays.</text><text x="91" y="692.09" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• X-ray binaries blaze in X-rays as gas torn from an orbiting star</text><text x="91" y="708.89" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">spirals down and crashes onto the neutron star&#x27;s surface.</text><text x="75" y="745.37" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">Laboratories at the Edge of Physics</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">3</tspan></text></svg>
