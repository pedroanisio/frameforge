<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><rect x="56" y="56" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="56" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="56" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="56" y="74" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="84.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Mass</text><rect x="217" y="74" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="84.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 1.4 – 2.1 M☉</text><rect x="378" y="74" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="84.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Up to about twice the Sun</text><rect x="56" y="92" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="102.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Radius</text><rect x="217" y="92" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="102.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 10 – 13 km</text><rect x="378" y="92" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="102.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The size of a city</text><rect x="56" y="110" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="120.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Mean density</text><rect x="217" y="110" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="120.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 4 × 10¹⁷ kg/m³</text><rect x="378" y="110" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="120.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The density of an atomic nucleus</text><rect x="56" y="128" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="138.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Surface gravity</text><rect x="217" y="128" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="138.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 2 × 10¹¹ g</text><rect x="378" y="128" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="138.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Two hundred billion times Earth&#x27;s pull</text><rect x="56" y="146" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="156.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Fastest spin</text><rect x="217" y="146" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="156.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">up to ≈ 700 turns per second</text><rect x="378" y="146" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="156.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Faster than a kitchen blender</text><rect x="56" y="164" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="174.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Magnetic field</text><rect x="217" y="164" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="174.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">10⁸ – 10¹⁵ gauss</text><rect x="378" y="164" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="174.36" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The strongest fields known in nature</text><text x="56" y="202.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The precise way matter behaves at these densities — its equation of state — is one</text><text x="56" y="218.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">of the great unsolved problems of modern physics. Because such conditions cannot be</text><text x="56" y="235.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">reproduced on Earth, neutron stars themselves serve as the only available</text><text x="56" y="251.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">laboratory.</text><text x="56" y="296.84" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">Cosmic Lighthouses</text><text x="56" y="329.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Collapse does more than compress a star; it spins it up. Just as a figure skater</text><text x="56" y="346.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">turns faster when she pulls in her arms, a stellar core that shrinks from the</text><text x="56" y="362.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">breadth of the Sun to a few kilometres must conserve its angular momentum, and so it</text><text x="56" y="379.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">whirls — some young neutron stars rotating hundreds of times every second.</text><text x="56" y="401.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The collapse concentrates the star&#x27;s magnetic field as fiercely as its spin,</text><text x="56" y="418.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">amplifying it to trillions of times the strength of any magnet built by human hands.</text><text x="56" y="434.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">A spinning magnet radiates, and a neutron star beams energy from its magnetic poles</text><text x="56" y="451.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">in two narrow cones. If one of those beams happens to sweep across the Earth, we see</text><text x="56" y="467.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">a pulse with every rotation — as regular as a ticking clock.</text><text x="56" y="489.96" text-anchor="start" style="font-family:sans-serif;font-size:10.5px;fill:#3a5a8c;font-weight:bold;letter-spacing:0.5pt;text-transform:uppercase">Little Green Men, 1967</text><text x="56" y="509.085" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">When Jocelyn Bell Burnell first recorded a string of impossibly regular pulses on her</text><text x="56" y="524.31" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">radio telescope, the signal was so precise that the source was half-jokingly labelled</text><text x="56" y="539.535" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">‘LGM-1’, for Little Green Men. The pulses turned out to be natural: the lighthouse beam</text><text x="56" y="554.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">of a rotating neutron star, the first pulsar ever found.</text><text x="56" y="580.445" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These beaming neutron stars, or pulsars, come in a remarkable variety:</text><text x="72" y="603.865" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Radio pulsars sweep lighthouse beams of radio waves across space with</text><text x="72" y="620.665" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">metronomic regularity, and serve as some of the most precise clocks in the</text><text x="72" y="637.465" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">universe.</text><text x="72" y="656.265" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Millisecond pulsars have been ‘recycled’ — spun up to hundreds of rotations</text><text x="72" y="673.065" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">per second by matter stripped from a companion star.</text><text x="72" y="691.865" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• Magnetars carry the most intense magnetic fields known, occasionally</text><text x="72" y="708.665" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">convulsing in titanic bursts of X-rays and gamma rays.</text><text x="72" y="727.465" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">• X-ray binaries blaze in X-rays as gas torn from an orbiting star spirals</text><text x="72" y="744.265" text-anchor="start" style="font-family:serif;font-size:12px;fill:#1c1c1c">down and crashes onto the neutron star&#x27;s surface.</text></svg>
