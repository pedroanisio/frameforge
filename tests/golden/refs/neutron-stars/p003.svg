<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><g transform="translate(75 96) scale(0.856)"><g><ellipse cx="180" cy="180" rx="150" ry="150" fill="#dce6f2" stroke="#3a5a8c" stroke-width="1.4"/><ellipse cx="180" cy="180" rx="116" ry="116" fill="#aebfd8"/><ellipse cx="180" cy="180" rx="78" ry="78" fill="#6f86b0"/><ellipse cx="180" cy="180" rx="34" ry="34" fill="#2f4d7e"/><line x1="305" y1="112" x2="354" y2="108" stroke="#6b7280" stroke-width="0.7"/><line x1="288" y1="150" x2="354" y2="156" stroke="#6b7280" stroke-width="0.7"/><line x1="248" y1="180" x2="354" y2="204" stroke="#6b7280" stroke-width="0.7"/><line x1="210" y1="196" x2="354" y2="252" stroke="#6b7280" stroke-width="0.7"/><text y="103.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Crust — ions in a crystalline</tspan><tspan x="356" dy="10.8">lattice</tspan></text><text y="158" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Outer core — superfluid neutrons</tspan></text><text y="199.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Inner core — composition</tspan><tspan x="356" dy="10.8">uncertain</tspan></text><text y="247.38" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#14161f"><tspan x="356">Centre — the densest matter of</tspan><tspan x="356" dy="10.8">all</tspan></text></g></g><text x="297.5" y="419.277" text-anchor="middle" style="font-family:serif;font-size:10px;fill:#666;font-style:italic">Schematic interior of a neutron star, from crust to core (not to scale).</text><text x="86" y="446.197" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These conditions translate into figures with no terrestrial parallel:</text><rect x="75" y="452.577" width="148.333" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="223.333" y="452.577" width="148.333" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="371.667" y="452.577" width="148.333" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="75" y="470.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="480.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Mass</text><rect x="223.333" y="470.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="480.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 1.4 – 2.1 M☉</text><rect x="371.667" y="470.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="480.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Up to about twice the Sun</text><rect x="75" y="488.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="498.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Radius</text><rect x="223.333" y="488.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="498.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 10 – 13 km</text><rect x="371.667" y="488.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="498.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The size of a city</text><rect x="75" y="506.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="516.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Mean density</text><rect x="223.333" y="506.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="516.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 4 × 10¹⁷ kg/m³</text><rect x="371.667" y="506.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="516.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The density of an atomic nucleus</text><rect x="75" y="524.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="534.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Surface gravity</text><rect x="223.333" y="524.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="534.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">≈ 2 × 10¹¹ g</text><rect x="371.667" y="524.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="534.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Two hundred billion times Earth&#x27;s pull</text><rect x="75" y="542.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="552.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Fastest spin</text><rect x="223.333" y="542.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="552.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">up to ≈ 700 turns per second</text><rect x="371.667" y="542.577" width="148.333" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="552.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Faster than a kitchen blender</text><rect x="75" y="560.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="78" y="570.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">Magnetic field</text><rect x="223.333" y="560.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="226.333" y="570.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">10⁸ – 10¹⁵ gauss</text><rect x="371.667" y="560.577" width="148.333" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="374.667" y="570.937" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">The strongest fields known in nature</text><text x="86" y="598.697" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">The precise way matter behaves at these densities — its equation of state —</text><text x="75" y="615.197" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">is one of the great unsolved problems of modern physics. Because such condi-</text><text x="75" y="631.697" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">tions cannot be reproduced on Earth, neutron stars themselves serve as the only</text><text x="75" y="648.197" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">available laboratory.</text><text x="75" y="687.417" text-anchor="start" style="font-family:serif;font-size:27px;fill:#3a5a8c;font-weight:bold">Cosmic Lighthouses</text><text x="75" y="720.497" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Collapse does more than compress a star; it spins it up. Just as a figure skater</text><text x="75" y="736.997" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">turns faster when she pulls in her arms, a stellar core that shrinks from the</text><text x="75" y="753.497" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">breadth of the Sun to a few kilometres must conserve its angular momentum, and</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">3</tspan></text></svg>
