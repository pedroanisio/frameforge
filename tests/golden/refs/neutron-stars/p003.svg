<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><rect x="75" y="96" width="148.333" height="21.75" fill="none"/><rect x="223.333" y="96" width="148.333" height="21.75" fill="none"/><rect x="371.667" y="96" width="148.333" height="21.75" fill="none"/><rect x="75" y="117.75" width="148.333" height="35.5" fill="none"/><text x="79" y="131.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Mass</text><rect x="223.333" y="117.75" width="148.333" height="35.5" fill="none"/><text x="227.333" y="131.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">≈ 1.4 – 2.1 M☉</text><rect x="371.667" y="117.75" width="148.333" height="35.5" fill="none"/><text x="375.667" y="131.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Up to about twice the</text><text x="375.667" y="145.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Sun</text><rect x="75" y="153.25" width="148.333" height="21.75" fill="none"/><text x="79" y="167.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Radius</text><rect x="223.333" y="153.25" width="148.333" height="21.75" fill="none"/><text x="227.333" y="167.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">≈ 10 – 13 km</text><rect x="371.667" y="153.25" width="148.333" height="21.75" fill="none"/><text x="375.667" y="167.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The size of a city</text><rect x="75" y="175" width="148.333" height="35.5" fill="none"/><text x="79" y="189.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Mean density</text><rect x="223.333" y="175" width="148.333" height="35.5" fill="none"/><text x="227.333" y="189.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">≈ 4 × 10¹⁷ kg/m³</text><rect x="371.667" y="175" width="148.333" height="35.5" fill="none"/><text x="375.667" y="189.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The density of an atomic</text><text x="375.667" y="202.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">nucleus</text><rect x="75" y="210.5" width="148.333" height="35.5" fill="none"/><text x="79" y="224.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Surface gravity</text><rect x="223.333" y="210.5" width="148.333" height="35.5" fill="none"/><text x="227.333" y="224.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">≈ 2 × 10¹¹ g</text><rect x="371.667" y="210.5" width="148.333" height="35.5" fill="none"/><text x="375.667" y="224.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Two hundred billion</text><text x="375.667" y="238.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">times Earth&#x27;s pull</text><rect x="75" y="246" width="148.333" height="35.5" fill="none"/><text x="79" y="260.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Fastest spin</text><rect x="223.333" y="246" width="148.333" height="35.5" fill="none"/><text x="227.333" y="260.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">up to ≈ 700 turns per</text><text x="227.333" y="273.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">second</text><rect x="371.667" y="246" width="148.333" height="35.5" fill="none"/><text x="375.667" y="260.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Faster than a kitchen</text><text x="375.667" y="273.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">blender</text><rect x="75" y="281.5" width="148.333" height="35.5" fill="none"/><text x="79" y="295.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Magnetic field</text><rect x="223.333" y="281.5" width="148.333" height="35.5" fill="none"/><text x="227.333" y="295.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">10⁸ – 10¹⁵ gauss</text><rect x="371.667" y="281.5" width="148.333" height="35.5" fill="none"/><text x="375.667" y="295.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The strongest fields</text><text x="375.667" y="309.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">known in nature</text><text y="337.12" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="86" style="font-family:serif;font-size:11px;fill:#14161f">The precise way matter behaves at these densities — its </tspan><tspan style="font-family:sans-serif;font-size:11px;fill:#1c1c1c;font-style:italic">equation of state</tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f"> —</tspan></text><text y="353.62" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">is one of the great unsolved problems of modern physics. Because such condi-</tspan></text><text y="370.12" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">tions cannot be reproduced on Earth, neutron stars themselves serve as the only</tspan></text><text y="386.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">available laboratory.</tspan></text><text x="75" y="415.72" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">Cosmic Lighthouses</text><text x="75" y="440.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Collapse does more than compress a star; it spins it up. Just as a figure skater</text><text x="75" y="456.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">turns faster when she pulls in her arms, a stellar core that shrinks from the</text><text x="75" y="473.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">breadth of the Sun to a few kilometres must conserve its angular momentum, and</text><text x="75" y="489.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">so it whirls — some young neutron stars rotating hundreds of times every second.</text><text x="86" y="506.32" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">The collapse concentrates the star&#x27;s magnetic field as fiercely as its spin,</text><text x="75" y="522.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">amplifying it to trillions of times the strength of any magnet built by human</text><text x="75" y="539.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">hands. A spinning magnet radiates, and a neutron star beams energy from its mag-</text><text x="75" y="555.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">netic poles in two narrow cones. If one of those beams happens to sweep across</text><text x="75" y="572.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">the Earth, we see a pulse with every rotation — as regular as a ticking clock.</text><rect x="75" y="578.7" width="445" height="117.25" fill="#eef3f8" stroke="#c2d2e6" stroke-width="1"/><text x="101.5" y="602.36" text-anchor="start" style="font-family:sans-serif;font-size:10.5px;fill:#3a5a8c;font-weight:bold;letter-spacing:0.5pt;text-transform:uppercase">Little Green Men, 1967</text><text x="101.5" y="615.485" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">When Jocelyn Bell Burnell first recorded a string of impossibly regular</text><text x="91" y="630.71" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">pulses on her radio telescope, the signal was so precise that the source</text><text x="91" y="645.935" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">was half-jokingly labelled ‘LGM-1’, for Little Green Men. The pulses turned</text><text x="91" y="661.16" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">out to be natural: the lighthouse beam of a rotating neutron star, the</text><text x="91" y="676.385" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">first pulsar ever found.</text><text x="86" y="710.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These beaming neutron stars, or pulsars, come in a remarkable variety:</text><text x="91" y="726.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">• Radio pulsars sweep lighthouse beams of radio waves across space with</text><text x="91" y="743.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">metronomic regularity, and serve as some of the most precise clocks in the</text><text x="91" y="759.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">universe.</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">3</tspan></text></svg>
