<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><rect x="75" y="96" width="115.7" height="21.75" fill="none"/><rect x="190.7" y="96" width="178" height="21.75" fill="none"/><rect x="368.7" y="96" width="151.3" height="21.75" fill="none"/><rect x="75" y="117.75" width="115.7" height="35.5" fill="none"/><text x="79" y="131.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Mean density</text><rect x="190.7" y="117.75" width="178" height="35.5" fill="none"/><text x="194.7" y="131.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">≈ 4 × 10¹⁷ kg/m³</text><rect x="368.7" y="117.75" width="151.3" height="35.5" fill="none"/><text x="372.7" y="131.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The density of an atomic</text><text x="372.7" y="145.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">nucleus</text><rect x="75" y="153.25" width="115.7" height="35.5" fill="none"/><text x="79" y="167.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Surface gravity</text><rect x="190.7" y="153.25" width="178" height="35.5" fill="none"/><text x="194.7" y="167.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">≈ 2 × 10¹¹ g</text><rect x="368.7" y="153.25" width="151.3" height="35.5" fill="none"/><text x="372.7" y="167.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Two hundred billion times</text><text x="372.7" y="181.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Earth&#x27;s pull</text><rect x="75" y="188.75" width="115.7" height="35.5" fill="none"/><text x="79" y="202.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Fastest spin</text><rect x="190.7" y="188.75" width="178" height="35.5" fill="none"/><text x="194.7" y="202.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">up to ≈ 700 turns per second</text><rect x="368.7" y="188.75" width="151.3" height="35.5" fill="none"/><text x="372.7" y="202.87" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Faster than a kitchen</text><text x="372.7" y="216.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">blender</text><rect x="75" y="224.25" width="115.7" height="35.5" fill="none"/><text x="79" y="238.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">Magnetic field</text><rect x="190.7" y="224.25" width="178" height="35.5" fill="none"/><text x="194.7" y="238.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">10⁸ – 10¹⁵ gauss</text><rect x="368.7" y="224.25" width="151.3" height="35.5" fill="none"/><text x="372.7" y="238.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">The strongest fields</text><text x="372.7" y="252.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">known in nature</text><text y="279.87" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="86" style="font-family:serif;font-size:11px;fill:#14161f">The precise way matter behaves at these densities — its </tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f;font-style:italic">equation of state</tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f"> —</tspan></text><text y="296.37" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">is one of the great unsolved problems of modern physics. Because such condi-</tspan></text><text y="312.87" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">tions cannot be reproduced on Earth, neutron stars themselves serve as the only</tspan></text><text y="329.37" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">available laboratory.</tspan></text><text x="75" y="358.47" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">Cosmic Lighthouses</text><text x="75" y="383.07" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Collapse does more than compress a star; it spins it up. Just as a figure skater</text><text x="75" y="399.57" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">turns faster when she pulls in her arms, a stellar core that shrinks from the</text><text x="75" y="416.07" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">breadth of the Sun to a few kilometres must conserve its angular momentum, and</text><text x="75" y="432.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">so it whirls — some young neutron stars rotating hundreds of times every second.</text><text x="86" y="449.07" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">The collapse concentrates the star&#x27;s magnetic field as fiercely as its spin,</text><text x="75" y="465.57" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">amplifying it to trillions of times the strength of any magnet built by human</text><text x="75" y="482.07" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">hands. A spinning magnet radiates, and a neutron star beams energy from its mag-</text><text x="75" y="498.57" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">netic poles in two narrow cones. If one of those beams happens to sweep across</text><text x="75" y="515.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">the Earth, we see a pulse with every rotation — as regular as a ticking clock.</text><rect x="75" y="521.45" width="445" height="119.875" fill="#eef3f8" stroke="#c2d2e6" stroke-width="1"/><text x="101.5" y="545.11" text-anchor="start" style="font-family:sans-serif;font-size:10.5px;fill:#3a5a8c;font-weight:bold;letter-spacing:0.5pt;text-transform:uppercase">Little Green Men, 1967</text><text x="101.5" y="560.86" text-anchor="start" textLength="402.5" lengthAdjust="spacing" style="font-family:serif;font-size:10.5px;fill:#14161f">When Jocelyn Bell Burnell first recorded a string of impossibly regular</text><text x="91" y="576.085" text-anchor="start" textLength="413" lengthAdjust="spacing" style="font-family:serif;font-size:10.5px;fill:#14161f">pulses on her radio telescope, the signal was so precise that the source was</text><text x="91" y="591.31" text-anchor="start" textLength="413" lengthAdjust="spacing" style="font-family:serif;font-size:10.5px;fill:#14161f">half-jokingly labelled ‘LGM-1’, for Little Green Men. The pulses turned out</text><text x="91" y="606.535" text-anchor="start" textLength="413" lengthAdjust="spacing" style="font-family:serif;font-size:10.5px;fill:#14161f">to be natural: the lighthouse beam of a rotating neutron star, the first pul-</text><text x="91" y="621.76" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">sar ever found.</text><text x="86" y="655.445" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">These beaming neutron stars, or pulsars, come in a remarkable variety:</text><text x="91" y="671.945" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">• Radio pulsars sweep lighthouse beams of radio waves across space with</text><text x="91" y="688.445" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">metronomic regularity, and serve as some of the most precise clocks in the</text><text x="91" y="704.945" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">universe.</text><text x="91" y="723.445" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">• Millisecond pulsars have been ‘recycled’ — spun up to hundreds of rotations</text><text x="91" y="739.945" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">per second by matter stripped from a companion star.</text><text y="60" text-anchor="start" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">3</tspan></text></svg>
