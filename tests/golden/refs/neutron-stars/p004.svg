<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="91" y="106.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">• Millisecond pulsars have been ‘recycled’ — spun up to hundreds of rotations</text><text x="91" y="122.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">per second by matter stripped from a companion star.</text><text x="91" y="141.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">• Magnetars carry the most intense magnetic fields known, occasionally</text><text x="91" y="157.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">convulsing in titanic bursts of X-rays and gamma rays.</text><text x="91" y="176.12" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">• X-ray binaries blaze in X-rays as gas torn from an orbiting star spirals</text><text x="91" y="192.62" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">down and crashes onto the neutron star&#x27;s surface.</text><text x="75" y="229.72" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">Laboratories at the Edge of Physics</text><text x="75" y="254.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Precisely because their interiors lie so far beyond our reach, neutron stars</text><text x="75" y="270.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">have become indispensable instruments for testing the laws of nature. Their</text><text x="75" y="287.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">fierce gravity bends light and slows time in ways that confirm Einstein&#x27;s gen-</text><text x="75" y="303.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">eral relativity to extraordinary precision, and the steady drumbeat of pulsars</text><text x="75" y="320.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">lets astronomers weigh distant stars and hunt for ripples in spacetime itself.</text><text y="336.82" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="86" style="font-family:serif;font-size:11px;fill:#14161f">In 2017 the field reached a milestone when two neutron stars, locked in a</tspan></text><text y="353.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">death spiral, were observed merging — first as a chirp of gravitational waves</tspan></text><text y="369.82" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">and moments later as a blaze of light. The collision flung out a cloud of de-</tspan></text><text y="386.32" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">bris glowing as a </tspan><tspan style="font-family:sans-serif;font-size:11px;fill:#1c1c1c;font-style:italic">kilonova</tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f">, and within it astronomers watched heavy elements</tspan></text><text y="402.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">being forged in real time.</tspan></text><rect x="75" y="409.2" width="445" height="117.25" fill="#fbf3e8" stroke="#e7cfa6" stroke-width="1"/><text x="101.5" y="432.86" text-anchor="start" style="font-family:sans-serif;font-size:10.5px;fill:#9a6b1e;font-weight:bold;letter-spacing:0.5pt;text-transform:uppercase">Where Your Gold Came From</text><text x="101.5" y="445.985" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">The merger of 2017 helped settle a long-standing mystery: where the</text><text x="91" y="461.21" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">universe&#x27;s heaviest elements are made. The wreckage of colliding neutron</text><text x="91" y="476.435" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">stars is now thought to be a principal forge of gold, platinum, and other</text><text x="91" y="491.66" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">heavy metals. Much of the gold in any wedding ring was very likely born in</text><text x="91" y="506.885" text-anchor="start" style="font-family:serif;font-size:10.5px;fill:#14161f">such a cataclysm.</text><text x="86" y="540.57" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">Individual neutron stars push the science further still. The discovery of</text><text x="75" y="557.07" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">pulsars weighing about two solar masses sets hard limits on how squeezable</text><text x="75" y="573.57" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">ultra-dense matter can be, while X-ray observatories measuring the size of a</text><text x="75" y="590.07" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">neutron star to within a kilometre are steadily narrowing down the elusive equa-</text><text x="75" y="606.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f">tion of state.</text><text x="75" y="635.67" text-anchor="start" style="font-family:sans-serif;font-size:16px;fill:#3a5a8c;font-weight:bold">The Edge of Collapse</text><text y="660.27" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">There is, however, a ceiling. Above a critical mass — the </tspan><tspan style="font-family:sans-serif;font-size:11px;fill:#1c1c1c;font-weight:bold">Tolman–Oppenheimer–</tspan></text><text y="676.77" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:sans-serif;font-size:11px;fill:#1c1c1c;font-weight:bold">Volkoff limit</tspan><tspan style="font-family:serif;font-size:11px;fill:#14161f">, somewhere near two and a quarter times the mass of the Sun — not</tspan></text><text y="693.27" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">even the defiance of densely packed neutrons can withstand gravity. Cross that</tspan></text><text y="709.77" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">threshold and collapse resumes without end, and the neutron star vanishes be-</tspan></text><text y="726.27" text-anchor="start" style="font-family:serif;font-size:11px;fill:#14161f"><tspan x="75" style="font-family:serif;font-size:11px;fill:#14161f">hind the horizon of a black hole.</tspan></text><text x="86" y="742.77" text-anchor="start" textLength="434" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">A neutron star therefore occupies a razor&#x27;s edge in the story of matter: the</text><text x="75" y="759.27" text-anchor="start" textLength="445" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#14161f">densest object that can still hold itself up, poised one step short of oblivion.</text><text y="60" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280;letter-spacing:0.6pt;text-transform:uppercase"><tspan x="75">NEUTRON STARS · AN ESSAY</tspan></text><line x1="75" y1="786" x2="520" y2="786" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">4</tspan></text></svg>
