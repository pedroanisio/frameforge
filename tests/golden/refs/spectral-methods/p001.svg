<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="56" y="83.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#1f5fa6;font-weight:bold">Spectral Methods for the Heat</text><text x="56" y="125.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#1f5fa6;font-weight:bold">Equation</text><text x="56" y="174.84" text-anchor="start" style="font-family:serif;font-size:27px;fill:#1f5fa6;font-weight:bold">Discretization</text><text x="56" y="207.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">The discrete Laplacian (see ) converges spectrally for smooth periodic data . In</text><text x="56" y="224.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">practice we apply fft() to the grid valuesWe use a real-to-complex transform, which</text><text x="56" y="240.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">halves the work for real input. and monitor the residual r = A u - f at every step.</text><g transform="translate(56,253.3)"><g><line x1="10" y1="45" x2="350" y2="45" stroke="#1f5fa6" stroke-width="1"/><line x1="10" y1="38" x2="10" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="95" y1="38" x2="95" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="180" y1="38" x2="180" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="265" y1="38" x2="265" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="350" y1="38" x2="350" y2="52" stroke="#1f5fa6" stroke-width="1"/><text y="67.755" text-anchor="middle" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic"><tspan x="180">x₀ x₁ x₂ x₃ x₄</tspan></text></g></g><text x="297.5" y="358.5" text-anchor="middle" style="font-family:serif;font-size:10px;fill:#666;font-style:italic">A uniform one-dimensional spectral grid.</text><text x="56" y="385.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">As shown in , the nodes are equally spaced, which is what makes the FFT applicable.</text><svg x="165.5" y="397.8" width="264" height="24" viewBox="0 0 264 24" preserveAspectRatio="xMidYMid meet" role="img" focusable="false" color="#111" data-framegraph-math="true"><title>math expression</title><g data-mml-node="math"><path d="M2 12 C 8 2, 16 2, 22 12 S 36 22, 44 12" fill="none" stroke="#111" stroke-width="2"/><path d="M50 6 H 58 V 14 H 50 Z" fill="#111" stroke="#111"/><path d="M4 19 H 44" fill="none" stroke="#111" stroke-width="1"/></g></svg><text x="56" y="443.92" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">turns differentiation into multiplication in frequency space, the heart of the</text><text x="56" y="460.42" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">method.</text><text x="56" y="481.08" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#1c1c1c;font-weight:bold">Error versus grid size for a smooth test function.</text><rect x="56" y="489.4" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="489.4" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="489.4" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="56" y="507.4" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="517.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">8</text><rect x="217" y="507.4" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="517.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">2.1 × 10⁻³</text><rect x="378" y="507.4" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="517.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">—</text><rect x="56" y="525.4" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="535.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">16</text><rect x="217" y="525.4" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="535.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">3.4 × 10⁻⁶</text><rect x="378" y="525.4" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="535.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">spectral</text><rect x="56" y="543.4" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="59" y="553.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">32</text><rect x="217" y="543.4" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="220" y="553.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">1.2 × 10⁻¹²</text><rect x="378" y="543.4" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><text x="381" y="553.76" text-anchor="start" style="font-family:sans-serif;font-size:8px;fill:#1c1c1c">spectral</text><text x="56" y="580.6" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">import numpy as np</text><text x="56" y="610.6" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">def laplacian(u, L):</text><text x="56" y="625.6" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">n = u.size</text><text x="56" y="640.6" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">k = 2*np.pi*np.fft.fftfreq(n, d=L/n)</text><text x="56" y="655.6" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">return np.real(np.fft.ifft(-(k**2) * np.fft.fft(u)))</text><text x="56" y="697" text-anchor="start" style="font-family:serif;font-size:30px;fill:#1f5fa6;font-weight:bold">References</text></svg>
