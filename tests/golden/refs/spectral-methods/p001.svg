<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="72" y="112.56" text-anchor="start" style="font-family:sans-serif;font-size:18px;fill:#1f5fa6;font-weight:bold">Spectral Methods for the Heat Equation</text><text x="72" y="137.72" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418;font-weight:bold">Contents</text><text x="72" y="162.22" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418">Spectral Methods for the Heat Equation</text><text x="295.36" y="162.22" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418"> . . . . . . . . . . . . . . . . .</text><text x="523" y="162.22" text-anchor="end" style="font-family:sans-serif;font-size:11px;fill:#111418">1</text><text x="86" y="178.72" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418">Discretization</text><text x="172.08" y="178.72" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418"> . . . . . . . . . . . . . . . . . . . . . . . . . . . .</text><text x="523" y="178.72" text-anchor="end" style="font-family:sans-serif;font-size:11px;fill:#111418">1</text><text x="72" y="195.22" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418">References</text><text x="135.2" y="195.22" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418"> . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .</text><text x="523" y="195.22" text-anchor="end" style="font-family:sans-serif;font-size:11px;fill:#111418">1</text><text x="72" y="223.56" text-anchor="start" style="font-family:sans-serif;font-size:13px;fill:#1f5fa6;font-weight:bold">Discretization</text><text y="247.32" text-anchor="start" textLength="451" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418"><tspan x="72" style="font-family:serif;font-size:11px;fill:#111418">The discrete Laplacian (see </tspan><tspan style="font-family:serif;font-size:11px;fill:#111418">) converges spectrally for smooth periodic data </tspan><tspan style="font-family:serif;font-size:11px;fill:#111418">. In</tspan></text><text y="263.82" text-anchor="start" textLength="451" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418"><tspan x="72" style="font-family:serif;font-size:11px;fill:#111418">practice we apply </tspan><tspan style="font-family:serif;font-size:11px;fill:#111418">fft()</tspan><tspan style="font-family:serif;font-size:11px;fill:#111418"> to the grid values</tspan><tspan style="font-family:serif;font-size:11px;fill:#111418"> and monitor the residual </tspan><tspan style="font-family:serif;font-size:11px;fill:#111418">r = A u - f</tspan></text><text y="280.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418"><tspan x="72" style="font-family:serif;font-size:11px;fill:#111418">at every step.</tspan></text><g transform="translate(72,286.7)"><g><line x1="10" y1="45" x2="350" y2="45" stroke="#1f5fa6" stroke-width="1"/><line x1="10" y1="38" x2="10" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="95" y1="38" x2="95" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="180" y1="38" x2="180" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="265" y1="38" x2="265" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="350" y1="38" x2="350" y2="52" stroke="#1f5fa6" stroke-width="1"/><text y="66" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic"><tspan x="180">x₀ x₁ x₂ x₃ x₄</tspan></text></g></g><text x="297.5" y="390.98" text-anchor="middle" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic">A uniform one-dimensional spectral grid.</text><text x="83" y="418.32" text-anchor="start" textLength="440" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">As shown in , the nodes are equally spaced, which is what makes the FFT</text><text x="72" y="434.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">applicable.</text><svg x="165.5" y="441.2" width="264" height="24" viewBox="0 0 264 24" preserveAspectRatio="xMidYMid meet" role="img" focusable="false" color="#111418" data-frameforge-math="true"><title>math expression</title><g data-mml-node="math"><path d="M2 12 C 8 2, 16 2, 22 12 S 36 22, 44 12" fill="none" stroke="#111418" stroke-width="2"/><path d="M50 6 H 58 V 14 H 50 Z" fill="#111418" stroke="#111418"/><path d="M4 19 H 44" fill="none" stroke="#111418" stroke-width="1"/></g></svg><text x="83" y="487.32" text-anchor="start" textLength="440" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">turns differentiation into multiplication in frequency space, the heart of the</text><text x="72" y="503.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">method.</text><text x="297.5" y="518.48" text-anchor="middle" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic">Error versus grid size for a smooth test function.</text><rect x="72" y="527.7" width="90.2" height="21.75" fill="none"/><rect x="162.2" y="527.7" width="202.95" height="21.75" fill="none"/><rect x="365.15" y="527.7" width="157.85" height="21.75" fill="none"/><rect x="72" y="549.45" width="90.2" height="21.75" fill="none"/><text x="76" y="563.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">8</text><rect x="162.2" y="549.45" width="202.95" height="21.75" fill="none"/><text x="166.2" y="563.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">2.1 × 10⁻³</text><rect x="365.15" y="549.45" width="157.85" height="21.75" fill="none"/><text x="369.15" y="563.57" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">—</text><rect x="72" y="571.2" width="90.2" height="21.75" fill="none"/><text x="76" y="585.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">16</text><rect x="162.2" y="571.2" width="202.95" height="21.75" fill="none"/><text x="166.2" y="585.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">3.4 × 10⁻⁶</text><rect x="365.15" y="571.2" width="157.85" height="21.75" fill="none"/><text x="369.15" y="585.32" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">spectral</text><rect x="72" y="592.95" width="90.2" height="21.75" fill="none"/><text x="76" y="607.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">32</text><rect x="162.2" y="592.95" width="202.95" height="21.75" fill="none"/><text x="166.2" y="607.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">1.2 × 10⁻¹²</text><rect x="365.15" y="592.95" width="157.85" height="21.75" fill="none"/><text x="369.15" y="607.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">spectral</text><text x="72" y="633.44" text-anchor="start" style="font-family:monospace;font-size:9.5px;fill:#111418;white-space:pre">import numpy as np</text><text x="72" y="662.04" text-anchor="start" style="font-family:monospace;font-size:9.5px;fill:#111418;white-space:pre">def laplacian(u, L):</text><text x="72" y="676.34" text-anchor="start" style="font-family:monospace;font-size:9.5px;fill:#111418;white-space:pre">n = u.size</text><text x="72" y="690.64" text-anchor="start" style="font-family:monospace;font-size:9.5px;fill:#111418;white-space:pre">k = 2*np.pi*np.fft.fftfreq(n, d=L/n)</text><text x="72" y="704.94" text-anchor="start" style="font-family:monospace;font-size:9.5px;fill:#111418;white-space:pre">return np.real(np.fft.ifft(-(k**2) * np.fft.fft(u)))</text><text x="72" y="735.06" text-anchor="start" style="font-family:sans-serif;font-size:18px;fill:#1f5fa6;font-weight:bold">References</text><text y="63" text-anchor="start" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280"><tspan x="72">Spectral Methods · Technical Note</tspan></text><line x1="72" y1="784" x2="523" y2="784" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">1</tspan></text></svg>
