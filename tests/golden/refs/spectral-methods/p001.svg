<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="72" y="112.56" text-anchor="start" style="font-family:sans-serif;font-size:18px;fill:#1f5fa6;font-weight:bold">Spectral Methods for the Heat Equation</text><text x="72" y="142.78" text-anchor="start" style="font-family:sans-serif;font-size:16.5px;fill:#111418;font-weight:bold">Contents</text><text x="72" y="170.47" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418">Spectral Methods for the Heat Equation</text><text x="295.36" y="170.47" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418"> . . . . . . . . . . . . . . . . .</text><text x="523" y="170.47" text-anchor="end" style="font-family:sans-serif;font-size:11px;fill:#111418">1</text><text x="86" y="184.22" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418">Discretization</text><text x="172.08" y="184.22" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418"> . . . . . . . . . . . . . . . . . . . . . . . . . . . .</text><text x="523" y="184.22" text-anchor="end" style="font-family:sans-serif;font-size:11px;fill:#111418">1</text><text x="72" y="197.97" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418">References</text><text x="135.2" y="197.97" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#111418"> . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .</text><text x="523" y="197.97" text-anchor="end" style="font-family:sans-serif;font-size:11px;fill:#111418">1</text><text x="72" y="223.56" text-anchor="start" style="font-family:sans-serif;font-size:13px;fill:#1f5fa6;font-weight:bold">Discretization</text><text x="72" y="247.32" text-anchor="start" textLength="451" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">The discrete Laplacian (see ) converges spectrally for smooth periodic data . In</text><text x="72" y="263.82" text-anchor="start" textLength="451" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">practice we apply fft() to the grid valuesWe use a real-to-complex transform,</text><text x="72" y="280.32" text-anchor="start" textLength="451" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">which halves the work for real input. and monitor the residual r = A u - f at</text><text x="72" y="296.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">every step.</text><g transform="translate(72,303.2)"><g><line x1="10" y1="45" x2="350" y2="45" stroke="#1f5fa6" stroke-width="1"/><line x1="10" y1="38" x2="10" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="95" y1="38" x2="95" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="180" y1="38" x2="180" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="265" y1="38" x2="265" y2="52" stroke="#1f5fa6" stroke-width="1"/><line x1="350" y1="38" x2="350" y2="52" stroke="#1f5fa6" stroke-width="1"/><text y="66" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic"><tspan x="180">x₀ x₁ x₂ x₃ x₄</tspan></text></g></g><text x="297.5" y="407.48" text-anchor="middle" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-style:italic">A uniform one-dimensional spectral grid.</text><text x="83" y="432.57" text-anchor="start" textLength="440" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">As shown in , the nodes are equally spaced, which is what makes the FFT</text><text x="72" y="449.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">applicable.</text><svg x="165.5" y="455.45" width="264" height="24" viewBox="0 0 264 24" preserveAspectRatio="xMidYMid meet" role="img" focusable="false" color="#111" data-frameforge-math="true"><title>math expression</title><g data-mml-node="math"><path d="M2 12 C 8 2, 16 2, 22 12 S 36 22, 44 12" fill="none" stroke="#111" stroke-width="2"/><path d="M50 6 H 58 V 14 H 50 Z" fill="#111" stroke="#111"/><path d="M4 19 H 44" fill="none" stroke="#111" stroke-width="1"/></g></svg><text x="83" y="501.57" text-anchor="start" textLength="440" lengthAdjust="spacing" style="font-family:serif;font-size:11px;fill:#111418">turns differentiation into multiplication in frequency space, the heart of the</text><text x="72" y="518.07" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">method.</text><text x="297.5" y="532.73" text-anchor="middle" style="font-family:sans-serif;font-size:9px;fill:#6b7280;font-weight:700;font-style:italic">Error versus grid size for a smooth test function.</text><rect x="72" y="539.7" width="150.333" height="18" fill="none"/><rect x="222.333" y="539.7" width="150.333" height="18" fill="none"/><rect x="372.667" y="539.7" width="150.333" height="18" fill="none"/><rect x="72" y="557.7" width="150.333" height="18" fill="none"/><text x="75" y="570.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">8</text><rect x="222.333" y="557.7" width="150.333" height="18" fill="none"/><text x="225.333" y="570.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">2.1 × 10⁻³</text><rect x="372.667" y="557.7" width="150.333" height="18" fill="none"/><text x="375.667" y="570.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">—</text><rect x="72" y="575.7" width="150.333" height="18" fill="none"/><text x="75" y="588.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">16</text><rect x="222.333" y="575.7" width="150.333" height="18" fill="none"/><text x="225.333" y="588.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">3.4 × 10⁻⁶</text><rect x="372.667" y="575.7" width="150.333" height="18" fill="none"/><text x="375.667" y="588.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">spectral</text><rect x="72" y="593.7" width="150.333" height="18" fill="none"/><text x="75" y="606.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">32</text><rect x="222.333" y="593.7" width="150.333" height="18" fill="none"/><text x="225.333" y="606.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">1.2 × 10⁻¹²</text><rect x="372.667" y="593.7" width="150.333" height="18" fill="none"/><text x="375.667" y="606.82" text-anchor="start" style="font-family:serif;font-size:11px;fill:#111418">spectral</text><text x="72" y="630.9" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">import numpy as np</text><text x="72" y="662.9" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">def laplacian(u, L):</text><text x="72" y="678.9" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">n = u.size</text><text x="72" y="694.9" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">k = 2*np.pi*np.fft.fftfreq(n, d=L/n)</text><text x="72" y="710.9" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">return np.real(np.fft.ifft(-(k**2) * np.fft.fft(u)))</text><text x="72" y="742.26" text-anchor="start" style="font-family:sans-serif;font-size:18px;fill:#1f5fa6;font-weight:bold">References</text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280"><tspan x="72">Spectral Methods · Technical Note</tspan></text><line x1="72" y1="784" x2="523" y2="784" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">1</tspan></text></svg>
