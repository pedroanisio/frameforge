<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><text x="72" y="105.2" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">n = u.size</text><text x="72" y="120.2" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">k = 2*np.pi*np.fft.fftfreq(n, d=L/n)</text><text x="72" y="135.2" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#333">return np.real(np.fft.ifft(-(k**2) * np.fft.fft(u)))</text><text x="72" y="176.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#1f5fa6;font-weight:bold">References</text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#6b7280"><tspan x="72">Spectral Methods · Technical Note</tspan></text><line x1="72" y1="784" x2="523" y2="784" stroke="#d9dee5" stroke-width="0.75"/><text y="784" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:9px;fill:#6b7280"><tspan x="297.5">2</tspan></text></svg>
