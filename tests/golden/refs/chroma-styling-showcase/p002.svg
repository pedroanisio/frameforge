<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><defs><linearGradient id="g7"><stop offset="0%" stop-color="#ff004d"/><stop offset="16%" stop-color="#ff7a00"/><stop offset="33%" stop-color="#ffd400"/><stop offset="50%" stop-color="#14d957"/><stop offset="66%" stop-color="#00c2ff"/><stop offset="83%" stop-color="#2b5bff"/><stop offset="100%" stop-color="#8a2be2"/></linearGradient><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="30"/><feOffset dx="0" dy="12" result="off"/><feFlood flood-color="rgba(20,18,26,0.28)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><text x="56" y="83.6" text-anchor="start" style="font-family:serif;font-size:30px;fill:#14121a;font-weight:bold">On the Physics of Iridescence</text><text x="56" y="117.2" text-anchor="start" style="font-family:sans-serif;font-size:10px;fill:#7a5cff;font-weight:600;font-variant-caps:all-small-caps;letter-spacing:0.18em">By the Optics Desk</text><text x="56" y="141.976" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Iridescence is structural color: hue produced not by pigment but by the way light</text><text x="56" y="157.426" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">interferes with itself across features the size of its own wavelength. Tilt the surface</text><text x="56" y="172.876" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">and the color shifts — the signature that geometry, not chemistry, is doing the work.</text><text x="56" y="194.326" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">In a thin film, light reflects from both the top and bottom surfaces. The two reflected</text><text x="56" y="209.776" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">waves travel paths that differ by twice the film thickness, and where that difference is a</text><text x="56" y="225.226" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">whole number of wavelengths the waves reinforce; elsewhere they cancel. Because the</text><text x="56" y="240.676" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">condition depends on wavelength, each thickness favors a particular color.</text><text x="56" y="269.21" text-anchor="start" style="font-family:serif;font-size:18px;fill:#7a5cff;font-weight:500;font-style:italic;hanging-punctuation:first">Color you can tilt: the hue lives in the geometry,</text><text x="56" y="292.97" text-anchor="start" style="font-family:serif;font-size:18px;fill:#7a5cff;font-weight:500;font-style:italic;hanging-punctuation:first">not in the pigment.</text><text x="56" y="319.646" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">The same mechanism paints the soap bubble, the beetle&#x27;s shell, and the compact-disc sheen.</text><text x="56" y="335.096" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Engineers exploit it deliberately in dielectric mirrors, stacking dozens of quarter-wave</text><text x="56" y="350.546" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">layers so that a chosen band reflects almost perfectly while the rest passes through.</text><text x="56" y="371.26" text-anchor="start" style="font-family:sans-serif;font-size:9.5px;fill:#ffb020;font-weight:800;font-variant-caps:all-small-caps;letter-spacing:0.22em">Field Note</text><text x="56" y="389.411" text-anchor="start" style="font-family:serif;font-size:9.8px;fill:#14121a">To see thin-film color at home, float a drop of oil on a puddle. The film thins as it spreads,</text><text x="56" y="403.621" text-anchor="start" style="font-family:serif;font-size:9.8px;fill:#14121a">so the bands of color map directly onto thickness.</text><text x="56" y="428.291" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">The table below pairs film thickness with the hue it reflects most strongly at normal</text><text x="56" y="443.741" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">incidence, for a film of refractive index near 1.4.</text><text x="56" y="463.995" text-anchor="start" style="font-family:sans-serif;font-size:9px;fill:#1c1c1c;font-weight:bold">Reflected hue by film thickness (n ≈ 1.4, normal incidence).</text><rect x="56" y="472.315" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="472.315" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="472.315" width="161" height="18" fill="#f1f3f5" stroke="#d8d8d8" stroke-width="0.5"/><rect x="56" y="490.315" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="490.315" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="490.315" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="56" y="508.315" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="508.315" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="508.315" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><rect x="56" y="526.315" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="526.315" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="526.315" width="161" height="18" fill="#ffffff" stroke="#d8d8d8" stroke-width="0.5"/><rect x="56" y="544.315" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><rect x="217" y="544.315" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><rect x="378" y="544.315" width="161" height="18" fill="#fafafa" stroke="#d8d8d8" stroke-width="0.5"/><g transform="translate(56,572.315)"><g transform="rotate(-1.5 180 48)"><g filter="url(#fx1)"><rect x="0" y="0" width="360" height="96" rx="12" fill="url(#g7)"/></g></g></g><text x="297.5" y="683.515" text-anchor="middle" style="font-family:serif;font-size:10px;fill:#666;font-style:italic">A continuous visible spectrum rendered as a single gradient fill — no raster image.</text><text x="56" y="709.791" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Read the spectrum above as the family of hues a single film sweeps through as it thickens.</text><text x="56" y="725.241" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">the geometry is the palette.</text></svg>
