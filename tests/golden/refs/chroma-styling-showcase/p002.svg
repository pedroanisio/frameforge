<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><defs><linearGradient id="g8" x1="0%" y1="50%" x2="100%" y2="50%"><stop offset="0%" stop-color="#ff004d"/><stop offset="16%" stop-color="#ff7a00"/><stop offset="33%" stop-color="#ffd400"/><stop offset="50%" stop-color="#14d957"/><stop offset="66%" stop-color="#00c2ff"/><stop offset="83%" stop-color="#2b5bff"/><stop offset="100%" stop-color="#8a2be2"/></linearGradient><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="30"/><feOffset dx="0" dy="12" result="off"/><feFlood flood-color="rgba(20,18,26,0.28)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><text x="54" y="113.6" text-anchor="start" style="font-family:sans-serif;font-size:30px;fill:#14121a;font-weight:800;letter-spacing:0.02em;text-transform:uppercase;hyphens:auto;hanging-punctuation:first">On the Physics of Iridescence</text><text x="54" y="136.7" text-anchor="start" style="font-family:sans-serif;font-size:10px;fill:#7a5cff;font-weight:600;font-variant-caps:all-small-caps;letter-spacing:0.18em">By the Optics Desk</text><text x="64.3" y="155.476" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Iridescence is structural color: hue produced not by pigment but by the way light inter-</text><text x="54" y="170.926" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">feres with itself across features the size of its own wavelength. Tilt the surface and the</text><text x="54" y="186.376" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">color shifts — the signature that geometry, not chemistry, is doing the work.</text><text x="64.3" y="201.826" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">In a thin film, light reflects from both the top and bottom surfaces. The two reflected</text><text x="54" y="217.276" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">waves travel paths that differ by twice the film thickness, and where that difference is a</text><text x="54" y="232.726" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">whole number of wavelengths the waves reinforce; elsewhere they cancel. Because the condi-</text><text x="54" y="248.176" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">tion depends on wavelength, each thickness favors a particular color.</text><text x="72" y="270.71" text-anchor="start" style="font-family:serif;font-size:18px;fill:#7a5cff;font-weight:500;font-style:italic;hanging-punctuation:first">Color you can tilt: the hue lives in the geometry,</text><text x="54" y="294.47" text-anchor="start" style="font-family:serif;font-size:18px;fill:#7a5cff;font-weight:500;font-style:italic;hanging-punctuation:first">not in the pigment.</text><text x="64.3" y="315.146" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">The same mechanism paints the soap bubble, the beetle&#x27;s shell, and the compact-disc sheen.</text><text x="54" y="330.596" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Engineers exploit it deliberately in dielectric mirrors, stacking dozens of quarter-wave</text><text x="54" y="346.046" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">layers so that a chosen band reflects almost perfectly while the rest passes through.</text><text x="63.5" y="360.76" text-anchor="start" style="font-family:sans-serif;font-size:9.5px;fill:#ffb020;font-weight:800;font-variant-caps:all-small-caps;letter-spacing:0.22em">Field Note</text><text x="63.8" y="372.911" text-anchor="start" style="font-family:serif;font-size:9.8px;fill:#14121a">To see thin-film color at home, float a drop of oil on a puddle. The film thins as it</text><text x="54" y="387.121" text-anchor="start" style="font-family:serif;font-size:9.8px;fill:#14121a">spreads, so the bands of color map directly onto thickness.</text><text x="64.3" y="405.791" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">The table below pairs film thickness with the hue it reflects most strongly at normal</text><text x="54" y="421.241" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">incidence, for a film of refractive index near 1.4.</text><text x="54" y="436.691" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;font-weight:700;hyphens:auto;hanging-punctuation:first">Reflected hue by film thickness (n ≈ 1.4, normal incidence).</text><rect x="54" y="446.665" width="162.333" height="18" fill="none"/><rect x="216.333" y="446.665" width="162.333" height="18" fill="none"/><rect x="378.667" y="446.665" width="162.333" height="18" fill="none"/><rect x="54" y="464.665" width="162.333" height="18" fill="none"/><rect x="216.333" y="464.665" width="162.333" height="18" fill="none"/><rect x="378.667" y="464.665" width="162.333" height="18" fill="none"/><rect x="54" y="482.665" width="162.333" height="18" fill="none"/><rect x="216.333" y="482.665" width="162.333" height="18" fill="none"/><rect x="378.667" y="482.665" width="162.333" height="18" fill="none"/><rect x="54" y="500.665" width="162.333" height="18" fill="none"/><rect x="216.333" y="500.665" width="162.333" height="18" fill="none"/><rect x="378.667" y="500.665" width="162.333" height="18" fill="none"/><rect x="54" y="518.665" width="162.333" height="18" fill="none"/><rect x="216.333" y="518.665" width="162.333" height="18" fill="none"/><rect x="378.667" y="518.665" width="162.333" height="18" fill="none"/><g transform="translate(54,546.665)"><g transform="rotate(-1.5 180 48)"><g filter="url(#fx1)"><rect x="0" y="0" width="360" height="96" rx="12" fill="url(#g8)"/></g></g></g><text x="297.5" y="658.141" text-anchor="middle" style="font-family:serif;font-size:10.3px;fill:#14121a;font-style:italic;hyphens:auto;hanging-punctuation:first">A continuous visible spectrum rendered as a single gradient fill — no raster image.</text><text x="64.3" y="685.591" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Read the spectrum above as the family of hues a single film sweeps through as it thickens.</text><text x="54" y="701.041" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">the geometry is the palette.</text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#8a8597;letter-spacing:0.35em;text-transform:uppercase"><tspan x="54">CHROMA</tspan></text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:11px;fill:#8a8597;font-weight:600;font-variant-caps:all-small-caps;letter-spacing:0.4em"><tspan x="300">Iridescence</tspan></text><text y="63" text-anchor="start" dominant-baseline="central" style="font-family:sans-serif;font-size:8.5px;fill:#8a8597;letter-spacing:0.35em;text-transform:uppercase"><tspan x="441">1</tspan></text></svg>
