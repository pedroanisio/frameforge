<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842"><rect width="100%" height="100%" fill="white"/><defs><linearGradient id="g10" x1="50%" y1="0%" x2="50%" y2="100%"><stop offset="0%" stop-color="#faf7ff"/><stop offset="100%" stop-color="#f0eafd"/></linearGradient><linearGradient id="g11" x1="0%" y1="50%" x2="100%" y2="50%"><stop offset="0%" stop-color="#ff004d"/><stop offset="16%" stop-color="#ff7a00"/><stop offset="33%" stop-color="#ffd400"/><stop offset="50%" stop-color="#14d957"/><stop offset="66%" stop-color="#00c2ff"/><stop offset="83%" stop-color="#2b5bff"/><stop offset="100%" stop-color="#8a2be2"/></linearGradient><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="30"/><feOffset dx="0" dy="12" result="off"/><feFlood flood-color="rgba(20,18,26,0.28)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="clip12"><rect x="300" y="56" width="180" height="14"/></clipPath></defs><text x="54" y="113.6" text-anchor="start" style="font-family:sans-serif;font-size:30px;fill:#14121a;font-weight:800;letter-spacing:0.02em;text-transform:uppercase">On the Physics of Iridescence</text><text x="54" y="136.7" text-anchor="start" style="font-family:sans-serif;font-size:10px;fill:#7a5cff;font-weight:600;font-variant-caps:all-small-caps;letter-spacing:0.18em">By the Optics Desk</text><text y="157.976" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="64.3" style="font-family:sans-serif;font-size:10.3px;fill:#ff2d95;font-weight:800;letter-spacing:0.01em">I</tspan><tspan style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">ridescence is structural color: hue produced not by pigment but by the way light inter-</tspan></text><text y="173.426" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="54" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">feres with itself across features the size of its own wavelength. Tilt the surface and the</tspan></text><text y="188.876" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="54" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">color shifts — the signature that geometry, not chemistry, is doing the work.</tspan></text><text x="64.3" y="204.326" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">In a thin film, light reflects from both the top and bottom surfaces. The two reflected</text><text x="54" y="219.776" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">waves travel paths that differ by twice the film thickness, and where that difference is a</text><text x="54" y="235.226" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">whole number of wavelengths the waves reinforce; elsewhere they cancel. Because the condi-</text><text x="54" y="250.676" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">tion depends on wavelength, each thickness favors a particular color.</text><rect x="54" y="256.65" width="487" height="71.52" rx="8" fill="url(#g10)"/><text x="88" y="285.21" text-anchor="start" textLength="437" lengthAdjust="spacing" style="font-family:serif;font-size:18px;fill:#7a5cff;font-weight:500;font-style:italic;hanging-punctuation:first">Color you can tilt: the hue lives in the</text><text x="70" y="308.97" text-anchor="start" style="font-family:serif;font-size:18px;fill:#7a5cff;font-weight:500;font-style:italic;hanging-punctuation:first">geometry, not in the pigment.</text><text y="341.646" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="64.3" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">The same mechanism paints the soap bubble, the beetle&#x27;s shell, and the </tspan><tspan style="font-family:serif;font-size:10.3px;fill:#25e0d8;text-decoration:underline wavy #25e0d8 1.4px">compact-disc</tspan><tspan style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"> sheen.</tspan></text><text y="357.096" text-anchor="start" textLength="487" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="54" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Engineers exploit it deliberately in </tspan><tspan style="font-family:serif;font-size:10.3px;fill:#14121a;font-variant-caps:small-caps;letter-spacing:0.04em">dielectric mirrors</tspan><tspan style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">, stacking dozens of quarter-wave</tspan></text><text y="372.546" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="54" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">layers so that a chosen band reflects almost perfectly while the rest passes through.</tspan></text><rect x="54" y="378.52" width="487" height="66.67" rx="10" fill="#f5f3fb" stroke="#d9d6e0" stroke-width="1"/><text x="77.5" y="399.26" text-anchor="start" style="font-family:sans-serif;font-size:9.5px;fill:#ffb020;font-weight:800;font-variant-caps:all-small-caps;letter-spacing:0.22em">Field Note</text><text x="77.8" y="413.786" text-anchor="start" textLength="449.2" lengthAdjust="spacing" style="font-family:serif;font-size:9.8px;fill:#14121a">To see thin-film color at home, float a drop of oil on a puddle. The film thins as it</text><text x="68" y="427.996" text-anchor="start" style="font-family:serif;font-size:9.8px;fill:#14121a">spreads, so the bands of color map directly onto thickness.</text><text x="64.3" y="458.666" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">The table below pairs film thickness with the hue it reflects most strongly at normal</text><text x="54" y="474.116" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">incidence, for a film of refractive index near 1.4.</text><text x="54" y="489.566" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;font-weight:700">Reflected hue by film thickness (n ≈ 1.4, normal incidence).</text><rect x="54" y="499.54" width="146.1" height="20.875" fill="none"/><rect x="200.1" y="499.54" width="146.1" height="20.875" fill="none"/><rect x="346.2" y="499.54" width="194.8" height="20.875" fill="none"/><rect x="54" y="520.415" width="146.1" height="20.875" fill="none"/><rect x="200.1" y="520.415" width="146.1" height="20.875" fill="none"/><rect x="346.2" y="520.415" width="194.8" height="20.875" fill="none"/><rect x="54" y="541.29" width="146.1" height="20.875" fill="none"/><rect x="200.1" y="541.29" width="146.1" height="20.875" fill="none"/><rect x="346.2" y="541.29" width="194.8" height="20.875" fill="none"/><rect x="54" y="562.165" width="146.1" height="20.875" fill="none"/><rect x="200.1" y="562.165" width="146.1" height="20.875" fill="none"/><rect x="346.2" y="562.165" width="194.8" height="20.875" fill="none"/><rect x="54" y="583.04" width="146.1" height="20.875" fill="none"/><rect x="200.1" y="583.04" width="146.1" height="20.875" fill="none"/><rect x="346.2" y="583.04" width="194.8" height="20.875" fill="none"/><g transform="translate(54,613.915)"><g transform="rotate(-1.5 180 48)"><g filter="url(#fx1)"><rect x="0" y="0" width="360" height="96" rx="12" fill="url(#g11)"/></g></g></g><text x="297.5" y="725.391" text-anchor="middle" style="font-family:serif;font-size:10.3px;fill:#14121a;font-style:italic">A continuous visible spectrum rendered as a single gradient fill — no raster image.</text><text y="752.841" text-anchor="start" textLength="476.7" lengthAdjust="spacing" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="64.3" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">Read the spectrum above as the family of hues a single film sweeps through as it thickens.</tspan></text><text y="768.291" text-anchor="start" style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first"><tspan x="54" style="font-family:serif;font-size:10.3px;fill:#8a8597;letter-spacing:0.35em;text-transform:uppercase">the geometry is the palette</tspan><tspan style="font-family:serif;font-size:10.3px;fill:#14121a;hyphens:auto;hanging-punctuation:first">.</tspan></text><text y="63" text-anchor="start" style="font-family:serif;font-size:8.5px;fill:#8a8597;letter-spacing:0.35em;text-transform:uppercase"><tspan x="54">CHROMA</tspan></text><g clip-path="url(#clip12)"><text y="63" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#8a8597;font-weight:600;font-variant-caps:all-small-caps;letter-spacing:0.4em"><tspan x="300">Iridescence</tspan></text></g><text y="63" text-anchor="start" style="font-family:serif;font-size:8.5px;fill:#8a8597;letter-spacing:0.35em;text-transform:uppercase"><tspan x="441">1</tspan></text></svg>
