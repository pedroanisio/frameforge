<svg xmlns="http://www.w3.org/2000/svg" width="595" height="842" viewBox="0 0 595 842" xml:lang="en-US"><title>CHROMA — advanced styling showcase</title><desc>Exercises the CSS-parity style module: gradients, gradient text, blend modes, filters, transforms, box-shadow, small-caps, text-decoration, styled tables and callouts.</desc><rect width="100%" height="100%" fill="white"/><defs><linearGradient id="g1" x1="28.869%" y1="4.685%" x2="71.131%" y2="95.315%"><stop offset="0%" stop-color="#0b0a12"/><stop offset="58%" stop-color="#241047"/><stop offset="100%" stop-color="#3a0f5c"/></linearGradient><radialGradient id="g2" cx="50%" cy="50%" fx="50%" fy="50%"><stop offset="0%" stop-color="#ff2d95"/><stop offset="70%" stop-color="rgba(255,45,149,0)"/></radialGradient><filter id="fx1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="46"/></filter><radialGradient id="g3" cx="50%" cy="50%" fx="50%" fy="50%"><stop offset="0%" stop-color="#25e0d8"/><stop offset="70%" stop-color="rgba(37,224,216,0)"/></radialGradient><filter id="fx2" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceGraphic" stdDeviation="54"/></filter><linearGradient id="g4" x1="0%" y1="50%" x2="100%" y2="50%"><stop offset="0%" stop-color="#ff004d"/><stop offset="16%" stop-color="#ff7a00"/><stop offset="33%" stop-color="#ffd400"/><stop offset="50%" stop-color="#14d957"/><stop offset="66%" stop-color="#00c2ff"/><stop offset="83%" stop-color="#2b5bff"/><stop offset="100%" stop-color="#8a2be2"/></linearGradient><filter id="fx3" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="16"/><feOffset dx="0" dy="5" result="off"/><feFlood flood-color="rgba(0,0,0,0.45)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="g5" x1="1.704%" y1="37.059%" x2="98.296%" y2="62.941%"><stop offset="0%" stop-color="#ff2d95"/><stop offset="52%" stop-color="#7a5cff"/><stop offset="100%" stop-color="#25e0d8"/></linearGradient><linearGradient id="g6" x1="0%" y1="50%" x2="100%" y2="50%"><stop offset="0%" stop-color="#ff2d95"/><stop offset="100%" stop-color="#ffb020"/></linearGradient><filter id="fx4" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="14"/><feOffset dx="0" dy="4" result="off"/><feFlood flood-color="rgba(255,45,149,0.45)" flood-opacity="0.25"/><feComposite in2="off" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><clipPath id="clip7"><rect x="398" y="760" width="125" height="16"/></clipPath></defs><rect x="0" y="0" width="595" height="842" fill="url(#g1)"/><g style="mix-blend-mode:screen;opacity:0.85"><g filter="url(#fx1)"><ellipse cx="150" cy="250" rx="220" ry="220" fill="url(#g2)"/></g></g><g style="mix-blend-mode:screen;opacity:0.7"><g filter="url(#fx2)"><ellipse cx="470" cy="560" rx="250" ry="250" fill="url(#g3)"/></g></g><g transform="rotate(-4 250 477)"><g filter="url(#fx3)"><rect x="70" y="470" width="360" height="14" rx="4" fill="url(#g4)"/></g></g><text y="160" text-anchor="start" style="font-family:sans-serif;font-size:12px;fill:#25e0d8;font-weight:700;font-variant-caps:all-small-caps;letter-spacing:0.32em"><tspan x="72">The Quarterly of Color &amp; Light</tspan></text><g style="background-clip:text"><text y="255" text-anchor="start" style="font-family:sans-serif;font-size:132px;fill:none;font-weight:800;letter-spacing:-0.04em"><tspan x="66">CHROMA</tspan></text></g><text y="375.58" text-anchor="start" style="font-family:serif;font-size:19px;fill:#e9e6f5;font-style:italic;letter-spacing:0.01em"><tspan x="72" textLength="430" lengthAdjust="spacing">On iridescence, thin films, and the colors</tspan><tspan x="72" dy="24.7">that live in geometry rather than pigment.</tspan></text><text y="769" text-anchor="start" style="font-family:sans-serif;font-size:11px;fill:#8a8597;font-weight:600;font-variant-caps:all-small-caps;letter-spacing:0.4em"><tspan x="72">Issue 07 — Spectra</tspan></text><g filter="url(#fx4)"><rect x="398" y="752" width="125" height="30" rx="999" fill="url(#g6)"/></g><g clip-path="url(#clip7)"><text y="768" text-anchor="middle" dominant-baseline="central" style="font-family:sans-serif;font-size:12.5px;fill:#241047;font-weight:800;letter-spacing:0.12em;text-transform:uppercase"><tspan x="460.5">AURORA EDITION</tspan></text></g><line x1="72" y1="430" x2="523" y2="430" stroke="rgba(255,255,255,0.25)" stroke-width="0.75"/></svg>
