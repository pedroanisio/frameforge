meta:
  disclaimer: Nothing in this fixture should be taken for granted. Coordinates, colors, and fonts are [APPROX]. Instructional
    text is transcribed from the supplied screenshot; the footer sentence is reproduced only to the visible clip point and
    is not completed by guess.
  source: 'User-supplied screenshot: 1782096105744.png'
  requires_patch: frameforge-v2-patch-nesting-textfit.md — spec §3.6 (nested coords + layout box model) and §3.7 (text fit);
    decisions 13–14
  patched_constructs_used:
  - 'GroupObject layout {kind: row} for the three tile rows (§3.6e)'
  - 'nested GroupObject layout {kind: free} per tile (§3.6a/e)'
  - parent-local child box resolution (§3.6a)
  - TextStyle overflow:clip + text_overflow:clip on footer_para (§3.7)
  open_questions:
  - Tile groups set layout:{kind:free} explicitly; the patch should also state that an ABSENT layout defaults to free, so
    authors need not write it.
  - BulletListObject item wrapping within its box is assumed, not stated in the supplied grammar.
