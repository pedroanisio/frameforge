meta:
  disclaimer: Nothing in this fixture should be taken for granted. Values not backed by a logical definition or verifiable
    reference (coordinates, colors, fonts) are marked [APPROX] and may be wrong. Editorial text is third-party content reproduced
    only as layout payload; no truth claim is made about it.
  source: 'User-supplied screenshot: Screenshot_20260621_225012_NYTimes.png'
  provenance:
    GRAMMAR: verified against uploaded frameforge-v2.ebnf
    SCREENSHOT: transcribed from the supplied image
    APPROX: author estimate; not authoritative
    GAP: fidelity compromise forced by the uploaded grammar (see header)
  open_questions:
  - Group-relative vs page-absolute coordinates were sidestepped by using a flat, page-absolute object list (no GroupObject).
  - text_decoration:underline for links needs frameforge-v2-style.ebnf, which was not uploaded.
  - An idiomatic article would use a FlowSection; this fixture uses a fixed Page for screenshot fidelity.
