meta:
  disclaimer: Nothing here is authoritative. Folder names/dates/counts are transcribed from the screenshot; coordinates, the
    Samsung dark palette, the two-rect folder icon, and icon glyph stand-ins are [APPROX].
  source: 'User-supplied screenshot: 27143.png (Samsung My Files)'
  requires_patch: framegraph-v2-patch-nesting-textfit.md — §3.6 column layout + nesting
  generated_by: gen_files.py (spec §9.7 external generator)
  open_questions:
  - Entry internals use free layout (so the item-count can sit at the right edge); the patched row/column layouts pack from
    the start and have no space-between/justify, so a right-aligned trailing element still needs free placement — a candidate
    refinement (justify) for a later patch.
  - 'SPEC GAP surfaced here: §3.6(f) requires every child under a layout container to supply a box, but box-less primitives
    (line via from/to, ellipse via center) have none. §3.6(f) should place box-less primitives under `free` by their intrinsic
    coordinates (offset by the parent origin) and define/forbid them under row/column/grid. Worked around by using a thin
    rect divider.'
