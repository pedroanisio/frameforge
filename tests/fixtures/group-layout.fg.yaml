dsl: FrameForge
version: 2.2.0
profile: diagram
title: Group layout — row / column / grid (fixture)
description: >-
  Exercises Group.layout arrangement (row / column / grid). Children are authored
  at (0,0) with a size and positioned by the layout engine (gap-spaced); the proxy
  previously ignored Layout, so such children overlapped. Backs the reused layout
  engine. Row tiles 60 wide + gap 10 -> x offsets 0/70/140; column 60 tall + gap 10
  -> y offsets 0/70/140; 2-col grid in 200x200 (gap 10) -> cell 95 -> offsets
  (0,0)/(105,0)/(0,105)/(105,105).
lang: en
defs:
  tokens:
    colors:
      a: '#3b6ea5'
      b: '#5b8c5a'
      c: '#b5651d'
pages:
- mode: page
  id: layout
  canvas:
    size: [600, 400]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: group          # ROW
      box: [40, 40, 300, 60]
      layout: {kind: row, gap: 10}
      children:
      - {type: rect, box: [0, 0, 60, 60], fill: a, radius: 6}
      - {type: rect, box: [0, 0, 60, 60], fill: b, radius: 6}
      - {type: rect, box: [0, 0, 60, 60], fill: c, radius: 6}
    - type: group          # COLUMN
      box: [40, 140, 80, 220]
      layout: {kind: column, gap: 10}
      children:
      - {type: rect, box: [0, 0, 80, 60], fill: a, radius: 6}
      - {type: rect, box: [0, 0, 80, 60], fill: b, radius: 6}
      - {type: rect, box: [0, 0, 80, 60], fill: c, radius: 6}
    - type: group          # GRID (2 columns)
      box: [380, 40, 200, 200]
      layout: {kind: grid, columns: 2, gap: 10}
      children:
      - {type: rect, box: [0, 0, 90, 90], fill: a, radius: 6}
      - {type: rect, box: [0, 0, 90, 90], fill: b, radius: 6}
      - {type: rect, box: [0, 0, 90, 90], fill: c, radius: 6}
      - {type: rect, box: [0, 0, 90, 90], fill: a, radius: 6}
