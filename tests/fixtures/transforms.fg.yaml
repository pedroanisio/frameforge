dsl: FrameForge
version: 2.2.0
profile: diagram
title: Y-axis transforms & origin (fixture)
description: >-
  Exercises the v2 `transform` style property — the TransformFn list rendered as
  an SVG `<g transform="…">` wrapper. Emphasises the Y axis (`translate_y`,
  `scale_y`, `skew_y`) plus `rotate`, the FrameForge default `transform_origin`
  (box centre) vs an explicit corner origin, and multi-function composition. Each
  demo overlays the transformed shape on a dashed "ghost" of its untransformed
  box so the displacement is visible. Backs the reused transform renderer
  (`_with_transform` / `_svg_transform`); the `matrix` raw-affine escape hatch is
  covered by the unit suite.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      accent: '#2e86de'
      guide: '#aebac6'
    stroke_styles:
      dashed:
        stroke_width: 1.2
        stroke_dasharray: [4, 3]
    text_styles:
      title:
        font: sans
        size: 15
        weight: 600
        color: ink
      cap:
        font: sans
        size: 11
        color: ink
        align: center
pages:
- mode: page
  id: transforms
  canvas:
    size: [770, 200]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: text
      box: [24, 18, 720, 22]
      text: Transforms with a Y-axis emphasis
      style: title

    # 1 — translate_y: shift straight down the Y axis
    - type: rect            # ghost: untransformed footprint
      box: [48, 64, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect            # transformed
      box: [48, 64, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: translate_y, args: [22]}
    - type: text
      box: [18, 168, 118, 16]
      text: translate_y
      style: cap

    # 2 — scale_y: stretch vertically about the box centre (default origin)
    - type: rect
      box: [172, 64, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [172, 64, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: scale_y, args: [1.6]}
    - type: text
      box: [142, 168, 118, 16]
      text: scale_y
      style: cap

    # 3 — skew_y: vertical shear about the box centre
    - type: rect
      box: [296, 64, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [296, 64, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: skew_y, args: [18]}
    - type: text
      box: [266, 168, 118, 16]
      text: skew_y
      style: cap

    # 4 — rotate: default transform_origin is the box centre
    - type: rect
      box: [420, 64, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [420, 64, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: rotate, args: [20]}
    - type: text
      box: [390, 168, 118, 16]
      text: rotate
      style: cap

    # 5 — rotate about an explicit transform_origin (the box's top-left corner)
    - type: rect
      box: [544, 64, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [544, 64, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: rotate, args: [20]}
        transform_origin: [544, 64]
    - type: text
      box: [514, 168, 118, 16]
      text: rotate (corner)
      style: cap

    # 6 — composition: a translate_y then a rotate, applied in list order
    - type: rect
      box: [668, 64, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [668, 64, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: translate_y, args: [14]}
        - {fn: rotate, args: [16]}
    - type: text
      box: [638, 168, 118, 16]
      text: translate_y + rotate
      style: cap
