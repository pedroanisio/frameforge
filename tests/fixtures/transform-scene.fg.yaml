    - {type: rect, box: [298, 48, 4, 34], radius: 2, fill: tick, opacity: 0.7, style: {transform: [{fn: rotate, args: [285]}], transform_origin: [300, 300]}}
    - {type: rect, box: [298, 48, 4, 34], radius: 2, fill: tick, opacity: 0.7, style: {transform: [{fn: rotate, args: [315]}], transform_origin: [300, 300]}}
