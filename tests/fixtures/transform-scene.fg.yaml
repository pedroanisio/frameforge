  - id: hub
    z: 30
    objects:
    - type: ellipse
      center: [300, 300]
      rx: 205
      ry: 205
      fill: none
      stroke: ring
      stroke_opacity: 0.5
      stroke_style: {stroke_width: 1.5, stroke_dasharray: [3, 5]}
    - type: ellipse
      center: [300, 300]
      rx: 70
      ry: 70
      fill: none
      stroke: ring
      stroke_opacity: 0.6
