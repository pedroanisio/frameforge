dsl: FrameForge
version: 2.2.0
profile: diagram
title: Transform scene — sunburst (fixture)
description: >-
  Capstone transform fixture: a radial sunburst assembled entirely from
  `rotate` copies sharing one `transform_origin` (the canvas centre [300,300]).
  Twelve gradient petals at 30° steps and twelve tick marks at the 15° offsets
  are identical objects differing only by rotation angle, over a `radial`
  gradient backdrop, finished with a glowing gradient hub and two dashed rings —
  composing transforms, gradients, `glow`, and dashed strokes into one scene.
lang: en
defs:
  tokens:
    colors:
      ring: '#7f9cf5'
      tick: '#cbd5e1'
      paper: '#e8eefc'
    text_styles:
      title:
        font: sans
        size: 15
        weight: 600
        color: paper
pages:
- mode: page
  id: transform_scene
  canvas:
    size: [600, 600]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: bg
    z: 0
    objects:
    - type: rect
      box: [0, 0, 600, 600]
      fill: {kind: radial, shape: circle, at: center, stops: [{color: '#24344a', position: '0%'}, {color: '#0d1117', position: '100%'}]}
    - type: text
      box: [24, 18, 552, 22]
      text: Transform scene — rotated copies about a shared origin
      style: title

  - id: petals
    z: 10
    objects:
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#4facfe', position: '0%'}, {color: '#00f2fe', position: '100%'}]}, style: {transform: [{fn: rotate, args: [0]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#a18cd1', position: '0%'}, {color: '#fbc2eb', position: '100%'}]}, style: {transform: [{fn: rotate, args: [30]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#4facfe', position: '0%'}, {color: '#00f2fe', position: '100%'}]}, style: {transform: [{fn: rotate, args: [60]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#a18cd1', position: '0%'}, {color: '#fbc2eb', position: '100%'}]}, style: {transform: [{fn: rotate, args: [90]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#4facfe', position: '0%'}, {color: '#00f2fe', position: '100%'}]}, style: {transform: [{fn: rotate, args: [120]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#a18cd1', position: '0%'}, {color: '#fbc2eb', position: '100%'}]}, style: {transform: [{fn: rotate, args: [150]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#4facfe', position: '0%'}, {color: '#00f2fe', position: '100%'}]}, style: {transform: [{fn: rotate, args: [180]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#a18cd1', position: '0%'}, {color: '#fbc2eb', position: '100%'}]}, style: {transform: [{fn: rotate, args: [210]}], transform_origin: [300, 300]}}
    - {type: rect, box: [288, 110, 24, 140], radius: 8, opacity: 0.92, fill: {kind: linear, angle: 90, stops: [{color: '#4facfe', position: '0%'}, {color: '#00f2fe', position: '100%'}]}, style: {transform: [{fn: rotate, args: [240]}], transform_origin: [300, 300]}}
