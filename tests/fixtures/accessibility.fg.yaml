dsl: FrameForge
version: "2.2.0"
title: Accessibility demo
description: >
  Reference fixture for the accessibility vocabulary (roadmap item 2): every
  meaningful object carries an id and is sequenced by the page `reading_order`;
  the image carries `alt` + `actual_text`; the purely visual backdrop is
  `decorative` (excluded from the reading order). It is authored to be clean
  under tooling/check_accessibility.py.
lang: en
pages:
  - mode: page
    id: cover
    canvas: deck-16x9
    reading_order: [title, subtitle, diagram, footer]
    layers:
      - id: main
        objects:
          - type: text
            id: title
            box: [120, 96, 1680, 130]
            text: Accessible by construction
            style: { font_size: 60 }
          - type: text
            id: subtitle
            box: [120, 250, 1680, 80]
            text: alt text, actual_text, and an explicit reading order
            style: { font_size: 34 }
          - type: image
            id: diagram
            box: [120, 372, 760, 520]
            src: diagram.png
            alt: System architecture diagram — client to API to database
            actual_text: client to API to database
          - type: rect
            id: backdrop
            box: [960, 372, 840, 520]
            fill: "#eef3ff"
            radius: 16
            decorative: true
          - type: text
            id: footer
            box: [120, 980, 1680, 60]
            text: FrameForge v2
            style: { font_size: 22 }
