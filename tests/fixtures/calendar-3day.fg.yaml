meta:
  disclaimer: Nothing here is authoritative. Layout text is transcribed from the screenshot (including the source typo 'School
    comute'); coordinates, the dark-theme palette, icon glyphs, and the simplified avatar ring are [APPROX].
  source: 'User-supplied screenshot: Screenshot_20260622_001747_Calendar.png'
  requires_patch: framegraph-v2-patch-nesting-textfit.md — §3.6 grid layout + nesting; §3.7 text clip on events
  generated_by: gen_calendar.py (spec §9.7 external generator)
  open_questions:
  - Overlays use the same PITCH the grid layout computes; a renderer whose grid spacing differs would misalign events.
  - The 12:50 'now' line vs the 00:17 capture time suggests the indicator is not the wall-clock now-line; modeled as a thin
    blue line as seen.
