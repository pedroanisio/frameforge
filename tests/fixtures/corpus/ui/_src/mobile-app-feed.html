<!DOCTYPE html>
<!--
  Original UI mockup, dedicated to the public domain (CC0 1.0) by the FrameForge
  project. Self-contained (inline CSS + inline SVG, system fonts, no network) so
  it renders reproducibly. A high-fidelity mobile app screen: layered cards,
  gradients, soft shadows, rounded corners, an inline chart — the raster UI
  target FrameForge should be able to reproduce.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #0f172a; --muted: #64748b; --line: #e9eef5;
    --brand: #6d28d9; --brand2: #9333ea; --accent: #06b6d4; --good: #16a34a;
    --bg: #f4f6fb;
    font-family: -apple-system, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  }
  body { width: 390px; height: 844px; background: var(--bg); color: var(--ink);
         -webkit-font-smoothing: antialiased; overflow: hidden; }
  .statusbar { height: 44px; display: flex; align-items: center; justify-content: space-between;
               padding: 0 22px; font-size: 14px; font-weight: 600; color: var(--ink); }
  .statusbar .dots { display: flex; gap: 5px; align-items: center; }
  .statusbar .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--ink); opacity: .85; }
  header { padding: 8px 22px 14px; display: flex; align-items: center; justify-content: space-between; }
  header .hi { font-size: 13px; color: var(--muted); }
  header h1 { font-size: 23px; font-weight: 800; letter-spacing: -.4px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 16px;
            box-shadow: 0 6px 16px rgba(109,40,217,.35); }
  .balance { margin: 4px 22px 18px; border-radius: 22px; padding: 22px 24px; color: #fff;
             background: radial-gradient(120% 140% at 0% 0%, var(--brand2) 0%, var(--brand) 55%, #4c1d95 100%);
             box-shadow: 0 18px 34px -14px rgba(76,29,149,.65); position: relative; overflow: hidden; }
  .balance::after { content: ""; position: absolute; right: -40px; top: -50px; width: 170px; height: 170px;
                    border-radius: 50%; background: rgba(255,255,255,.12); }
  .balance .label { font-size: 12.5px; opacity: .85; letter-spacing: .3px; text-transform: uppercase; }
  .balance .amt { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-top: 6px; }
  .balance .row { display: flex; gap: 10px; margin-top: 16px; }
  .chip { background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.22);
          padding: 7px 13px; border-radius: 999px; font-size: 12.5px; font-weight: 600;
          backdrop-filter: blur(4px); }
  .chip.up::before { content: "▲ "; color: #bbf7d0; font-size: 10px; }
  .section { display: flex; align-items: center; justify-content: space-between; margin: 6px 22px 12px; }
  .section h2 { font-size: 16px; font-weight: 700; }
  .section a { font-size: 13px; color: var(--brand); font-weight: 600; }
  .card { margin: 0 22px 12px; background: #fff; border: 1px solid var(--line); border-radius: 18px;
          padding: 14px 16px; display: flex; align-items: center; gap: 14px;
          box-shadow: 0 8px 20px -16px rgba(15,23,42,.35); }
  .icon { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
  .icon svg { width: 24px; height: 24px; }
  .i-shop { background: #ede9fe; color: var(--brand); }
  .i-food { background: #cffafe; color: #0e7490; }
  .i-pay  { background: #dcfce7; color: var(--good); }
  .meta { flex: 1; }
  .meta .t { font-size: 15px; font-weight: 700; }
  .meta .s { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .amt2 { font-size: 15.5px; font-weight: 800; }
  .amt2.neg { color: var(--ink); }
  .amt2.pos { color: var(--good); }
  .chartcard { margin: 0 22px 14px; background: #fff; border: 1px solid var(--line); border-radius: 18px;
               padding: 16px 18px 10px; box-shadow: 0 8px 20px -16px rgba(15,23,42,.35); }
  .chartcard .top { display: flex; justify-content: space-between; align-items: baseline; }
  .chartcard .top .k { font-size: 12.5px; color: var(--muted); }
  .chartcard .top .v { font-size: 18px; font-weight: 800; }
  .nav { position: absolute; bottom: 0; left: 0; right: 0; height: 84px; background: rgba(255,255,255,.92);
         border-top: 1px solid var(--line); display: flex; justify-content: space-around; align-items: flex-start;
         padding-top: 12px; backdrop-filter: blur(12px); }
  .nav .item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); font-size: 11px; }
  .nav .item.active { color: var(--brand); }
  .nav .item svg { width: 24px; height: 24px; }
  .fab { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
         width: 58px; height: 58px; border-radius: 50%;
         background: linear-gradient(135deg, var(--brand), var(--brand2));
         box-shadow: 0 12px 26px -8px rgba(109,40,217,.7); display: flex; align-items: center; justify-content: center; }
  .fab svg { width: 26px; height: 26px; color: #fff; }
</style>
</head>
<body>
  <div class="statusbar">
    <span>9:41</span>
    <span class="dots"><span></span><span></span><span></span>&nbsp;&nbsp;5G&nbsp;&nbsp;100%</span>
  </div>

  <header>
    <div><div class="hi">Good morning</div><h1>Maya Okafor</h1></div>
    <div class="avatar">MO</div>
  </header>

  <div class="balance">
    <div class="label">Total balance</div>
    <div class="amt">$12,480.55</div>
    <div class="row">
      <span class="chip up">3.2% this week</span>
      <span class="chip">•••• 4921</span>
    </div>
  </div>

  <div class="chartcard">
    <div class="top"><span class="k">Spending · June</span><span class="v">$2,140</span></div>
    <svg viewBox="0 0 320 90" width="100%" height="90" preserveAspectRatio="none" style="margin-top:6px">
      <defs>
        <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#9333ea" stop-opacity=".35"/>
          <stop offset="1" stop-color="#9333ea" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M0,70 L40,55 L80,62 L120,38 L160,46 L200,22 L240,34 L280,16 L320,26 L320,90 L0,90 Z" fill="url(#area)"/>
      <path d="M0,70 L40,55 L80,62 L120,38 L160,46 L200,22 L240,34 L280,16 L320,26" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="280" cy="16" r="4.5" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    </svg>
  </div>

  <div class="section"><h2>Recent</h2><a>See all</a></div>

  <div class="card">
    <div class="icon i-shop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
    <div class="meta"><div class="t">Lumière Studio</div><div class="s">Shopping · 8:24 AM</div></div>
    <div class="amt2 neg">−$84.20</div>
  </div>
  <div class="card">
    <div class="icon i-food"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7a3 3 0 0 0 6 0V2"/><path d="M6 2v20"/><path d="M18 2a4 4 0 0 0-4 4v6h4Zm0 10v10"/></svg></div>
    <div class="meta"><div class="t">Aster Coffee</div><div class="s">Food &amp; Drink · Yesterday</div></div>
    <div class="amt2 neg">−$5.75</div>
  </div>
  <div class="card">
    <div class="icon i-pay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
    <div class="meta"><div class="t">Payroll · Northwind</div><div class="s">Income · Jun 14</div></div>
    <div class="amt2 pos">+$3,250.00</div>
  </div>

  <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></div>
  <nav class="nav">
    <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>Home</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>Stats</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Cards</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Profile</div>
  </nav>
</body>
</html>
