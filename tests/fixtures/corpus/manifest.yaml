    format: png
    license: CC0-1.0
    license_url: https://creativecommons.org/publicdomain/zero/1.0/
    source: FrameForge (original mockup)
    generated: true
    generator: viewer/dev/render-ui-corpus.cjs
    title: "Analytics dashboard @2x (2880×1800) — sidebar, KPIs, charts, table"

  # ---- Reference suite: per-feature SVG (resvg test suite, MIT — permissive) ----
