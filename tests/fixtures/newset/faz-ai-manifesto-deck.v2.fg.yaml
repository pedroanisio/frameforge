      slide_num: '03'
      params:
        phase_color: phase1
  - id: header
    z: 10
    objects:
    - type: text
      id: v.h1
      decorative: true
      text: 'Most AI products are now optimized for the same metric as social media:'
      box:
      - 80
      - 76
      - 800
      - 32
      style: reject_setup
    - type: text
      id: v.h2
      decorative: true
      text: time spent.
      box:
      - 80
      - 116
      - 800
      - 40
      style: reject_em
    - type: line
      id: v.rule
      decorative: true
      from:
      - 380
      - 176
      to:
      - 580
      - 176
      stroke: chrome_line
      stroke_style:
        stroke_width: 1
  - id: refusals
    z: 20
    objects:
    - type: use
      id: v.r1
      decorative: true
      symbol: rejection_card
      box:
      - 60
      - 210
      - 278
      - 260
      label: WE WILL NOT BE
      title: 'An AI that just

        keeps going.'
      body: A real worker has limits. They push back. They tell the boss when enough is enough. An always-on compliance machine
        is autocomplete, not a colleague. Ours should know when to stop.
    - type: use
      id: v.r2
      decorative: true
      symbol: rejection_card
      box:
      - 346
      - 210
      - 278
      - 260
      label: WE WILL NOT BE
      title: 'An AI that trains on

        your life.'
      body: 'Family logistics, kids'' schedules, household decisions: none of that should feed a foundation model. Privacy
        isn''t a bonus feature. It''s the condition that makes the rest of the product defensible. No training without explicit
        per-source consent.'
    - type: use
      id: v.r3
      decorative: true
      symbol: rejection_card
      box:
      - 632
      - 210
      - 278
      - 260
      label: WE WILL NOT BE
      title: 'An AI that treats more

        use as success.'
      body: DAU logic cannot support a product whose best state is "go rest, we've got it." We'll measure success by how much
        thinking we took off your plate, not by how long we kept your eyes on a screen.
  - id: synthesis
    z: 30
    objects:
    - type: text
      id: v.sy
      decorative: true
      text: These three refusals clash directly with the business model underneath every foundation model provider.
      box:
      - 60
      - 486
      - 840
      - 18
      style:
        font: primary
        size: 11
        weight: 400
        color: text_muted
        align: center
        italic: true
  notes: Read the setup. Pause before 'time spent.' Then give each card its own beat.
  meta:
    title: Engagement-Maximizing AI Is the Disease, Not the Cure
    description: Three plain refusals. This is where the deck sharpens. Phase 1.
    slide_index: 3
