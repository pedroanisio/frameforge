      text: Manifesto v0.2  ·  Defended at every quarterly review for the next ten years
      box:
      - 80
      - 440
      - 800
      - 18
      style: cover_meta
  notes: Open quietly. Read the tagline once. Then stop for a beat.
  meta:
    title: faz.ai — The Achievement Layer for Operators
    description: Cover slide. Set the tone without overexplaining it. Phase 1.
    slide_index: 1
    tokens:
