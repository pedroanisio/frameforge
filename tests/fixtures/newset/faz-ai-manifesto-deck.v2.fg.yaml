      slide_title: What We Will Refuse to Ship
      slide_num: 09
      params:
        phase_color: phase3
  - id: taboos
    z: 10
    objects:
    - type: use
      id: v.t1
      decorative: true
      symbol: taboo_card
      box:
      - 40
      - 68
      - 440
      - 108
      number: '01'
      title: No dark patterns.
      body: No infinite scroll, no hidden cancel flow, no fake urgency, no manipulative copy. Getting out should be as easy
        as getting in.
    - type: use
      id: v.t2
      decorative: true
      symbol: taboo_card
      box:
      - 40
      - 184
      - 440
      - 108
      number: '02'
      title: No attention-capture UX.
      body: No notification bursts to drag people back in. No streak counters. No read-receipt anxiety. The product should
        earn attention by being useful, not by extracting it.
    - type: use
      id: v.t3
      decorative: true
      symbol: taboo_card
      box:
      - 40
      - 300
      - 440
      - 108
      number: '03'
      title: No training without consent.
      body: Per-source explicit consent. Family data is opt-in only. Default is no-train. The user can inspect, edit, export,
        and delete any memory at any time.
    - type: use
      id: v.t4
      decorative: true
      symbol: taboo_card
      box:
      - 496
      - 68
      - 440
      - 108
      number: '04'
      title: No engagement metrics as North Star.
      body: 'DAU, time spent, queries served: operational metrics, never goals. Our North Star is hours of cognition offloaded.
        We measure what the user got back, not what we captured.'
    - type: use
      id: v.t5
      decorative: true
      symbol: taboo_card
      box:
      - 496
      - 184
      - 440
      - 108
      number: '05'
      title: No hidden Core configurability.
      body: The Core's commitments are constitutional and non-negotiable. They do not sit behind feature flags. If the disagreement
        is fundamental, the honest answer is cancellation.
    - type: use
      id: v.t6
      decorative: true
      symbol: taboo_card
      box:
      - 496
      - 300
      - 440
      - 108
      number: '06'
      title: No soft-refusal that relents.
      body: A hard limit that softens under user pressure is not a limit. The system does not negotiate. "Sleep on it" is
        the user's cool-down hatch — not the system's reconsideration loop.
  - id: cultural_commitment
    z: 20
