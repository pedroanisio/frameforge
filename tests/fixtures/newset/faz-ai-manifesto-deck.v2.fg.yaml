    objects:
    - type: use
      id: v.q1
      decorative: true
      symbol: commitment_card
      box:
      - 40
      - 68
      - 440
      - 196
      label: 01  ·  PRIVACY POSTURE
      title: 'End-to-end encrypted.

        No training without consent.'
      body: 'Family data, kids'' schedules, household financial decisions: encrypted at rest, never turned into training material
        by default. Fine-tuning requires per-source consent. The user can inspect, edit, export, and delete any memory.'
      block_label: 'FOUNDATION PROVIDERS CAN''T:'
      block_body: Their training-data economics cut against this promise at the root.
    - type: use
      id: v.q2
      decorative: true
      symbol: commitment_card
      box:
      - 496
      - 68
      - 440
      - 196
      label: 02  ·  ANTI-ENGAGEMENT UX
      title: 'We ship UI_RESTING.

        We ship UI_DEPLETED.'
      body: '"You''ve done enough thinking today." "faz is working. You are resting." Those are flagship states, not edge
        cases. When the user''s wellbeing calls for less engagement, the product should create less engagement. Logging out
        is a feature.'
      block_label: 'FOUNDATION PROVIDERS CAN''T:'
      block_body: DAU and time-spent logic make this almost impossible for them to hold.
    - type: use
      id: v.q3
      decorative: true
      symbol: commitment_card
      box:
      - 40
      - 280
      - 440
      - 196
      label: 03  ·  WORK–LIFE MERGE
      title: 'One cognitive space.

        Work and life unified.'
      body: School pickup at 15:00 should live in the same canvas as Q2 strategy. The switch between those worlds is what
        steals people's evenings. We merge the cognitive space so the user doesn't pay that bridge tax twice a day.
      block_label: 'FOUNDATION PROVIDERS HAVEN''T:'
      block_body: This asks for family-domain trust and policy infrastructure they were never built to carry.
    - type: use
      id: v.q4
      decorative: true
      symbol: commitment_card
      box:
      - 496
      - 280
      - 440
      - 196
      label: 04  ·  REFUSAL AS FEATURE
      title: 'AI says No.

        No is No.'
      body: No to the fourteenth version of the same request today. No to a pattern of working past your declared end-time.
        No to a decision made while angry. No to itself when its own classifier is wrong. A hard limit has to stay hard.
      block_label: 'FOUNDATION PROVIDERS CAN''T:'
      block_body: Helpfulness training rewards compliance, not principled refusal.
  notes: Read these as one system, not four isolated promises. The line at the bottom of each card is the point.
  meta:
    title: Four Commitments Only We Can Make
    description: Four commitments that define the moat. Phase 2.
    slide_index: 5
