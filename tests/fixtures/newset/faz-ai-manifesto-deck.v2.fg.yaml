    - type: line
      id: v.rule
      decorative: true
      from:
      - 400
      - 302
      to:
      - 560
      - 302
      stroke: accent_warm
      stroke_style:
        stroke_width: 1.5
    - type: text
      id: v.tag
      decorative: true
      text: 'The achievement layer for operators

        who want their life back.'
      box:
      - 80
      - 322
      - 800
      - 80
      style: cover_tag
    - type: text
