dsl: FrameForge
version: 2.2.0
profile: diagram
title: GenAI as a mediated intelligence system
defs:
  tokens:
    colors:
      page_bg: '#F8FAFD'
      slide_bg: '#FFFFFF'
      slide_border: '#C8C8C8'
      black: '#000000'
      white: '#FFFFFF'
      orchestration_blue: '#153F6B'
      orchestration_border: '#082E53'
      pale_blue: '#E8EEF7'
      governance_blue: '#DFE8F5'
      governance_border: '#003D76'
      panel_gray: '#EFEFEF'
      box_gray: '#F7F7F7'
      recursive_box: '#F4F8FC'
      legend_gray: '#EFEFEF'
      dashed_blue: '#1D4F7A'
      chip_border: '#AFC3D9'
    fonts:
      primary: Arial, Helvetica, sans-serif
    text_styles:
      title:
        font: primary
        size: 29
        weight: 800
        color: black
        align: left
        line_height: 32
      subtitle:
        font: primary
        size: 18
        weight: 400
        color: black
        align: left
        line_height: 21
      heading:
        font: primary
        size: 14
        weight: 700
        color: black
        align: center
        line_height: 16
      body:
        font: primary
        size: 12
        weight: 400
        color: black
        align: center
        line_height: 13
      tiny:
        font: primary
        size: 10
        weight: 400
        color: black
        align: center
        line_height: 11
      tiny_left:
        font: primary
        size: 10
        weight: 400
        color: black
        align: left
        line_height: 11
      white_heading:
        font: primary
        size: 14
        weight: 700
        color: white
        align: center
        line_height: 16
      white_italic:
        font: primary
        size: 12
        weight: 400
        italic: true
        color: white
        align: center
        line_height: 13
      legend:
        font: primary
        size: 12
        weight: 400
        color: black
        align: left
        line_height: 14
    stroke_styles:
      direct_flow:
        stroke_width: 1.5
        stroke_dasharray: null
        arrow_start: false
        arrow_end: true
        stroke: black
      genai_loop:
        stroke_width: 1.2
        stroke_dasharray:
        - 4
        - 4
        arrow_start: false
        arrow_end: true
        stroke: dashed_blue
      dependency:
        stroke_width: 1.3
        stroke_dasharray: null
        arrow_start: true
        arrow_end: true
        stroke: black
      influence:
        stroke_width: 1.2
        stroke_dasharray: null
        arrow_start: false
        arrow_end: true
        stroke: black
      thin_border:
        stroke_width: 1
        stroke_dasharray: null
        stroke: black
      dashed_border:
        stroke_width: 1
        stroke_dasharray:
        - 4
        - 4
        stroke: dashed_blue
      cross_cutting_control:
        stroke_width: 1.2
        stroke_dasharray: null
        stroke: governance_border
  masters:
    main:
      canvas:
        size:
        - 991
        - 570
        units: px
  components:
    info_box:
      slots:
      - title
      - body
      geometry:
        radius: 8
      variants:
        normal:
          fill: box_gray
          stroke_style: thin_border
        recursive:
          fill: recursive_box
          stroke_style: dashed_border
      internal_layout:
        title:
          box_offset:
          - 0
          - 7
          - 100%
          - 17
          style: heading
        body:
          box_offset:
          - 8
          - 24
          - calc(100% - 16)
          - calc(100% - 27)
          style: body
    orchestration_inner_box:
      slots:
      - title
      - body
      geometry:
        radius: 4
      fill: pale_blue
      internal_layout:
        title:
          box_offset:
          - 0
          - 4
          - 100%
          - 15
          style: heading
        body:
          box_offset:
          - 4
          - 20
          - calc(100% - 8)
          - 13
          style: tiny
    substrate_layer:
      slots:
      - title
      - body
      geometry:
        radius: 5
      fill: box_gray
      stroke_style: thin_border
      internal_layout:
        title:
          box_offset:
          - 0
          - 5
          - 100%
          - 15
          style: heading
        body:
          box_offset:
          - 0
          - 22
          - 100%
          - 13
          style: tiny
    chip:
      slots:
      - text
      geometry:
        radius: 3
      fill: pale_blue
      stroke:
        color: chip_border
        width: 1
      text_style: tiny
  ontology:
    node_types:
      DocumentTitle:
        meaning: Primary statement and subtitle of the diagram.
      GovernanceLayer:
        meaning: Cross-cutting governance, safety, and accountability controls.
      ActorGroup:
        meaning: Container grouping actors and input sources.
      Actor:
        meaning: Initiating source that provides input, intent, data, or synthetic input.
      Mediator:
        meaning: Orchestration layer mediating actors, tools, memory, policy, and models.
      OrchestrationSubLayer:
        meaning: Functional subcomponent inside the orchestration layer.
      ModalitySet:
        meaning: Supported mediated modalities and action types.
      OutcomeGroup:
        meaning: Container grouping outputs and effects.
      Outcome:
        meaning: Effect or output produced by the mediated system.
      ModelSubstrate:
        meaning: Underlying model and knowledge infrastructure.
      ModelSubstrateLayer:
        meaning: 'Specific substrate layer: foundation, adaptation, or training source.'
      FeedbackLoop:
        meaning: Recursive GenAI-to-GenAI or synthetic-data feedback loop.
      Legend:
        meaning: Explanation of visual encodings.
    edge_types:
      ControlApplication:
        meaning: Governance applies across the system as a cross-cutting control layer.
        default_visual_style: cross_cutting_control
      DirectMediationFlow:
        meaning: Solid arrow showing direct mediated flow between actors, orchestration, and outcomes.
        default_visual_style: direct_flow
      RecursiveGenAIFlow:
        meaning: Dashed arrow showing GenAI-to-GenAI recursive loop or feedback flow.
        default_visual_style: genai_loop
      GroundingDependency:
        meaning: Bidirectional dependency or runtime grounding relationship.
        default_visual_style: dependency
      TrainingInfluence:
        meaning: Pre-training or post-training influence from knowledge sources to model behavior.
        default_visual_style: influence
description: Actors, orchestration, model substrate, feedback loops, and governance.
