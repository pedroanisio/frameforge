dsl: FrameForge
version: 2.2.0
profile: diagram
title: Arrowhead markers (fixture)
description: >-
  Exercises stroke_style arrow_start/arrow_end on line and path — the v2
  single-form marker refs (paint in `stroke`, geometry incl. arrows in
  `stroke_style`). Backs the ported arrowhead-marker renderer component; covers
  every marker kind plus a both-ends case and an inline (un-named) stroke_style.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      accent: '#c0392b'
      muted: '#6b7785'
    stroke_styles:
      flow:        # default filled triangle at the end (arrow_end: true)
        stroke_width: 2
        arrow_end: true
      bidir:       # both ends, default triangle
        stroke_width: 2
        arrow_start: true
        arrow_end: true
      inherit:     # hollow triangle (UML generalization)
        stroke_width: 1.5
        arrow_end: hollow_triangle
      compose:     # filled diamond at the start (UML composition)
        stroke_width: 1.5
        arrow_start: filled_diamond
      navig:       # open arrow (UML association navigability)
        stroke_width: 1.5
        arrow_end: open_arrow
    text_styles:
      label:
        font: sans
        size: 13
        weight: 600
        color: ink
pages:
- mode: page
  id: arrows
  canvas:
    size:
    - 640
    - 400
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: text
      box: [40, 22, 560, 26]
      text: Arrowhead marker kinds
      style: label
    - type: line          # filled_triangle (default), end
      from: [60, 92]
      to: [580, 92]
      stroke: ink
      stroke_style: flow
    - type: line          # default triangles, both ends
      from: [60, 142]
      to: [580, 142]
      stroke: accent
      stroke_style: bidir
    - type: line          # hollow_triangle, end
      from: [60, 192]
      to: [580, 192]
      stroke: ink
      stroke_style: inherit
    - type: line          # filled_diamond, start
      from: [60, 242]
      to: [580, 242]
      stroke: muted
      stroke_style: compose
    - type: path          # open_arrow on a multi-segment path
      d: M60,300 L320,300 L580,332
      stroke: ink
      stroke_style: navig
    - type: line          # inline (un-named) stroke_style also carries an arrow
      from: [60, 366]
      to: [580, 366]
      stroke: accent
      stroke_style:
        stroke_width: 2
        stroke_dasharray: [6, 4]
        arrow_end: true
