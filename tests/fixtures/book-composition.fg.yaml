    type: heading
    level: 1
    text: 5 · Style
    id: ch-5
  - type: paragraph
    text: An object's paint need not be a single decision. The appearance stack paints
      one geometry several times — fill, outer stroke, inner stroke — bottom to top,
      each pass declaring only what it owns.
