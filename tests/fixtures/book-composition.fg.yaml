    caption: 'Figure 7.3 — Multiview of the prism: front, top, side, isometric'
  - type: paragraph
    text: The painter's algorithm sorts faces by depth per view; the projection is
      honest about being a drawing, not a model. For the cases where a true kernel
      is needed, the roadmap keeps its non-goals written down.
  - break_before: page
    type: heading
    level: 1
    text: 8 · The Letter
    id: ch-8
  - type: paragraph
    text: Typography's smallest unit is a pair. The space between A and V is not the
      space between A and B, and a page set without kerning quietly announces that
      nobody looked. The metrics module reads the resolved font's kern table when
      fontTools is present, and accepts explicit pairs when it is not — both paths
      emit grammar-native spans.
