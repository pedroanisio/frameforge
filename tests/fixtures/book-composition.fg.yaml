  - type: paragraph
    text: 'Contrast is arithmetic, not opinion: ink on paper here measures 16.1:1
      against the WCAG floor of 4.5:1 for body text. The builder can refuse a palette
      before a single page is set — the cheapest possible accessibility review.'
