    caption: 'Figure 1.1 — A modular scale (base 11, ratio 1.25): [11.0, 13.8, 17.2,
      21.5, 26.9, 33.6]'
  - type: paragraph
    text: Sizes drawn from one modular scale agree with each other the way notes of
      one chord do; the bars above are the scale made visible, each length six times
      its font size.
  - type: paragraph
    text: 'The proof of a paginator is what it refuses to do: it will not orphan a
      heading at a page foot, will not split a kept figure from its caption, and will
      not stretch a last line into a river because the paragraph ended inconveniently.
      Refusals are design; the engine''s cost function makes them cheap enough to
      be invisible.'
  - type: heading
    level: 2
    text: 1.2 · Lists and continuation
    id: ch-1-s2
  - type: list
    items:
    - The column carries prose.
    - Lists interrupt it with rhythm, not with noise.
    - A continuation line hangs beneath its marker.
  - type: paragraph
    text: 'Everything on this page is a flowable: paragraphs, headings, lists, figures.
      The engine decides where pages end; the author decides only what must not be
      separated.'
  - type: heading
    level: 2
    text: 1.3 · The canon, briefly
    id: ch-1-s3
  - type: paragraph
    text: 'Edward Johnston taught letterers to divide the page before touching it:
      the inner margin one and a half units, the head two, the outer three, the foot
      four. The asymmetry is not decoration — facing pages share their inner silence,
      and the thumb needs the outer edge. FrameGraph mirrors the canon recto and verso,
      so a spread reads as one object.'
  - type: paragraph
    text: 'A measure that runs too long tires the return sweep of the eye; one that
      runs too short chops the phrase. The forty-five to seventy-five character band
      is not taste but physiology, and the validator can be asked to check it the
      way it checks contrast: before ink, not after complaints.'
  - type: paragraph
    text: None of this requires an operator watching a preview. The same YAML paginates
      identically on every machine, because the breaks are chosen by an algorithm
      with a cost function, not by a rendering accident. Determinism is what lets
      a book carry a test suite.
  - type: paragraph
    text: 'What follows is a tour: each chapter takes one capability family, states
      what it is for, and proves it with plates computed by the very functions under
      discussion. Nothing was drawn by hand; everything can be re-derived.'
  - type: heading
    level: 2
    text: 1.4 · Reading a spread
    id: ch-1-s4
  - type: paragraph
    text: Hold two facing pages and the design either resolves or it does not. The
      inner margins pool into one channel of quiet; the outer edges hold the thumbs;
      the running text aligns across the gutter because both pages answer to the same
      master. A book that only works one page at a time is a stack of leaflets.
  - type: paragraph
    text: The verso and recto masters mirror each other, and the engine tracks the
      document-global page parity — so a chapter that opens mid-book still knows which
      margin is inner. These are the kinds of facts a template cannot carry and a
      layout engine must.
  - break_before: page
    type: heading
    level: 1
    text: 2 · The Line
    id: ch-2
  - type: paragraph
    text: 'A stroke is a promise about a pen. The outline engine keeps that promise
      in geometry: the centre-line and a width become a closed filled path, so every
      backend paints the same body without knowing anything about pens.'
