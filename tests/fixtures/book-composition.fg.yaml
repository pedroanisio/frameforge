  - type: heading
    level: 2
    text: 4.3 · Naming the palette
    id: ch-4-s3
  - type: paragraph
    text: 'A colour that reaches the document does so as a token: a name in one table,
      referenced everywhere it is used. The name is the design decision; the hex is
      an implementation detail the recolour pass may change wholesale. Plates in this
      chapter write literals only because they demonstrate the machinery beneath the
      names.'
  - type: paragraph
    text: Tokens also carry the audit trail. When the grey test or the contrast floor
      rejects a palette, the finding names a token, not a coordinate on some page
      — and fixing the token fixes every use at once.
  - type: heading
    level: 2
    text: 4.4 · Tone before hue
    id: ch-4-s4
  - type: paragraph
    text: 'Chevreul''s sternest test ignores colour entirely: print the page grey
      and see whether the hierarchy survives. A palette that only works in hue collapses
      for a fifth of readers and every photocopier. The tone scale below is one teal
      walked from paper to ink; any two neighbours are a legible step.'
