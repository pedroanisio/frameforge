  - type: heading
    level: 2
    text: 8.1 · Measure before ink
    id: ch-8-s1
  - type: paragraph
    text: 'The same module answers the question every absolute layout asks eventually:
      how wide is this string, and how tall will it stand once wrapped? Boxes sized
      by measurement instead of guesswork are what keep the containment gates green
      across this entire corpus.'
  - type: paragraph
    text: 'Where the measuring engine and the drawing engine disagree — different
      font, different host — the layout must scream, and it does: silent substitution
      is banned by decision record, and the font-pack tooling pins the faces so measure
      equals render on any machine.'
  - type: paragraph
    text: The pipeline runs both directions. A portable font pack carries the exact
      faces with their fingerprints; the renderer installs it before the first glyph
      is measured; and a face the pack cannot supply is a loud build error carrying
      the pack digest — never a lookalike substituted in silence.
  - type: paragraph
    text: 'Typography at this altitude is bookkeeping, and that is praise: kerning
      tables, advance widths, wrap points and line boxes are all just numbers, and
      numbers can be gated. The craft is deciding which numbers matter; the machine
      holds them steady afterwards.'
  - break_before: page
    type: heading
    level: 1
    text: 9 · The Pattern
    id: ch-9
  - type: paragraph
    text: 'Most slides are not designed; they are re-derived. The pattern catalog
      absorbs that truth: three hundred and seventy-five typed layouts, each declaring
      its zones, its size vocabulary and the shape of content it accepts. A fill is
      validated before any geometry is computed — layout never runs on unchecked content.'
