    type: heading
    level: 1
    text: 1 · The Column
    id: ch-1
  - type: paragraph
    text: A page begins as a negotiation between text and silence. The column takes
      what it needs to carry a comfortable line — forty-five to seventy-five characters
      — and returns the rest to the margins, where the eye rests between thoughts.
  - type: paragraph
    text: FrameGraph settles this negotiation deterministically. A flow section names
      a master; the master names a canvas; the margins resolve through an explicit
      region, a declared margin, or the Johnston canon — inner one-and-a-half, top
      two, outer three, foot four. Nothing is eyeballed, so nothing drifts.
  - type: heading
    level: 2
    text: 1.1 · Measure and rhythm
    id: ch-1-s1
  - type: paragraph
    text: The Knuth–Plass engine breaks each paragraph as a whole, trading tightness
      across lines instead of committing greedily to the first fit. Hyphenation follows
      Liang patterns. The result is the even grey a book page owes its reader.
