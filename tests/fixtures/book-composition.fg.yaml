    caption: 'Figure 9.3 — The radial module generator: one hub, four satellites,
      edges beneath'
  - type: paragraph
    text: Three generators, three grammars of arrangement — grid, tessellation, radial
      — and none of them asked the author for a single coordinate.
  - type: paragraph
    text: Each plate is the generator's own output, rescaled by plain arithmetic —
      symbol frames, path data and text styles all multiplied by one factor, so what
      this book embeds is exactly what the generator computed, smaller.
  - break_before: page
    type: heading
    level: 1
    text: 10 · The Corpus
    id: ch-10
  - type: paragraph
    text: A format earns trust by carrying other people's documents. The migration
      path lifts the predecessor dialect in one command, and the corners it learned
      are recorded as a mapping table — each one found by migrating a real production
      deck, not by speculation.
  - type: table
    rows:
    - - scene / visual envelope
      - one page + defs.tokens
    - - deck / slides envelope
      - defs + one page per slide
    - - text styles (font, size, wrap)
      - font_family, font_size, white_space
    - - chip_row component
      - a group of pills, baked
    - - gradient fill tokens
      - v2 Gradient paints that render
    columns:
    - v0.1 dialect
    - v2 lift
    header:
    - v0.1 dialect
    - v2 lift
  - type: heading
    level: 2
    text: 10.1 · What the oracle taught
    id: ch-10-s1
  - type: paragraph
    text: 'The strongest lesson came from the golden corpus itself: a deck cover had
      rendered near-black since the day it was pinned, because a declared gradient
      token was never dereferenced by the renderer. The migration work found the silent
      failure, the fix lit the cover purple, and the golden lock was re-pinned with
      open eyes.'
  - type: paragraph
    text: 'Every migrated deck is verified page-by-page against the predecessor''s
      own renderer — content identical, wrap points and font faces honestly different,
      and a hard rule enforced throughout: nothing is ever silently truncated. Overflow
      must be explicit policy or it is a build error.'
  - type: paragraph
    text: 'The corpus now holds thirty-eight fixtures, every one validating clean,
      every one rendered by the gate on every commit. A book like this joins them
      the moment it is committed: the page you are reading is a test asset.'
  - type: paragraph
    text: 'Two decks remain outside, waiting on a dependency the checklist names honestly:
      their diagrams speak the UML dialect, and the composers that understand it have
      not yet crossed over from the predecessor. When they do, the same one-command
      lift is already waiting.'
  - break_before: page
    type: heading
    level: 1
    text: 11 · The Gate
    id: ch-11
  - type: paragraph
    text: 'Everything in this volume is claimed twice: once by the prose, once by
      a test. The gate runs twelve checks on every commit — schema against model,
      grammar against schema, fixtures against the validator, renders against a golden
      lock — and a chapter that breaks any of them does not ship.'
  - type: paragraph
    text: 'The discipline has a name in this repository: no output is trusted until
      it is checked against a real gate. Rendered pixels outrank YAML; a numbered
      caption is not delivered until it is seen on a page; a silent truncation is
      a build error, not a style choice.'
  - type: heading
    level: 2
    text: 11.1 · The grey test
    id: ch-11-s1
  - type: paragraph
    text: 'The oldest gate is Chevreul''s: drain the hue and see if the page still
      speaks. Below, one working palette and its grey shadow — the hierarchy must
      survive the crossing or the palette is leaning on colour it does not own.'
