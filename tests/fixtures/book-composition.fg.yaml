  - type: paragraph
    text: 'Profiles compose with smoothing: run the centre-line through the Catmull-Rom
      interpolator first and the width function rides the curve, not the polyline.
      The swash on the previous plate is exactly that — four knots, one pen angle,
      and no hand-tuning anywhere.'
  - type: heading
    level: 2
    text: 2.3 · Corners, honestly
    id: ch-2-s3
  - type: paragraph
    text: 'A join is a small theory of what a corner means: miter insists the two
      edges meet where they were headed, bevel concedes the point, round admits a
      pen was involved. The engine implements all three and caps to match — and routes
      the round cap explicitly through the outward direction, because at a stroke''s
      end the shorter arc is ambiguous and the wrong choice bites into the body.'
  - type: paragraph
    text: The deeper point is architectural. Because outlining happens at author time,
      the document that leaves the builder contains only closed filled paths. A PDF
      engine, a browser, a plotter — none of them is asked to agree about pens, because
      the pen is already gone.
