    alt: lathe-revolved vase
    caption: Figure 7.2 — A profile revolved into a vessel (20 segments)
  - type: paragraph
    text: 'Materials shade the faces without pretending to ray-trace: a Lambert term
      against a declared light, ambient floor beneath it, painter-sorted. The vase''s
      roundness is twenty flat quadrilaterals telling one coordinated lie — which
      is all drawing has ever been.'
  - type: heading
    level: 2
    text: 7.1 · Every view at once
    id: ch-7-s1
  - type: paragraph
    text: Engineering asks for agreement between views. Multiview renders front, top,
      side and isometric panels of one scene in a single grid — four claims, one geometry,
      no chance for the views to drift apart because they are projections of the same
      faces.
