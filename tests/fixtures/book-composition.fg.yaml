  - type: paragraph
    text: 'Because the wobble is seeded, imperfection becomes a reviewable property:
      change the seed and the hand changes; keep it and every rebuild of this book
      draws the same tremor. The golden gate treats humanized pages like any other
      — byte-identical until someone means to change them.'
