    level: 2
    text: 5.2 · The imperfect hand
    id: ch-5-s2
  - type: paragraph
    text: Perfection reads as machine; a seeded wobble reads as care. Humanize perturbs
      rotation, opacity and stroke weight from one seed — the same seed always draws
      the same page.
