    caption: Figure 11.1 — A palette and its grey test, computed
  - type: paragraph
    text: 'A book is a promise held over hundreds of decisions. The gates keep the
      promise cheap: nobody re-reads every page after every change, because the machine
      already has.'
  - type: heading
    level: 2
    text: 11.2 · What a gate cannot see
    id: ch-11-s2
  - type: paragraph
    text: Honesty requires the inverse list. A gate cannot tell you whether a sentence
      is worth reading, whether a plate earns its page, or whether the tone of a chapter
      matches its subject. It can only hold the ground so those judgements are made
      once, by a person, and never silently unmade by a regression.
  - type: paragraph
    text: 'So the division of labour stands: the machine guards measure, contrast,
      containment, determinism and provenance; the author owns meaning. Neither can
      do the other''s job, and the book is better because neither tries.'
  - break_before: page
    type: heading
    level: 1
    text: 12 · The Book
    id: ch-12
  - type: paragraph
    text: This volume assembled itself. Chapters numbered their own headings, figures
      counted themselves per chapter and folded their labels into captions, and the
      contents page resolved its numbers from the paginated result.
  - type: heading
    level: 2
    text: 12.1 · The whole surface in one builder
    id: ch-12-s1
  - type: code
    source: "book = BookBuilder(title=\"On Composition\", author=\"…\")\nch = book.chapter(\"\
      The Line\")\nch.para(\"A stroke is a promise about a pen…\")\nch.figure(stroke_outline(pts,\
      \ width=18, pen_angle=30),\n          caption=\"A calligraphic swash\")    \
      \ # -> Figure 2.3\ndoc = book.build()                            # validated\
      \ flow document"
    language: python
  - type: list
    items:
    - Front matter carries identity, never a chapter number.
    - A figure without a box still reserves its true height.
    - The book never lists itself in its own contents.
    ordered: true
  - type: heading
    level: 2
    text: 12.2 · From builder to shelf
    id: ch-12-s2
  - type: paragraph
    text: The path from these calls to a bound object is short and entirely inspectable.
      The builder returns a document; the document validates against the model; the
      flow engine paginates it; the SVG pages assemble into a vector PDF or transpile
      to LaTeX for a press that prefers TeX. Each stage is a function with a test,
      not a menu with a mood.
  - type: paragraph
    text: Nothing in that chain is exotic. The same builders that made this book make
      slide decks, diagrams, letters and posters; the book layer is only an opinion
      about numbering and front matter expressed over the common flowables.
  - type: list
    items:
    - One source, every artifact derived.
    - One paginator, every backend downstream.
    - One test suite, every page accounted for.
  - type: paragraph
    text: If a page of this volume ever renders differently on your machine, that
      difference is a bug with a reproduction — the book itself is the test case.
  - type: heading
    level: 2
    text: 12.3 · What the reader never sees
    id: ch-12-s3
  - type: paragraph
    text: 'Under every page: a validated document, a deterministic paginator, margins
      from a hundred-year-old canon, and a test suite that reads the pixels. The craft
      is old; the guarantees are new.'
  - type: paragraph
    text: 'The same surface is reachable over MCP: an agent connects, reads the capability
      guide, and authors through the identical builders — with coverage gates that
      fail the build if a new capability ever ships without appearing in that guide.'
  - type: paragraph
    text: 'Colophon: composed by framegraph.sdk.book on an A5 master, set with the
      ADR-0003 flow engine, every plate computed by the capability it depicts.'
  media: paged
