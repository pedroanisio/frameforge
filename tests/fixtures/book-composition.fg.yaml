  - type: paragraph
    text: The guide's six rows are not swatch inspiration; they are functions of one
      input. Feed the same teal tomorrow and the same six families return — which
      is what lets a palette decision live in version control instead of in somebody's
      memory of a Tuesday.
  - type: heading
    level: 2
    text: 4.2 · Recolouring a page
    id: ch-4-s2
  - type: paragraph
    text: 'Recolor is one call over the whole document: token values, paint literals,
      gradient stops. The pair below is the same plate, remapped from rust to violet
      without touching text.'
