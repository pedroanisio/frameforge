dsl: FrameForge
version: 2.2.0
profile: diagram
title: Affine transforms gallery (fixture)
description: >-
  Companion to transforms.fg.yaml (which emphasises the Y axis). Exercises the
  rest of the `transform` TransformFn surface: 2-axis `translate`, uniform and
  non-uniform `scale`, `skew_x`, the `matrix` raw-affine escape hatch, the
  CSS-string transform form (`"rotate(18deg) scale(1.15)"`), and multi-function
  composition — plus `transform_origin` as a corner Point. Each demo overlays the
  transformed rect on a dashed "ghost" of its untransformed box so the affine
  displacement is visible.
lang: en
defs:
  tokens:
    colors:
      ink: '#1c2733'
      accent: '#2e86de'
      guide: '#aebac6'
    stroke_styles:
      dashed:
        stroke_width: 1.2
        stroke_dasharray: [4, 3]
    text_styles:
      title:
        font: sans
        size: 15
        weight: 600
        color: ink
      cap:
        font: sans
        size: 11
        color: ink
        align: center
pages:
- mode: page
  id: transforms_affine
  canvas:
    size: [880, 220]
    units: px
  rendering:
    coordinate_mode: absolute
  layers:
  - id: main
    z: 0
    objects:
    - type: text
      box: [24, 18, 820, 22]
      text: Affine transforms — translate · scale · skew · matrix · string · compose
      style: title

    # 1 — translate [x, y]
    - type: rect
      box: [48, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [48, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: translate, args: [22, 16]}
    - type: text
      box: [18, 176, 118, 16]
      text: translate [x, y]
      style: cap

    # 2 — scale uniform
    - type: rect
      box: [172, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [172, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: scale, args: [1.35]}
    - type: text
      box: [142, 176, 118, 16]
      text: scale 1.35
      style: cap

    # 3 — scale non-uniform [sx, sy]
    - type: rect
      box: [296, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [296, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: scale, args: [1.5, 0.7]}
    - type: text
      box: [266, 176, 118, 16]
      text: scale [1.5, 0.7]
      style: cap

    # 4 — skew_x
    - type: rect
      box: [420, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [420, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: skew_x, args: [22]}
    - type: text
      box: [390, 176, 118, 16]
      text: skew_x 22°
      style: cap

    # 5 — matrix raw affine (horizontal shear via c)
    - type: rect
      box: [544, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [544, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: matrix, args: [1, 0, 0.36, 1, 0, 0]}
    - type: text
      box: [514, 176, 118, 16]
      text: matrix shear
      style: cap

    # 6 — CSS-string transform form + corner transform_origin
    - type: rect
      box: [668, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [668, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform: rotate(18deg) scale(1.15)
        transform_origin: [668, 70]
    - type: text
      box: [638, 176, 118, 16]
      text: '"rotate scale" · corner'
      style: cap

    # 7 — composition: translate -> rotate -> scale, applied in list order
    - type: rect
      box: [792, 70, 58, 54]
      stroke: guide
      stroke_style: dashed
      radius: 4
    - type: rect
      box: [792, 70, 58, 54]
      fill: accent
      radius: 4
      opacity: 0.82
      style:
        transform:
        - {fn: translate, args: [0, 10]}
        - {fn: rotate, args: [16]}
        - {fn: scale, args: [1.1]}
    - type: text
      box: [762, 176, 118, 16]
      text: translate+rotate+scale
      style: cap
