               box: [670, 454, 160, 28], fill: dark, radius: 6}
            - {type: text, id: e5_pillt,
               text: "ERR_SYCOPHANCY", box: [670, 454, 160, 28], style: tag_w}
            - {type: text, id: e5_def,
               text: "Output shaped by perceived user preference rather than truth. The model optimizes for approval. Not detectable by schema, logic, or range checks — ever.",
               box: [670, 490, 510, 96], style: sm_ink}

            # ERR_INSTRUCTION
            - {type: rect, id: e6_bg, decorative: true,
               box: [1212, 440, 546, 160], fill: panel, radius: 10}
            - {type: rect, id: e6_bar, decorative: true,
