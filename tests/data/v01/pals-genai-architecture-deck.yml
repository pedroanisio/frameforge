  # ═══════════════════════════════════════════════════════════════════════
  # 6  VALIDATOR — THE VERIFICATION BOUNDARY
  # ═══════════════════════════════════════════════════════════════════════
  - slide: 6
    id: validator
    title: "Validators Extend Coverage, But Cannot Guarantee Correctness"
    notes: "The validator is the only node in this architecture capable of programmatically rejecting GenAI output. Emphasise 'programmatically' — human review can also reject, but the validator is the only automated boundary. The residual (ERR_SEMANTIC, ERR_SYCOPHANCY, ERR_CALIBRATION) is not a validator limitation — it is a theoretical limit."
    visual:
      layers:
        - id: bg
          z: 0
          objects:
            - {type: rect, id: bg_fill,  decorative: true, box: [0, 0, 1920, 1080], fill: bg}
            - {type: rect, id: left_bar, decorative: true, box: [0, 0, 8, 1080],    fill: green}
            - {type: rect, id: channel_band, decorative: true,
               box: [0, 0, 1920, 8], fill: green}

        - id: header
          z: 1
          objects:
            - {type: text, id: stitle,
               text: "Validators Extend Coverage, But Cannot Guarantee Correctness",
               box: [80, 56, 1420, 58], style: stitle}
            - {type: rect, id: rule, decorative: true,
               box: [80, 116, 56, 3], fill: green}
            - {type: rect, id: status_pill, decorative: true,
               box: [1540, 58, 300, 44], fill: bg, radius: 22}
            - {type: rect, id: status_pill_s, decorative: true,
               box: [1540, 58, 300, 44], stroke: dark, stroke_width: 1, fill: none, radius: 22}
            - {type: text, id: status_t,
               text: "Only automated boundary",
               box: [1540, 58, 300, 44], style: lbl_b}

        - id: definition
          z: 2
          objects:
            - {type: rect, id: def_rule, decorative: true,
               box: [80, 136, 1760, 2], fill: stroke}
            - {type: text, id: def_t,
               text: "The Validator is the only node in this architecture capable of programmatically rejecting GenAI output. By encoding domain rules, cross-field constraints, and value-range checks, it extends coverage into classes that schema alone cannot reach. It produces auditable output — not provably correct output.",
               box: [80, 154, 1760, 52], style: body}

        - id: coverage_table
          z: 3
          objects:
            # LEFT: what validator covers
            - {type: rect, id: cov_bg, decorative: true,
               box: [80, 258, 760, 710], fill: none, stroke: stroke, stroke_width: 0.5, radius: 12}
            - {type: rect, id: cov_top, decorative: true,
               box: [80, 258, 760, 64], fill: dark, radius: 8}
            - {type: text, id: cov_h,
               text: "Coverage added by the Validator",
               box: [104, 258, 720, 64], style: ctr_w}

            - {type: rect, id: cv1, decorative: true, box: [104, 342, 710, 100], fill: panel, radius: 8}
            - {type: rect, id: cv1b, decorative: true, box: [104, 342, 5, 100], fill: green}
            - {type: rect, id: cv1_pill, decorative: true, box: [120, 356, 162, 26], fill: green, radius: 6}
            - {type: text, id: cv1_pt,
               text: "ERR_INSTRUCTION", box: [120, 356, 162, 26], style: tag_w}
            - {type: text, id: cv1_t,
               text: "Fully covered when prompt constraints are encoded as validator rules. The validator can programmatically reject outputs that violate declared constraints.",
               box: [120, 390, 680, 44], style: sm_ink}

            - {type: rect, id: cv2, decorative: true, box: [104, 452, 710, 100], fill: panel, radius: 8}
            - {type: rect, id: cv2b, decorative: true, box: [104, 452, 5, 100], fill: green}
            - {type: rect, id: cv2_pill, decorative: true, box: [120, 466, 186, 26], fill: green, radius: 6}
            - {type: text, id: cv2_pt,
               text: "ERR_HALLUCINATION (partial)", box: [120, 466, 186, 26], style: tag_w}
            - {type: text, id: cv2_t,
               text: "Enum and value-range checks catch obvious fabrications. A validator can reject outputs where a field value is not in the declared allowed set. The semantic core remains unreachable.",
               box: [120, 500, 680, 44], style: sm_ink}

            - {type: rect, id: cv3, decorative: true, box: [104, 562, 710, 100], fill: panel, radius: 8}
            - {type: rect, id: cv3b, decorative: true, box: [104, 562, 5, 100], fill: green}
            - {type: rect, id: cv3_pill, decorative: true, box: [120, 576, 162, 26], fill: green, radius: 6}
            - {type: text, id: cv3_pt,
               text: "ERR_REASONING (partial)", box: [120, 576, 162, 26], style: tag_w}
            - {type: text, id: cv3_t,
               text: "Cross-field logical consistency rules can catch detectable contradictions: a start date after an end date, a total that does not sum its parts.",
               box: [120, 610, 680, 44], style: sm_ink}

            - {type: rect, id: cv4, decorative: true, box: [104, 672, 710, 100], fill: panel, radius: 8}
            - {type: rect, id: cv4b, decorative: true, box: [104, 672, 5, 100], fill: green}
            - {type: rect, id: cv4_pill, decorative: true, box: [120, 686, 140, 26], fill: green, radius: 6}
            - {type: text, id: cv4_pt,
               text: "ERR_OMISSION", box: [120, 686, 140, 26], style: tag_w}
            - {type: text, id: cv4_t,
               text: "Completeness rules extended beyond schema-required fields. The validator can enforce domain-level completeness not expressible in a structural schema.",
               box: [120, 720, 680, 44], style: sm_ink}

            - {type: rect, id: cv5, decorative: true, box: [104, 782, 710, 100], fill: panel, radius: 8}
            - {type: rect, id: cv5b, decorative: true, box: [104, 782, 5, 100], fill: green}
            - {type: rect, id: cv5_pill, decorative: true, box: [120, 796, 124, 26], fill: green, radius: 6}
            - {type: text, id: cv5_pt,
               text: "ERR_SCHEMA", box: [120, 796, 124, 26], style: tag_w}
            - {type: text, id: cv5_t,
               text: "Structural conformance re-confirmed at the validation boundary, even when schema enforcement is not enforced upstream. The validator is authoritative.",
               box: [120, 830, 680, 44], style: sm_ink}

            # RIGHT: permanent residual
            - {type: rect, id: res_bg, decorative: true,
               box: [900, 258, 940, 710], fill: none, stroke: stroke, stroke_width: 0.5, radius: 12}
            - {type: rect, id: res_top, decorative: true,
               box: [900, 258, 940, 64], fill: dark, radius: 8}
            - {type: text, id: res_h,
               text: "Permanent residual — not addressable by any validator",
               box: [924, 258, 900, 64], style: ctr_w}

            - {type: text, id: res_intro,
               text: "These three classes are resistant to full automation regardless of validator sophistication. The error predicate ε is not computable in general for any of them. This is not an engineering gap — it is a theoretical limit.",
               box: [924, 342, 890, 90], style: body}

            - {type: rect, id: rr1, decorative: true, box: [924, 448, 890, 130], fill: panel, radius: 8}
            - {type: rect, id: rr1b, decorative: true, box: [924, 448, 5, 130], fill: red}
            - {type: rect, id: rr1_pill, decorative: true, box: [940, 462, 148, 26], fill: dark, radius: 6}
            - {type: text, id: rr1_pt,
               text: "ERR_SEMANTIC", box: [940, 462, 148, 26], style: tag_w}
            - {type: text, id: rr1_t,
               text: "A validator can confirm that a field contains a valid string that matches a pattern. It cannot confirm that the string refers to the correct real-world entity. Meaning is not decidable from structure.",
               box: [940, 496, 860, 70], style: sm_ink}

            - {type: rect, id: rr2, decorative: true, box: [924, 590, 890, 130], fill: panel, radius: 8}
            - {type: rect, id: rr2b, decorative: true, box: [924, 590, 5, 130], fill: red}
            - {type: rect, id: rr2_pill, decorative: true, box: [940, 604, 160, 26], fill: dark, radius: 6}
            - {type: text, id: rr2_pt,
               text: "ERR_SYCOPHANCY", box: [940, 604, 160, 26], style: tag_w}
            - {type: text, id: rr2_t,
               text: "A validator has no access to the optimization objective that shaped the model's output. It cannot distinguish approval-seeking from truth-seeking outputs. Requires adversarial probing or domain-expert review.",
               box: [940, 638, 860, 70], style: sm_ink}

            - {type: rect, id: rr3, decorative: true, box: [924, 732, 890, 130], fill: panel, radius: 8}
            - {type: rect, id: rr3b, decorative: true, box: [924, 732, 5, 130], fill: red}
            - {type: rect, id: rr3_pill, decorative: true, box: [940, 746, 172, 26], fill: dark, radius: 6}
            - {type: text, id: rr3_pt,
               text: "ERR_CALIBRATION", box: [940, 746, 172, 26], style: tag_w}
            - {type: text, id: rr3_t,
               text: "Confidence is an intrinsic property of the model's output distribution. A validator receives only the output token, not the distribution it was drawn from. Misaligned confidence is invisible at the output boundary.",
               box: [940, 780, 860, 70], style: sm_ink}

  # ═══════════════════════════════════════════════════════════════════════
  # 7  RESIDUAL EXPOSURE
  # ═══════════════════════════════════════════════════════════════════════
  - slide: 7
    id: residual
    title: "Residual Error Is Permanent, Not A Temporary Engineering Gap"
    notes: "The residual is not a gap in the current architecture — it is a permanent feature of deploying probabilistic models. The honest position is to name it, describe what would reduce (not eliminate) it, and restate Corollary 5: more capable models widen the residual if the verifier is not co-evolved."
    visual:
      layers:
        - id: bg
          z: 0
          objects:
            - {type: rect, id: bg_fill,  decorative: true, box: [0, 0, 1920, 1080], fill: bg}
            - {type: rect, id: left_bar, decorative: true, box: [0, 0, 8, 1080],    fill: purple}

        - id: header
          z: 1
          objects:
            - {type: text, id: stitle,
               text: "Residual Error Is Permanent, Not A Temporary Engineering Gap",
               box: [80, 56, 1600, 58], style: stitle}
            - {type: rect, id: rule, decorative: true,
               box: [80, 116, 56, 3], fill: purple}

        - id: residual_classes
          z: 2
          objects:
