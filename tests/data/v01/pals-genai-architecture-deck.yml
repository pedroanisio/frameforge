               text: "Output cut short without any signal. No error code. No continuation prompt. The downstream consumer cannot distinguish a complete response from a truncated one.",
               box: [104, 490, 510, 96], style: sm_ink}

            # ERR_SYCOPHANCY
            - {type: rect, id: e5_bg, decorative: true,
               box: [646, 440, 546, 160], fill: panel, radius: 10}
            - {type: rect, id: e5_bar, decorative: true,
