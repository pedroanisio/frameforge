               text: "Correct facts, invalid composition. The logical steps do not support the conclusion. Partially catchable only when cross-field constraints are explicitly declared.",
               box: [670, 672, 510, 96], style: sm_ink}

            # ERR_SEMANTIC
            - {type: rect, id: e9_bg, decorative: true,
