               text: "ERR_CALIBRATION", box: [104, 636, 172, 28], style: tag_w}
            - {type: text, id: e7_def,
               text: "Expressed confidence misaligned with actual reliability. The model says it is certain; it is not. ε not computable in general for this class.",
