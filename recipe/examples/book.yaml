# A recipe BOOK: recipes linked by recipe-level `depends_on` (a higher DAG than
# the step-level links inside each recipe). `python -m recipe recipe/examples/book.yaml`.
recipes:
  - id: package
    goal: Make FrameGraph an installable standalone package
    desired_state: A buildable `framegraph` wheel with zero sys.path hacks
    steps:
      - id: move-model
        goal: Move the model into the package (keystone)
        commands:
          - target: models/framegraph.py
            mutate: git mv models/framegraph.py src/framegraph/model.py
            reverse: git mv src/framegraph/model.py models/framegraph.py
      - id: packaging-metadata
        goal: Enable building the wheel
        depends_on: [move-model]
        commands:
          - target: pyproject.toml
            mutate: add build-system + scripts; remove `package = false`
            reverse: git checkout -- pyproject.toml

  - id: publish
    goal: Publish framegraph to PyPI
    depends_on: [package]          # ← recipe-level dependency on a previous recipe
    preconditions:
      - "`package` recipe applied: a wheel builds locally"
    desired_state: framegraph installable via `pip install framegraph`
    steps:
      - id: build
        goal: Build sdist + wheel
        commands:
          - target: dist/
            mutate: python -m build
            reverse: rm -rf dist
      - id: upload
        goal: Upload to PyPI
        depends_on: [build]
        commands:
          - target: "pypi:framegraph"
            mutate: twine upload dist/*
            # no reverse — a published PyPI release is immutable (irreversible)
