# Worked example: the FrameGraph "installable standalone package" migration,
# encoded as a recipe. `python -m recipe recipe/examples/packaging.yaml`.
goal: Make FrameGraph an installable standalone Python package
preconditions:
  - "Full test suite and `make check` are green at HEAD"
  - "Work happens on a branch/worktree; no concurrent edits to models/ or tooling/"
  - "models/framegraph.py is the single source-of-truth Pydantic model"
desired_state: >
  One `framegraph` distribution (src/ layout) installable via `pip install
  framegraph[...]`, exposing the model, SDK, rendering and a tooling CLI, with
  zero sys.path hacks and the generate-and-check gate system intact.

steps:
  - id: move-model
    goal: Move the model into the package (keystone — kills the name collision)
    as_is: models/framegraph.py imported as `framegraph` via sys.path
    to_be: src/framegraph/model.py imported as `framegraph.model`
    independent: false
    commands:
      - target: models/framegraph.py
        mutate: git mv models/framegraph.py src/framegraph/model.py
        reverse: git mv src/framegraph/model.py models/framegraph.py
      - target: tooling/ + tests/
        mutate: "codemod: 'import framegraph as fg' -> 'from framegraph import model as fg'; delete the 61 sys.path inserts + 36 shadow-dances"
        reverse: git checkout -- tooling tests

  - id: move-tooling
    goal: Move tooling into the package as importable modules
    as_is: tooling/*.py run as sys.path-rooted scripts
    to_be: src/framegraph/tooling/*.py with console entry points
    depends_on: [move-model]
    commands:
      - target: tooling/
        mutate: git mv tooling src/framegraph/tooling
        reverse: git mv src/framegraph/tooling tooling
      - target: Makefile
        mutate: "sed -i 's#python tooling/#python -m framegraph.tooling.#g' Makefile"
        reverse: git checkout -- Makefile

  - id: packaging-metadata
    goal: Enable building and installing the wheel
    as_is: pyproject has `package = false`; no build-system / scripts / extras
    to_be: package buildable; [project.scripts] + optional-dependencies extras
    depends_on: [move-model, move-tooling]
    commands:
      - target: pyproject.toml
        mutate: "add [build-system] + [project.scripts]; remove `package = false`; map dependency-groups to optional-dependencies"
        reverse: git checkout -- pyproject.toml

  - id: ship-schema-data
    goal: Ship the generated schema as package data for external consumers
    as_is: schema/framegraph-v2.schema.json is repo-only
    to_be: framegraph/_data/framegraph-v2.schema.json readable via importlib.resources
    depends_on: [move-model]
    commands:
      - target: src/framegraph/_data/
        mutate: cp schema/framegraph-v2.schema.json src/framegraph/_data/
        reverse: rm -rf src/framegraph/_data/

  - id: document-install
    goal: Document the pip-install workflow (fully independent, doc-only)
    as_is: README documents only the in-repo `uv run` workflow
    to_be: README documents `pip install framegraph` + extras
    independent: true
    commands:
      - target: README.md
        mutate: add an "Install (standalone)" section documenting pip install + extras
        reverse: git checkout -- README.md
