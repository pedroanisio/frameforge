# Rename the codebase + package from framegraph → frameforge.
# A reversible, dependency-ordered plan. Validate/report it with:
#   python -m recipe recipe/examples/rename-frameforge.yaml
id: rename-frameforge
goal: Rename the project, package, and code identifiers from framegraph → frameforge
preconditions:
  - "Clean working tree; `make check` and the full pytest suite are green at HEAD"
  - "Work on a dedicated branch/worktree — this is a sweeping rename; no concurrent edits"
  - "SCOPE DECISION: this recipe also renames the BREAKING format identifiers (the `dsl: FrameGraph` document literal and the schema `$id` host) and migrates fixtures via a codemod. Drop the `dsl-literal` step to keep the on-disk document format unchanged."
  - "SCOPE DECISION: the `.fg.yaml` fixture extension is intentionally KEPT (file extension, not the brand) to bound blast radius; add a step if you want `.ff.yaml`."
desired_state: >
  The package imports as `frameforge`, the distribution is `frameforge`, every
  identifier/path/doc reads frameforge/FrameForge, fixtures and examples are
  migrated, generated artifacts are regenerated, and `make check` is green.

steps:
  - id: package-dir
    goal: Rename the package directory
    as_is: framegraph/ (rendering · sdk · mcp · vision · live)
    to_be: frameforge/
    commands:
      - target: framegraph/
        mutate: git mv framegraph frameforge
        reverse: git mv frameforge framegraph

  - id: model-module
    goal: Rename the source-of-truth model module
    as_is: models/framegraph.py (imported as `framegraph` and `models.framegraph`)
    to_be: models/frameforge.py
    commands:
      - target: models/framegraph.py
        mutate: git mv models/framegraph.py models/frameforge.py
        reverse: git mv models/frameforge.py models/framegraph.py

  - id: py-imports
    goal: Codemod every Python import/identifier framegraph → frameforge
    as_is: "`import framegraph`, `from framegraph.…`, `models.framegraph`, `import framegraph as fg` across pkg/tooling/tests/schema"
    to_be: the same imports rebound to `frameforge` / `models.frameforge`
    depends_on: [package-dir, model-module]
    commands:
      - target: frameforge/ tooling/ tests/ schema/
        mutate: "git grep -lz -e 'framegraph' -- 'frameforge/**.py' 'tooling/**.py' 'tests/**.py' 'schema/**.py' | xargs -0 sed -i 's/\\bframegraph\\b/frameforge/g; s/models\\.framegraph/models.frameforge/g'"
        reverse: git checkout -- frameforge tooling tests schema
        note: "includes frameforge/sdk/model.py: import_module('models.framegraph') → 'models.frameforge'"

  - id: examples
    goal: Rename the package examples that import the SDK
    as_is: examples/*.py + framegraph_to_html.py import `framegraph.sdk` (~47 refs)
    to_be: examples import `frameforge.sdk`; framegraph_to_html.py → frameforge_to_html.py
    depends_on: [py-imports]
    commands:
      - target: examples/
        mutate: "git grep -lz 'framegraph' -- 'examples/**.py' | xargs -0 sed -i 's/\\bframegraph\\b/frameforge/g'"
        reverse: git checkout -- examples
      - target: framegraph_to_html.py
        mutate: git mv framegraph_to_html.py frameforge_to_html.py && sed -i 's/\bframegraph\b/frameforge/g' frameforge_to_html.py
        reverse: git mv frameforge_to_html.py framegraph_to_html.py && git checkout -- framegraph_to_html.py

  - id: dsl-literal
    goal: "BREAKING — rename the document discriminator FrameGraph → FrameForge"
    as_is: 'model `dsl` Literal default "FrameGraph"; 47 `dsl:` literals across 31 fixtures + spec/doc examples'
    to_be: 'dsl: "FrameForge" in the model default and every document'
    depends_on: [py-imports]
    commands:
      - target: models/frameforge.py
        mutate: 'sed -i ''s/"FrameGraph"/"FrameForge"/g'' models/frameforge.py'
        reverse: git checkout -- models/frameforge.py
      - target: fixtures/
        mutate: "git grep -lz 'FrameGraph' -- 'fixtures/**' | xargs -0 sed -i 's/FrameGraph/FrameForge/g'"
        reverse: git checkout -- fixtures
        note: "BREAKING format change — every existing .fg document must be migrated; ship this as a versioned codemod"

  - id: schema
    goal: Regenerate the schema under the new name + host
    as_is: schema/framegraph-v2.schema.json · $id https://framegraph.dev/schema/v2
    to_be: schema/frameforge-v2.schema.json · $id https://frameforge.dev/schema/v2
    depends_on: [py-imports, dsl-literal]
    commands:
      - target: schema/framegraph-v2.schema.json
        mutate: git mv schema/framegraph-v2.schema.json schema/frameforge-v2.schema.json && python schema/build_schema.py
        reverse: git mv schema/frameforge-v2.schema.json schema/framegraph-v2.schema.json && git checkout -- schema
      - target: schema/build_schema.py
        mutate: "sed -i 's#framegraph.dev/schema#frameforge.dev/schema#; s/framegraph-v2.schema.json/frameforge-v2.schema.json/g' schema/build_schema.py"
        reverse: git checkout -- schema/build_schema.py

  - id: grammar-spec
    goal: Rename the grammar + spec source files and their internal references
    as_is: grammar/framegraph-v2*.ebnf · spec/framegraph-v2-spec.md
    to_be: grammar/frameforge-v2*.ebnf · spec/frameforge-v2-spec.md
    depends_on: [py-imports]
    commands:
      - target: grammar/
        mutate: "for f in grammar/framegraph-v2*.ebnf; do git mv \"$f\" \"${f/framegraph/frameforge}\"; done && sed -i 's/framegraph/frameforge/g; s/FrameGraph/FrameForge/g' grammar/*.ebnf"
        reverse: git checkout -- grammar && git mv grammar/frameforge-v2.ebnf grammar/framegraph-v2.ebnf
      - target: spec/framegraph-v2-spec.md + tooling/check_*_sync.py
        mutate: "git mv spec/framegraph-v2-spec.md spec/frameforge-v2-spec.md && sed -i 's/framegraph-v2/frameforge-v2/g' tooling/check_grammar_sync.py tooling/check_spec_sync.py"
        reverse: git mv spec/frameforge-v2-spec.md spec/framegraph-v2-spec.md && git checkout -- tooling/check_grammar_sync.py tooling/check_spec_sync.py

  - id: pyproject
    goal: Rename the distribution metadata
    as_is: 'pyproject.toml name = "framegraph"; mcp module framegraph.mcp'
    to_be: 'name = "frameforge"; module frameforge.mcp; refreshed shadow comment'
    depends_on: [package-dir]
    commands:
      - target: pyproject.toml
        mutate: "sed -i 's/^name = \"framegraph\"/name = \"frameforge\"/; s/\\bframegraph\\b/frameforge/g' pyproject.toml"
        reverse: git checkout -- pyproject.toml

  - id: tooling-ci
    goal: Update build/CI wiring that names the module
    as_is: Makefile (frameforge.mcp/.live targets) · CI · mkdocs.yml · .mcp.json
    to_be: the same wiring pointed at `frameforge`
    depends_on: [py-imports]
    commands:
      - target: Makefile + .github/ + mkdocs.yml + .mcp.json
        mutate: "sed -i 's/\\bframegraph\\b/frameforge/g' Makefile .github/workflows/ci.yml mkdocs.yml .mcp.json"
        reverse: git checkout -- Makefile .github/workflows/ci.yml mkdocs.yml .mcp.json

  - id: viewer
    goal: Rename the JS viewer subsystem (independent — separate from the Python rename)
    as_is: viewer/framegraph-viewer.jsx · framegraph-normalize.mjs · data-framegraph-* · pkg name
    to_be: viewer/frameforge-viewer.jsx · frameforge-normalize.mjs · data-frameforge-*
    independent: true
    commands:
      - target: viewer/
        mutate: "for f in viewer/framegraph-*; do git mv \"$f\" \"${f/framegraph/frameforge}\"; done && git grep -lz 'framegraph' -- 'viewer/**' | xargs -0 sed -i 's/framegraph/frameforge/g; s/FrameGraph/FrameForge/g'"
        reverse: git checkout -- viewer && git mv viewer/frameforge-viewer.jsx viewer/framegraph-viewer.jsx && git mv viewer/frameforge-normalize.mjs viewer/framegraph-normalize.mjs

  - id: docs-brand
    goal: Rebrand prose docs and brand assets
    as_is: README · CLAUDE.md · docs/* · PURPOSE · CHANGELOG · codebase-standards · BRAND.md · brand/*
    to_be: all prose + assets read frameforge / FrameForge
    depends_on: [schema, grammar-spec]
    commands:
      - target: "*.md + docs/ + brand/"
        mutate: "git grep -lz -i 'framegraph' -- '*.md' 'docs/**' 'brand/**' | xargs -0 sed -i 's/framegraph/frameforge/g; s/FrameGraph/FrameForge/g' && for f in brand/framegraph-*; do git mv \"$f\" \"${f/framegraph/frameforge}\"; done"
        reverse: git checkout -- . ':!*.py' && git mv brand/frameforge-mark.svg brand/framegraph-mark.svg

  - id: regen-gate
    goal: Regenerate all generated artifacts and run the gate
    as_is: generated schema/status/docs still reference the old name
    to_be: every generated artifact fresh; `make check` + pytest green
    depends_on: [examples, dsl-literal, schema, grammar-spec, pyproject, tooling-ci, docs-brand]
    commands:
      - target: FIXTURE-STATUS.md + docs/ (generated)
        mutate: make schema status docs && make check && uv run pytest -q
        reverse: git checkout -- FIXTURE-STATUS.md schema docs
        note: "verification gate — if this fails, roll back in reverse dependency order"
