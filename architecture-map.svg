<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="940" viewBox="0 0 1320 940" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrGov" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#B45309"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#DC2626"/>
    </marker>
    <style>
      .reg{fill:#F8FAFC;stroke:#CBD5E1;stroke-width:1.2;rx:14;}
      .regL{font-size:13px;font-weight:800;letter-spacing:.5px;fill:#64748B;text-transform:uppercase;}
      .node{rx:9;stroke-width:1.4;}
      .nl{font-size:13px;font-weight:700;}
      .ns{font-size:10.5px;font-weight:500;}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;}
      .egov{stroke:#B45309;stroke-width:1.5;fill:none;stroke-dasharray:5 3;}
      .ered{stroke:#DC2626;stroke-width:1.5;fill:none;}
      .elbl{font-size:10px;font-weight:600;fill:#475569;}
      .glbl{font-size:10px;font-weight:600;fill:#B45309;}
      .tit{font-size:22px;font-weight:800;fill:#0F172A;}
      .sub{font-size:12px;fill:#64748B;}
    </style>
  </defs>

  <rect width="1320" height="940" fill="#FFFFFF"/>
  <text x="40" y="42" class="tit">FrameGraph v2 — Architecture Map</text>
  <text x="40" y="62" class="sub">A DSL + code-generation system: one Pydantic model is the source of truth; everything else is generated from or checked against it.</text>

  <!-- ============ SOURCE OF TRUTH ============ -->
  <rect x="505" y="92" width="310" height="86" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="660" y="120" text-anchor="middle" class="nl" fill="#5B21B6">models/framegraph.py</text>
  <text x="660" y="139" text-anchor="middle" class="ns" fill="#5B21B6">SINGLE SOURCE OF TRUTH · Document (Pydantic v2)</text>
  <text x="660" y="157" text-anchor="middle" class="ns" fill="#6D28D9">closed model (extra="forbid") · 1082 LOC · HEAD 2.2.0</text>
  <text x="660" y="172" text-anchor="middle" class="ns" fill="#6D28D9">VisualObject ∪ Flowable · Style bag (~90 props)</text>

  <!-- ============ AUTHORING (left) ============ -->
  <rect x="40" y="210" width="340" height="270" class="reg" rx="14"/>
  <text x="58" y="234" class="regL">Authoring  ·  inputs</text>

  <rect x="60" y="250" width="300" height="58" class="node" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="74" y="272" class="nl" fill="#1E40AF">framegraph.sdk — DocumentBuilder</text>
  <text x="74" y="290" class="ns" fill="#1E40AF">PageBuilder, layout (row/col/grid), paint,</text>
  <text x="74" y="302" class="ns" fill="#1E40AF">widgets, macros, geometry · 5.5K LOC</text>

  <rect x="60" y="318" width="300" height="46" class="node" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="74" y="338" class="nl" fill="#1E40AF">sdk.expand / sdk.validate</text>
  <text x="74" y="354" class="ns" fill="#1E40AF">lowers builders → model; validates there</text>

  <rect x="60" y="374" width="300" height="46" class="node" fill="#ECFEFF" stroke="#0D9488"/>
  <text x="74" y="394" class="nl" fill="#0F766E">framegraph.mcp — FastMCP server</text>
  <text x="74" y="410" class="ns" fill="#0F766E">run_sdk_code · render · 7 tools (integration)</text>

  <rect x="60" y="430" width="300" height="40" class="node" fill="#ECFEFF" stroke="#0D9488"/>
  <text x="74" y="455" class="nl" fill="#0F766E">pdf_to_framegraph · fixtures (corpus)</text>

  <!-- ============ GENERATED ARTIFACTS (right) ============ -->
  <rect x="940" y="92" width="340" height="330" class="reg" rx="14"/>
  <text x="958" y="116" class="regL">Generated / checked views</text>

  <rect x="960" y="128" width="300" height="40" class="node" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="974" y="153" class="nl" fill="#854D0E">schema/…schema.json  <tspan class="ns">(byte-equal)</tspan></text>

  <rect x="960" y="176" width="300" height="40" class="node" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="974" y="201" class="nl" fill="#854D0E">grammar/*.ebnf  <tspan class="ns">(hand view · enum parity)</tspan></text>

  <rect x="960" y="224" width="300" height="40" class="node" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="974" y="249" class="nl" fill="#854D0E">spec/…spec.md  <tspan class="ns">(membership check)</tspan></text>

  <rect x="960" y="272" width="300" height="40" class="node" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="974" y="297" class="nl" fill="#854D0E">docs/ (MkDocs)  <tspan class="ns">(regenerate + diff)</tspan></text>

  <rect x="960" y="320" width="300" height="40" class="node" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="974" y="345" class="nl" fill="#854D0E">FIXTURE-STATUS.md  <tspan class="ns">(byte-equal)</tspan></text>

  <rect x="960" y="368" width="300" height="40" class="node" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="974" y="393" class="nl" fill="#854D0E">viewer/ type sets  <tspan class="ns">(parity test)</tspan></text>

  <!-- ============ RENDERING (center lower) ============ -->
  <rect x="400" y="520" width="520" height="300" class="reg" rx="14"/>
  <text x="418" y="544" class="regL">Rendering  ·  capability</text>

  <rect x="420" y="558" width="480" height="56" class="node" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="434" y="580" class="nl" fill="#991B1B">Renderer  —  tooling/render_fixtures.py  (2,395 LOC)</text>
  <text x="434" y="598" class="ns" fill="#991B1B">orchestrator: obj dispatch, page-mode layout, flow pagination, text-fit</text>

  <rect x="420" y="628" width="230" height="76" class="node" fill="#F1F5F9" stroke="#475569"/>
  <text x="434" y="649" class="nl" fill="#334155">domain/services (resolvers)</text>
  <text x="434" y="666" class="ns" fill="#334155">paint · stroke · text-style ·</text>
  <text x="434" y="679" class="ns" fill="#334155">canvas · effect · layout_engine ·</text>
  <text x="434" y="692" class="ns" fill="#334155">table_layout  + domain/ports</text>

  <rect x="670" y="628" width="230" height="76" class="node" fill="#F1F5F9" stroke="#475569"/>
  <text x="684" y="649" class="nl" fill="#334155">ScenePainter port → adapters</text>
  <text x="684" y="666" class="ns" fill="#334155">SVG painter (canonical)</text>
  <text x="684" y="679" class="ns" fill="#334155">Chromium/Playwright → PNG</text>
  <text x="684" y="692" class="ns" fill="#334155">LaTeX/TikZ → .tex (flow only)</text>

  <rect x="420" y="718" width="480" height="40" class="node" fill="#F1F5F9" stroke="#475569"/>
  <text x="434" y="743" class="ns" fill="#334155">font_metrics (fontTools/fc-match, graceful) · golden lock = SHA-256 per page (deterministic)</text>

  <rect x="420" y="770" width="480" height="38" class="node" fill="#FFFFFF" stroke="#94A3B8" stroke-dasharray="4 3"/>
  <text x="434" y="794" class="ns" fill="#64748B">two layout engines: page-mode (absolute layers + Group.layout)  ≠  flow-mode (naive vertical pagination)</text>

  <!-- ============ GOVERNANCE GATES (bottom-left band) ============ -->
  <rect x="40" y="520" width="340" height="300" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="58" y="544" class="regL" fill="#B45309">Governance  ·  make check (= CI)</text>
  <rect x="60" y="556" width="300" height="36" class="node" fill="#FEF3C7" stroke="#B45309"/>
  <text x="74" y="579" class="nl" fill="#92400E">validate.py — Pydantic + ~14 static rules</text>
  <g fill="#92400E" class="ns">
    <text x="74" y="610">• schema-check  (regenerate + diff)</text>
    <text x="74" y="628">• grammar-check  (discriminator/enum parity)</text>
    <text x="74" y="646">• spec-check  (every type named in prose)</text>
    <text x="74" y="664">• status-check / docs-check  (regen + diff)</text>
    <text x="74" y="682">• golden-check  (b1 oracle render hashes)</text>
    <text x="74" y="700">• a11y-check  (reading_order, alt text)</text>
    <text x="74" y="718">• overflow  (no text escapes its box)</text>
    <text x="74" y="736">• §8.5 conformance: out-of-profile ⇒ warn</text>
  </g>
  <rect x="60" y="752" width="300" height="50" class="node" fill="#FEF3C7" stroke="#B45309"/>
  <text x="74" y="772" class="nl" fill="#92400E">codemod.py — migrations</text>
  <text x="74" y="790" class="ns" fill="#92400E">P3 stroke-collapse · size→sizing · circle→ellipse · …</text>

  <!-- ============ EDGES ============ -->
  <!-- authoring -> model -->
  <path class="edge" marker-end="url(#arr)" d="M360 300 C 440 300 460 200 503 165"/>
  <text x="392" y="246" class="elbl">build → validate</text>
  <!-- model -> generated (governing/derive) -->
  <path class="egov" marker-end="url(#arrGov)" d="M815 150 C 880 150 900 148 958 148"/>
  <path class="egov" marker-end="url(#arrGov)" d="M815 158 C 880 196 900 196 958 196"/>
  <path class="egov" marker-end="url(#arrGov)" d="M815 164 C 880 244 900 244 958 244"/>
  <path class="egov" marker-end="url(#arrGov)" d="M815 170 C 880 292 900 292 958 292"/>
  <path class="egov" marker-end="url(#arrGov)" d="M815 174 C 880 340 900 340 958 340"/>
  <path class="egov" marker-end="url(#arrGov)" d="M815 178 C 880 388 900 388 958 388"/>
  <text x="838" y="120" class="glbl">generates / governs</text>
  <!-- model -> rendering (data flows) -->
  <path class="edge" marker-end="url(#arr)" d="M640 180 C 600 360 580 470 600 556"/>
  <text x="566" y="372" class="elbl">validated doc →</text>
  <!-- governance validates model + artifacts -->
  <path class="egov" marker-end="url(#arrGov)" d="M210 556 C 230 470 360 300 503 200"/>
  <text x="250" y="430" class="glbl">enforces no-drift</text>
  <!-- INVERTED DEP tension: sdk.conform -> Renderer in tooling -->
  <path class="ered" marker-end="url(#arrRed)" d="M210 364 C 300 460 360 540 420 575"/>
  <text x="210" y="500" fill="#DC2626" font-size="10" font-weight="700">sdk.conform imports</text>
  <text x="210" y="513" fill="#DC2626" font-size="10" font-weight="700">tooling.Renderer (inverted)</text>

  <!-- ============ TENSION HOTSPOTS ============ -->
  <g>
    <circle cx="424" cy="558" r="11" fill="#DC2626"/><text x="424" y="562" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">1</text>
    <circle cx="958" cy="190" r="11" fill="#DC2626"/><text x="958" y="194" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">2</text>
    <circle cx="660" cy="172" r="11" fill="#DC2626"/><text x="660" y="176" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">3</text>
    <circle cx="424" cy="788" r="11" fill="#DC2626"/><text x="424" y="792" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">4</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <rect x="960" y="452" width="320" height="180" rx="10" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="976" y="474" class="regL">Legend</text>
  <rect x="976" y="484" width="16" height="16" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/><text x="1000" y="497" class="ns" fill="#334155">source of truth (model)</text>
  <rect x="976" y="506" width="16" height="16" rx="3" fill="#EFF6FF" stroke="#2563EB"/><text x="1000" y="519" class="ns" fill="#334155">domain (authoring / model)</text>
  <rect x="976" y="528" width="16" height="16" rx="3" fill="#FEF3C7" stroke="#B45309"/><text x="1000" y="541" class="ns" fill="#334155">control / governance (gates)</text>
  <rect x="976" y="550" width="16" height="16" rx="3" fill="#F1F5F9" stroke="#475569"/><text x="1000" y="563" class="ns" fill="#334155">platform / infrastructure (render)</text>
  <rect x="976" y="572" width="16" height="16" rx="3" fill="#ECFEFF" stroke="#0D9488"/><text x="1000" y="585" class="ns" fill="#334155">integration (MCP / PDF)</text>
  <circle cx="984" cy="606" r="8" fill="#DC2626"/><text x="1000" y="610" class="ns" fill="#334155">tension hotspot (see report §6)</text>
  <line x1="1170" y1="498" x2="1200" y2="498" class="egov"/><text x="1206" y="502" class="ns" fill="#334155">governs</text>
  <line x1="1170" y1="520" x2="1200" y2="520" class="edge"/><text x="1206" y="524" class="ns" fill="#334155">data flow</text>
  <line x1="1170" y1="542" x2="1200" y2="542" class="ered"/><text x="1206" y="546" class="ns" fill="#334155">inverted dep</text>

  <!-- tension key -->
  <rect x="40" y="840" width="1240" height="76" rx="10" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="56" y="862" font-size="12" font-weight="800" fill="#991B1B">TENSIONS</text>
  <text x="56" y="882" font-size="11" fill="#7F1D1D">1 · Canonical Renderer lives in tooling/ (a 2.4K-LOC monolith) and the SDK depends UP into it — inverted layering, half-finished hexagonal extraction.</text>
  <text x="56" y="898" font-size="11" fill="#7F1D1D">2 · Drift surface: grammar EBNF + spec prose are hand-maintained VIEWS of the model, kept honest only by membership/enum gates (looser than the byte-equal schema).</text>
  <text x="660" y="882" font-size="11" fill="#7F1D1D">3 · Style is a ~90-field closed CSS bag; TextStyle/StrokeStyle are aliases of it — broad surface, only partly enforced by the renderer.</text>
  <text x="660" y="898" font-size="11" fill="#7F1D1D">4 · Two paradigms: absolute page-mode vs naive flow-mode pagination — separate layout engines, no shared model; flow is the weaker engine.</text>
</svg>
